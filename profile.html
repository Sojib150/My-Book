<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .profile-ring { padding: 4px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 2.5rem; }
        .action-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .action-btn:hover { background: rgba(99, 102, 241, 0.1); border-color: #6366f1; }
        .nav-btn { transition: 0.3s; }
        .nav-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="pb-24">

    <div class="relative h-48 bg-gradient-to-b from-indigo-600/20 to-transparent">
        <div class="absolute -bottom-16 left-0 right-0 flex flex-col items-center">
            <div class="profile-ring shadow-2xl shadow-indigo-500/20">
                <img id="uPic" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-[2.3rem] object-cover border-4 border-[#05070a]">
            </div>
            <div class="flex items-center gap-2 mt-4">
                <h2 id="uName" class="text-2xl font-black tracking-tight">Loading...</h2>
                <span id="uBadge" class="hidden text-blue-500 text-lg"><i class="fas fa-check-circle"></i></span>
            </div>
            <p id="uEmail" class="text-slate-500 text-xs font-bold tracking-widest uppercase">email@example.com</p>
        </div>
    </div>

    <main class="mt-24 px-6 space-y-8">
        <div class="flex justify-around items-center glass p-6 rounded-[2rem] text-center">
            <div>
                <p id="uPosts" class="text-xl font-black">0</p>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Posts</p>
            </div>
            <div class="w-[1px] h-8 bg-white/5"></div>
            <div>
                <p id="uFollowers" class="text-xl font-black">0</p>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Followers</p>
            </div>
            <div class="w-[1px] h-8 bg-white/5"></div>
            <div>
                <p id="uFollowing" class="text-xl font-black">0</p>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Following</p>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="window.location.href='edit-profile.html'" class="w-full flex items-center justify-between p-5 rounded-2xl action-btn">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center"><i class="fas fa-user-edit"></i></div>
                    <span class="text-sm font-black uppercase tracking-tight">Edit Profile</span>
                </div>
                <i class="fas fa-chevron-right text-slate-600"></i>
            </button>

            <button onclick="window.location.href='Withdraw.html'" class="w-full flex items-center justify-between p-5 rounded-2xl action-btn">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-green-500/10 text-green-400 rounded-xl flex items-center justify-center"><i class="fas fa-wallet"></i></div>
                    <span class="text-sm font-black uppercase tracking-tight">Wallet & Earnings</span>
                </div>
                <i class="fas fa-chevron-right text-slate-600"></i>
            </button>

            <button onclick="logout()" class="w-full flex items-center justify-between p-5 rounded-2xl action-btn">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-red-500/10 text-red-400 rounded-xl flex items-center justify-center"><i class="fas fa-power-off"></i></div>
                    <span class="text-sm font-black uppercase tracking-tight">Sign Out</span>
                </div>
            </button>
        </div>

        <div class="glass p-6 rounded-[2rem]">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">About Me</h3>
            <p id="uBio" class="text-xs text-slate-400 leading-relaxed">No bio added yet. Tell the My Book community about yourself!</p>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 glass rounded-[2rem] p-3 flex justify-around items-center z-50">
        <button onclick="window.location.href='feed.html'" class="p-4 text-slate-500 nav-btn"><i class="fas fa-home"></i></button>
        <button onclick="window.location.href='search.html'" class="p-4 text-slate-500 nav-btn"><i class="fas fa-search"></i></button>
        <button onclick="window.location.href='add-post.html'" class="w-12 h-12 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-500/40 nav-btn"><i class="fas fa-plus"></i></button>
        <button onclick="window.location.href='dashboard.html'" class="p-4 text-slate-500 nav-btn"><i class="fas fa-chart-pie"></i></button>
        <button onclick="window.location.href='profile.html'" class="p-4 text-indigo-400 nav-btn"><i class="fas fa-user"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    if (d.exists()) {
                        const data = d.data();
                        document.getElementById('uName').innerText = data.name || "User";
                        document.getElementById('uEmail').innerText = data.email;
                        document.getElementById('uFollowers').innerText = data.followers || 0;
                        document.getElementById('uFollowing').innerText = data.following || 0;
                        document.getElementById('uPosts').innerText = data.postCount || 0;
                        document.getElementById('uPic').src = data.profilePic || "https://via.placeholder.com/150";
                        document.getElementById('uBio').innerText = data.bio || "No bio added yet.";
                        
                        if(data.isVerified) document.getElementById('uBadge').classList.remove('hidden');
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        };
    </script>
</body>
</html>
