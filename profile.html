<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
.header{background:#1877f2;color:white;padding:15px;text-align:center;}
.profile{background:white;padding:20px;text-align:center;}
.post{background:white;margin:10px;padding:10px;border-radius:10px;}
button{padding:6px 10px;border:none;border-radius:5px;margin:5px;}
.blue{background:#1877f2;color:white;}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="profile">
<h2 id="name">User</h2>
</div>

<!-- 🔥 Friend Requests -->
<div id="requests"></div>

<!-- 🔥 My Posts -->
<div id="posts"></div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
loadAll();
}else{
location.href="login.html";
}
});

function loadAll(){

// 👤 name
onValue(ref(db,"users/"+uid),snap=>{
let d = snap.val();
if(d){
document.getElementById("name").innerText = d.username || "User";
}
});

// 📩 requests
onValue(ref(db,"requests/"+uid),snap=>{
let data = snap.val();
let html="";

if(!data){
html = "<p style='text-align:center'>No Requests</p>";
}else{
for(let from in data){
html+=`
<div class="post">
Friend request from: ${from}<br>
<button class="blue" onclick="accept('${from}')">Accept</button>
<button onclick="reject('${from}')">Reject</button>
</div>
`;
}
}

document.getElementById("requests").innerHTML = html;
});

// 📝 posts
onValue(ref(db,"posts"),snap=>{
let data = snap.val();
let html="";

for(let id in data){
let p = data[id];
if(p.owner===uid){
html+=`<div class="post">${p.text}</div>`;
}
}

document.getElementById("posts").innerHTML = html;
});

}

// ✅ accept
window.accept = async function(from){
await set(ref(db,"friends/"+uid+"/"+from),true);
await set(ref(db,"friends/"+from+"/"+uid),true);
await remove(ref(db,"requests/"+uid+"/"+from));
alert("Friend Added");
}

// ❌ reject
window.reject = async function(from){
await remove(ref(db,"requests/"+uid+"/"+from));
}
</script>

</body>
</html>
