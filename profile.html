<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .verified-badge { color: #1d9bf0; font-size: 1.1rem; margin-left: 4px; }
        .dashboard-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <a href="home.html" class="text-blue-600"><i class="fas fa-arrow-left text-xl"></i></a>
            <h1 id="topName" class="font-bold text-gray-800 text-sm uppercase tracking-widest">আমার প্রোফাইল</h1>
            <a href="edit-profile.html" class="text-gray-400 hover:text-blue-600"><i class="fas fa-cog text-xl"></i></a>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white shadow-sm border-b overflow-hidden">
        <div class="h-40 bg-gradient-to-r from-blue-500 to-indigo-600 relative">
            <img id="coverImg" src="" class="w-full h-full object-cover hidden">
        </div>

        <div class="px-6 pb-6">
            <div class="relative flex justify-center -mt-16">
                <div class="w-32 h-32 bg-blue-500 rounded-full border-4 border-white shadow-2xl overflow-hidden flex items-center justify-center text-4xl font-bold text-white relative">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                    <span id="initialText">?</span>
                </div>
            </div>

            <div class="text-center mt-4">
                <div class="flex items-center justify-center gap-1">
                    <h2 id="uName" class="text-2xl font-black text-gray-800 leading-none italic">লোড হচ্ছে...</h2>
                    <span id="vBadge" class="hidden"><i class="fas fa-check-circle verified-badge"></i></span>
                </div>
                <p id="uBio" class="text-gray-400 text-[10px] mt-2 px-4 italic"></p>
            </div>

            <div class="mt-6">
                <a href="dashboard.html" class="dashboard-gradient block w-full p-4 rounded-2xl text-white shadow-lg active:scale-95 transition-all">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold uppercase opacity-80">Creator Tools</p>
                            <h3 class="font-black tracking-tight">Professional Dashboard</h3>
                        </div>
                        <i class="fas fa-chart-line text-2xl opacity-50"></i>
                    </div>
                </a>
            </div>

            <div class="mt-6 space-y-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2"><i class="fas fa-info-circle mr-1"></i> পরিচয় ও তথ্য</h3>
                <div id="info-job" class="hidden flex items-center gap-3 text-xs text-gray-600"><i class="fas fa-briefcase w-4 text-blue-500"></i> <span id="val-job"></span></div>
                <div id="info-edu" class="hidden flex items-center gap-3 text-xs text-gray-600"><i class="fas fa-graduation-cap w-4 text-blue-500"></i> <span id="val-edu"></span></div>
                <div id="info-city" class="hidden flex items-center gap-3 text-xs text-gray-600"><i class="fas fa-map-marker-alt w-4 text-blue-500"></i> <span id="val-city"></span></div>
                <div id="info-relation" class="hidden flex items-center gap-3 text-xs text-gray-600"><i class="fas fa-heart w-4 text-pink-500"></i> <span id="val-relation"></span></div>
            </div>

            <div class="flex justify-around mt-8 border-t pt-6">
                <div class="text-center">
                    <p id="pCount" class="font-black text-lg text-gray-800">0</p>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Posts</p>
                </div>
                <div class="text-center cursor-pointer" onclick="window.openModal('followers')">
                    <p id="followerCount" class="font-black text-lg text-gray-800">0</p>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest">Followers</p>
                </div>
                <div class="text-center cursor-pointer" onclick="window.openModal('following')">
                    <p id="followingCount" class="font-black text-lg text-gray-800">0</p>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest">Following</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 bg-white min-h-[300px]">
        <div class="flex border-b">
            <button class="flex-1 py-3 text-[10px] font-black uppercase text-blue-600 border-b-2 border-blue-600">My Posts</button>
            <button class="flex-1 py-3 text-[10px] font-black uppercase text-gray-400">Reels</button>
        </div>
        <div id="uPosts" class="grid grid-cols-3 gap-0.5 p-0.5"></div>
    </div>

    <div class="max-w-md mx-auto p-6 mt-4">
        <button onclick="window.logout()" class="w-full bg-red-50 text-red-600 font-bold py-4 rounded-2xl border border-red-100 flex items-center justify-center gap-3 active:scale-95 transition-all shadow-sm">
            <i class="fas fa-sign-out-alt"></i> 
            <span class="uppercase tracking-widest text-[10px]">লগ-আউট করুন</span>
        </button>
    </div>

    <div id="listModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[30px] p-6 h-[70vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6 pb-2 border-b">
                <h3 id="modalTitle" class="font-black text-gray-800 uppercase text-xs tracking-widest">List</h3>
                <button onclick="window.closeModal()" class="text-gray-400 text-2xl px-2">&times;</button>
            </div>
            <div id="modalList" class="flex-1 overflow-y-auto space-y-4 no-scrollbar"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid = null;

        onAuthStateChanged(auth, user => {
            if(user) {
                uid = user.uid;
                loadProfile();
                loadStats();
                loadPosts();
            } else { window.location.href = "index.html"; }
        });

        async function loadProfile() {
            onSnapshot(doc(db, "users", uid), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById('uName').innerText = d.name || "User";
                    document.getElementById('topName').innerText = d.name || "Profile";
                    document.getElementById('uBio').innerText = d.bio || "";
                    document.getElementById('initialText').innerText = (d.name ? d.name[0] : "U").toUpperCase();
                    
                    // Verified Badge Logic (যন্ত্রপাতি ১)
                    if(d.isVerified === true) {
                        document.getElementById('vBadge').classList.remove('hidden');
                    } else {
                        document.getElementById('vBadge').classList.add('hidden');
                    }

                    if(d.profilePic) {
                        const img = document.getElementById('profileImg');
                        img.src = d.profilePic; img.classList.remove('hidden');
                        document.getElementById('initialText').classList.add('hidden');
                    }
                    if(d.coverPic) {
                        const cImg = document.getElementById('coverImg');
                        cImg.src = d.coverPic; cImg.classList.remove('hidden');
                    }

                    showInfo('info-job', 'val-job', d.job, 'কাজ: ');
                    showInfo('info-edu', 'val-edu', d.education, 'পড়াশোনা: ');
                    showInfo('info-city', 'val-city', d.city, 'শহর: ');
                    showInfo('info-relation', 'val-relation', d.relationship, 'সম্পর্ক: ');
                }
            });
        }

        function showInfo(divId, valId, value, label) {
            if(value && value !== "") {
                document.getElementById(divId).classList.remove('hidden');
                document.getElementById(valId).innerText = label + value;
            } else {
                document.getElementById(divId).classList.add('hidden');
            }
        }

        function loadStats() {
            onSnapshot(collection(db, "users", uid, "followers"), s => document.getElementById('followerCount').innerText = s.size);
            onSnapshot(collection(db, "users", uid, "following"), s => document.getElementById('followingCount').innerText = s.size);
        }

        async function loadPosts() {
            // Algorithm Connection (যন্ত্রপাতি ২)
            const algoSnap = await getDoc(doc(db, "appSettings", "algorithm"));
            let algoMode = algoSnap.exists() ? algoSnap.data().priority : 'fresh';

            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, s => {
                const container = document.getElementById('uPosts'); 
                container.innerHTML = "";
                document.getElementById('pCount').innerText = s.size;
                
                let myPosts = [];
                s.forEach(d => myPosts.push({id: d.id, ...d.data()}));

                // Sorting based on admin settings
                if(algoMode === 'popular') {
                    myPosts.sort((a, b) => (b.likes || 0) - (a.likes || 0));
                } else {
                    myPosts.sort((a, b) => b.createdAt?.toMillis() - a.createdAt?.toMillis());
                }

                myPosts.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "aspect-square bg-gray-100 border-[0.5px] border-white overflow-hidden relative group";
                    
                    let content = "";
                    if(p.fileType === 'video') {
                        content = `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>
                                   <i class="fas fa-play absolute top-2 right-2 text-white text-[10px] drop-shadow-md"></i>`;
                    } else if(p.fileUrl) {
                        content = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                    } else {
                        content = `<div class="p-2 text-[8px] text-gray-500 font-bold uppercase">${p.text?.slice(0,30)}...</div>`;
                    }
                    
                    div.innerHTML = content;
                    container.appendChild(div);
                });
            });
        }

        window.openModal = async (type) => {
            const modal = document.getElementById('listModal');
            const listDiv = document.getElementById('modalList');
            document.getElementById('modalTitle').innerText = type === 'followers' ? 'Followers' : 'Following';
            modal.classList.remove('hidden');
            listDiv.innerHTML = "<div class='flex justify-center py-10'><i class='fas fa-circle-notch fa-spin text-blue-600'></i></div>";
            
            onSnapshot(collection(db, "users", uid, type), async s => {
                listDiv.innerHTML = "";
                if(s.empty) listDiv.innerHTML = "<p class='text-center text-gray-400 text-xs py-10'>No one here yet.</p>";
                for(const docRef of s.docs) {
                    const uSnap = await getDoc(doc(db, "users", docRef.id));
                    if(uSnap.exists()){
                        const u = uSnap.data();
                        listDiv.innerHTML += `
                            <div class="flex items-center justify-between p-2 bg-gray-50 rounded-xl">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-blue-100 rounded-full overflow-hidden">
                                        <img src="${u.profilePic || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                    </div>
                                    <div>
                                        <p class="text-sm font-black text-gray-800">${u.name || 'User'} ${u.isVerified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>' : ''}</p>
                                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">View Profile</p>
                                    </div>
                                </div>
                                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
                            </div>`;
                    }
                }
            });
        };

        window.closeModal = () => document.getElementById('listModal').classList.add('hidden');
        window.logout = () => confirm("আপনি কি নিশ্চিত?") && signOut(auth).then(() => window.location.href = "index.html");

    </script>
</body>
</html>
