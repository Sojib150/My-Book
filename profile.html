<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 p-4 text-white flex items-center gap-4 sticky top-0 z-50 shadow-md">
        <a href="home.html" class="text-xl font-bold">←</a>
        <h1 class="font-bold">My Profile</h1>
    </nav>

    <div class="max-w-md mx-auto bg-white p-6 text-center border-b shadow-sm">
        <div id="uInit" class="w-24 h-24 bg-blue-500 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl font-bold text-white border-4 border-blue-100 shadow-lg">?</div>
        <h2 id="uName" class="text-xl font-bold text-gray-800">Loading...</h2>
        <p id="uEmail" class="text-gray-400 text-sm italic mb-4"></p>
        
        <div class="flex justify-around border-t pt-4">
            <div><p id="pCount" class="font-bold">0</p><p class="text-[10px] text-gray-400">POSTS</p></div>
            <div><p class="font-bold">0</p><p class="text-[10px] text-gray-400">FOLLOWERS</p></div>
        </div>
    </div>

    <div id="uPosts" class="max-w-md mx-auto grid grid-cols-3 gap-1 p-1 mt-2">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp({ apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92" });
        const db = getFirestore(app); const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(!user) return;
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('uName').innerText = name;
            document.getElementById('uEmail').innerText = user.email;
            document.getElementById('uInit').innerText = name[0].toUpperCase();
            
            // পোস্ট লোড করা
            const q = query(collection(db, "posts"), where("userId", "==", user.uid));
            onSnapshot(q, snap => {
                const container = document.getElementById('uPosts');
                container.innerHTML = "";
                document.getElementById('pCount').innerText = snap.size;

                if (snap.empty) {
                    container.innerHTML = "<p class='col-span-3 text-center py-10 text-gray-400 text-sm'>কোনো পোস্ট পাওয়া যায়নি</p>";
                }

                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "aspect-square bg-gray-300 overflow-hidden relative";
                    
                    let content = "";
                    if(p.fileUrl) {
                        if(p.fileType === 'video') {
                            content = `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video><span class="absolute top-1 right-1 text-[8px] bg-black/50 text-white p-0.5 rounded">▶</span>`;
                        } else {
                            content = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                        }
                    } else {
                        content = `<div class="p-2 text-[8px] text-gray-700 bg-blue-50 h-full flex items-center justify-center text-center italic">${p.text.substring(0, 30)}...</div>`;
                    }
                    
                    div.innerHTML = content;
                    container.appendChild(div);
                });
            });
        });
    </script>
</body>
</html>
