<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .profile-card { border-radius: 30px 30px 0 0; margin-top: -30px; }
        .stat-card { background: #f8fafc; border-radius: 15px; transition: all 0.3s; }
        .stat-card:active { transform: scale(0.95); background: #f1f5f9; }
        .post-img { aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <nav class="glass-nav sticky top-0 z-50 p-4 flex justify-between items-center border-b max-w-md mx-auto">
        <h1 id="topUser" class="font-black text-gray-800 tracking-tighter text-lg italic">PROFILE</h1>
        <div class="flex gap-4">
            <button onclick="window.location.href='search.html'"><i class="fas fa-search text-gray-500"></i></button>
            <button onclick="window.location.href='edit-profile.html'"><i class="fas fa-cog text-gray-500"></i></button>
        </div>
    </nav>

    <div class="max-w-md mx-auto relative">
        <div class="h-48 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 relative">
            <img id="coverImg" src="" class="w-full h-full object-cover hidden">
            <div class="absolute inset-0 bg-black/10"></div>
        </div>

        <div class="bg-white profile-card relative px-6 pt-0 shadow-2xl">
            <div class="flex justify-center relative -top-16">
                <div class="w-32 h-32 rounded-full border-4 border-white shadow-xl bg-indigo-500 overflow-hidden flex items-center justify-center text-4xl text-white font-bold">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                    <span id="initials">?</span>
                </div>
            </div>

            <div class="text-center -mt-12">
                <h2 id="uName" class="text-2xl font-black text-gray-800 tracking-tight leading-none italic uppercase">লোড হচ্ছে...</h2>
                <p id="uEmail" class="text-[10px] text-gray-400 font-bold mt-1 tracking-widest"></p>
                <p id="uBio" class="text-gray-500 text-xs mt-3 px-8 leading-relaxed italic">আপনার প্রোফাইল সাজাতে এডিট বাটনে ক্লিক করুন।</p>
            </div>

            <div class="flex gap-2 mt-6">
                <button onclick="window.location.href='edit-profile.html'" class="flex-1 bg-gray-900 text-white py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition">
                    Edit Profile
                </button>
                <button onclick="window.location.href='home.html'" class="flex-1 bg-white border border-gray-200 text-gray-800 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-sm active:scale-95 transition">
                    Share Profile
                </button>
            </div>

            <div class="grid grid-cols-3 gap-3 mt-8 pb-8 border-b">
                <div class="stat-card p-3 text-center">
                    <p id="pCount" class="font-black text-lg text-indigo-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Posts</p>
                </div>
                <div class="stat-card p-3 text-center cursor-pointer" onclick="openList('followers')">
                    <p id="followerCount" class="font-black text-lg text-indigo-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Followers</p>
                </div>
                <div class="stat-card p-3 text-center cursor-pointer" onclick="openList('following')">
                    <p id="followingCount" class="font-black text-lg text-indigo-600">0</p>
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Following</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white mt-0 px-4 pt-4">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-black text-gray-800 text-xs uppercase tracking-widest">My Gallery</h3>
            <div class="flex gap-2">
                <button id="gridBtn" class="text-indigo-600"><i class="fas fa-th-large"></i></button>
                <button id="listBtn" class="text-gray-300"><i class="fas fa-list"></i></button>
            </div>
        </div>
        
        <div id="uPosts" class="grid grid-cols-3 gap-2">
            </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-gray-900/90 backdrop-blur-xl rounded-3xl p-4 flex justify-around items-center shadow-2xl z-50">
        <a href="home.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-home"></i></a>
        <a href="search.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-search"></i></a>
        <button class="bg-indigo-600 text-white w-10 h-10 rounded-full flex items-center justify-center -mt-10 border-4 border-gray-100 shadow-xl active:scale-90 transition">
            <i class="fas fa-plus"></i>
        </button>
        <a href="messages.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-comment"></i></a>
        <a href="profile.html" class="text-indigo-400"><i class="fas fa-user"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                loadProfile(user.uid);
                loadStats(user.uid);
                loadPosts(user.uid);
            } else { window.location.href = "index.html"; }
        });

        async function loadProfile(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                const d = snap.data();
                const name = d.name || auth.currentUser.email.split('@')[0];
                document.getElementById('uName').innerText = name;
                document.getElementById('topUser').innerText = name;
                document.getElementById('uEmail').innerText = d.email || auth.currentUser.email;
                document.getElementById('uBio').innerText = d.bio || "No bio available.";
                document.getElementById('initials').innerText = name[0].toUpperCase();
                
                if(d.profilePic) {
                    const img = document.getElementById('profileImg');
                    img.src = d.profilePic; img.classList.remove('hidden');
                    document.getElementById('initials').classList.add('hidden');
                }
                if(d.coverPic) {
                    const img = document.getElementById('coverImg');
                    img.src = d.coverPic; img.classList.remove('hidden');
                }
            }
        }

        function loadStats(uid) {
            onSnapshot(collection(db, "users", uid, "followers"), s => document.getElementById('followerCount').innerText = s.size);
            onSnapshot(collection(db, "users", uid, "following"), s => document.getElementById('followingCount').innerText = s.size);
        }

        function loadPosts(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, s => {
                const container = document.getElementById('uPosts'); container.innerHTML = "";
                document.getElementById('pCount').innerText = s.size;
                s.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "post-img bg-gray-200 overflow-hidden shadow-sm active:scale-95 transition";
                    div.innerHTML = p.fileUrl ? (p.fileType==='video'?`<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>`:`<img src="${p.fileUrl}" class="w-full h-full object-cover">`) : `<div class="p-2 text-[8px] flex items-center justify-center h-full text-gray-500">${p.text?.slice(0,20)}</div>`;
                    container.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
