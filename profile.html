<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Premium Profile - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050508; -webkit-tap-highlight-color: transparent; color: #fff; margin: 0; overflow-x: hidden; }
        
        /* Premium Cyberpunk & Glassmorphism Theme Base */
        .neon-border { border: 1px solid rgba(99, 102, 241, 0.15); box-shadow: 0 0 15px rgba(99, 102, 241, 0.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-panel { background: linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0%, rgba(234, 179, 8, 0.03) 100%); border: 1px solid rgba(245, 158, 11, 0.2); }
        
        .avatar-ring { border: 4px solid #0b0f19; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); border-radius: 35px; transform: translateY(-35%); }
        
        /* Premium Creator Stat Block */
        .stat-pill { background: rgba(255, 255, 255, 0.03); border-radius: 16px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-pill:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.07); }
        
        /* Tik-Tok/Reels Style Grid Thumbnails */
        .insta-gallery-item { aspect-ratio: 1/1; position: relative; overflow: hidden; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .media-badge { position: absolute; top: 8px; right: 8px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); color: white; width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; z-index: 5; }
        .text-post-placeholder { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); padding: 10px; display: flex; align-items: center; justify-content: center; text-align: center; height: 100%; font-size: 10px; font-weight: 700; color: #a5b4fc; line-height: 1.4; }
        
        .interest-tag { background: rgba(99, 102, 241, 0.1); color: #818cf8; font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(99, 102, 241, 0.15); text-transform: uppercase; }
        
        /* 📱 Universal Bottom Menu Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; background: rgba(8, 12, 20, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.04); padding: 12px 0; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #64748b; transition: all 0.25s; }
        .nav-btn.active { color: #1877f2; text-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28">

    <nav class="sticky top-0 z-50 bg-[#0b0f19]/90 backdrop-blur-md border-b border-white/5 px-5 py-4 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <button onclick="logoutUser()" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl flex items-center justify-center active:scale-90 transition border border-red-500/20">
                <i class="fas fa-power-off text-xs"></i>
            </button>
            <h1 id="topUser" class="font-black text-white tracking-wider text-sm italic uppercase truncate max-w-[150px]">STUDIO</h1>
        </div>
        
        <div class="flex gap-2.5 items-center">
            <button id="adminGatewayBtn" onclick="location.href='admin.html'" class="w-9 h-9 bg-indigo-600/10 border border-indigo-500/30 rounded-xl flex items-center justify-center text-indigo-400 active:scale-95 transition hidden" title="Access Master Control Panel">
                <i class="fa-solid fa-headset text-xs animate-pulse"></i>
            </button>
            <button onclick="location.href='search.html'" class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center text-gray-400 active:scale-95 transition"><i class="fas fa-search text-xs"></i></button>
            <button onclick="location.href='edit-profile.html'" class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center text-gray-400 active:scale-95 transition" title="Edit Profile Details"><i class="fas fa-sliders-h text-xs"></i></button>
        </div>
    </nav>

    <div class="max-w-md mx-auto relative px-0 sm:px-4">
        <div class="h-44 bg-gradient-to-tr from-indigo-900 via-purple-900 to-slate-900 relative overflow-hidden sm:rounded-t-[28px] neon-border">
            <img id="coverImg" src="" class="w-full h-full object-cover opacity-60 hidden">
            <div class="absolute inset-0 bg-black/30"></div>
        </div>

        <div class="bg-[#0b0f19] px-5 pb-6 rounded-b-[28px] border-x border-b border-white/5 shadow-xl relative">
            <div class="flex justify-center relative h-12">
                <div class="avatar-ring w-28 h-28 bg-[#1e1b4b] overflow-hidden flex items-center justify-center text-3xl text-white font-black">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden bg-black">
                    <span id="initials">?</span>
                </div>
            </div>

            <div class="text-center mt-3 space-y-1">
                <div class="flex items-center justify-center gap-1.5">
                    <h2 id="uName" class="text-xl font-black text-white tracking-wide italic uppercase">LOADING...</h2>
                    <div id="verifiedBadge" class="bg-indigo-500 text-white w-3.5 h-3.5 rounded-full flex items-center justify-center text-[7px] hidden"><i class="fas fa-check"></i></div>
                </div>
                <p id="uEmail" class="text-[9px] text-gray-500 font-extrabold tracking-widest uppercase"></p>
                
                <div id="interestBadges" class="flex flex-wrap justify-center gap-1.5 pt-2"></div>
                
                <p id="uBio" class="text-gray-400 text-[12px] pt-3 px-4 font-medium leading-relaxed italic text-center"></p>
            </div>

            <div class="mt-5 p-4 rounded-2xl gold-panel flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-400 border border-amber-500/20">
                        <i class="fa-solid fa-wallet text-sm animate-bounce"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-black uppercase text-amber-500 tracking-widest">Creator Balance Wallet</p>
                        <div class="flex items-baseline gap-1">
                            <span class="text-lg font-black text-white tracking-tight" id="walletBalance">0.00</span>
                            <span class="text-[9px] font-bold text-amber-400 uppercase">BDT</span>
                        </div>
                    </div>
                </div>
                <button onclick="location.href='Withdraw.html'" class="px-3.5 py-2 bg-amber-500 text-black font-black text-[10px] tracking-wider uppercase rounded-xl shadow-lg shadow-amber-500/10 active:scale-95 transition">
                    Cash Out <i class="fa-solid fa-arrow-turn-up text-[9px] ml-0.5"></i>
                </button>
            </div>

            <div class="mt-4 grid grid-cols-2 gap-2">
                <button onclick="location.href='dashboard.html'" class="glass-panel hover:bg-white/5 text-gray-300 py-3 px-2 rounded-xl font-bold text-[10px] uppercase tracking-wider active:scale-98 transition flex items-center justify-center gap-2">
                    <i class="fas fa-chart-pie text-indigo-400 text-xs"></i>
                    Creator Studio
                </button>
                <button onclick="location.href='notifications.html'" class="glass-panel hover:bg-white/5 text-gray-300 py-3 px-2 rounded-xl font-bold text-[10px] uppercase tracking-wider active:scale-98 transition flex items-center justify-center gap-2">
                    <i class="fas fa-bell text-blue-400 text-xs"></i>
                    Alert Hub
                </button>
            </div>

            <div class="mt-2 px-0">
                <button onclick="openComplaintModal()" class="w-full bg-amber-500/5 hover:bg-amber-500/10 text-amber-400/80 py-3 rounded-xl font-bold text-[11px] uppercase tracking-wider active:scale-98 transition flex items-center justify-center gap-2 border border-amber-500/10">
                    <i class="fa-solid fa-triangle-exclamation text-amber-500 text-xs"></i>
                    Report Issue / এডমিনকে কমপ্লেন করুন
                </button>
            </div>
                
            <div class="grid grid-cols-3 gap-3 mt-4">
                <div class="stat-pill p-3 text-center">
                    <p id="pCount" class="font-black text-base text-white">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Reels</p>
                </div>
                <div id="followersBtn" class="stat-pill p-3 text-center">
                    <p id="followerCount" class="font-black text-base text-indigo-400">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Followers</p>
                </div>
                <div id="followingBtn" class="stat-pill p-3 text-center">
                    <p id="followingCount" class="font-black text-base text-indigo-400">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Following</p>
                </div>
            </div>
        </div>

        <div class="bg-[#0b0f19] mt-4 p-4 rounded-2xl mb-24 border border-white/5 mx-3 sm:mx-0">
            <div class="flex items-center gap-2 border-b border-white/5 pb-2.5 mb-3.5">
                <i class="fa-solid fa-clapperboard text-indigo-400 text-xs"></i>
                <h3 class="font-black text-white text-[10px] uppercase tracking-[2px]">My Creative Studio Grid</h3>
            </div>
            <div id="uPosts" class="grid grid-cols-3 gap-2"></div>
        </div>
    </div>

    <div id="complaintModal" class="fixed inset-0 z-[1100] hidden bg-black/70 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-[#0b0f19] w-full max-w-sm rounded-[24px] p-5 border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 bg-amber-500/10 text-amber-400 rounded-lg flex items-center justify-center text-sm border border-amber-500/20"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div>
                    <h3 class="font-black text-white text-xs tracking-wide">Report Technical Error Log</h3>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Direct Transmission to Admin</p>
                </div>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[9px] font-black text-indigo-400 uppercase ml-0.5">Issue Classification</label>
                    <select id="complaintIssueType" class="w-full bg-white/5 border border-white/5 rounded-xl p-2.5 text-xs font-bold text-gray-300 mt-1 outline-none focus:border-indigo-500/30 transition-all">
                        <option value="Video Playback Glitch" class="bg-[#0b0f19]">Video/Reels Loading Error</option>
                        <option value="Ad/Monetization Problem" class="bg-[#0b0f19]">Ad / Revenue Balance Sync Problem</option>
                        <option value="Payment/Withdraw Request" class="bg-[#0b0f19]">Cash Out Withdrawal Request Hold</option>
                        <option value="Profile/Login Bug" class="bg-[#0b0f19]">Account Framework Bug</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-indigo-400 uppercase ml-0.5">Problem Context Description</label>
                    <textarea id="complaintMessage" rows="4" class="w-full bg-white/5 border border-white/5 rounded-xl p-2.5 text-xs font-medium text-gray-200 mt-1 outline-none resize-none placeholder-gray-600 focus:border-indigo-500/30 transition-all" placeholder="আপনার সমস্যাটি বিস্তারিত লিখুন, সাবমিট করার সাথে সাথে এডমিন প্যানেলে রিয়েল টাইমে আপনার লগ রিপোর্ট পৌছে যাবে..."></textarea>
                </div>
                <div class="flex gap-2 pt-1">
                    <button onclick="closeComplaintModal()" class="flex-1 py-2.5 bg-white/5 hover:bg-white/10 text-gray-400 rounded-xl font-bold text-xs uppercase tracking-wider transition border border-white/5">Cancel</button>
                    <button onclick="submitComplaint()" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-black text-xs uppercase tracking-wider shadow-lg shadow-indigo-500/20 active:scale-95 transition">Send Log</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-glass z-50 flex justify-around items-center px-4 max-w-md mx-auto">
        <button onclick="location.href='reels.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-clapperboard text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Reels</span>
        </button>
        <button onclick="location.href='post.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-square-plus text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Create</span>
        </button>
        <button onclick="location.href='messages.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-comment-dots text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Messages</span>
        </button>
        <button onclick="location.href='profile.html'" class="nav-btn active flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const auth = getAuth(app);

        let currentActiveUserName = "Citizen";

        onAuthStateChanged(auth, user => {
            if(user) {
                checkAdminClearance(user.uid);
                loadProfile(user.uid);
                loadPosts(user.uid);
                document.getElementById('followersBtn').onclick = () => location.href = `followers.html?id=${user.uid}`;
                document.getElementById('followingBtn').onclick = () => location.href = `following.html?id=${user.uid}`;
            } else { location.href = "index.html"; }
        });

        function checkAdminClearance(uid) {
            onSnapshot(doc(db, "system_admins", uid), (adminSnap) => {
                const gatewayBtn = document.getElementById('adminGatewayBtn');
                if (adminSnap.exists() && adminSnap.data().role === "superadmin") {
                    gatewayBtn.classList.remove('hidden'); 
                } else {
                    gatewayBtn.classList.add('hidden');
                }
            });
        }

        function loadProfile(uid) {
            onSnapshot(doc(db, "users", uid), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    const name = d.name || "Citizen";
                    currentActiveUserName = name; 
                    
                    document.getElementById('uName').innerText = name;
                    document.getElementById('topUser').innerText = name;
                    document.getElementById('uEmail').innerText = d.email || auth.currentUser.email;
                    document.getElementById('uBio').innerText = d.bio || "Hello, I am using My Book Elite Video Studio!";
                    document.getElementById('initials').innerText = name[0].toUpperCase();

                    document.getElementById('walletBalance').innerText = d.balance ? parseFloat(d.balance).toFixed(2) : "0.00";

                    if(d.isVerified === true || d.role === "admin") {
                        document.getElementById('verifiedBadge').classList.remove('hidden');
                    } else {
                        document.getElementById('verifiedBadge').classList.add('hidden');
                    }

                    document.getElementById('followerCount').innerText = d.followers ? (Array.isArray(d.followers) ? d.followers.length : d.followers) : 0;
                    document.getElementById('followingCount').innerText = d.following ? (Array.isArray(d.following) ? d.following.length : d.following) : 0;

                    const interestBox = document.getElementById('interestBadges');
                    interestBox.innerHTML = "";
                    if(d.interests) {
                        d.interests.forEach(interest => {
                            interestBox.innerHTML += `<span class="interest-tag">${interest}</span>`;
                        });
                    }

                    if(d.profilePic) {
                        const img = document.getElementById('profileImg');
                        img.src = d.profilePic; img.classList.remove('hidden');
                        document.getElementById('initials').classList.add('hidden');
                    }
                    if(d.coverPic) {
                        const img = document.getElementById('coverImg');
                        img.src = d.coverPic; img.classList.remove('hidden');
                    }
                }
            });
        }

        function loadPosts(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, s => {
                const container = document.getElementById('uPosts'); 
                container.innerHTML = "";
                document.getElementById('pCount').innerText = s.size;
                
                s.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "insta-gallery-item transform active:scale-95 transition-all cursor-pointer";
                    
                    let content = "";
                    if(p.fileUrl) {
                        if(p.fileType === 'video') {
                            content = `<video src="${p.fileUrl}" class="w-full h-full object-cover" muted></video>
                                       <div class="media-badge"><i class="fas fa-play text-[8px]"></i></div>`;
                        } else {
                            content = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                        }
                    } else {
                        content = `<div class="text-post-placeholder"><span>${p.text ? p.text.slice(0,25) + '...' : 'TEXT POST'}</span></div>`;
                    }
                    
                    div.innerHTML = content;
                    // ✅ রিডাইরেকশন লজিক একদম পারফেক্টলি ইনজেক্টেড!
                    div.onclick = () => location.href = `post-view.html?id=${d.id}`;
                    container.appendChild(div);
                });
            });
        }

        window.openComplaintModal = () => {
            document.getElementById('complaintMessage').value = "";
            document.getElementById('complaintModal').classList.remove('hidden');
        };

        window.closeComplaintModal = () => {
            document.getElementById('complaintModal').classList.add('hidden');
        };

        window.submitComplaint = async () => {
            const issueType = document.getElementById('complaintIssueType').value;
            const message = document.getElementById('complaintMessage').value.trim();
            const user = auth.currentUser;

            if(!message) {
                return Swal.fire({ icon: 'warning', title: 'Empty Log Text', text: 'দয়া করে আপনার সমস্যাটি বিস্তারিত লিখুন।' });
            }

            try {
                await addDoc(collection(db, "complaints"), {
                    userUid: user.uid,
                    userName: currentActiveUserName,
                    userEmail: user.email,
                    issueType: issueType,
                    message: message,
                    status: "pending", 
                    adminNotes: "",    
                    timestamp: serverTimestamp()
                });

                closeComplaintModal();
                Swal.fire({
                    icon: 'success',
                    title: 'Report Logs Synced!',
                    text: 'আপনার কমপ্লেনটি সরাসরি এডমিন কন্ট্রোল ড্যাশবোর্ডে পাঠানো হয়েছে।',
                    confirmButtonColor: '#6366f1'
                });

            } catch (error) {
                console.error("Complaint error: ", error);
                Swal.fire({ icon: 'error', title: 'Transmission Error', text: 'সার্ভারে সমস্যা হয়েছে, দয়া করে আবার চেষ্টা করুন।' });
            }
        };

        window.logoutUser = () => { 
            Swal.fire({
                title: 'Logout Request',
                text: "Are you sure you want to exit your creator studio terminal?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#6366f1',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Yes, Sign Out'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => location.href = "index.html");
                }
            });
        };
    </script>
</body>
</html>
