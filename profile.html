<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Profile</div>

<h2 id="name"></h2>

<input id="newName" placeholder="Edit name">
<button onclick="save()">Save</button>

<h3>Friend Requests</h3>
<div id="req"></div>

<button onclick="logout()">Logout</button>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(u)=>{
uid=u.uid;

// name
onValue(ref(db,"users/"+uid),snap=>{
name.innerText=snap.val().username;
});

// requests
onValue(ref(db,"requests/"+uid),snap=>{
let d=snap.val();
let html="";

for(let f in d){
html+=`${f} <button onclick="accept('${f}')">Accept</button><br>`;
}

req.innerHTML=html;
});
});

// save name
window.save=function(){
update(ref(db,"users/"+uid),{
username:newName.value
});
}

// accept
window.accept = async function(from){

await set(ref(db,"friends/"+uid+"/"+from),true);
await set(ref(db,"friends/"+from+"/"+uid),true);

await set(ref(db,"requests/"+uid+"/"+from),null);
}

// logout
window.logout=function(){
signOut(auth);
location.href="index.html";
}
</script>

</body>
</html>
