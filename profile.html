<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* header */
.header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

/* profile box */
.profile{
  background:white;
  padding:20px;
  text-align:center;
}

.profile img{
  width:100px;
  height:100px;
  border-radius:50%;
}

.name{
  font-size:20px;
  font-weight:bold;
}

.badge{
  color:#1877f2;
  font-size:14px;
}

.bio{
  color:#555;
  margin-top:5px;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:5px;
  margin:5px;
}

.blue{background:#1877f2;color:white;}
.gray{background:#ddd;}

/* edit popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.popup input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="profile">

<img id="photo" src="https://i.pravatar.cc/150">

<div class="name">
<span id="name">User</span>
<span id="badge" class="badge"></span>
</div>

<div class="bio" id="bio">No bio</div>

<button class="btn gray" onclick="openEdit()">Edit Profile</button>
<button class="btn blue" id="followBtn" onclick="follow()">Follow</button>

<div id="followers">0 Followers</div>

</div>

<!-- ✏️ popup -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Edit Profile</h3>

<input id="newName" placeholder="Name">
<input id="newBio" placeholder="Bio">

<button class="btn blue" onclick="save()">Save</button>
<button class="btn gray" onclick="closeEdit()">Cancel</button>

</div>
</div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="inbox.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, update, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;
let profileId = new URLSearchParams(location.search).get("uid");

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
if(!profileId) profileId = uid;
loadProfile();
}else{
location.href="index.html";
}
});

// 🔥 LOAD PROFILE
function loadProfile(){

onValue(ref(db,"users/"+profileId),snap=>{
let d = snap.val();
if(!d) return;

name.innerText = d.username || "User";
bio.innerText = d.bio || "No bio";

if(d.photo) photo.src = d.photo;

// ✔️ verified badge
if(d.verified){
badge.innerText = " ✔️";
}else{
badge.innerText = "";
}

});

// followers count
onValue(ref(db,"followers/"+profileId),snap=>{
let count = snap.val() ? Object.keys(snap.val()).length : 0;
followers.innerText = count+" Followers";
});

// follow button state
get(ref(db,"followers/"+profileId+"/"+uid)).then(snap=>{
if(snap.exists()){
followBtn.innerText="Following";
}else{
followBtn.innerText="Follow";
}
});

}

// ❤️ FOLLOW SYSTEM
window.follow = async function(){

if(profileId===uid) return;

let ref1 = ref(db,"followers/"+profileId+"/"+uid);
let ref2 = ref(db,"following/"+uid+"/"+profileId);

let snap = await get(ref1);

if(snap.exists()){
// unfollow
set(ref1,null);
set(ref2,null);
followBtn.innerText="Follow";
}else{
// follow
set(ref1,true);
set(ref2,true);
followBtn.innerText="Following";
}

}

// ✏️ EDIT UI
window.openEdit = function(){
popup.style.display="flex";
}

window.closeEdit = function(){
popup.style.display="none";
}

// 💾 SAVE PROFILE
window.save = function(){

let n = newName.value;
let b = newBio.value;

update(ref(db,"users/"+uid),{
username:n,
bio:b
});

closeEdit();
}

</script>

</body>
</html>
