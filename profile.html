<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .post-item { aspect-ratio: 1 / 1; overflow: hidden; background: #eee; position: relative; }
        .post-item img, .post-item video { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: white; padding: 2px 5px; border-radius: 3px; font-size: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white flex justify-between items-center sticky top-0 z-50">
        <a href="home.html" class="text-sm font-bold">← Back</a>
        <h1 class="text-lg font-bold">My Profile</h1>
        <div class="w-8"></div> </nav>

    <div class="bg-white p-6 shadow-sm border-b">
        <div class="flex flex-col items-center">
            <div id="userAvatar" class="w-24 h-24 bg-blue-500 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-lg mb-4">
                U
            </div>
            <h2 id="userName" class="text-xl font-bold text-gray-800 tracking-tight">User Name</h2>
            <p id="userEmail" class="text-gray-500 text-sm mb-4">email@example.com</p>
            
            <div class="flex gap-10 border-t pt-4 w-full justify-center">
                <div class="text-center">
                    <p id="postCount" class="font-bold text-lg">0</p>
                    <p class="text-xs text-gray-500 uppercase">Posts</p>
                </div>
                <div class="text-center">
                    <p class="font-bold text-lg">0</p>
                    <p class="text-xs text-gray-500 uppercase">Followers</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 pb-20">
        <h3 class="p-3 text-sm font-bold text-gray-600">আমার পোস্টসমূহ</h3>
        <div id="userPosts" class="post-grid px-1">
            </div>
        <div id="noPosts" class="text-center py-10 hidden">
            <p class="text-gray-400">এখনো কোনো পোস্ট করেননি।</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const name = user.displayName || user.email.split('@')[0];
                document.getElementById('userName').innerText = name;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userAvatar').innerText = name[0].toUpperCase();
                loadUserPosts(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function loadUserPosts(uid) {
            const postsContainer = document.getElementById('userPosts');
            const noPosts = document.getElementById('noPosts');
            const postCount = document.getElementById('postCount');

            // শুধু নিজের পোস্টগুলো খোঁজা
            const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                postsContainer.innerHTML = "";
                postCount.innerText = snapshot.size;

                if (snapshot.empty) {
                    noPosts.classList.remove('hidden');
                    return;
                }

                noPosts.classList.add('hidden');
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const item = document.createElement('div');
                    item.className = "post-item shadow-sm";

                    let content = "";
                    if (post.fileUrl) {
                        if (post.fileType === "video") {
                            content = `<span class="video-icon">▶</span><video src="${post.fileUrl}"></video>`;
                        } else {
                            content = `<img src="${post.fileUrl}" alt="Post">`;
                        }
                    } else {
                        content = `<div class="flex items-center justify-center h-full p-2 text-[8px] bg-blue-50 text-blue-800 overflow-hidden">${post.text}</div>`;
                    }

                    item.innerHTML = content;
                    postsContainer.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
