<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f0f2f5;
}

/* header */
.header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:600;
}

/* cover */
.cover{
  height:140px;
  background:linear-gradient(135deg,#1877f2,#4facfe);
}

/* profile section */
.profile{
  background:white;
  margin-top:-60px;
  text-align:center;
  padding:20px;
  border-radius:15px 15px 0 0;
}

/* profile img */
.profile img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid white;
  margin-top:-70px;
}

/* name */
.name{
  font-size:20px;
  font-weight:600;
  margin-top:10px;
}

/* badge */
.badge{
  color:#1877f2;
  font-size:14px;
}

/* bio */
.bio{
  color:#666;
  margin:5px 0;
}

/* buttons */
.btns{
  margin-top:10px;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  margin:5px;
  font-size:14px;
}

.follow{background:#1877f2;color:white;}
.edit{background:#e4e6eb;}

/* stats */
.stats{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.stats div{
  font-size:14px;
}

/* posts */
.post{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="cover"></div>

<div class="profile">

<img id="photo" src="https://i.pravatar.cc/150?img=3">

<div class="name">
  <span id="name">User</span> ✔️
</div>

<div class="bio" id="bio">No bio</div>

<div class="btns">
<button class="btn edit" onclick="editProfile()">Edit</button>
<button class="btn follow" onclick="followUser()">Follow</button>
</div>

<div class="stats">
<div><b id="followers">0</b><br>Followers</div>
<div><b id="postsCount">0</b><br>Posts</div>
</div>

</div>

<div id="posts"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="inbox.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
loadProfile();
}else{
location.href="index.html";
}
});

function loadProfile(){

// user info
onValue(ref(db,"users/"+uid),snap=>{
let d = snap.val();
if(!d) return;

document.getElementById("name").innerText = d.username || "User";
document.getElementById("bio").innerText = d.bio || "No bio";

if(d.photo){
document.getElementById("photo").src = d.photo;
}
});

// followers
onValue(ref(db,"followers/"+uid),snap=>{
let data = snap.val();
let count = data ? Object.keys(data).length : 0;
document.getElementById("followers").innerText = count;
});

// posts
onValue(ref(db,"posts"),snap=>{
let data = snap.val();
let html="";
let count=0;

for(let id in data){
let p=data[id];
if(p.owner===uid){
count++;
html+=`<div class="post">${p.text}</div>`;
}
}

document.getElementById("posts").innerHTML = html;
document.getElementById("postsCount").innerText = count;
});

}

// ✏️ edit profile
window.editProfile = function(){

let name = prompt("Enter name");
let bio = prompt("Enter bio");

if(name){
update(ref(db,"users/"+uid),{
username:name,
bio:bio
});
}

}

// ❤️ follow system
window.followUser = async function(){

let target = prompt("Enter UID to follow");

if(!target) return;

await set(ref(db,"followers/"+target+"/"+uid),true);

alert("Followed!");
}
</script>

</body>
</html>
