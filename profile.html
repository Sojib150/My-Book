<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 p-4 text-white flex items-center gap-4 sticky top-0 z-50">
        <a href="home.html">← Back</a>
        <h1 class="font-bold">My Profile</h1>
    </nav>
    <div class="max-w-md mx-auto bg-white shadow-sm p-6 text-center">
        <div id="uInit" class="w-24 h-24 bg-blue-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white shadow-lg">?</div>
        <h2 id="uName" class="text-xl font-bold">Loading...</h2>
        <p id="uEmail" class="text-gray-400 text-xs"></p>
    </div>
    <div id="uPosts" class="max-w-md mx-auto grid grid-cols-3 gap-1 p-1"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp({ apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92" });
        const db = getFirestore(app); const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(!user) return;
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('uName').innerText = name;
            document.getElementById('uEmail').innerText = user.email;
            document.getElementById('uInit').innerText = name[0].toUpperCase();
            
            onSnapshot(query(collection(db, "posts"), where("userId", "==", user.uid), orderBy("createdAt", "desc")), snap => {
                const container = document.getElementById('uPosts'); container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "aspect-square bg-gray-200 overflow-hidden rounded-sm";
                    div.innerHTML = p.fileUrl ? (p.fileType==='video'?`<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>`:`<img src="${p.fileUrl}" class="w-full h-full object-cover">`) : `<div class="p-1 text-[8px]">${p.text}</div>`;
                    container.appendChild(div);
                });
            });
        });
    </script>
</body>
</html>
