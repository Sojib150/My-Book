<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

.header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
}

.profile{
  background:white;
  padding:20px;
  text-align:center;
}

.profile img{
  width:100px;
  height:100px;
  border-radius:50%;
}

.name{
  font-size:20px;
  font-weight:bold;
}

.info{
  color:#555;
  margin-top:5px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="profile">
<img id="photo" src="https://i.pravatar.cc/150">

<div class="name" id="name">User</div>

<div class="info" id="email"></div>
<div class="info" id="dob"></div>

</div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="inbox.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
loadProfile();
}else{
location.href="index.html";
}
});

function loadProfile(){

onValue(ref(db,"users/"+uid),snap=>{

let d = snap.val();
if(!d) return;

document.getElementById("name").innerText = d.username || "User";
document.getElementById("email").innerText = d.email || "";
document.getElementById("dob").innerText = d.dob || "";

if(d.photo){
document.getElementById("photo").src = d.photo;
}

});

}
</script>

</body>
</html>
