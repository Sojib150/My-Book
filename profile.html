<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Premium Profile - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        
        /* Facebook + Instagram Mix Profiles Components */
        .profile-sheet { background: white; border-radius: 0 0 32px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-bottom: 1px solid rgba(0,0,0,0.02); }
        .avatar-ring { border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.12); border-radius: 35px; transform: translateY(-30%); }
        
        /* Stat Interactive Grid */
        .fb-stat-pill { background: #f0f2f5; border-radius: 16px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .fb-stat-pill:active { transform: scale(0.95); background: #e4e6eb; }
        
        /* Instagram Core Media Grid Item Layout */
        .insta-gallery-item { aspect-ratio: 1/1; position: relative; overflow: hidden; border-radius: 14px; background: #e4e6eb; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .media-badge { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); color: white; width: 24px; height: 24px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 5; }
        .text-post-placeholder { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 12px; display: flex; align-items: center; justify-content: center; text-align: center; height: 100%; font-size: 11px; font-weight: 700; color: #4f5e71; line-height: 1.4; }
        
        .interest-tag { background: #e7f3ff; color: #1877f2; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 12px; letter-spacing: 0.5px; border: 1px solid rgba(24,119,242,0.05); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.06); padding: 10px 0; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-icon { font-size: 1.45rem; color: #4b5563; cursor: pointer; }
        .nav-icon.active { color: #1877f2; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 px-5 py-4 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <button onclick="logoutUser()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center active:scale-90 transition shadow-sm border border-red-100/50">
                <i class="fas fa-power-off text-sm"></i>
            </button>
            <h1 id="topUser" class="font-black text-gray-800 tracking-tighter text-base italic uppercase">PROFILE</h1>
        </div>
        <div class="flex gap-2.5">
            <button onclick="location.href='search.html'" class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 active:scale-95 transition"><i class="fas fa-search text-sm"></i></button>
            <button onclick="location.href='edit-profile.html'" class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 active:scale-95 transition"><i class="fas fa-sliders-h text-sm"></i></button>
        </div>
    </nav>

    <div class="max-w-md mx-auto relative">
        <div class="h-48 bg-gradient-to-tr from-blue-600 via-indigo-600 to-cyan-500 relative overflow-hidden shadow-inner">
            <img id="coverImg" src="" class="w-full h-full object-cover opacity-90 hidden">
            <div class="absolute inset-0 bg-black/10"></div>
        </div>

        <div class="profile-sheet px-5 pb-6">
            <div class="flex justify-center relative h-16">
                <div class="avatar-ring w-32 h-32 bg-gradient-to-tr from-blue-600 to-cyan-400 overflow-hidden flex items-center justify-center text-4xl text-white font-black">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden bg-white">
                    <span id="initials">?</span>
                </div>
            </div>

            <div class="text-center mt-2 space-y-1">
                <div class="flex items-center justify-center gap-1.5">
                    <h2 id="uName" class="text-2xl font-black text-gray-900 tracking-tight italic uppercase">লোডিং...</h2>
                    <div class="bg-blue-500 text-white w-4 h-4 rounded-full flex items-center justify-center text-[8px]"><i class="fas fa-check"></i></div>
                </div>
                <p id="uEmail" class="text-[9px] text-gray-400 font-extrabold tracking-widest uppercase"></p>
                
                <div id="interestBadges" class="flex flex-wrap justify-center gap-1.5 pt-3"></div>
                
                <p id="uBio" class="text-gray-500 text-[13px] pt-3 px-4 font-semibold leading-relaxed italic text-center"></p>
            </div>

            <div class="mt-6 px-1">
                <button onclick="location.href='dashboard.html'" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 py-3.5 rounded-2xl font-bold text-xs uppercase tracking-[1.5px] active:scale-98 transition flex items-center justify-center gap-2 border border-gray-200/50">
                    <i class="fas fa-chart-pie text-blue-600 text-sm"></i>
                    View Professional Dashboard
                </button>
            </div>
                
            <div class="grid grid-cols-3 gap-3.5 mt-4">
                <div class="fb-stat-pill p-3.5 text-center border border-black/5">
                    <p id="pCount" class="font-black text-lg text-gray-900">0</p>
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-wider mt-0.5">Posts</p>
                </div>
                <div id="followersBtn" class="fb-stat-pill p-3.5 text-center border border-black/5">
                    <p id="followerCount" class="font-black text-lg text-blue-600">0</p>
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-wider mt-0.5">Followers</p>
                </div>
                <div id="followingBtn" class="fb-stat-pill p-3.5 text-center border border-black/5">
                    <p id="followingCount" class="font-black text-lg text-blue-600">0</p>
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-wider mt-0.5">Following</p>
                </div>
            </div>
        </div>

        <div class="bg-white mt-4 p-5 rounded-3xl mb-12 border border-gray-100 shadow-sm mx-3">
            <div class="flex items-center gap-2 border-b border-gray-50 pb-3 mb-4">
                <i class="fa-solid fa-border-all text-blue-600 text-xs"></i>
                <h3 class="font-black text-gray-800 text-[11px] uppercase tracking-[2px]">Media Grid Gallery</h3>
            </div>
            <div id="uPosts" class="grid grid-cols-3 gap-2.5"></div>
        </div>
    </div>

    <div class="bottom-nav max-w-md mx-auto">
        <div onclick="location.href='home.html'" class="text-gray-500 text-xl px-4 py-2"><i class="fas fa-home"></i></div>
        <div onclick="location.href='search.html'" class="text-gray-500 text-xl px-4 py-2"><i class="fas fa-search"></i></div>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 transform active:scale-90 transition -mt-5"><i class="fas fa-plus"></i></div>
        <div onclick="location.href='messages.html'" class="text-gray-500 text-xl px-4 py-2"><i class="fas fa-comment-dots"></i></div>
        <div onclick="location.href='profile.html'" class="nav-icon active text-xl px-4 py-2"><i class="fas fa-user-circle"></i></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                loadProfile(user.uid);
                loadPosts(user.uid);
                document.getElementById('followersBtn').onclick = () => location.href = `followers.html?id=${user.uid}`;
                document.getElementById('followingBtn').onclick = () => location.href = `following.html?id=${user.uid}`;
            } else { location.href = "index.html"; }
        });

        function loadProfile(uid) {
            onSnapshot(doc(db, "users", uid), (snap) => {
                if(snap.exists()) {
                    const d = snap.data();
                    const name = d.name || "Citizen";
                    document.getElementById('uName').innerText = name;
                    document.getElementById('topUser').innerText = name;
                    document.getElementById('uEmail').innerText = d.email || auth.currentUser.email;
                    document.getElementById('uBio').innerText = d.bio || "Hello, I am using My Book!";
                    document.getElementById('initials').innerText = name[0].toUpperCase();

                    // Stats Update
                    document.getElementById('followerCount').innerText = d.followers ? (Array.isArray(d.followers) ? d.followers.length : d.followers) : 0;
                    document.getElementById('followingCount').innerText = d.following ? (Array.isArray(d.following) ? d.following.length : d.following) : 0;

                    // Interests Badges Injector
                    const interestBox = document.getElementById('interestBadges');
                    interestBox.innerHTML = "";
                    if(d.interests) {
                        d.interests.forEach(interest => {
                            interestBox.innerHTML += `<span class="interest-tag">${interest}</span>`;
                        });
                    }

                    if(d.profilePic) {
                        const img = document.getElementById('profileImg');
                        img.src = d.profilePic; img.classList.remove('hidden');
                        document.getElementById('initials').classList.add('hidden');
                    }
                    if(d.coverPic) {
                        const img = document.getElementById('coverImg');
                        img.src = d.coverPic; img.classList.remove('hidden');
                    }
                }
            });
        }

        function loadPosts(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, s => {
                const container = document.getElementById('uPosts'); 
                container.innerHTML = "";
                document.getElementById('pCount').innerText = s.size;
                
                s.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "insta-gallery-item transform active:scale-95 transition-all cursor-pointer";
                    
                    let content = "";
                    if(p.fileUrl) {
                        if(p.fileType === 'video') {
                            content = `<video src="${p.fileUrl}" class="w-full h-full object-cover" muted></video>
                                       <div class="media-badge"><i class="fas fa-play text-[9px]"></i></div>`;
                        } else {
                            content = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                        }
                    } else {
                        content = `<div class="text-post-placeholder"><span>${p.text ? p.text.slice(0,25) + '...' : 'TEXT POST'}</span></div>`;
                    }
                    
                    div.innerHTML = content;
                    div.onclick = () => location.href = `post-view.html?id=${d.id}`;
                    container.appendChild(div);
                });
            });
        }

        window.logoutUser = () => { 
            Swal.fire({
                title: 'Logout?',
                text: "Are you sure you want to sign out?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#1877f2',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Yes, Logout'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => location.href = "index.html");
                }
            });
        };
    </script>
</body>
</html>
