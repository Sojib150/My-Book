<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        #incomingCallUI {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 92%; max-width: 380px; background: #000; border-radius: 35px;
            padding: 12px 20px; z-index: 2000; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: space-between; color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }

        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
        video { width: 100%; max-height: 70vh; }
        
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); border-radius: 32px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
        .nav-item { color: rgba(255,255,255,0.5); transition: color 0.3s; font-size: 1.2rem; }
        .nav-item.active { color: white; }

        .pulse-call { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .elite-popup { background: #111 !important; border: 1px solid #D4AF37 !important; color: #fff !important; border-radius: 25px !important; }
        .elite-confirm { background: linear-gradient(135deg, #D4AF37, #8A6E2F) !important; color: #000 !important; font-weight: bold !important; border-radius: 12px !important; }
        .elite-cancel { background: #222 !important; color: #fff !important; border-radius: 12px !important; }

        #maintenanceUI { position: fixed; inset: 0; z-index: 10000; background: white; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body class="pb-32">

    <div id="maintenanceUI">
        <div class="max-w-xs mx-auto text-center p-6">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600 shadow-inner">
                <i class="fas fa-tools text-4xl animate-bounce"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-3">সার্ভার আপডেট চলছে</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-6">আমরা অ্যাপটিকে আরও উন্নত করার কাজ করছি। কিছুক্ষণ পর আবার অ্যাপটি ওপেন করুন।</p>
            <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-full w-1/2 animate-[pulse_2s_infinite]"></div>
            </div>
        </div>
    </div>

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-video text-white text-xs"></i></div>
            <div class="min-w-0">
                <h4 id="callerNameDisplay" class="text-[13px] font-extrabold truncate">লোড হচ্ছে...</h4>
                <p class="text-[9px] text-green-400 uppercase font-black tracking-widest animate-pulse">Incoming Call</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center pulse-call"><i class="fas fa-phone-alt"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="reels.html" class="text-red-500"><i class="fa-solid fa-play-circle text-2xl"></i></a>
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-800"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover cursor-pointer bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="global-ad-slot" class="mb-4"></div>

        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white shadow-sm">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home-alt"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl active:scale-90 transition cursor-pointer">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    
    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeAll()"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-6"></div>
        <div class="flex gap-3 border-t pt-4 bg-white mt-2">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; 
        let currentUserData = null;
        let activePostId = null; 
        let globalCPM = 0.0001;
        let viewTimers = {}; // টাইম-বেজড ভিউ ট্র্যাকার

        onAuthStateChanged(auth, async u => { 
            if(u){ 
                user = u; 
                onSnapshot(doc(db, "appSettings", "maintenance"), (snap) => {
                    if (snap.exists()) {
                        document.getElementById('maintenanceUI').style.display = snap.data().isOn ? 'flex' : 'none';
                    }
                });
                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.exists() ? userSnap.data() : null;
                onSnapshot(doc(db, "appSettings", "algorithm"), snap => {
                    if (snap.exists()) globalCPM = snap.data().trendBoost || 0.0001;
                });
                onSnapshot(doc(db, "appSettings", "ads"), snap => {
                    if (snap.exists() && snap.data().code) {
                        const adSlot = document.getElementById('global-ad-slot');
                        adSlot.innerHTML = snap.data().code;
                        const scripts = adSlot.getElementsByTagName("script");
                        for (let n = 0; n < scripts.length; n++) { eval(scripts[n].innerHTML); }
                    }
                });
                renderFeed(); 
                loadProfile(); 
                checkNotif(); 
                loadStories(); 
                listenForCalls(u.uid);
            } else location.href="index.html"; 
        });

        // মাস্টার আপডেট: ভিউ, ইনকাম এবং এন্টি-চিট লজিক
        async function handlePostView(postId, creatorId) {
            if (!postId || creatorId === user.uid) return;
            
            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            if (!postSnap.exists()) return;
            
            const postData = postSnap.data();
            const viewedBy = postData.viewedBy || [];

            // ১. এন্টি-চিট: যদি ইউজার আগে দেখে থাকে তবে ইনকাম হবে না
            if (viewedBy.includes(user.uid)) return;

            try {
                // ভিউ এবং ট্রেন্ড স্কোর আপডেট
                await updateDoc(postRef, { 
                    views: increment(1),
                    viewedBy: arrayUnion(user.uid),
                    trendScore: increment(1) // ৬. অ্যালগরিদম ট্রেন্ড বুস্ট
                });

                const creatorRef = doc(db, "users", creatorId);
                const creatorSnap = await getDoc(creatorRef);
                
                // মনিটাইজেশন চেক এবং ব্যালেন্স বৃদ্ধি
                if (creatorSnap.exists() && creatorSnap.data().isMonetized === true) {
                    await updateDoc(creatorRef, { 
                        balance: increment(globalCPM),
                        totalImpressions: increment(1) // অ্যানালিটিক্সের জন্য
                    });
                }
            } catch (e) { console.error("View Update Error:", e); }
        }

        async function sendNotification(targetId, type, message, postImg = "", postId = "") {
            if(!targetId || targetId === user.uid) return;
            await addDoc(collection(db, "notifications"), {
                targetUserId: targetId,
                senderId: user.uid,
                senderName: currentUserData?.name || "Someone",
                senderPic: currentUserData?.profilePic || "",
                type: type,
                message: message,
                postImg: postImg,
                postId: postId,
                read: false,
                timestamp: serverTimestamp()
            });
        }

        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists() && snap.data().status === 'ringing') {
                    const data = snap.data();
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = data.callerName;
                    document.getElementById('acceptCallBtn').onclick = () => window.location.href = `call.html?id=${data.callerId}&type=${data.type}&action=incoming`;
                    document.getElementById('declineCallBtn').onclick = async () => {
                        await deleteDoc(doc(db, "calls", myId));
                        ui.classList.remove('active');
                    };
                } else { ui.classList.remove('active'); }
            });
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), limit(50)), async snap => {
                let rawPosts = [];
                snap.forEach(d => rawPosts.push({ id: d.id, ...d.data() }));
                // ট্রেন্ড স্কোর বা টাইম অনুযায়ী সর্ট করা যেতে পারে
                rawPosts.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                feed.innerHTML = "";
                rawPosts.forEach(async (p) => {
                    if(p.isShadowBanned) return;
                    const card = await createPostCard(p.id, p);
                    feed.appendChild(card);
                });
                setTimeout(initIntersection, 1000);
            });
        }

        async function createPostCard(id, p) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{hour:'numeric',minute:'numeric',day:'numeric',month:'short'}) : 'Just Now';
            const card = document.createElement('div');
            card.className = "premium-card";
            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border-2 border-blue-50 bg-gray-100">
                        <div>
                            <div class="font-extrabold text-[14px]">@${p.userName}</div>
                            <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">${date}</p>
                        </div>
                    </div>
                    ${isMine ? `<button onclick="confirmDeletePost('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-alt"></i></button>` : ''}
                </div>
                <p class="px-5 pb-4 text-[14px] text-gray-700 font-medium leading-relaxed">${p.text || ''}</p>
                <div class="post-tracker" data-id="${id}" data-creator="${p.userId}">
                    ${p.fileUrl ? `<div class="video-box">${p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ''}
                </div>
                <div class="flex justify-around py-2 border-t mt-1">
                    <button onclick="like('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 ${hasL ? 'text-red-500':'text-gray-400'}"><i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i><span class="text-[10px] font-black">${p.likedBy?.length||0}</span></button>
                    <button onclick="openComments('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400"><i class="fa-regular fa-comment-dots text-xl"></i><span class="text-[10px] font-black">${p.commentCount||0}</span></button>
                    
                    <div class="flex flex-col items-center gap-1 flex-1 py-2 text-blue-500/60"><i class="fa-solid fa-eye text-xl"></i><span class="text-[10px] font-black">${p.views || 0}</span></div>
                    
                    <button onclick="sharePost('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400"><i class="fa-solid fa-share-nodes text-xl"></i><span class="text-[10px] font-black uppercase tracking-tighter">Share</span></button>
                </div>
            `;
            return card;
        }

        window.like = async (id) => {
            const ref = doc(db, "posts", id); 
            const snap = await getDoc(ref);
            const d = snap.data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            if(!hasL) sendNotification(d.userId, "like", "আপনার পোস্টে লাইক দিয়েছেন।", d.fileUrl || "", id);
        };

        window.openComments = (id) => { 
            activePostId = id; 
            document.getElementById('commentSheet').classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
            loadComments(id); 
        };
        
        async function loadComments(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                const list = document.getElementById('commentList'); list.innerHTML = "";
                sn.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `<div class="flex gap-3"><img src="${d.userPic}" class="w-9 h-9 rounded-full object-cover"><div class="bg-gray-100 p-3 rounded-2xl max-w-[85%]"><p class="text-[10px] font-black text-blue-600">@${d.userName}</p><p class="text-[13px] text-gray-800">${d.text}</p></div></div>`;
                });
            });
        }

        window.postComment = async () => {
            const v = document.getElementById('cInput').value; if(!v) return;
            const postRef = doc(db, "posts", activePostId);
            const postSnap = await getDoc(postRef);
            const postData = postSnap.data();
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: v, userId: user.uid, userName: currentUserData.name, userPic: currentUserData.profilePic, time: serverTimestamp() });
            await updateDoc(postRef, { commentCount: increment(1) });
            sendNotification(postData.userId, "comment", `মন্তব্য করেছেন: "${v}"`, postData.fileUrl || "", activePostId);
            document.getElementById('cInput').value = "";
        };

        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; };
        window.handleVideo = (v) => { v.muted = !v.muted; if(v.paused) v.play(); };
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { onSnapshot(collection(db, "stories"), snap => { const sL = document.getElementById('storyList'); sL.innerHTML = ""; snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><div class="w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div><span class="text-[9px] font-bold text-gray-500">${d.data().userName}</span></div>`; }); }); }

        // ২. রিটেনশন লজিক: ৫ সেকেন্ড দেখার পর ভিউ কাউন্ট
        function initIntersection() { 
            const obs = new IntersectionObserver(es => { 
                es.forEach(e => { 
                    const target = e.target;
                    const postId = target.getAttribute('data-id');
                    const creatorId = target.getAttribute('data-creator');
                    const vid = target.querySelector('video');

                    if (e.isIntersecting) {
                        if(vid) vid.play().catch(() => {});
                        
                        // ৫ সেকেন্ডের টাইমার সেট
                        viewTimers[postId] = setTimeout(() => {
                            handlePostView(postId, creatorId);
                        }, 5000); 
                    } else { 
                        if(vid) vid.pause();
                        // যদি ৫ সেকেন্ডের আগে সরিয়ে ফেলে তবে টাইমার বন্ধ
                        if (viewTimers[postId]) {
                            clearTimeout(viewTimers[postId]);
                            delete viewTimers[postId];
                        }
                    }
                }); 
            }, { threshold: 0.7 }); 
            document.querySelectorAll('.post-tracker').forEach(v => obs.observe(v)); 
        }

        window.confirmDeletePost = (id) => {
            Swal.fire({
                title: 'পোস্ট মুছে ফেলবেন?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'হ্যাঁ, মুছুন',
                customClass: { popup: 'elite-popup', confirmButton: 'elite-confirm', cancelButton: 'elite-cancel' }
            }).then(async (result) => { if (result.isConfirmed) { await deleteDoc(doc(db, "posts", id)); } });
        };

        window.sharePost = (id) => {
            const url = `${window.location.origin}/post-view.html?id=${id}`;
            if (navigator.share) { navigator.share({ title: 'My Book', url: url }); } else { navigator.clipboard.writeText(url); Swal.fire({ title: 'লিঙ্ক কপি হয়েছে!', icon: 'success', timer: 1000, showConfirmButton: false }); }
        };
    </script>
</body>
</html>
