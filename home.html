<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f0f2f5;
}

/* header */
.header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:600;
}

/* post box */
.upload{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.upload input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.upload button{
  background:#1877f2;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:20px;
}

/* feed */
.feed{
  padding:10px;
}

.post{
  background:white;
  margin-bottom:12px;
  border-radius:12px;
  padding:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.post-header{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#1877f2;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.username{
  font-weight:600;
}

.post-text{
  margin:10px 0;
}

/* actions */
.actions{
  display:flex;
  justify-content:space-around;
  border-top:1px solid #eee;
  padding-top:8px;
}

.actions button{
  background:none;
  border:none;
  font-size:14px;
  color:#555;
}

/* comments */
.comment-box{
  margin-top:10px;
}

.comment{
  background:#f0f2f5;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
  font-size:14px;
}

.reply{
  margin-left:20px;
}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🔥 My Social</div>

<div class="upload">
<input id="text" placeholder="Write something...">
<button onclick="postText()">Post</button>
</div>

<div id="feed" class="feed"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="chat.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let currentUser = null;

// auth check
onAuthStateChanged(auth,(user)=>{
if(user){
currentUser = user.uid;
}else{
location.href="index.html";
}
});

// POST
window.postText = async function(){

let text = document.getElementById("text").value;
if(!text) return alert("Write something");

let snap = await get(ref(db,"users/"+currentUser));
let userData = snap.val();

await push(ref(db,"posts"),{
text:text,
likes:0,
comments:{},
user:userData?.username || "User",
owner:currentUser
});

document.getElementById("text").value = "";
}

// LOAD POSTS
onValue(ref(db,"posts"),snap=>{
let data = snap.val();

if(!data){
feed.innerHTML = "No posts yet";
return;
}

let html="";

for(let id in data){

let post = data[id];

html += `
<div class="post">

<div class="post-header">
<div class="avatar">👤</div>
<div class="username">${post.user || "User"}</div>
</div>

<div class="post-text">${post.text}</div>

<div class="actions">
<button onclick="likePost('${id}')">❤️ ${post.likes||0}</button>
<button onclick="toggleComment('${id}')">💬 Comment</button>
<button onclick="sharePost()">🔗 Share</button>
</div>

<div id="cbox_${id}" class="comment-box" style="display:none">

<input id="c_${id}" placeholder="Write comment...">
<button onclick="addComment('${id}')">Send</button>

<div id="comments_${id}"></div>

</div>

</div>
`;
}

feed.innerHTML = html;

// load comments
for(let id in data){
loadComments(id, data[id].comments);
}
});

// LIKE POST
window.likePost = async function(id){
let snap = await get(ref(db,"posts/"+id));
let data = snap.val();

update(ref(db,"posts/"+id),{
likes:(data.likes||0)+1
});
}

// COMMENT TOGGLE
window.toggleComment = function(id){
let box = document.getElementById("cbox_"+id);
box.style.display = box.style.display==="none"?"block":"none";
}

// ADD COMMENT
window.addComment = function(id){
let text = document.getElementById("c_"+id).value;
if(!text) return;

push(ref(db,"posts/"+id+"/comments"),{
text:text,
likes:0,
replies:{}
});
}

// LOAD COMMENTS
function loadComments(postId, comments){

if(!comments) return;

let html="";

for(let cid in comments){

let c = comments[cid];

html += `
<div class="comment">
${c.text}

<br>
<button onclick="likeComment('${postId}','${cid}')">❤️ ${c.likes||0}</button>
<button onclick="replyBox('${cid}')">Reply</button>

<div id="rbox_${cid}" style="display:none">
<input id="r_${cid}" placeholder="Reply...">
<button onclick="addReply('${postId}','${cid}')">Send</button>
</div>

${loadReplies(postId, cid, c.replies)}

</div>
`;
}

document.getElementById("comments_"+postId).innerHTML = html;
}

// REPLY BOX
window.replyBox = function(cid){
let box = document.getElementById("rbox_"+cid);
box.style.display = box.style.display==="none"?"block":"none";
}

// ADD REPLY
window.addReply = function(p,c){
let text = document.getElementById("r_"+c).value;
if(!text) return;

push(ref(db,"posts/"+p+"/comments/"+c+"/replies"),{
text:text
});
}

// LOAD REPLIES
function loadReplies(p,c,replies){
if(!replies) return "";

let html="";
for(let r in replies){
html += `<div class="comment reply">${replies[r].text}</div>`;
}
return html;
}

// LIKE COMMENT
window.likeComment = async function(p,c){
let snap = await get(ref(db,"posts/"+p+"/comments/"+c));
let data = snap.val();

update(ref(db,"posts/"+p+"/comments/"+c),{
likes:(data.likes||0)+1
});
}

// SHARE
window.sharePost = function(){
alert("Share coming soon 😎");
}

</script>

</body>
</html>
