<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .hashtag { color: #2563eb; font-weight: 600; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Drawer Animations */
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); border-radius: 30px 30px 0 0; }
        #commentSheet.active { transform: translateY(0); }
        .comment-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 999; display: none; opacity: 0; transition: opacity 0.3s; }
        .comment-blur.active { display: block; opacity: 1; }

        /* ✨ Glassmorphism Toast Style */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 16px 24px;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999; display: flex; align-items: center; gap: 15px;
            min-width: 300px; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #customToast.show { top: 30px; }
        .toast-icon { width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-24">

    <div id="customToast">
        <div id="toastIcon" class="toast-icon"></div>
        <div>
            <p id="toastTitle" class="text-[10px] font-black uppercase tracking-[2px] leading-none"></p>
            <p id="toastMsg" class="text-xs text-gray-600 font-bold mt-1.5"></p>
        </div>
    </div>

    <nav class="bg-blue-600 p-4 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="search.html"><i class="fas fa-search text-lg"></i></a>
                <a href="messages.html" class="relative">
                    <i class="fab fa-facebook-messenger text-xl"></i>
                    <span id="msgCount" class="hidden absolute -top-2 -right-2 bg-red-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center border-2 border-blue-600 font-bold">0</span>
                </a>
                <a href="profile.html" id="navProfile" class="w-9 h-9 bg-blue-700 rounded-2xl flex items-center justify-center border-2 border-blue-400 overflow-hidden shadow-inner">
                    <span id="navInit">P</span>
                    <img id="navPic" src="" class="w-full h-full object-cover hidden">
                </a>
            </div>
        </div>
    </nav>

    <div class="bg-white/80 backdrop-blur-md border-b sticky top-[64px] z-40">
        <div class="max-w-md mx-auto flex">
            <button id="showAll" class="flex-1 py-4 text-[11px] font-black border-b-4 border-blue-600 text-blue-600 uppercase tracking-widest">Feed</button>
            <button onclick="window.location.href='reels.html'" class="flex-1 py-4 text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fas fa-play-circle text-red-500"></i> Reels
            </button>
        </div>
    </div>

    <div id="feed" class="max-w-md mx-auto p-3 mt-2 space-y-4">
        <div class="flex flex-col items-center py-20 text-gray-300">
            <div class="w-12 h-12 border-4 border-gray-100 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="mt-4 text-xs font-bold uppercase tracking-widest">Generating Feed...</p>
        </div>
    </div>

    <a href="post.html" class="fixed bottom-8 right-6 bg-blue-600 text-white w-15 h-15 rounded-[22px] shadow-[0_20px_40px_rgba(37,99,235,0.3)] flex items-center justify-center text-xl hover:scale-110 transition-all active:scale-90 z-50 border-4 border-white">
        <i class="fas fa-plus"></i>
    </a>

    <div id="commentBlur" class="comment-blur" onclick="closeComments()"></div>
    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 bg-white h-[85vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeComments()"></div>
        <h3 class="font-black text-gray-800 text-center uppercase text-xs tracking-widest mb-6" id="commentHeader">Comments (0)</h3>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 mb-4 pr-2 no-scrollbar"></div>
        <div class="flex flex-col gap-2 border-t pt-4">
            <div id="replyBox" class="hidden text-[10px] text-blue-600 font-black bg-blue-50 p-3 rounded-2xl flex justify-between">
                <span id="replyText">Replying...</span>
                <button onclick="cancelReply()" class="text-red-500 uppercase">Cancel</button>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="commentInput" placeholder="Say something nice..." class="flex-1 bg-gray-100 border-none rounded-[20px] px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-blue-600 font-medium">
                <button onclick="postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, setDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let myFollowing = [];
        let activePostId = null;
        let replyToId = null;

        // 🍎 Custom Toast
        window.showToast = (title, msg, type = 'error') => {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            const tTitle = document.getElementById('toastTitle');
            const tMsg = document.getElementById('toastMsg');
            icon.className = type === 'error' ? "toast-icon bg-red-100 text-red-600" : "toast-icon bg-green-100 text-green-600";
            icon.innerHTML = type === 'error' ? '<i class="fas fa-exclamation-triangle"></i>' : '<i class="fas fa-check-circle"></i>';
            tTitle.className = `text-[10px] font-black uppercase tracking-[2px] ${type === 'error' ? 'text-red-600' : 'text-green-600'}`;
            tTitle.innerText = title; tMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadNavData();
                loadFollowingList();
                renderFeed();
            } else { window.location.href = "index.html"; }
        });

        async function loadNavData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(userDoc.exists() && userDoc.data().profilePic) {
                document.getElementById('navPic').src = userDoc.data().profilePic;
                document.getElementById('navPic').classList.remove('hidden');
                document.getElementById('navInit').classList.add('hidden');
            }
        }

        function loadFollowingList() {
            onSnapshot(collection(db, "users", currentUser.uid, "following"), snap => {
                myFollowing = snap.docs.map(d => d.id);
            });
        }

        async function renderFeed() {
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            const algoSnap = await getDoc(doc(db, "appSettings", "algorithm"));
            let adCode = adSnap.exists() ? adSnap.data().code : "";
            let algoMode = algoSnap.exists() ? algoSnap.data().priority : 'fresh';

            onSnapshot(query(collection(db, "posts")), snap => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                
                let posts = [];
                snap.forEach(d => {
                    const data = d.data();
                    // 🛡️ শ্যাডুব্যান ফিল্টার
                    if(!data.isShadowBanned) posts.push({id: d.id, ...data});
                });

                if(algoMode === 'popular') posts.sort((a, b) => (b.likes || 0) - (a.likes || 0));
                else posts.sort((a, b) => b.createdAt?.toMillis() - a.createdAt?.toMillis());

                posts.forEach((p, index) => {
                    // ৩ পোস্ট পর পর অ্যাড
                    if (index > 0 && index % 3 === 0 && adCode) {
                        feed.innerHTML += `<div class="bg-white p-4 rounded-[25px] text-center my-2 border-2 border-dashed border-gray-100 shadow-sm">
                            <span class="text-[9px] font-black text-gray-300 uppercase block mb-2">Sponsored</span>
                            <div class="ad-slot">${adCode}</div>
                        </div>`;
                    }

                    const isLiked = p.likedBy?.includes(currentUser?.uid);
                    const isFollowing = myFollowing.includes(p.userId) || p.userId === currentUser.uid;
                    
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-[30px] shadow-sm border border-gray-100 overflow-hidden";
                    card.innerHTML = `
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <a href="user.html?id=${p.userId}" class="w-11 h-11 rounded-[15px] border-2 border-gray-50 overflow-hidden">
                                    <img src="${p.userPic || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                </a>
                                <div>
                                    <a href="user.html?id=${p.userId}" class="font-black text-sm text-gray-800">@${p.userName || 'User'}</a>
                                    <p class="text-[9px] text-gray-400 font-black uppercase tracking-wider">Public Identity</p>
                                </div>
                            </div>
                            ${(!isFollowing) ? `<button onclick="window.quickFollow('${p.userId}')" class="text-blue-600 text-[10px] font-black px-4 py-2 bg-blue-50 rounded-xl uppercase tracking-tighter">Follow</button>` : ''}
                        </div>
                        <p class="px-5 pb-4 text-sm text-gray-700 leading-relaxed font-medium">${formatText(p.text)}</p>
                        ${p.fileUrl ? (p.fileType === 'video' ? `<video src="${p.fileUrl}" loop controls playsinline class="w-full max-h-[450px] bg-black"></video>` : `<img src="${p.fileUrl}" class="w-full object-cover max-h-[500px]">`) : ""}
                        <div class="p-3 border-t border-gray-50 flex justify-around text-[11px] font-black text-gray-400">
                            <button onclick="window.like('${p.id}')" class="flex-1 py-2 flex items-center justify-center gap-2 ${isLiked ? 'text-red-500' : ''}"><i class="${isLiked ? 'fas' : 'far'} fa-heart text-lg"></i> ${p.likes || 0}</button>
                            <button onclick="window.openComments('${p.id}')" class="flex-1 py-2 flex items-center justify-center gap-2"><i class="far fa-comment text-lg"></i> Comment</button>
                            <button onclick="window.shareToProfile('${p.id}', '${p.fileUrl}', '${p.fileType}', '${p.text || ''}')" class="flex-1 py-2 flex items-center justify-center gap-2"><i class="fas fa-share-nodes text-lg"></i> Share</button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        // --- COMMENT LOGIC WITH TOAST ---
        window.openComments = (postId) => {
            activePostId = postId;
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('commentBlur').classList.add('active');
            loadComments(postId);
        };

        window.closeComments = () => {
            document.getElementById('commentSheet').classList.remove('active');
            document.getElementById('commentBlur').classList.remove('active');
            cancelReply();
        };

        window.postComment = async () => {
            const input = document.getElementById('commentInput');
            if(!input.value.trim()) return showToast("Empty", "কিছু তো লিখুন!", "error");
            
            const uSnap = await getDoc(doc(db, "users", currentUser.uid));
            const uData = uSnap.data();
            const data = {
                text: input.value, userId: currentUser.uid, userName: uData.name,
                userPic: uData.profilePic, createdAt: serverTimestamp()
            };

            try {
                if(replyToId) {
                    await addDoc(collection(db, "posts", activePostId, "comments", replyToId, "replies"), data);
                    showToast("Replied", "আপনার উত্তর দেওয়া হয়েছে", "success");
                    cancelReply();
                } else {
                    await addDoc(collection(db, "posts", activePostId, "comments"), {...data, likes: 0, likedBy: []});
                    showToast("Success", "কমেন্ট পাবলিশ হয়েছে", "success");
                }
                input.value = "";
            } catch(e) { showToast("Error", "কমেন্ট করা যায়নি", "error"); }
        };

        window.shareToProfile = async (id, url, type, text) => {
            showToast("Sharing", "প্রোফাইলে শেয়ার করা হচ্ছে...", "success");
            const uSnap = await getDoc(doc(db, "users", currentUser.uid));
            const u = uSnap.data();
            await addDoc(collection(db, "posts"), {
                userId: currentUser.uid, userName: u.name, userPic: u.profilePic,
                fileUrl: url || "", fileType: type || "", text: "Shared: " + text,
                createdAt: serverTimestamp(), likes: 0, likedBy: [], isShadowBanned: false
            });
            showToast("Shared", "আপনার প্রোফাইলে পোস্ট হয়েছে!", "success");
        };

        window.like = async (id) => {
            const ref = doc(db, "posts", id);
            const p = (await getDoc(ref)).data();
            const isLiked = p.likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        function formatText(text) {
            return text ? text.replace(/#(\w+)/g, '<span class="hashtag" onclick="window.location.href=\'search.html?q=$1\'">#$1</span>') : "";
        }

        window.quickFollow = async (tid) => {
            await setDoc(doc(db, "users", currentUser.uid, "following", tid), { time: serverTimestamp() });
            await setDoc(doc(db, "users", tid, "followers", currentUser.uid), { time: serverTimestamp() });
            showToast("Following", "ইউজারকে ফলো করা হয়েছে", "success");
        };
    </script>
</body>
</html>
