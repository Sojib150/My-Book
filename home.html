<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Pro Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; -webkit-tap-highlight-color: transparent; }
        
        .ios-blur { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .premium-card { background: white; border-radius: 28px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }
        
        /* Interactive Buttons Style */
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.9); background: rgba(0,0,0,0.05); }

        /* Dynamic Island Call Popup */
        #incomingCallUI {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 92%; max-width: 400px; background: #000; border-radius: 32px;
            padding: 12px 20px; z-index: 2000; transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: space-between;
        }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }

        .video-box { width: 100%; position: relative; }
        video { width: 100%; object-fit: cover; }
        
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-radius: 32px; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="pb-28">

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center"><i class="fas fa-phone-alt text-white text-xs"></i></div>
            <div class="min-w-0"><h4 id="callerNameDisplay" class="text-white text-[13px] font-bold truncate">Caller</h4><p class="text-[10px] text-gray-400">Incoming...</p></div>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-9 h-9 bg-red-500 rounded-full flex items-center justify-center text-white"><i class="fas fa-times text-xs"></i></button>
            <button id="acceptCallBtn" class="w-9 h-9 bg-green-500 rounded-full flex items-center justify-center text-white"><i class="fas fa-check text-xs"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-5 pt-8 pb-4 border-b border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-700"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover cursor-pointer">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white shadow-sm">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 text-gray-400 font-medium italic">অনুগ্রহ করে অপেক্ষা করুন...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="p-3 text-white"><i class="fas fa-house-chimney text-lg"></i></a>
        <a href="search.html" class="p-3 text-gray-500"><i class="fas fa-search text-lg"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition"><i class="fas fa-plus"></i></div>
        <a href="messages.html" class="p-3 text-gray-500"><i class="fas fa-comment-nodes text-lg"></i></a>
        <a href="profile.html" class="p-3 text-gray-500"><i class="fas fa-user text-lg"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="deleteDrawer" class="drawer p-8">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg font-bold text-center mb-8">পোস্টটি মুছে ফেলবেন?</h3>
        <div class="flex gap-3">
            <button id="confirmDelBtn" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-2xl active:scale-95 transition">মুছে ফেলুন</button>
            <button onclick="closeAll()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl">বাতিল</button>
        </div>
    </div>

    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar"></div>
        <div class="flex gap-2 border-t pt-4">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-medium">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let activePostId = null; let postToDelete = null;

        onAuthStateChanged(auth, u => { 
            if(u){ user=u; renderFeed(); loadProfile(); checkNotif(); loadStories(); listenForCalls(u.uid); } 
            else location.href="index.html"; 
        });

        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists()) {
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = snap.data().callerName;
                    document.getElementById('acceptCallBtn').onclick = () => window.location.href = `call.html?id=${snap.data().callerId}&type=${snap.data().type}`;
                    document.getElementById('declineCallBtn').onclick = async () => { await deleteDoc(doc(db, "calls", myId)); ui.classList.remove('active'); };
                } else ui.classList.remove('active');
            });
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            const globalAd = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)), async snap => {
                feed.innerHTML = "";
                snap.forEach(async docRef => {
                    const p = docRef.data(); if(p.isShadowBanned) return;
                    const card = await createPostCard(docRef.id, p, globalAd);
                    feed.appendChild(card);
                });
                setTimeout(initIntersection, 1000);
            });
        }

        async function createPostCard(id, p, globalAd) {
            const hasL = p.likedBy?.includes(user.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{hour:'numeric',minute:'numeric',day:'numeric',month:'short'}) : 'সবেমাত্র';
            const card = document.createElement('div');
            card.className = "premium-card";
            
            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border">
                        <div>
                            <div class="font-bold text-[14px]">@${p.userName}</div>
                            <p class="text-[9px] text-gray-400 font-bold">${date}</p>
                        </div>
                    </div>
                    ${p.userId === user.uid ? `<button onclick="openDeleteDrawer('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-can text-sm"></i></button>` : ''}
                </div>
                <p class="px-5 pb-4 text-[14px] text-gray-700 leading-relaxed">${p.text || ''}</p>
                ${p.fileUrl ? `<div class="video-box">${p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ''}
                
                ${globalAd ? `<div class="p-3 border-y bg-gray-50/50 text-center"><div id="ad-frame-${id}"></div></div>` : ""}

                <div class="flex justify-around py-2">
                    <button onclick="like('${id}')" class="btn-interact flex items-center gap-2 px-5 py-2 rounded-2xl ${hasL ? 'text-red-500 bg-red-50':'text-gray-500'}">
                        <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart"></i>
                        <span class="text-[11px] font-bold">${p.likes||0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="btn-interact flex items-center gap-2 px-5 py-2 rounded-2xl text-gray-500">
                        <i class="fa-regular fa-comment"></i>
                        <span class="text-[11px] font-bold">${p.commentCount||0}</span>
                    </button>
                    <button onclick="sharePost('${id}')" class="btn-interact flex items-center gap-2 px-5 py-2 rounded-2xl text-gray-500">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                    </button>
                </div>
            `;
            if(globalAd) injectAd(id, globalAd);
            return card;
        }

        function injectAd(id, code) { 
            setTimeout(() => { 
                const box = document.getElementById(`ad-frame-${id}`); 
                if(box){ 
                    const frame = document.createElement('iframe'); 
                    frame.style.width="100%"; frame.style.height="65px"; frame.style.border="none"; 
                    box.appendChild(frame); 
                    frame.contentWindow.document.write(`<body style="margin:0;display:flex;justify-content:center;align-items:center;">${code}</body>`); 
                } 
            }, 1500); 
        }

        window.like = async (id) => {
            const ref = doc(db, "posts", id); const d = (await getDoc(ref)).data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likes: increment(hasL?-1:1), likedBy: hasL?arrayRemove(user.uid):arrayUnion(user.uid) });
        };

        window.openComments = (id) => { activePostId = id; document.getElementById('commentSheet').classList.add('active'); document.getElementById('overlay').style.display='block'; loadComments(id); };
        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; };
        window.handleVideo = (v) => { v.muted = !v.muted; if(v.paused) v.play(); };
        
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "users", user.uid, "notifications")), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { 
            onSnapshot(collection(db, "stories"), snap => { 
                const sL = document.getElementById('storyList'); sL.innerHTML = ""; 
                snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><div class="w-16 h-16 rounded-full p-0.5 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover border border-white"></div><span class="text-[9px] font-bold text-gray-500">${d.data().userName}</span></div>`; }); 
            }); 
        }
        function initIntersection() { const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.play().catch(() => {}); else e.target.pause(); }); }, { threshold: 0.6 }); document.querySelectorAll('.post-vid').forEach(v => obs.observe(v)); }
        window.sharePost = (id) => navigator.share ? navigator.share({ title: 'My Book', url: window.location.href }) : alert("Link Copied!");
    </script>
</body>
</html>
