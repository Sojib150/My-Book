<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Professional Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .premium-card { background: white; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
        .video-box { width: 100%; background: #000; display: none; } 
        .video-box.active { display: block; min-height: 200px; }
        video { width: 100%; max-height: 80vh; border-radius: 4px; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-radius: 28px 28px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; z-index: 999; }
        .floating-btn { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; background: #2563eb; color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(37,99,235,0.4); z-index: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 bg-gray-50">

    <nav class="bg-white/95 backdrop-blur-xl border-b sticky top-0 z-50 px-5 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5 text-gray-600">
                <a href="search.html"><i class="fa-solid fa-search text-xl"></i></a>
                <a href="reels.html"><i class="fa-solid fa-play-circle text-xl text-red-500"></i></a>
                <a href="messages.html" class="relative"><i class="fa-brands fa-facebook-messenger text-2xl text-blue-600"></i></a>
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <div id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-full border-2 border-blue-100 object-cover cursor-pointer">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-8 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white shadow-sm">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[11px] font-bold text-gray-500">Your Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>
        <div id="feed" class="space-y-5"></div>
    </div>

    <button class="floating-btn" onclick="location.href='post.html'"><i class="fa-solid fa-plus"></i></button>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="deleteDrawer" class="drawer p-8">
        <div class="w-14 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-xl font-extrabold text-center text-gray-800 mb-2">মুছে ফেলবেন?</h3>
        <p class="text-gray-500 text-center text-sm mb-8 px-4">পোস্টটি কি নিশ্চিতভাবে ডিলিট করতে চান?</p>
        <div class="flex flex-col gap-3">
            <button id="confirmDelBtn" class="w-full bg-red-500 text-white font-bold py-4 rounded-2xl">হ্যাঁ, মুছে ফেলুন</button>
            <button onclick="closeAll()" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl">বাতিল করুন</button>
        </div>
    </div>

    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-14 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar"></div>
        
        <div id="replyBox" class="hidden bg-blue-50 p-3 rounded-t-2xl text-xs font-bold text-blue-600 flex justify-between border-b">
            <span>Replying to <span id="replyingTo"></span></span>
            <button onclick="cancelReply()"><i class="fa-solid fa-times"></i></button>
        </div>

        <div class="flex gap-3 border-t pt-4 bg-white">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-semibold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let activePostId = null; let postToDelete = null;

        onAuthStateChanged(auth, u => { if(u){ user=u; renderFeed(); loadProfile(); checkNotif(); loadStories(); } else location.href="index.html"; });

        async function renderFeed() {
            const feed = document.getElementById('feed');
            // ১. বিজ্ঞাপন কোড গেট করা
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            const globalAd = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(query(collection(db, "posts"), limit(50)), async snap => {
                feed.innerHTML = ""; // ফ্রেশ লোডের জন্য
                snap.forEach(async docRef => {
                    const p = docRef.data();
                    const id = docRef.id;
                    if(p.isShadowBanned) return;
                    const card = await createPostCard(id, p, globalAd);
                    feed.appendChild(card);
                });
                initIntersection();
            });
        }

        async function createPostCard(id, p, globalAd) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{hour:'numeric',minute:'numeric',day:'numeric',month:'short'}) : 'সবেমাত্র';
            const card = document.createElement('div');
            card.id = `post-${id}`;
            card.className = "premium-card";
            
            const mediaHtml = p.fileUrl ? `<div class="video-box active">${p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ``;

            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border-2 border-blue-50">
                        <div>
                            <div class="font-extrabold text-[14px]">@${p.userName}</div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${date}</p>
                        </div>
                    </div>
                    ${isMine ? `<button onclick="openDeleteDrawer('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-can text-sm"></i></button>` : ''}
                </div>
                <p class="px-5 pb-3 text-[14px] text-gray-700 font-medium">${p.text || ''}</p>
                ${mediaHtml}
                
                ${globalAd ? `<div class="p-3 border-y bg-gray-50 text-center"><div id="ad-frame-${id}"></div></div>` : ""}

                <div class="flex justify-around py-2 border-t mt-1">
                    <button onclick="like('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 like-btn ${hasL ? 'text-red-500':'text-gray-400'}">
                        <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i>
                        <span class="text-[10px] font-black like-count">${p.likes||0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400">
                        <i class="fa-regular fa-comment-dots text-xl"></i>
                        <span class="text-[10px] font-black">${p.commentCount||0}</span>
                    </button>
                    <button onclick="sharePost('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                        <span class="text-[10px] font-black uppercase">Share</span>
                    </button>
                </div>
            `;
            if(globalAd) injectAd(id, globalAd);
            return card;
        }

        // ২. রিপ্লাই সিস্টেমসহ কমেন্ট লোড
        window.openComments = (id) => { 
            activePostId = id; 
            document.getElementById('commentSheet').classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
            loadComments(id); 
        };

        async function loadComments(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                const list = document.getElementById('commentList'); list.innerHTML = "";
                sn.forEach(c => {
                    const d = c.data(); const cid = c.id;
                    list.innerHTML += `
                        <div class="flex gap-4">
                            <img src="${d.userPic}" class="w-10 h-10 rounded-full object-cover border">
                            <div class="flex-1">
                                <div class="bg-gray-100 p-3 rounded-2xl inline-block max-w-[90%]">
                                    <p class="text-[11px] font-black text-blue-600">@${d.userName}</p>
                                    <p class="text-[13px] text-gray-800">${d.text}</p>
                                </div>
                                <div class="flex gap-5 mt-1 ml-2 text-[10px] font-bold text-gray-400 uppercase">
                                    <button onclick="prepReply('${d.userName}')">Reply</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        window.prepReply = (name) => {
            document.getElementById('replyBox').classList.remove('hidden');
            document.getElementById('replyingTo').innerText = name;
            document.getElementById('cInput').value = `@${name} `;
            document.getElementById('cInput').focus();
        };

        window.cancelReply = () => {
            document.getElementById('replyBox').classList.add('hidden');
            document.getElementById('cInput').value = "";
        };

        window.postComment = async () => {
            const v = document.getElementById('cInput').value; if(!v) return;
            const u = (await getDoc(doc(db, "users", user.uid))).data();
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: v, userId: user.uid, userName: u.name, userPic: u.profilePic, time: serverTimestamp() });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            cancelReply();
        };

        // লাইক ফাংশন
        window.like = async (id) => {
            const ref = doc(db, "posts", id); const d = (await getDoc(ref)).data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likes: increment(hasL?-1:1), likedBy: hasL?arrayRemove(user.uid):arrayUnion(user.uid) });
        };

        // বিজ্ঞাপন ইনজেকশন
        function injectAd(id, code) { 
            setTimeout(() => { 
                const box = document.getElementById(`ad-frame-${id}`); 
                if(box){ 
                    const frame = document.createElement('iframe'); 
                    frame.style.width="100%"; frame.style.height="60px"; frame.style.border="none"; 
                    box.appendChild(frame); 
                    frame.contentWindow.document.write(`<body style="margin:0;display:flex;justify-content:center;">${code}</body>`); 
                } 
            }, 1000); 
        }

        // বাকি সিস্টেম
        window.openDeleteDrawer = (id) => { postToDelete = id; document.getElementById('deleteDrawer').classList.add('active'); document.getElementById('overlay').style.display='block'; };
        document.getElementById('confirmDelBtn').onclick = async () => { if(postToDelete){ await deleteDoc(doc(db, "posts", postToDelete)); closeAll(); } };
        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; cancelReply(); };
        window.handleVideo = (v) => { v.muted = !v.muted; if(v.paused) v.play(); };
        
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "users", user.uid, "notifications")), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { 
            onSnapshot(collection(db, "stories"), snap => { 
                const sL = document.getElementById('storyList'); sL.innerHTML = ""; 
                snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><img src="${d.data().userPic}" class="w-16 h-16 rounded-full p-1 border-2 border-blue-600 object-cover"><span class="text-[9px] font-bold text-gray-600">${d.data().userName}</span></div>`; }); 
            }); 
        }
        function initIntersection() { const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.play().catch(() => {}); else e.target.pause(); }); }, { threshold: 0.6 }); document.querySelectorAll('.post-vid').forEach(v => obs.observe(v)); }
        window.sharePost = (id) => navigator.share ? navigator.share({ title: 'My Book', url: window.location.href }) : alert("লিঙ্ক কপি হয়েছে!");

    </script>
</body>
</html>
