<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; min-height: 200px; }
        video { width: 100%; max-height: 70vh; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; z-index: 999; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); border-radius: 32px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
        .nav-item { color: rgba(255,255,255,0.5); transition: color 0.3s; font-size: 1.2rem; }
        .nav-item.active { color: white; }
        #maintenanceUI { position: fixed; inset: 0; z-index: 10000; background: white; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body class="pb-32">

    <div id="maintenanceUI">
        <div class="max-w-xs mx-auto p-6">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                <i class="fas fa-tools text-3xl animate-bounce"></i>
            </div>
            <h2 class="text-xl font-black mb-2">সার্ভার আপডেট চলছে</h2>
            <p class="text-gray-500 text-xs mb-6">কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="reels.html" class="text-red-500"><i class="fa-solid fa-play-circle text-2xl"></i></a>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="global-ad-slot" class="mb-4"></div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home-alt"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl cursor-pointer">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let globalCPM = 0.0001;

        onAuthStateChanged(auth, async u => {
            if(u){
                user = u;
                // ১. মেইনটেন্যান্স চেক
                onSnapshot(doc(db, "appSettings", "maintenance"), snap => {
                    document.getElementById('maintenanceUI').style.display = snap.data()?.isOn ? 'flex' : 'none';
                });

                // ২. CPM সেটিংস আনা
                onSnapshot(doc(db, "appSettings", "algorithm"), snap => {
                    if (snap.exists()) globalCPM = snap.data().trendBoost || 0.0001;
                });

                renderFeed();
                loadProfilePic();
            } else location.href="index.html";
        });

        // ৩. ইনকাম এবং ভিউ আপডেট লজিক
        async function handlePostView(postId, creatorId) {
            if (!postId || creatorId === user.uid) return;
            const postRef = doc(db, "posts", postId);
            const creatorRef = doc(db, "users", creatorId);

            try {
                await updateDoc(postRef, { views: increment(1) });
                const cSnap = await getDoc(creatorRef);
                if (cSnap.exists() && cSnap.data().isMonetized) {
                    await updateDoc(creatorRef, { balance: increment(globalCPM) });
                }
            } catch(e) { console.error(e); }
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const q = query(collection(db, "posts"), limit(30));
            
            onSnapshot(q, snap => {
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const card = createPostElement(d.id, p);
                    feed.appendChild(card);
                });
                setupObserver();
            });
        }

        function createPostElement(id, p) {
            const div = document.createElement('div');
            div.className = "premium-card";
            div.innerHTML = `
                <div class="p-4 flex items-center gap-3">
                    <img src="${p.userPic}" class="w-10 h-10 rounded-xl object-cover bg-gray-100">
                    <div>
                        <div class="font-bold text-sm">@${p.userName}</div>
                        <p class="text-[8px] text-gray-400 uppercase font-black">Sponsored</p>
                    </div>
                </div>
                <p class="px-5 pb-3 text-sm text-gray-700">${p.text || ''}</p>
                <div class="post-container video-box" data-id="${id}" data-creator="${p.userId}">
                    ${p.fileType === 'video' 
                        ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid"></video>` 
                        : `<img src="${p.fileUrl}" class="w-full">`}
                </div>
                <div class="flex justify-around py-3 border-t mt-2 text-gray-400">
                    <button class="flex items-center gap-2"><i class="fa-regular fa-heart"></i><span class="text-xs font-bold">${p.likedBy?.length || 0}</span></button>
                    <div class="flex items-center gap-2 text-blue-500/70"><i class="fa-solid fa-eye"></i><span class="text-xs font-bold">${p.views || 0}</span></div>
                    <button class="flex items-center gap-2"><i class="fa-solid fa-share"></i></button>
                </div>
            `;
            return div;
        }

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = entry.target;
                        const vid = target.querySelector('video');
                        if(vid) vid.play().catch(()=>{});
                        
                        handlePostView(target.dataset.id, target.dataset.creator);
                        obs.unobserve(target); // একবার ভিউ হলে স্টপ
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-container').forEach(el => obs.observe(el));
        }

        async function loadProfilePic() {
            const d = await getDoc(doc(db, "users", user.uid));
            if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || "";
        }

        window.handleVideo = (v) => { v.muted = !v.muted; v.paused ? v.play() : v.pause(); };
    </script>
</body>
</html>
