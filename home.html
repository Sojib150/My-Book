<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .post-card { background: white; border-radius: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .nav-item { transition: all 0.3s; }
        .nav-item:active { scale: 0.9; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-blue-600 p-3 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center text-white">
            <h1 class="text-2xl font-black italic tracking-tighter">My Book</h1>
            <div class="flex gap-4">
                <a href="search.html" class="text-xl"><i class="fas fa-search"></i></a>
                <a href="messages.html" class="text-xl relative">
                    <i class="fab fa-facebook-messenger"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-[8px] px-1 rounded-full border border-white">3</span>
                </a>
            </div>
        </div>
    </nav>

    <div id="postContainer" class="max-w-md mx-auto p-4 space-y-5">
        <div class="flex justify-center py-10 text-blue-600">
            <i class="fas fa-circle-notch fa-spin text-3xl"></i>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around max-w-md mx-auto z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <a href="home.html" class="nav-item text-blue-600 text-2xl"><i class="fas fa-home"></i></a>
        <a href="reels.html" class="nav-item text-gray-400 text-2xl"><i class="fas fa-play-circle"></i></a>
        <a href="post.html" class="nav-item text-gray-400 text-2xl"><i class="fas fa-plus-square"></i></a>
        <a href="profile.html" class="nav-item text-gray-400 text-2xl"><i class="fas fa-user-circle"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => {
            if(user) {
                currentUser = user;
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadPosts();
            } else {
                window.location.href = "index.html";
            }
        });

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, snap => {
                const container = document.getElementById('postContainer');
                container.innerHTML = "";
                snap.forEach(postDoc => {
                    const p = postDoc.data();
                    const id = postDoc.id;
                    const div = document.createElement('div');
                    div.className = "post-card p-4";
                    
                    let mediaContent = "";
                    if(p.fileType === 'video') {
                        // অটো-প্লে এবং সাউন্ড লজিক ফিক্স
                        mediaContent = `
                            <div class="mt-3 relative rounded-xl overflow-hidden bg-black">
                                <video src="${p.fileUrl}" loop autoplay muted playsinline class="w-full h-auto"></video>
                            </div>`;
                    } else if(p.fileUrl) {
                        mediaContent = `<img src="${p.fileUrl}" class="mt-3 rounded-xl w-full h-auto shadow-sm">`;
                    }

                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full border border-gray-200 overflow-hidden shadow-sm">
                                    <img src="${p.userPic || 'https://via.placeholder.com/50'}" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h4 class="font-bold text-sm text-gray-800 tracking-tight">${p.userName || 'User'}</h4>
                                    <p class="text-[10px] text-gray-400 font-medium">Just now • <i class="fas fa-globe-americas"></i></p>
                                </div>
                            </div>
                            <button onclick="window.followUser('${p.userId}', event)" class="bg-blue-50 text-blue-600 text-[11px] font-bold px-4 py-1.5 rounded-full hover:bg-blue-100 transition active:scale-90">
                                Follow
                            </button>
                        </div>
                        <p class="text-[13px] text-gray-700 leading-relaxed px-1">${p.text || ''}</p>
                        ${mediaContent}
                        
                        <div class="flex justify-between mt-4 pt-3 border-t border-gray-50 text-gray-500 text-sm">
                            <button class="flex items-center gap-2 px-2 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-thumbs-up"></i> Like</button>
                            <button class="flex items-center gap-2 px-2 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-comment-alt"></i> Comment</button>
                            <button class="flex items-center gap-2 px-2 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-share-square"></i> Share</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.followUser = async (targetId, e) => {
            e.stopPropagation();
            if(!currentUser || currentUser.uid === targetId) return;
            try {
                await updateDoc(doc(db, "users", currentUser.uid), { following: arrayUnion(targetId) });
                await updateDoc(doc(db, "users", targetId), { followers: arrayUnion(currentUser.uid) });
                alert("ফলো করা হয়েছে!");
            } catch(err) {
                console.error(err);
            }
        };

        // অফলাইন স্ট্যাটাস ট্র্যাকিং
        window.onbeforeunload = () => { if(currentUser) updateDoc(doc(db, "users", currentUser.uid), { status: "offline" }); };
    </script>
</body>
</html>
