<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .post-card { background: white; border-radius: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-blue-600 p-3 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center text-white">
            <h1 class="text-2xl font-black italic tracking-tighter">My Book</h1>
            <div class="flex gap-4">
                <a href="messages.html" class="text-xl relative">
                    <i class="fab fa-facebook-messenger"></i>
                </a>
            </div>
        </div>
    </nav>

    <div id="postContainer" class="max-w-md mx-auto p-4 space-y-5">
        <div id="loading" class="flex flex-col items-center justify-center py-20 text-blue-600">
            <i class="fas fa-circle-notch fa-spin text-3xl mb-2"></i>
            <p class="text-xs font-bold">পোস্ট লোড হচ্ছে...</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around max-w-md mx-auto z-50 shadow-lg">
        <a href="home.html" class="text-blue-600 text-2xl"><i class="fas fa-home"></i></a>
        <a href="reels.html" class="text-gray-400 text-2xl"><i class="fas fa-play-circle"></i></a>
        <a href="post.html" class="text-gray-400 text-2xl"><i class="fas fa-plus-square"></i></a>
        <a href="profile.html" class="text-gray-400 text-2xl"><i class="fas fa-user-circle"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                // অনলাইন স্ট্যাটাস আপডেট
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadPosts();
            } else {
                window.location.href = "index.html";
            }
        });

        function loadPosts() {
            const container = document.getElementById('postContainer');
            // 'timestamp' অনুযায়ী সাজিয়ে পোস্ট আনা
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snap) => {
                if (snap.empty) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">কোনো পোস্ট খুঁজে পাওয়া যায়নি।</div>`;
                    return;
                }

                container.innerHTML = "";
                snap.forEach(postDoc => {
                    const p = postDoc.data();
                    const id = postDoc.id;
                    const div = document.createElement('div');
                    div.className = "post-card p-4 animate-in fade-in duration-500";
                    
                    let mediaContent = "";
                    if(p.fileType === 'video') {
                        mediaContent = `
                            <div class="mt-3 rounded-xl overflow-hidden bg-black shadow-inner">
                                <video src="${p.fileUrl}" loop autoplay muted playsinline class="w-full h-auto"></video>
                            </div>`;
                    } else if(p.fileUrl) {
                        mediaContent = `<img src="${p.fileUrl}" class="mt-3 rounded-xl w-full h-auto object-cover shadow-sm">`;
                    }

                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-3">
                                <img src="${p.userPic || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-full border object-cover">
                                <div>
                                    <h4 class="font-bold text-sm text-gray-800">${p.userName || 'User'}</h4>
                                    <p class="text-[10px] text-gray-400">Public • <i class="fas fa-globe-americas"></i></p>
                                </div>
                            </div>
                            <button onclick="window.followUser('${p.userId}')" class="bg-blue-50 text-blue-600 text-[11px] font-bold px-4 py-1.5 rounded-full active:scale-95 transition">
                                Follow
                            </button>
                        </div>
                        <p class="text-[13px] text-gray-700 leading-snug">${p.text || ''}</p>
                        ${mediaContent}
                        
                        <div class="flex justify-around mt-4 pt-3 border-t border-gray-50 text-gray-500 text-xs font-bold">
                            <button class="flex items-center gap-2 px-3 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-thumbs-up"></i> Like</button>
                            <button class="flex items-center gap-2 px-3 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-comment"></i> Comment</button>
                            <button class="flex items-center gap-2 px-3 py-1 hover:bg-gray-50 rounded-lg"><i class="far fa-share-square"></i> Share</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }, (error) => {
                console.error("Error loading posts: ", error);
                container.innerHTML = `<div class="text-center py-10 text-red-400 text-sm">পোস্ট লোড করতে সমস্যা হয়েছে। ইন্ডেক্সিং চেক করুন।</div>`;
            });
        }

        window.followUser = async (targetId) => {
            if(!auth.currentUser || auth.currentUser.uid === targetId) return;
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { following: arrayUnion(targetId) });
                await updateDoc(doc(db, "users", targetId), { followers: arrayUnion(auth.currentUser.uid) });
                alert("ফলো করা হয়েছে!");
            } catch(e) {
                alert("ফলো করতে সমস্যা হয়েছে!");
            }
        };

        window.onbeforeunload = () => {
            if(auth.currentUser) updateDoc(doc(db, "users", auth.currentUser.uid), { status: "offline" });
        };
    </script>
</body>
</html>
