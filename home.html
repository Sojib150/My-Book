<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
        video { width: 100%; max-height: 70vh; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; z-index: 999; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); border-radius: 32px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
        .nav-item { color: rgba(255,255,255,0.5); transition: color 0.3s; font-size: 1.2rem; }
        .nav-item.active { color: white; }
        #incomingCallUI { position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%); width: 92%; max-width: 380px; background: #000; border-radius: 35px; padding: 12px 20px; z-index: 2000; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; justify-content: space-between; color: white; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }
        #maintenanceUI { position: fixed; inset: 0; z-index: 10000; background: white; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <div id="maintenanceUI">
        <div class="max-w-xs mx-auto text-center p-6">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                <i class="fas fa-tools text-4xl animate-bounce"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-3">সার্ভার আপডেট চলছে</h2>
        </div>
    </div>

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center"><i class="fas fa-video text-white text-xs"></i></div>
            <div class="min-w-0">
                <h4 id="callerNameDisplay" class="text-[13px] font-extrabold truncate">লোড হচ্ছে...</h4>
                <p class="text-[9px] text-green-400 uppercase font-black tracking-widest animate-pulse">Incoming Call</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center"><i class="fas fa-phone-alt"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="reels.html" class="text-red-500"><i class="fa-solid fa-play-circle text-2xl"></i></a>
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-800"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover cursor-pointer bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="global-ad-slot" class="mb-4"></div>

        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white shadow-sm"><i class="fa-solid fa-plus text-xl"></i></div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home-alt"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl active:scale-90 transition cursor-pointer"><i class="fas fa-plus text-xl"></i></div>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeAll()"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-6"></div>
        <div class="flex gap-3 border-t pt-4 bg-white mt-2">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; 
        let currentUserData = null;
        let globalCPM = 0.0001;

        onAuthStateChanged(auth, async u => { 
            if(u){ 
                user = u; 
                onSnapshot(doc(db, "appSettings", "maintenance"), snap => { document.getElementById('maintenanceUI').style.display = snap.data()?.isOn ? 'flex' : 'none'; });
                onSnapshot(doc(db, "appSettings", "algorithm"), snap => { if (snap.exists()) globalCPM = snap.data().trendBoost || 0.0001; });
                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.exists() ? userSnap.data() : null;
                
                renderFeed(); 
                loadProfile(); 
                checkNotif(); 
                loadStories(); 
                listenForCalls(u.uid);
            } else location.href="index.html"; 
        });

        // ভিউ ও ইনকাম লজিক
        async function handlePostView(postId, creatorId) {
            if (!postId || creatorId === user.uid) return;
            try {
                await updateDoc(doc(db, "posts", postId), { views: increment(1) });
                const creatorRef = doc(db, "users", creatorId);
                const cSnap = await getDoc(creatorRef);
                if (cSnap.exists() && cSnap.data().isMonetized) {
                    await updateDoc(creatorRef, { balance: increment(globalCPM) });
                }
            } catch (e) { console.error(e); }
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)), async snap => {
                feed.innerHTML = "";
                snap.forEach(async (d) => {
                    const p = d.data();
                    const card = await createPostCard(d.id, p);
                    feed.appendChild(card);
                });
                setupObserver();
            });
        }

        async function createPostCard(id, p) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const views = p.views || 0;
            const card = document.createElement('div');
            card.className = "premium-card";
            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover bg-gray-100 border-2 border-blue-50">
                        <div><div class="font-extrabold text-[14px]">@${p.userName}</div><p class="text-[9px] text-gray-400 uppercase font-black">Just Now</p></div>
                    </div>
                    ${isMine ? `<button onclick="deletePost('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-alt"></i></button>` : ''}
                </div>
                <p class="px-5 pb-4 text-[14px] text-gray-700 font-medium">${p.text || ''}</p>
                <div class="post-container video-box" data-id="${id}" data-creator="${p.userId}">
                    ${p.fileUrl ? (p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`) : ''}
                </div>
                <div class="flex justify-around py-2 border-t mt-1">
                    <button onclick="like('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 ${hasL ? 'text-red-500':'text-gray-400'}"><i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i><span class="text-[10px] font-black">${p.likedBy?.length||0}</span></button>
                    <button onclick="openComments('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400"><i class="fa-regular fa-comment-dots text-xl"></i><span class="text-[10px] font-black">${p.commentCount||0}</span></button>
                    <div class="flex flex-col items-center gap-1 flex-1 py-2 text-blue-500/60"><i class="fa-solid fa-eye text-xl"></i><span class="text-[10px] font-black">${views}</span></div>
                    <button onclick="sharePost('${id}')" class="flex flex-col items-center gap-1 flex-1 py-2 text-gray-400"><i class="fa-solid fa-share-nodes text-xl"></i><span class="text-[10px] font-black uppercase">Share</span></button>
                </div>`;
            return card;
        }

        function setupObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = entry.target;
                        const vid = target.querySelector('video');
                        if(vid) vid.play().catch(()=>{});
                        handlePostView(target.dataset.id, target.dataset.creator);
                        obs.unobserve(target);
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-container').forEach(el => obs.observe(el));
        }

        window.like = async (id) => {
            const ref = doc(db, "posts", id); 
            const snap = await getDoc(ref);
            const hasL = snap.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.openComments = (id) => { activePostId = id; document.getElementById('commentSheet').classList.add('active'); document.getElementById('overlay').style.display='block'; loadComments(id); };
        function closeAll() { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; }
        window.closeAll = closeAll;
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { onSnapshot(collection(db, "stories"), snap => { const sL = document.getElementById('storyList'); sL.innerHTML = ""; snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0"><div class="w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div><span class="text-[9px] font-bold text-gray-500">${d.data().userName}</span></div>`; }); }); }
        function listenForCalls(myId) { onSnapshot(doc(db, "calls", myId), snap => { const ui = document.getElementById('incomingCallUI'); if (snap.exists() && snap.data().status === 'ringing') { ui.classList.add('active'); document.getElementById('callerNameDisplay').innerText = snap.data().callerName; } else { ui.classList.remove('active'); } }); }
        window.handleVideo = (v) => { v.muted = !v.muted; v.paused ? v.play() : v.pause(); };
    </script>
</body>
</html>
