<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        #incomingCallUI { position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%); width: 92%; max-width: 380px; background: #000; border-radius: 35px; padding: 12px 20px; z-index: 2000; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; justify-content: space-between; color: white; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }
        
        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; }
        video { width: 100%; max-height: 70vh; display: block; pointer-events: none; }
        
        /* ভিডিওর ভেতরে অ্যাড স্লট */
        .post-ad-slot { width: 100%; background: #f1f5f9; padding: 12px; font-size: 10px; text-align: center; border-top: 1px solid #e2e8f0; min-height: 50px; }
        
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); border-radius: 32px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
        .nav-item { color: rgba(255,255,255,0.5); transition: color 0.3s; font-size: 1.2rem; }
        .nav-item.active { color: white; }
        
        .elite-popup { background: #111 !important; border: 1px solid #D4AF37 !important; color: #fff !important; border-radius: 25px !important; }
        .elite-confirm { background: linear-gradient(135deg, #D4AF37, #8A6E2F) !important; color: #000 !important; font-weight: bold !important; border-radius: 12px !important; }
        .elite-cancel { background: #222 !important; color: #fff !important; border-radius: 12px !important; }
        
        #maintenanceUI { position: fixed; inset: 0; z-index: 10000; background: white; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #global-ad-slot { width: 100%; min-height: 20px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .follow-btn { padding: 5px 12px; background: #2563eb; color: white; border-radius: 12px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body class="pb-32">

    <div id="maintenanceUI">
        <div class="max-w-xs mx-auto text-center p-6">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600 shadow-inner">
                <i class="fas fa-tools text-4xl animate-bounce"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-3">সার্ভার আপডেট চলছে</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-6">আমরা অ্যাপটিকে আরও উন্নত করার কাজ করছি। কিছুক্ষণ পর আবার অ্যাপটি ওপেন করুন।</p>
        </div>
    </div>

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center"><i class="fas fa-video text-white text-xs"></i></div>
            <div class="min-w-0"><h4 id="callerNameDisplay" class="text-[13px] font-extrabold truncate">লোড হচ্ছে...</h4></div>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center pulse-call"><i class="fas fa-phone-alt"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="reels.html" class="text-red-500"><i class="fa-solid fa-play-circle text-2xl"></i></a>
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-800"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover cursor-pointer bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="global-ad-slot"></div>

        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home-alt"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl cursor-pointer">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    
    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeAll()"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-6"></div>
        <div class="flex gap-3 border-t pt-4 bg-white mt-2">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; 
        let currentUserData = null;
        let activePostId = null; 
        let globalCPM = 0.0001;
        let adCode = "";
        let viewTimers = {}; 

        onAuthStateChanged(auth, async u => { 
            if(u){ 
                user = u; 
                onSnapshot(doc(db, "appSettings", "maintenance"), (snap) => {
                    if (snap.exists()) document.getElementById('maintenanceUI').style.display = snap.data().isOn ? 'flex' : 'none';
                });
                
                onSnapshot(doc(db, "appSettings", "algorithm"), snap => {
                    if (snap.exists()) globalCPM = snap.data().trendBoost || 0.0001;
                });

                onSnapshot(doc(db, "appSettings", "ads"), snap => {
                    if (snap.exists() && snap.data().code) {
                        adCode = snap.data().code;
                        const adSlot = document.getElementById('global-ad-slot');
                        const range = document.createRange();
                        const documentFragment = range.createContextualFragment(adCode);
                        adSlot.innerHTML = ""; 
                        adSlot.appendChild(documentFragment);
                    }
                });

                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.data();

                renderFeed(); 
                loadProfile(); 
                checkNotif(); 
                loadStories(); 
                listenForCalls(u.uid);
            } else location.href="index.html"; 
        });

        async function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), limit(30), orderBy("createdAt", "desc")), async snap => {
                feed.innerHTML = "";
                for (const d of snap.docs) {
                    const card = await createPostCard(d.id, d.data());
                    feed.appendChild(card);
                }
                setTimeout(initIntersection, 1000);
            });
        }

        async function createPostCard(id, p) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{hour:'numeric',minute:'numeric',day:'numeric',month:'short'}) : 'Just Now';
            
            const creatorSnap = await getDoc(doc(db, "users", p.userId));
            const creatorData = creatorSnap.data();
            const isCreatorMonetized = creatorData?.isMonetized || false;
            const isFollowing = currentUserData.following?.includes(p.userId);

            const card = document.createElement('div');
            card.className = "premium-card";
            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${p.userPic || ''}" onclick="location.href='user.html?id=${p.userId}'" class="w-11 h-11 rounded-2xl object-cover border-2 border-blue-50 bg-gray-100 cursor-pointer">
                        <div>
                            <div class="font-extrabold text-[14px]">@${p.userName || 'User'}</div>
                            <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">${date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${(!isMine && !isFollowing) ? `<button onclick="followUser('${p.userId}')" class="follow-btn">Follow</button>` : ''}
                        ${isMine ? `<button onclick="confirmDeletePost('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-alt"></i></button>` : ''}
                        <button onclick="reportPost('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-circle-exclamation"></i></button>
                    </div>
                </div>
                
                <div class="px-5 pb-4 text-[14px] text-gray-700 font-medium cursor-pointer" onclick="location.href='post-view.html?id=${id}'">
                    ${p.text || ''}
                </div>

                <div class="post-tracker" data-id="${id}" data-creator="${p.userId}">
                    ${p.fileUrl ? `
                        <div class="video-box" onclick="${p.fileType === 'video' ? "location.href='reels.html'" : "location.href='post-view.html?id=" + id + "'" }">
                            ${p.fileType === 'video' ? 
                                `<video src="${p.fileUrl}" loop muted playsinline autoplay></video>` : 
                                `<img src="${p.fileUrl}" class="w-full object-cover">`
                            }
                        </div>` : ''}
                </div>

                ${isCreatorMonetized && adCode ? `<div class="post-ad-slot" id="post-ad-${id}">${adCode}</div>` : ''}

                <div class="flex justify-around py-2 border-t mt-1">
                    <button onclick="like('${id}')" class="flex flex-col items-center flex-1 py-2 ${hasL ? 'text-red-500' : 'text-gray-400'}">
                        <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i>
                        <span class="text-[10px] font-black">${p.likedBy?.length || 0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="flex flex-col items-center flex-1 py-2 text-gray-400">
                        <i class="fa-regular fa-comment-dots text-xl"></i>
                        <span class="text-[10px] font-black">${p.commentCount || 0}</span>
                    </button>
                    <div class="flex flex-col items-center flex-1 py-2 text-blue-500/60">
                        <i class="fa-solid fa-eye text-xl"></i>
                        <span class="text-[10px] font-black">${p.views || 0}</span>
                    </div>
                    <button onclick="sharePost('${id}')" class="flex flex-col items-center flex-1 py-2 text-gray-400">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                        <span class="text-[10px] font-black uppercase">Share</span>
                    </button>
                </div>
            `;

            if(isCreatorMonetized && adCode.includes('<script')) {
                setTimeout(() => {
                    const adDiv = document.getElementById(`post-ad-${id}`);
                    if(adDiv) {
                        const range = document.createRange();
                        const fragment = range.createContextualFragment(adCode);
                        adDiv.innerHTML = ""; adDiv.appendChild(fragment);
                    }
                }, 800);
            }
            return card;
        }

        window.followUser = async (targetId) => {
            await updateDoc(doc(db, "users", user.uid), { following: arrayUnion(targetId) });
            await updateDoc(doc(db, "users", targetId), { followers: arrayUnion(user.uid) });
            Swal.fire({ title: 'Following!', icon: 'success', timer: 1000, showConfirmButton: false });
        };

        window.reportPost = (postId) => {
            Swal.fire({
                title: 'Report / Complaint',
                input: 'textarea',
                inputPlaceholder: 'আপনার অভিযোগটি লিখুন...',
                showCancelButton: true,
                customClass: { popup: 'elite-popup' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await addDoc(collection(db, "reports"), { postId, reporterId: user.uid, reason: result.value, timestamp: serverTimestamp() });
                    Swal.fire('Submitted', 'আপনার রিপোর্ট জমা হয়েছে', 'success');
                }
            });
        };

        window.like = async (id) => {
            const ref = doc(db, "posts", id); 
            const snap = await getDoc(ref);
            const hasL = snap.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            if(!hasL) sendNotification(snap.data().userId, "like", "আপনার পোস্টে লাইক দিয়েছেন।", snap.data().fileUrl || "", id);
        };

        window.openComments = (id) => { 
            activePostId = id; 
            document.getElementById('commentSheet').classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
            loadComments(id); 
        };
        
        async function loadComments(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                sn.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `<div class="flex gap-3"><img src="${d.userPic}" class="w-9 h-9 rounded-full object-cover bg-gray-200"><div class="bg-gray-100 p-3 rounded-2xl max-w-[85%]"><p class="text-[10px] font-black text-blue-600">@${d.userName}</p><p class="text-[13px] text-gray-800">${d.text}</p></div></div>`;
                });
            });
        }

        window.postComment = async () => {
            const input = document.getElementById('cInput');
            if(!input.value.trim() || !activePostId) return;
            const postRef = doc(db, "posts", activePostId);
            const postSnap = await getDoc(postRef);
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: input.value, userId: user.uid, userName: currentUserData.name, userPic: currentUserData.profilePic, time: serverTimestamp() });
            await updateDoc(postRef, { commentCount: increment(1) });
            sendNotification(postSnap.data().userId, "comment", `মন্তব্য করেছেন: "${input.value}"`, postSnap.data().fileUrl || "", activePostId);
            input.value = "";
        };

        function initIntersection() { 
            const obs = new IntersectionObserver(es => { 
                es.forEach(e => { 
                    const pid = e.target.getAttribute('data-id'); const cid = e.target.getAttribute('data-creator');
                    if (e.isIntersecting) { viewTimers[pid] = setTimeout(() => handlePostView(pid, cid), 5000); } 
                    else { clearTimeout(viewTimers[pid]); }
                }); 
            }, { threshold: 0.6 }); 
            document.querySelectorAll('.post-tracker').forEach(v => obs.observe(v)); 
        }

        async function handlePostView(pid, cid) {
            if(cid === user.uid) return;
            const ref = doc(db, "posts", pid); const snap = await getDoc(ref);
            if(!snap.exists() || snap.data().viewedBy?.includes(user.uid)) return;
            await updateDoc(ref, { views: increment(1), viewedBy: arrayUnion(user.uid) });
            const creRef = doc(db, "users", cid); const creSnap = await getDoc(creRef);
            if (creSnap.exists() && creSnap.data().isMonetized) await updateDoc(creRef, { balance: increment(globalCPM) });
        }

        window.confirmDeletePost = (id) => {
            Swal.fire({ title: 'মুছে ফেলবেন?', icon: 'warning', showCancelButton: true, customClass: { popup: 'elite-popup' } }).then(async r => { if (r.isConfirmed) await deleteDoc(doc(db, "posts", id)); });
        };

        window.sharePost = (id) => {
            const url = `${window.location.origin}/post-view.html?id=${id}`;
            navigator.clipboard.writeText(url);
            Swal.fire({ title: 'লিঙ্ক কপি হয়েছে!', icon: 'success', timer: 1000, showConfirmButton: false });
        };

        async function sendNotification(targetId, type, message, postImg, postId) {
            if(!targetId || targetId === user.uid) return;
            await addDoc(collection(db, "notifications"), { targetUserId: targetId, senderName: currentUserData.name, senderPic: currentUserData.profilePic, type, message, postImg, postId, read: false, timestamp: serverTimestamp() });
        }

        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists() && snap.data().status === 'ringing') {
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = snap.data().callerName;
                    document.getElementById('acceptCallBtn').onclick = () => location.href = `call.html?id=${snap.data().callerId}&type=${snap.data().type}&action=incoming`;
                    document.getElementById('declineCallBtn').onclick = async () => { await deleteDoc(doc(db, "calls", myId)); ui.classList.remove('active'); };
                } else ui.classList.remove('active');
            });
        }

        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); document.getElementById('navPic').src = d.data()?.profilePic || ""; }
        function checkNotif() { onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => { document.getElementById('notifDot').style.display = s.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() {
            onSnapshot(collection(db, "stories"), s => {
                const sL = document.getElementById('storyList'); sL.innerHTML = "";
                s.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><div class="w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div><span class="text-[9px] font-bold text-gray-500">${d.data().userName}</span></div>`; });
            });
        }
        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; };
    </script>
</body>
</html>
