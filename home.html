<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Your Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* আপনার সিগনেচার ডিজাইন */
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        /* ডাইনামিক আইল্যান্ড কল বার */
        #incomingCallUI { position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%); width: 92%; max-width: 380px; background: #000; border-radius: 35px; padding: 12px 20px; z-index: 2000; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; align-items: center; justify-content: space-between; color: white; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }
        
        .video-box-wrapper { width: 100%; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; max-height: 70vh; display: block; background: #000; }
        
        /* আপনার বটম নেভিগেশন */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); border-radius: 32px; padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 35px rgba(0,0,0,0.4); }
        .nav-item { color: rgba(255,255,255,0.5); font-size: 1.2rem; }
        .nav-item.active { color: white; }

        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: none; z-index: 999; }
    </style>
</head>
<body class="pb-32">

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center"><i class="fas fa-video text-white text-xs"></i></div>
            <h4 id="callerNameDisplay" class="text-[13px] font-extrabold truncate">Calling...</h4>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-full"><i class="fas fa-times"></i></button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-green-500 text-white rounded-full"><i class="fas fa-phone-alt"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-800"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home-alt"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-xl cursor-pointer"><i class="fas fa-plus text-xl"></i></div>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 pb-6 no-scrollbar"></div>
        <div class="flex gap-3 border-t pt-4">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let currentUserData = null; let activePostId = null; 
        let globalCPM = 0.0001; let viewTimers = {};

        // 🕒 ফেববুকের মতো টাইম ফরমেটিং লজিক
        function formatRelativeTime(seconds) {
            if(!seconds) return "সদ্য";
            const diff = Math.floor(Date.now() / 1000 - seconds);
            if (diff < 60) return diff + " সেকেন্ড আগে";
            if (diff < 3600) return Math.floor(diff / 60) + " মিনিট আগে";
            if (diff < 84000) return Math.floor(diff / 3600) + " ঘণ্টা আগে";
            return Math.floor(diff / 86400) + " দিন আগে";
        }

        onAuthStateChanged(auth, async u => {
            if(u) { user = u; const snap = await getDoc(doc(db, "users", u.uid)); currentUserData = snap.data() || {}; initApp(); }
            else location.href = "index.html";
        });

        function initApp() {
            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost || 0.0001; });
            renderFeed(); loadProfile(); checkNotif(); loadStories(); listenForCalls(user.uid);
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(40)), snap => {
                const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // 🔥 NO JUMP RENDER: লজিক এমনভাবে সেট করা যেন স্ক্রিন লাফ না দেয়
                feed.innerHTML = posts.map(p => {
                    const isLiked = p.likedBy?.includes(user.uid);
                    const timeStr = formatRelativeTime(p.createdAt?.seconds);
                    
                    return `
                    <div class="premium-card">
                        <div class="p-4 flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover bg-gray-200" onclick="location.href='user.html?id=${p.userId}'">
                                <div>
                                    <div class="font-extrabold text-[14px]">@${p.userName}</div>
                                    <p class="text-[9px] text-gray-400 font-bold uppercase">${timeStr}</p>
                                </div>
                            </div>
                            ${p.userId === user.uid ? `<i onclick="deletePost('${p.id}')" class="fa-solid fa-trash-alt text-gray-200"></i>` : `<i class="fa-solid fa-circle-exclamation text-gray-200"></i>`}
                        </div>
                        <div class="px-5 pb-4 text-[14px] font-medium leading-relaxed">${p.text || ''}</div>
                        <div class="post-tracker" data-id="${p.id}" data-creator="${p.userId}">
                            ${p.fileUrl ? `
                                <div class="video-box-wrapper">
                                    ${p.fileType === 'video' ? `
                                        <video id="vid-${p.id}" src="${p.fileUrl}" loop muted playsinline onclick="this.paused?this.play():this.pause()"></video>
                                        <div class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-[10px] border border-white/30" onclick="location.href='reels.html?id=${p.id}'"><i class="fa-solid fa-expand"></i> Reels</div>
                                    ` : `<img src="${p.fileUrl}" class="w-full">`}
                                </div>` : ''}
                        </div>
                        <div class="flex justify-around py-3 border-t mt-2">
                            <button onclick="handleLike('${p.id}', '${p.userId}')" class="flex flex-col items-center flex-1 ${isLiked ? 'text-red-500' : 'text-gray-400'}">
                                <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart text-xl"></i>
                                <span class="text-[10px] font-bold">${p.likedBy?.length || 0}</span>
                            </button>
                            <button onclick="openComments('${p.id}')" class="flex flex-col items-center flex-1 text-gray-400">
                                <i class="fa-regular fa-comment-dots text-xl"></i>
                                <span class="text-[10px] font-bold">${p.commentCount || 0}</span>
                            </button>
                            <button class="flex flex-col items-center flex-1 text-blue-500/50">
                                <i class="fa-solid fa-eye text-xl"></i>
                                <span class="text-[10px] font-bold">${p.views || 0}</span>
                            </button>
                        </div>
                    </div>`;
                }).join('');
                initIntersection();
            });
        }

        // 🔥 NO-JUMP LIKE LOGIC
        window.handleLike = async (pid, oid) => {
            const ref = doc(db, "posts", pid);
            const snap = await getDoc(ref);
            const isLiked = snap.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            if(!isLiked && oid !== user.uid) {
                addDoc(collection(db, "notifications"), { targetUserId: oid, senderName: currentUserData.name, type: "like", timestamp: serverTimestamp(), read: false });
            }
        };

        // 🔥 VIEW & ADS INCOME (৫ সেকেন্ড লজিক)
        function initIntersection() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const pid = entry.target.dataset.id;
                    const cid = entry.target.dataset.creator;
                    const vid = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        if(vid) vid.play().catch(()=>{});
                        viewTimers[pid] = setTimeout(() => recordView(pid, cid), 5000);
                    } else {
                        if(vid) vid.pause();
                        clearTimeout(viewTimers[pid]);
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.post-tracker').forEach(el => obs.observe(el));
        }

        async function recordView(pid, cid) {
            if(cid === user.uid) return;
            const ref = doc(db, "posts", pid);
            const snap = await getDoc(ref);
            if(!snap.exists() || snap.data().viewedBy?.includes(user.uid)) return;

            await updateDoc(ref, { views: increment(1), viewedBy: arrayUnion(user.uid) });
            const creRef = doc(db, "users", cid);
            const creSnap = await getDoc(creRef);
            if(creSnap.exists() && creSnap.data().isMonetized) await updateDoc(creRef, { balance: increment(globalCPM) });
        }

        // --- অন্যান্য ফাংশন ---
        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('overlay').style.display = "block";
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                document.getElementById('commentList').innerHTML = sn.docs.map(c => `
                    <div class="flex gap-3">
                        <img src="${c.data().userPic}" class="w-9 h-9 rounded-2xl object-cover">
                        <div class="bg-gray-50 p-3 rounded-2xl flex-1 border border-gray-100">
                            <p class="text-[10px] font-black text-blue-600">@${c.data().userName}</p>
                            <p class="text-[13px] font-medium">${c.data().text}</p>
                        </div>
                    </div>`).join('');
            });
        };

        window.postComment = async () => {
            const input = document.getElementById('cInput');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: input.value, userId: user.uid, userName: currentUserData.name, userPic: currentUserData.profilePic, time: serverTimestamp() });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            input.value = "";
        };

        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists() && snap.data().status === 'ringing') {
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = snap.data().callerName;
                    document.getElementById('acceptCallBtn').onclick = () => location.href = `call.html?id=${snap.data().callerId}&type=${snap.data().type}&action=incoming`;
                    document.getElementById('declineCallBtn').onclick = async () => { await deleteDoc(doc(db, "calls", myId)); ui.classList.remove('active'); };
                } else ui.classList.remove('active');
            });
        }

        window.deletePost = (id) => { Swal.fire({ title: 'মুছে ফেলবেন?', icon: 'warning', showCancelButton: true }).then(async r => { if(r.isConfirmed) await deleteDoc(doc(db, "posts", id)); }); };
        function loadProfile() { if(currentUserData.profilePic) document.getElementById('navPic').src = currentUserData.profilePic; }
        function checkNotif() { onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => { document.getElementById('notifDot').style.display = s.size > 0 ? "block" : "none"; }); }
        function loadStories() { onSnapshot(collection(db, "stories"), s => { document.getElementById('storyList').innerHTML = s.docs.map(d => `<div class="flex flex-col items-center shrink-0"><div class="w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div><span class="text-[9px] font-bold mt-1 text-gray-500">${d.data().userName}</span></div>`).join(''); }); }
        window.closeAll = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('overlay').style.display = "none"; };
    </script>
</body>
</html>
