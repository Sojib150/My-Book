<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .premium-card { background: white; border-radius: 32px; margin-bottom: 18px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        
        /* Dynamic Island Call UI */
        #incomingCallUI {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 92%; max-width: 380px; background: #000; border-radius: 35px;
            padding: 12px 20px; z-index: 2000; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: space-between; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }

        .video-box { width: calc(100% - 20px); background: #000; border-radius: 20px; overflow: hidden; margin: 0 10px; }
        video { width: 100%; max-height: 75vh; border-radius: 20px; }
        
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Floating Navbar iPhone Style */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(25px); border-radius: 35px; padding: 12px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 900; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: rgba(255,255,255,0.5); font-size: 1.4rem; transition: all 0.3s; }
        .nav-item.active { color: #60a5fa; }

        .pulse-call { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="pb-36">

    <div id="incomingCallUI">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center"><i class="fas fa-video text-white text-sm"></i></div>
            <div class="min-w-0">
                <h4 id="callerNameDisplay" class="text-[13px] font-black truncate">Incoming...</h4>
                <p class="text-[9px] text-green-400 uppercase font-black tracking-widest">Video Call</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center pulse-call"><i class="fas fa-check"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-4">
                <a href="reels.html" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-full"><i class="fa-solid fa-play text-lg"></i></a>
                <div class="relative cursor-pointer w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-lg text-gray-800"></i>
                    <div id="notifDot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="" class="w-10 h-10 rounded-full border-2 border-indigo-100 shadow-sm object-cover bg-gray-200">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-[72px] h-[72px] rounded-3xl border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] font-black text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-20"><i class="fas fa-spinner fa-spin text-indigo-600 text-3xl"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-house-chimney"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-magnifying-glass"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition cursor-pointer">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <a href="messages.html" class="nav-item"><i class="fas fa-message"></i></a> <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="deleteDrawer" class="drawer p-8">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-lg font-black text-center mb-10">মুছে ফেলবেন?</h3>
        <div class="flex gap-3">
            <button id="confirmDelBtn" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-2xl">হ্যাঁ</button>
            <button onclick="closeAll()" class="flex-1 bg-gray-100 text-gray-500 font-bold py-4 rounded-2xl">বাতিল</button>
        </div>
    </div>

    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-10"></div>
        <div class="flex gap-3 border-t pt-4 bg-white mt-2">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold">
            <button onclick="postComment()" class="bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; 
        let currentUserData = null;
        let activePostId = null; 
        let postToDelete = null;

        onAuthStateChanged(auth, async u => { 
            if(u){ 
                user = u; 
                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.exists() ? userSnap.data() : null;
                
                renderFeed(); 
                loadProfile(); 
                checkNotif(); 
                loadStories(); 
                listenForCalls(u.uid);
            } else location.href="index.html"; 
        });

        // 🔥 অ্যালগরিদম (ইনট্যাক্ট রাখা হয়েছে)
        function getSortedFeed(posts, currentUser) {
            function calculateScore(post) {
                const likes = post.likedBy?.length || 0;
                const comments = post.commentCount || 0;
                const engagementScore = (likes * 2) + (comments * 4);
                
                let contentScore = (post.fileType === "video") ? 30 : 15;
                let userInterestScore = (currentUser?.interests?.includes(post.category)) ? 40 : 10;

                const postTime = post.createdAt ? post.createdAt.seconds * 1000 : Date.now();
                const hours = (Date.now() - postTime) / 3600000;
                let timeScore = hours < 1 ? 40 : (hours < 6 ? 25 : 10);

                let score = (engagementScore * 0.5) + (contentScore * 0.2) + (userInterestScore * 0.2) + (timeScore * 0.1);
                if (currentUser?.friends?.includes(post.userId)) score += 20;
                return score;
            }
            return posts.sort((a, b) => calculateScore(b) - calculateScore(a));
        }

        // কল লিসেনার
        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists() && snap.data().status === 'ringing') {
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = snap.data().callerName;
                    document.getElementById('acceptCallBtn').onclick = () => window.location.href = `call.html?id=${snap.data().callerId}&type=${snap.data().type}&action=incoming`;
                    document.getElementById('declineCallBtn').onclick = async () => { await deleteDoc(doc(db, "calls", myId)); ui.classList.remove('active'); };
                } else { ui.classList.remove('active'); }
            });
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            const globalAd = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(query(collection(db, "posts"), limit(50)), async snap => {
                let rawPosts = [];
                snap.forEach(d => rawPosts.push({ id: d.id, ...d.data() }));
                const sortedPosts = getSortedFeed(rawPosts, currentUserData);

                feed.innerHTML = "";
                sortedPosts.forEach(async (p, index) => {
                    if(p.isShadowBanned) return;
                    const showAd = globalAd && (index > 0 && index % 3 === 0);
                    const card = await createPostCard(p.id, p, showAd ? globalAd : null);
                    feed.appendChild(card);
                    if(showAd) injectAd(p.id, globalAd);
                });
                setTimeout(initIntersection, 1000);
            });
        }

        async function createPostCard(id, p, adCode) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const card = document.createElement('div');
            card.className = "premium-card";
            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border-2 border-indigo-50">
                        <div>
                            <div class="font-extrabold text-[14px]">@${p.userName}</div>
                            <p class="text-[9px] text-gray-400 font-black uppercase">Post</p>
                        </div>
                    </div>
                    ${isMine ? `<button onclick="openDeleteDrawer('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-ellipsis-v"></i></button>` : ''}
                </div>
                <p class="px-5 pb-4 text-[14px] text-gray-800 leading-relaxed">${p.text || ''}</p>
                ${p.fileUrl ? `<div class="video-box">${p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ''}
                ${adCode ? `<div class="p-3 border-y bg-gray-50/50 text-center mx-5 rounded-2xl mt-4"><div id="ad-frame-${id}"></div></div>` : ""}
                <div class="flex justify-around py-3 mt-2">
                    <button onclick="like('${id}')" class="flex items-center gap-2 flex-1 justify-center ${hasL ? 'text-red-500':'text-gray-400'}"><i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i><span class="text-[12px] font-black">${p.likedBy?.length||0}</span></button>
                    <button onclick="openComments('${id}')" class="flex items-center gap-2 flex-1 justify-center text-gray-400"><i class="fa-regular fa-comment-dots text-xl"></i><span class="text-[12px] font-black">${p.commentCount||0}</span></button>
                    <button onclick="sharePost('${id}')" class="flex items-center justify-center flex-1 text-gray-400"><i class="fa-solid fa-share-nodes text-xl"></i></button>
                </div>`;
            return card;
        }

        function injectAd(id, code) { setTimeout(() => { const box = document.getElementById(`ad-frame-${id}`); if(box){ const frame = document.createElement('iframe'); frame.style.width="100%"; frame.style.border="none"; box.appendChild(frame); frame.contentWindow.document.write(`<body style="margin:0;display:flex;justify-content:center;align-items:center;">${code}</body>`); } }, 2000); }
        window.like = async (id) => { const ref = doc(db, "posts", id); const d = (await getDoc(ref)).data(); const hasL = d.likedBy?.includes(user.uid); await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) }); };
        window.openComments = (id) => { activePostId = id; document.getElementById('commentSheet').classList.add('active'); document.getElementById('overlay').style.display='block'; loadComments(id); };
        async function loadComments(id) { onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => { const list = document.getElementById('commentList'); list.innerHTML = ""; sn.forEach(c => { const d = c.data(); list.innerHTML += `<div class="flex gap-3"><img src="${d.userPic}" class="w-9 h-9 rounded-full object-cover"><div class="bg-gray-100 p-3 rounded-2xl"><p class="text-[10px] font-black text-indigo-600">@${d.userName}</p><p class="text-[13px] text-gray-800">${d.text}</p></div></div>`; }); }); }
        window.postComment = async () => { const v = document.getElementById('cInput').value; if(!v) return; const userData = (await getDoc(doc(db, "users", user.uid))).data(); await addDoc(collection(db, "posts", activePostId, "comments"), { text: v, userId: user.uid, userName: userData.name, userPic: userData.profilePic, time: serverTimestamp() }); await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) }); document.getElementById('cInput').value = ""; };
        window.openDeleteDrawer = (id) => { postToDelete = id; document.getElementById('deleteDrawer').classList.add('active'); document.getElementById('overlay').style.display='block'; };
        document.getElementById('confirmDelBtn').onclick = async () => { if(postToDelete){ await deleteDoc(doc(db, "posts", postToDelete)); closeAll(); } };
        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; };
        window.handleVideo = (v) => { v.muted = !v.muted; if(v.paused) v.play(); };
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "users", user.uid, "notifications")), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { onSnapshot(collection(db, "stories"), snap => { const sL = document.getElementById('storyList'); sL.innerHTML = ""; snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-2 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><div class="w-[72px] h-[72px] rounded-3xl p-1 border-2 border-indigo-500 shadow-lg"><img src="${d.data().userPic}" class="w-full h-full rounded-[20px] object-cover"></div><span class="text-[9px] font-black text-gray-500 uppercase">${d.data().userName?.split(' ')[0]}</span></div>`; }); }); }
        function initIntersection() { const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.play().catch(() => {}); else e.target.pause(); }); }, { threshold: 0.6 }); document.querySelectorAll('.post-vid').forEach(v => obs.observe(v)); }
        window.sharePost = (id) => navigator.share ? navigator.share({ title: 'My Book', url: window.location.href }) : alert("Link Copied!");
    </script>
</body>
</html>
