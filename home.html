<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Final Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .premium-card { background: white; border-radius: 30px; margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 10px 40px rgba(0,0,0,0.02); overflow: hidden; position: relative; }
        
        /* 💰 Ad Banner Style */
        .ad-tag { background: linear-gradient(90deg, #1877f2, #00d2ff); color: white; padding: 4px 14px; border-radius: 0 0 15px 0; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; position: absolute; top: 0; left: 0; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.2); }
        
        /* 🔍 Search Box */
        .search-container { background: white; border-radius: 20px; padding: 14px 20px; margin: 10px 0 25px 0; display: flex; align-items: center; gap: 12px; border: 1px solid #edf2f7; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }

        .video-box { position: relative; width: 100%; background: #000; border-radius: 20px; overflow: hidden; margin-top: 10px; }
        video { width: 100%; max-height: 75vh; }
        
        .vid-controls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 12px; }
        .control-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); color: white; width: 44px; height: 44px; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); font-size: 18px; }

        /* ⚓ Fixed Navigation */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: #000; border-radius: 35px; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .nav-item { color: rgba(255,255,255,0.4); font-size: 1.3rem; transition: 0.3s; }
        .nav-item.active { color: white; }

        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; border-radius: 35px 35px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 1500; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-40">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg px-6 py-5 border-b border-gray-100 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
        <div class="flex gap-5 items-center">
            <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                <i class="fa-solid fa-bell text-xl text-gray-800"></i>
                <span id="notifDot" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden border-2 border-white"></span>
            </div>
            <img id="navPic" onclick="location.href='profile.html'" class="w-10 h-10 rounded-full border-2 border-blue-500 p-0.5 object-cover bg-gray-50">
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div class="search-container" onclick="location.href='search.html'">
            <i class="fa-solid fa-search text-blue-500"></i>
            <span class="text-gray-400 font-semibold text-sm">মানুষ বা ভিডিও খুঁজুন...</span>
        </div>

        <div id="storyList" class="flex gap-4 overflow-x-auto no-scrollbar mb-8 py-2"></div>

        <div id="feed" class="space-y-2"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-house"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-magnifying-glass"></i></a>
        <div onclick="location.href='post.html'" class="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center -mt-8 border-4 border-[#f8fafc] shadow-lg"><i class="fas fa-plus text-xl"></i></div>
        <a href="reels.html" class="nav-item"><i class="fas fa-play"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-8 shadow-2xl">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-4"></div>
        <div class="flex gap-3 pt-6 border-t border-gray-100">
            <input id="cInput" type="text" placeholder="মতামত লিখুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none font-bold">
            <button onclick="postComment()" class="bg-blue-600 text-white px-7 rounded-2xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let currentUserData = null; let globalCPM = 0.0001; let viewTimers = {};

        // ⏱️ FB/Insta Style Time Logic
        function getFameTime(ts) {
            if(!ts) return "সদ্য";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return "সদ্য";
            if (diff < 3600) return Math.floor(diff/60) + " মিনিট আগে";
            if (diff < 86400) return Math.floor(diff/3600) + " ঘণ্টা আগে";
            return date.toLocaleDateString('bn-BD', {day:'numeric', month:'long'});
        }

        // 🧠 Hybrid Feed Algorithm
        function getSortedFeed(posts, currentUser) {
            function calculateScore(p) {
                const likes = p.likedBy?.length || 0;
                const comments = p.commentCount || 0;
                const views = p.views || 0;
                const engagement = (likes * 2) + (comments * 4) + (views * 1);
                const postTime = p.createdAt?.toDate ? p.createdAt.toDate().getTime() : Date.now();
                const hours = (Date.now() - postTime) / 3600000;
                let timeScore = hours < 1 ? 40 : (hours < 6 ? 25 : (hours < 24 ? 10 : 0));
                let score = (engagement * 0.5) + (timeScore * 0.2);
                if (likes > 100) score += 100;
                if (p.viewedBy?.includes(currentUser?.uid)) score -= 15;
                return score;
            }
            return posts.sort((a, b) => calculateScore(b) - calculateScore(a));
        }

        onAuthStateChanged(auth, async u => {
            if(u) { user = u; const s = await getDoc(doc(db, "users", u.uid)); currentUserData = s.data() || {}; init(); }
            else location.href = "index.html";
        });

        function init() {
            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost || 0.0001; });
            renderFeed(); loadProfile(); checkNotif(); loadStories();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(collection(db, "posts"), snap => {
                const raw = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sorted = getSortedFeed(raw, { uid: user.uid, ...currentUserData });

                feed.innerHTML = sorted.map(p => {
                    const isLiked = p.likedBy?.includes(user.uid);
                    // শুধুমাত্র মনিটাইজড আইডি চেক
                    const adBadge = p.isCreatorMonetized ? `<div class="ad-tag"><i class="fa-solid fa-certificate mr-1"></i> Sponsored</div>` : '';
                    
                    return `
                    <div class="premium-card">
                        ${adBadge}
                        <div class="p-5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <img src="${p.userPic}" class="w-12 h-12 rounded-2xl object-cover border-2 border-white shadow-sm">
                                <div>
                                    <h4 class="font-extrabold text-[15px]">@${p.userName}</h4>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase">${getFameTime(p.createdAt)}</p>
                                </div>
                            </div>
                            <i class="fa-solid fa-ellipsis text-gray-300"></i>
                        </div>
                        <div class="px-6 pb-4 text-[14px] font-medium text-gray-800 leading-relaxed">${p.text || ''}</div>
                        <div class="post-tracker" data-id="${p.id}" data-creator="${p.userId}" data-monetized="${p.isCreatorMonetized || false}">
                            ${p.fileUrl ? `
                                <div class="px-4">
                                    <div class="video-box shadow-xl shadow-gray-200/50">
                                        ${p.fileType === 'video' ? `
                                            <video id="vid-${p.id}" src="${p.fileUrl}" loop muted playsinline onclick="this.paused?this.play():this.pause()"></video>
                                            <div class="vid-controls">
                                                <button onclick="toggleSound('${p.id}')" class="control-btn"><i id="vol-${p.id}" class="fas fa-volume-mute"></i></button>
                                                <button onclick="location.href='reels.html?id=${p.id}'" class="control-btn"><i class="fas fa-expand"></i></button>
                                            </div>
                                        ` : `<img src="${p.fileUrl}" class="w-full object-cover">`}
                                    </div>
                                </div>` : ''}
                        </div>
                        <div class="px-6 py-4 flex justify-between items-center mt-2">
                            <div class="flex gap-6">
                                <button onclick="handleLike('${p.id}', '${p.userId}')" class="flex items-center gap-2 ${isLiked?'text-blue-600':'text-gray-400'}">
                                    <i class="fa-${isLiked?'solid':'regular'} fa-heart text-2xl"></i>
                                    <span class="text-xs font-black">${p.likedBy?.length || 0}</span>
                                </button>
                                <button onclick="openComments('${p.id}')" class="flex items-center gap-2 text-gray-400"><i class="fa-regular fa-comment-dots text-2xl"></i><span class="text-xs font-black">${p.commentCount || 0}</span></button>
                            </div>
                            <div class="flex items-center gap-1.5 bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full"><i class="fa-solid fa-chart-simple text-[10px]"></i><span class="text-[11px] font-black uppercase italic">${p.views || 0} Views</span></div>
                        </div>
                    </div>`;
                }).join('');
                initSmartObserver();
            });
        }

        // 💰 Income Logic (Only for Monetized ID)
        function initSmartObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const pid = e.target.dataset.id;
                    const cid = e.target.dataset.creator;
                    const isMon = e.target.dataset.monetized === "true";
                    const vid = e.target.querySelector('video');
                    if (e.isIntersecting) {
                        if(vid) vid.play().catch(()=>{});
                        viewTimers[pid] = setTimeout(() => recordView(pid, cid, isMon), 5000);
                    } else {
                        if(vid) vid.pause();
                        clearTimeout(viewTimers[pid]);
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-tracker').forEach(el => obs.observe(el));
        }

        async function recordView(pid, cid, isMon) {
            if(cid === user.uid) return;
            const pRef = doc(db, "posts", pid);
            const pSnap = await getDoc(pRef);
            if(!pSnap.exists() || pSnap.data().viewedBy?.includes(user.uid)) return;

            await updateDoc(pRef, { views: increment(1), viewedBy: arrayUnion(user.uid) });
            if(isMon) {
                await updateDoc(doc(db, "users", cid), { balance: increment(globalCPM) });
                console.log("Ad payout processed.");
            }
        }

        window.toggleSound = (id) => {
            const v = document.getElementById(`vid-${id}`);
            const i = document.getElementById(`vol-${id}`);
            v.muted = !v.muted; i.className = v.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
        };

        window.handleLike = async (id, oid) => {
            const r = doc(db, "posts", id); const s = await getDoc(r);
            const l = s.data().likedBy?.includes(user.uid);
            await updateDoc(r, { likedBy: l ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            if(!l && oid !== user.uid) addDoc(collection(db, "notifications"), { targetUserId: oid, senderName: currentUserData.name, type: "like", timestamp: serverTimestamp(), read: false });
        };

        window.openComments = (id) => {
            activePostId = id; document.getElementById('commentSheet').classList.add('active');
            document.getElementById('overlay').style.display = "block";
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                document.getElementById('commentList').innerHTML = sn.docs.map(c => `<div class="flex gap-4"><img src="${c.data().userPic}" class="w-10 h-10 rounded-2xl object-cover border"><div class="bg-gray-50 p-4 rounded-2xl flex-1"><p class="text-[11px] font-black text-blue-600">@${c.data().userName}</p><p class="text-sm font-bold text-gray-800">${c.data().text}</p></div></div>`).join('');
            });
        };

        window.postComment = async () => {
            const i = document.getElementById('cInput'); if(!i.value.trim()) return;
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: i.value, userId: user.uid, userName: currentUserData.name, userPic: currentUserData.profilePic, time: serverTimestamp() });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) }); i.value = "";
        };

        function loadProfile() { if(currentUserData?.profilePic) document.getElementById('navPic').src = currentUserData.profilePic; }
        function checkNotif() { onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => { document.getElementById('notifDot').style.display = s.size > 0 ? "block" : "none"; }); }
        function loadStories() { onSnapshot(collection(db, "stories"), s => { document.getElementById('storyList').innerHTML = s.docs.map(d => `<div class="shrink-0 w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div>`).join(''); }); }
        window.closeAll = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('overlay').style.display = "none"; };
    </script>
</body>
</html>
