<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Professional Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .premium-card { background: white; border-radius: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
        .video-box { width: 100%; background: #000; overflow: hidden; border-radius: 12px; margin: 0 12px; width: calc(100% - 24px); }
        video { width: 100%; max-height: 80vh; border-radius: 12px; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-radius: 32px 32px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 999; }
        .floating-btn { position: fixed; bottom: 95px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 25px rgba(37,99,235,0.4); z-index: 900; transition: 0.3s; }
        .floating-btn:active { transform: scale(0.9); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-28 bg-gray-50">

    <nav class="bg-white/90 backdrop-blur-xl border-b sticky top-0 z-50 px-5 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5 text-gray-600">
                <a href="search.html"><i class="fa-solid fa-search text-xl"></i></a>
                <a href="reels.html"><i class="fa-solid fa-play-circle text-xl text-red-500"></i></a>
                <a href="messages.html" class="relative"><i class="fa-brands fa-facebook-messenger text-2xl text-blue-600"></i></a>
                <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <div id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-full border-2 border-blue-100 object-cover cursor-pointer">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white shadow-sm">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-tighter">Your Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-6">
            <div id="feedLoader" class="text-center py-20">
                <div class="animate-spin text-blue-600 text-3xl mb-4"><i class="fas fa-circle-notch"></i></div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Initialising Feed...</p>
            </div>
        </div>
    </div>

    <button class="floating-btn" onclick="location.href='post.html'"><i class="fa-solid fa-plus"></i></button>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="deleteDrawer" class="drawer p-8">
        <div class="w-14 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-xl font-black text-center text-gray-800 mb-2">মুছে ফেলবেন?</h3>
        <p class="text-gray-500 text-center text-sm mb-8">পোস্টটি মুছে ফেললে আর ফিরে পাবেন না।</p>
        <div class="flex flex-col gap-3">
            <button id="confirmDelBtn" class="w-full bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-red-200">হ্যাঁ, মুছে ফেলুন</button>
            <button onclick="closeAll()" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl">বাতিল</button>
        </div>
    </div>

    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-14 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h4 class="text-center font-black text-xs uppercase tracking-widest text-gray-400 mb-4">Comments</h4>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-4"></div>
        <div class="flex gap-3 border-t pt-4 bg-white items-center">
            <input id="cInput" type="text" placeholder="Write a comment..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-semibold">
            <button onclick="postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null; 
        let activePostId = null; 
        let postToDelete = null;

        onAuthStateChanged(auth, u => { 
            if(u){ 
                currentUser = u; 
                initHome();
            } else {
                location.href = "login.html";
            }
        });

        async function initHome() {
            loadProfile();
            renderFeed();
            checkNotif();
            loadStories();
        }

        // ফিড রেন্ডারিং ফিক্সড
        async function renderFeed() {
            const feed = document.getElementById('feed');
            const loader = document.getElementById('feedLoader');
            
            // রিয়েল-টাইম ফিড লিসেনার
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(30));
            onSnapshot(q, snap => {
                loader.style.display = 'none';
                feed.innerHTML = ""; // ফ্রেশ লোড

                snap.forEach(d => {
                    const p = d.data();
                    const id = d.id;
                    if(p.isShadowBanned) return; // শ্যাডো ব্যান থাকলে দেখাবে না
                    
                    const card = createPostCard(id, p);
                    feed.appendChild(card);
                });
                initVideoAutoPlay();
            });
        }

        function createPostCard(id, p) {
            const isMine = p.userId === currentUser.uid;
            const hasL = p.likedBy?.includes(currentUser.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString('bn-BD') : 'Just now';
            
            const card = document.createElement('div');
            card.id = `post-${id}`;
            card.className = "premium-card";
            
            let mediaHtml = "";
            if(p.fileUrl) {
                if(p.fileType === 'video') {
                    mediaHtml = `<div class="video-box"><video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="toggleMute(this)"></video></div>`;
                } else {
                    mediaHtml = `<div class="px-3"><img src="${p.fileUrl}" class="w-full rounded-xl object-cover shadow-sm"></div>`;
                }
            }

            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user-profile.html?id=${p.userId}'">
                        <img src="${p.userPic || 'https://via.placeholder.com/100'}" class="w-11 h-11 rounded-2xl object-cover border-2 border-blue-50">
                        <div>
                            <div class="font-black text-[13px] text-gray-800">@${p.userName || 'User'}</div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${date}</p>
                        </div>
                    </div>
                    ${isMine ? `<button onclick="openDeleteDrawer('${id}')" class="text-gray-300 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can text-sm"></i></button>` : ''}
                </div>
                
                <p class="px-5 pb-3 text-[14px] text-gray-700 leading-relaxed">${p.text || ''}</p>
                
                ${mediaHtml}

                <div class="flex justify-around py-2 border-t mt-3 mx-4">
                    <button onclick="handleLike('${id}')" class="flex items-center gap-2 py-3 like-btn ${hasL ? 'text-red-500' : 'text-gray-400'}">
                        <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i>
                        <span class="text-xs font-black">${p.likes || 0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="flex items-center gap-2 py-3 text-gray-400">
                        <i class="fa-regular fa-comment-dots text-xl"></i>
                        <span class="text-xs font-black">${p.commentCount || 0}</span>
                    </button>
                    <button onclick="sharePost('${id}')" class="flex items-center gap-2 py-3 text-gray-400">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                        <span class="text-xs font-black uppercase tracking-tighter">Share</span>
                    </button>
                </div>
            `;
            return card;
        }

        // লাইক সিস্টেম ফিক্স
        window.handleLike = async (id) => {
            const ref = doc(db, "posts", id);
            const d = (await getDoc(ref)).data();
            const hasL = d.likedBy?.includes(currentUser.uid);
            
            await updateDoc(ref, {
                likes: increment(hasL ? -1 : 1),
                likedBy: hasL ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        }

        // কমেন্ট সিস্টেম ফিক্স
        window.openComments = (id) => { 
            activePostId = id; 
            document.getElementById('commentSheet').classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
            loadComments(id); 
        };

        async function loadComments(pid) {
            const list = document.getElementById('commentList');
            onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("time", "asc")), snap => {
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `
                        <div class="flex gap-3">
                            <img src="${d.userPic}" class="w-8 h-8 rounded-full object-cover">
                            <div class="bg-gray-100 p-3 rounded-2xl">
                                <p class="text-[10px] font-black text-blue-600">@${d.userName}</p>
                                <p class="text-sm text-gray-700">${d.text}</p>
                            </div>
                        </div>`;
                });
            });
        }

        window.postComment = async () => {
            const input = document.getElementById('cInput');
            if(!input.value.trim()) return;
            
            const uData = (await getDoc(doc(db, "users", currentUser.uid))).data();
            await addDoc(collection(db, "posts", activePostId, "comments"), {
                text: input.value,
                userId: currentUser.uid,
                userName: uData.name,
                userPic: uData.profilePic,
                time: serverTimestamp()
            });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            input.value = "";
        }

        // অটো-প্লে ভিডিও লজিক
        function initVideoAutoPlay() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if(entry.isIntersecting) {
                        video.play().catch(()=>{});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.post-vid').forEach(v => observer.observe(v));
        }

        window.toggleMute = (v) => { v.muted = !v.muted; };

        // ডিলিট সিস্টেম
        window.openDeleteDrawer = (id) => { 
            postToDelete = id; 
            document.getElementById('deleteDrawer').classList.add('active'); 
            document.getElementById('overlay').style.display='block'; 
        };

        document.getElementById('confirmDelBtn').onclick = async () => {
            if(postToDelete) {
                await deleteDoc(doc(db, "posts", postToDelete));
                closeAll();
                Swal.fire({ title: 'Deleted!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
            }
        }

        window.closeAll = () => {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('active'));
            document.getElementById('overlay').style.display = 'none';
        }

        async function loadProfile() {
            const d = await getDoc(doc(db, "users", currentUser.uid));
            if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || "";
        }

        async function checkNotif() {
            onSnapshot(query(collection(db, "users", currentUser.uid, "notifications")), snap => {
                document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none';
            });
        }

        async function loadStories() {
            onSnapshot(collection(db, "stories"), snap => {
                const sL = document.getElementById('storyList');
                sL.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    sL.innerHTML += `
                        <div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'">
                            <div class="p-[2px] rounded-full border-2 border-blue-500">
                                <img src="${s.userPic}" class="w-14 h-14 rounded-full object-cover border-2 border-white">
                            </div>
                            <span class="text-[9px] font-bold text-gray-500 truncate w-16 text-center">${s.userName}</span>
                        </div>`;
                });
            });
        }

        window.sharePost = (id) => {
            navigator.share({ title: 'My Book Post', url: window.location.origin + '/post-view.html?id=' + id })
            .catch(() => { Swal.fire('Link Copied!', '', 'success'); });
        }
    </script>
</body>
</html>
