<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Elite Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fafafa; 
        }
        
        .insta-post { 
            background: white; 
            border-bottom: 8px solid #f4f7fa; 
        }
        
        .video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 4/5; 
            background: #000; 
            overflow: hidden; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .caption-text {
            font-size: 14.5px;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
        }
        
        .read-more {
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            border-top: 1px solid #efefef; 
            padding: 12px 0; 
            display: flex; 
            justify-content: space-around; 
            z-index: 1000; 
        }
        .nav-icon { font-size: 1.4rem; color: #262626; }

        .drawer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            z-index: 2000; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
        }
        .drawer.active { transform: translateY(0); }
        .overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(4px); 
            display: none; 
            z-index: 1500; 
        }
        .reply-box { 
            border-left: 3px solid #6366f1; 
            margin-left: 12px; 
            padding-left: 12px; 
            margin-top: 8px; 
            background: #f8fafc; 
            border-radius: 8px; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <!-- Top Nav -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b px-5 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-blue-600">My Book</h1>
        <div class="flex gap-5 items-center">
            <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                <i class="fa-regular fa-bell text-2xl"></i>
                <span id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden border-2 border-white"></span>
            </div>
            <i class="fa-regular fa-paper-plane text-2xl"></i>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <!-- Stories -->
        <div class="bg-white py-4 border-b overflow-x-auto no-scrollbar flex gap-4 px-4">
            <div class="shrink-0 flex flex-col items-center gap-1" onclick="location.href='post.html'">
                <div class="relative w-16 h-16 rounded-full border-2 border-gray-200 p-0.5">
                    <img id="myStoryPic" src="" class="w-full h-full rounded-full object-cover">
                    <div class="absolute bottom-0 right-0 bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white text-[10px]">
                        <i class="fas fa-plus"></i>
                    </div>
                </div>
                <span class="text-[10px] font-bold">Your Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="globalAdArea" class="p-2"></div>
        <div id="feed" class="space-y-1"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="location.href='home.html'"></i>
        <i class="fas fa-search nav-icon" onclick="location.href='search.html'"></i>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white -mt-4 shadow-lg shadow-blue-500/30">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-play nav-icon" onclick="location.href='reels.html'"></i>
        <img id="navPic" onclick="location.href='profile.html'" class="w-7 h-7 rounded-full border border-gray-200 object-cover">
    </div>

    <!-- Comment Drawer -->
    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[80vh] flex flex-col p-5">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar"></div>
        
        <div id="replyTag" class="hidden px-4 py-2 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-t-xl flex justify-between items-center">
            <span>Replying to <span id="replyName" class="font-bold"></span></span>
            <button onclick="cancelReply()" class="text-gray-500"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="flex gap-2 pt-4 border-t">
            <input id="cInput" type="text" placeholder="মতামত লিখুন..." 
                   class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none font-medium text-sm">
            <button onclick="postComment()" 
                    class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let currentUserData = null;
        let activePostId = null;
        let replyToId = null;
        let globalCPM = 0.0001;

        function getTimeAgo(ts) {
            if(!ts) return "সদ্য";
            const diff = Math.floor((new Date() - ts.toDate()) / 1000);
            if(diff < 60) return diff + "s ago";
            if(diff < 3600) return Math.floor(diff/60) + "m ago";
            if(diff < 86400) return Math.floor(diff/3600) + "h ago";
            return Math.floor(diff/86400) + "d ago";
        }

        function renderCaption(text) {
            if (!text) return '';
            const max = 130;
            if (text.length <= max) return `<p class="caption-text text-gray-800">${text}</p>`;
            
            return `
                <p class="caption-text text-gray-800" id="caption-short">
                    ${text.substring(0, max)}...
                    <span class="read-more" onclick="this.parentElement.style.display='none'; document.getElementById('caption-full').style.display='block'"> আরও দেখুন</span>
                </p>
                <p class="caption-text text-gray-800 hidden" id="caption-full">${text}</p>
            `;
        }

        onAuthStateChanged(auth, async u => {
            if (u) {
                user = u;
                const userDoc = await getDoc(doc(db, "users", u.uid));
                currentUserData = userDoc.data() || {};
                document.getElementById('navPic').src = currentUserData.profilePic || '';
                document.getElementById('myStoryPic').src = currentUserData.profilePic || '';
                initApp();
            } else {
                location.href = "index.html";
            }
        });

        function initApp() {
            onSnapshot(doc(db, "appSettings", "ads"), s => {
                if (s.exists()) document.getElementById('globalAdArea').innerHTML = s.data().code || '';
            });

            onSnapshot(doc(db, "appSettings", "algorithm"), s => {
                if (s.exists()) globalCPM = s.data().trendBoost || 0.0001;
            });

            renderFeed();
            checkNotifications();
            loadStories();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                feed.innerHTML = snap.docs.map(docSnap => {
                    const p = docSnap.data();
                    const pid = docSnap.id;
                    const isLiked = p.likedBy?.includes(user.uid) || false;

                    return `
                    <div class="insta-post">
                        <div class="flex items-center justify-between p-4">
                            <div class="flex items-center gap-3" onclick="location.href='profile.html?uid=${p.userId}'">
                                <img src="${p.userPic || ''}" class="w-9 h-9 rounded-full object-cover">
                                <div>
                                    <span class="font-bold">${p.userName || 'User'}</span>
                                    <span class="text-[10px] text-gray-400">${getTimeAgo(p.createdAt)}</span>
                                </div>
                            </div>
                            <i class="fas fa-ellipsis-h text-gray-400"></i>
                        </div>

                        <div class="video-container" onclick="recordView('\( {pid}', ' \){p.userId}', ${!!p.isCreatorMonetized})">
                            ${p.fileType === 'video' ? `
                                <video id="vid-\( {pid}" src=" \){p.fileUrl}" loop muted playsinline></video>
                                <div class="absolute bottom-4 right-4 w-8 h-8 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white">
                                    <i id="icon-${pid}" class="fas fa-volume-mute"></i>
                                </div>
                            ` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>

                        <div class="p-4">
                            <div class="flex justify-between mb-3">
                                <div class="flex gap-6 text-3xl">
                                    <i onclick="handleLike('\( {pid}')" class="fa- \){isLiked ? 'solid text-red-500' : 'regular'} fa-heart cursor-pointer active:scale-125 transition-transform"></i>
                                    <i onclick="openComments('${pid}')" class="fa-regular fa-comment cursor-pointer"></i>
                                    <i onclick="sharePost('${pid}')" class="fa-regular fa-paper-plane cursor-pointer"></i>
                                </div>
                                <div class="flex items-center gap-1 bg-blue-50 text-blue-600 px-3 py-1 rounded-xl text-xs font-bold">
                                    <i class="fas fa-eye"></i> ${p.views || 0}
                                </div>
                            </div>

                            <div>
                                <b>${p.userName}</b>
                                ${renderCaption(p.text || '')}
                            </div>

                            ${p.isCreatorMonetized ? `<div class="mt-3 p-3 bg-blue-50 text-blue-700 text-xs font-bold rounded-2xl text-center">💰 Sponsored Post</div>` : ''}
                        </div>
                    </div>`;
                }).join('');

                initObserver();
            });
        }

        // ==================== Video Control ====================
        window.toggleVideo = (id) => {
            const v = document.getElementById(`vid-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if (!v) return;
            if (v.paused) {
                v.play();
                v.muted = false;
                icon.className = "fas fa-volume-up";
            } else {
                v.pause();
            }
        };

        // ==================== View & Monetization ====================
        window.recordView = async (pid, cid, isMon) => {
            if (cid === user.uid) return;
            try {
                await updateDoc(doc(db, "posts", pid), { views: increment(1) });
                if (isMon) {
                    await updateDoc(doc(db, "users", cid), { balance: increment(globalCPM) });
                }
            } catch (e) { console.error(e); }
        };

        // ==================== Like Post ====================
        window.handleLike = async (pid) => {
            const ref = doc(db, "posts", pid);
            const snap = await getDoc(ref);
            const liked = snap.data().likedBy?.includes(user.uid) || false;
            await updateDoc(ref, {
                likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid)
            });
        };

        // ==================== Comments System ====================
        window.openComments = (pid) => {
            activePostId = pid;
            cancelReply();
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('overlay').style.display = "block";

            onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("time", "asc")), snap => {
                const html = snap.docs.map(cDoc => {
                    const c = cDoc.data();
                    const cid = cDoc.id;
                    const commentLiked = c.likedBy?.includes(user.uid) || false;

                    return `
                    <div class="flex gap-3">
                        <img src="${c.userPic || ''}" class="w-8 h-8 rounded-full mt-1">
                        <div class="flex-1">
                            <div class="bg-gray-100 p-3 rounded-2xl">
                                <p class="text-blue-600 text-xs font-bold">@${c.userName}</p>
                                <p class="text-sm">${c.text}</p>
                            </div>
                            <div class="flex gap-4 text-xs mt-1 text-gray-500">
                                <button onclick="likeComment('\( {cid}')" class=" \){commentLiked ? 'text-red-500' : ''}">
                                    <i class="fas fa-heart"></i> ${c.likedBy?.length || 0}
                                </button>
                                <button onclick="setReply('\( {cid}', ' \){c.userName}')" class="font-bold">Reply</button>
                            </div>
                            ${c.replies ? c.replies.map(r => `
                                <div class="reply-box mt-2">
                                    <p class="text-indigo-600 text-xs">@${r.userName}</p>
                                    <p class="text-sm">${r.text}</p>
                                </div>
                            `).join('') : ''}
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('commentList').innerHTML = html || '<p class="text-center text-gray-400 py-10">কোনো কমেন্ট নেই</p>';
            });
        };

        window.likeComment = async (cid) => {
            if (!activePostId) return;
            const ref = doc(db, "posts", activePostId, "comments", cid);
            const snap = await getDoc(ref);
            const liked = snap.data().likedBy?.includes(user.uid) || false;
            await updateDoc(ref, {
                likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid)
            });
        };

        window.setReply = (cid, name) => {
            replyToId = cid;
            document.getElementById('replyTag').classList.remove('hidden');
            document.getElementById('replyName').innerText = name;
            document.getElementById('cInput').focus();
        };

        window.cancelReply = () => {
            replyToId = null;
            document.getElementById('replyTag').classList.add('hidden');
        };

        window.postComment = async () => {
            const input = document.getElementById('cInput');
            if (!input.value.trim()) return;

            if (replyToId) {
                await updateDoc(doc(db, "posts", activePostId, "comments", replyToId), {
                    replies: arrayUnion({
                        text: input.value,
                        userName: currentUserData.name || 'User',
                        time: Date.now()
                    })
                });
                cancelReply();
            } else {
                await addDoc(collection(db, "posts", activePostId, "comments"), {
                    text: input.value,
                    userName: currentUserData.name || 'User',
                    userPic: currentUserData.profilePic || '',
                    time: serverTimestamp(),
                    likedBy: []
                });
                await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            }
            input.value = "";
        };

        window.sharePost = (id) => {
            const link = `\( {window.location.origin}/post-view.html?id= \){id}`;
            navigator.clipboard.writeText(link);
            Swal.fire({ title: 'লিঙ্ক কপি হয়েছে!', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
        };

        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        if (entry.isIntersecting) video.play().catch(() => {});
                        else video.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.video-container').forEach(container => observer.observe(container));
        }

        function checkNotifications() {
            onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => {
                document.getElementById('notifDot').style.display = s.size > 0 ? "block" : "none";
            });
        }

        function loadStories() {
            onSnapshot(collection(db, "stories"), s => {
                document.getElementById('storyList').innerHTML = s.docs.map(d => `
                    <div class="shrink-0 flex flex-col items-center gap-1">
                        <div class="w-16 h-16 rounded-full border-2 border-pink-500 p-0.5">
                            <img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover border-2 border-white">
                        </div>
                        <span class="text-[9px] font-bold truncate w-16 text-center">${d.data().userName}</span>
                    </div>
                `).join('');
            });
        }

        window.closeAll = () => {
            document.getElementById('commentSheet').classList.remove('active');
            document.getElementById('overlay').style.display = "none";
        };
    </script>
</body>
</html>
