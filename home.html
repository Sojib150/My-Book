<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Premium Drawer */
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); border-radius: 30px 30px 0 0; }
        #commentSheet.active { transform: translateY(0); }
        .comment-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 999; display: none; }
        .comment-blur.active { display: block; }

        /* Follow Button Magic */
        .hidden-follow { display: none !important; }
        
        /* Video Container */
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 20px; overflow: hidden; }
        video { width: 100%; cursor: pointer; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-blue-600 p-4 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="search.html"><i class="fas fa-search text-lg"></i></a>
                <a href="messages.html"><i class="fab fa-facebook-messenger text-xl"></i></a>
                <a href="profile.html" class="w-9 h-9 bg-blue-700 rounded-2xl flex items-center justify-center border-2 border-blue-400 overflow-hidden shadow-inner">
                    <img id="navPic" src="" class="w-full h-full object-cover hidden">
                    <span id="navInit" class="text-xs font-bold uppercase">P</span>
                </a>
            </div>
        </div>
    </nav>

    <div id="feed" class="max-w-md mx-auto p-3 mt-2 space-y-6">
        <div class="text-center py-20 text-gray-400 italic">Initializing Premium Feed...</div>
    </div>

    <div id="commentBlur" class="comment-blur" onclick="window.closeComments()"></div>
    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 bg-white h-[80vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="flex items-center gap-3 border-t pt-4">
            <input type="text" id="commentInput" placeholder="Write a comment..." class="flex-1 bg-gray-100 rounded-2xl px-6 py-4 text-sm outline-none">
            <button onclick="window.postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let activePostId = null;

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                loadNavData();
                renderFeed();
            } else { window.location.href = "index.html"; }
        });

        async function loadNavData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(userDoc.exists() && userDoc.data().profilePic) {
                document.getElementById('navPic').src = userDoc.data().profilePic;
                document.getElementById('navPic').classList.remove('hidden');
                document.getElementById('navInit').classList.add('hidden');
            }
        }

        async function renderFeed() {
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            let adCode = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                
                snap.forEach((d) => {
                    const p = d.data(); const id = d.id;
                    if(p.isShadowBanned) return;

                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-[30px] shadow-sm border border-gray-100 overflow-hidden";
                    card.innerHTML = `
                        <div class="p-4 flex items-center justify-between">
                            <a href="user.html?id=${p.userId}" class="flex items-center gap-3">
                                <img src="${p.userPic || 'https://via.placeholder.com/150'}" class="w-11 h-11 rounded-2xl object-cover border">
                                <div>
                                    <h3 class="font-black text-sm text-gray-800 tracking-tight">@${p.userName}</h3>
                                    <p class="text-[8px] font-black text-blue-500 uppercase">Verified Master</p>
                                </div>
                            </a>
                            <button id="follow_${id}" onclick="window.quickFollow('${p.userId}', '${id}')" class="text-blue-600 text-[10px] font-black px-4 py-2 bg-blue-50 rounded-xl">FOLLOW</button>
                        </div>

                        <p class="px-5 pb-4 text-sm text-gray-700 font-medium leading-relaxed">${p.text || ''}</p>
                        
                        <div class="video-wrapper">
                            ${p.fileUrl ? (p.fileType === 'video' ? 
                                `<video src="${p.fileUrl}" loop playsinline muted class="feed-video h-auto max-h-[500px]" onclick="window.handleVideo(this)"></video>
                                 <div class="absolute bottom-4 right-4 bg-black/40 p-2 rounded-full text-white text-[10px] pointer-events-none"><i class="fas fa-volume-mute"></i></div>` : 
                                `<img src="${p.fileUrl}" class="w-full object-cover">`) : ""}
                        </div>

                        <div class="p-3 flex justify-around text-[11px] font-black text-gray-400">
                            <button onclick="window.like('${id}')" class="flex-1 py-3 flex items-center justify-center gap-2 ${isLiked ? 'text-red-500' : ''}">
                                <i class="${isLiked ? 'fas' : 'far'} fa-heart text-xl"></i> ${p.likes || 0}
                            </button>
                            <button onclick="window.openComments('${id}')" class="flex-1 py-3 flex items-center justify-center gap-2">
                                <i class="far fa-comment text-xl"></i> Comment
                            </button>
                            <button onclick="window.shareToProfile('${id}', '${p.fileUrl}', '${p.fileType}', '${p.text || ''}')" class="flex-1 py-3 flex items-center justify-center gap-2">
                                <i class="fas fa-share-nodes text-xl"></i> Share
                            </button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
                observeVideos();
            });
        }

        // --- Video Magic: Auto Play & Sound Management ---
        window.handleVideo = (video) => {
            if (video.paused) {
                video.play();
            } else {
                // Click করলে Unmute হবে (সাউন্ড আসবে)
                video.muted = !video.muted;
                const icon = video.nextElementSibling.querySelector('i');
                icon.className = video.muted ? "fas fa-volume-mute" : "fas fa-volume-up";
            }
        };

        function observeVideos() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                        video.muted = true; // পরের বার যখন আসবে তখন আবার মিউট থাকবে
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.feed-video').forEach(vid => observer.observe(vid));
        }

        // --- Profile Actions ---
        window.quickFollow = async (tid, postId) => {
            const btn = document.getElementById(`follow_${postId}`);
            btn.classList.add('hidden-follow');
            await setDoc(doc(db, "users", currentUser.uid, "following", tid), { time: serverTimestamp() });
            await setDoc(doc(db, "users", tid, "followers", currentUser.uid), { time: serverTimestamp() });
        };

        window.like = async (id) => {
            const ref = doc(db, "posts", id);
            const p = (await getDoc(ref)).data();
            const isLiked = p.likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('commentBlur').classList.add('active');
            // Load comments logic here...
        };

        window.closeComments = () => {
            document.getElementById('commentSheet').classList.remove('active');
            document.getElementById('commentBlur').classList.remove('active');
        };

        window.shareToProfile = async (id, url, type, text) => {
            const uSnap = await getDoc(doc(db, "users", currentUser.uid));
            const u = uSnap.data();
            await addDoc(collection(db, "posts"), {
                userId: currentUser.uid, userName: u.name, userPic: u.profilePic,
                fileUrl: url || "", fileType: type || "", text: "Shared: " + (text || ""),
                createdAt: serverTimestamp(), likes: 0, likedBy: [], isShadowBanned: false
            });
            alert("Shared to your profile!");
        };
    </script>
</body>
</html>
