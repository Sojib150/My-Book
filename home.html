<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Engine V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; color: #1a1a1a; }
        
        /* Instagram Style Vertical Video */
        .insta-post { background: white; border-bottom: 1px solid #efefef; margin-bottom: 10px; }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/5; background: #000; overflow: hidden; border-radius: 4px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .ad-banner { background: #f0f7ff; border: 1px dashed #1877f2; padding: 10px; margin: 10px; border-radius: 12px; font-size: 11px; text-align: center; color: #1877f2; font-weight: 800; }
        
        .story-ring { width: 68px; height: 68px; padding: 2px; border: 2px solid #ff3040; border-radius: 50%; }
        .story-add { background: #1877f2; color: white; border: 2px solid white; position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #efefef; padding: 12px 0; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-icon { font-size: 1.5rem; color: #262626; }

        .comment-btn { transition: transform 0.2s; }
        .comment-btn:active { transform: scale(0.9); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white border-b px-4 py-3 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter italic text-blue-600">My Book</h1>
        <div class="flex gap-4 items-center">
            <i class="fa-regular fa-heart text-2xl" onclick="location.href='notifications.html'"></i>
            <i class="fa-regular fa-paper-plane text-2xl"></i>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="bg-white py-4 border-b overflow-x-auto no-scrollbar flex gap-4 px-4">
            <div class="relative shrink-0" onclick="location.href='post.html?type=story'">
                <div class="w-[66px] h-[66px] rounded-full border-2 border-gray-200 p-0.5">
                    <img id="myStoryPic" src="https://via.placeholder.com/100" class="w-full h-full rounded-full object-cover">
                </div>
                <div class="story-add"><i class="fas fa-plus"></i></div>
                <p class="text-[10px] text-center mt-1 font-medium">Your Story</p>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="globalAdSpace" class="hidden"></div>

        <div id="feed" class="space-y-2"></div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="location.href='home.html'"></i>
        <i class="fas fa-search nav-icon" onclick="location.href='search.html'"></i>
        <i class="far fa-plus-square nav-icon" onclick="location.href='post.html'"></i>
        <i class="fas fa-play nav-icon" onclick="location.href='reels.html'"></i>
        <img id="navPic" onclick="location.href='profile.html'" class="w-7 h-7 rounded-full border border-gray-300">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let currentUserData = null; let globalCPM = 0.0001;

        // 🕒 Advanced Time Logic
        function formatFameTime(timestamp) {
            if(!timestamp) return "Just now";
            const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
            if(seconds < 60) return seconds + "s ago";
            if(seconds < 3600) return Math.floor(seconds/60) + "m ago";
            if(seconds < 86400) return Math.floor(seconds/3600) + "h ago";
            return Math.floor(seconds/86400) + "d ago";
        }

        onAuthStateChanged(auth, async u => {
            if(u) { user = u; 
                const s = await getDoc(doc(db, "users", u.uid)); 
                currentUserData = s.data() || {};
                document.getElementById('navPic').src = currentUserData.profilePic || 'https://via.placeholder.com/100';
                document.getElementById('myStoryPic').src = currentUserData.profilePic || 'https://via.placeholder.com/100';
                startEngine(); 
            } else { location.href = "index.html"; }
        });

        function startEngine() {
            // Load Global Ads
            onSnapshot(doc(db, "appSettings", "ads"), s => {
                if(s.exists() && s.data().code) {
                    const adBox = document.getElementById('globalAdSpace');
                    adBox.innerHTML = s.data().code;
                    adBox.classList.remove('hidden');
                }
            });

            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost || 0.0001; });

            renderFeed();
            loadStories();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                feed.innerHTML = snap.docs.map(docSnap => {
                    const p = docSnap.data();
                    const pid = docSnap.id;
                    const isLiked = p.likedBy?.includes(user.uid);
                    
                    return `
                    <div class="insta-post">
                        <div class="flex items-center justify-between p-3">
                            <div class="flex items-center gap-3">
                                <img src="${p.userPic}" class="w-9 h-9 rounded-full object-cover border border-gray-100">
                                <span class="font-bold text-sm tracking-tight">${p.userName}</span>
                                <span class="text-gray-400 text-xs">• ${formatFameTime(p.createdAt)}</span>
                            </div>
                            <i class="fas fa-ellipsis-h text-gray-400"></i>
                        </div>

                        <div class="video-container" onclick="handleAdView('${pid}', '${p.userId}', ${p.isCreatorMonetized})">
                            ${p.fileType === 'video' ? `
                                <video id="v-${pid}" src="${p.fileUrl}" loop muted playsinline onclick="togglePlay('${pid}')"></video>
                                <div class="absolute bottom-4 right-4 bg-black/40 p-2 rounded-full text-white text-[10px]" id="vol-icon-${pid}">
                                    <i class="fas fa-volume-mute"></i>
                                </div>
                            ` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>

                        <div class="p-3">
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex gap-4">
                                    <i class="fa-${isLiked?'solid text-red-500':'regular'} fa-heart text-2xl cursor-pointer" onclick="handleLike('${pid}')"></i>
                                    <i class="fa-regular fa-comment text-2xl" onclick="location.href='post_view.html?id=${pid}'"></i>
                                    <i class="fa-regular fa-paper-plane text-2xl"></i>
                                </div>
                                <i class="fa-regular fa-bookmark text-2xl"></i>
                            </div>
                            <p class="font-bold text-sm">${p.likedBy?.length || 0} likes</p>
                            <p class="text-sm mt-1">
                                <span class="font-bold">${p.userName}</span> ${p.text || ''}
                            </p>
                            <p class="text-gray-400 text-xs mt-2 cursor-pointer" onclick="location.href='post_view.html?id=${pid}'">
                                View all ${p.commentCount || 0} comments
                            </p>
                        </div>
                        
                        ${p.isCreatorMonetized ? `<div class="ad-banner">✨ Monetized Content • Earnings Active</div>` : ''}
                    </div>`;
                }).join('');
                initObserver();
            });
        }

        // Ads Income Logic
        window.handleAdView = async (pid, creatorId, isMonetized) => {
            if(creatorId === user.uid || !isMonetized) return;
            // এই ফাংশনটি ভিউ কাউন্ট করবে এবং ইউজারের অ্যাকাউন্টে টাকা যোগ করবে
            await updateDoc(doc(db, "posts", pid), { views: increment(1) });
            await updateDoc(doc(db, "users", creatorId), { balance: increment(globalCPM) });
        };

        window.togglePlay = (id) => {
            const v = document.getElementById(`v-${id}`);
            const vol = document.getElementById(`vol-icon-${id}`);
            if(v.paused) { v.play(); v.muted = false; vol.innerHTML = '<i class="fas fa-volume-up"></i>'; }
            else { v.pause(); }
        };

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const vid = entry.target.querySelector('video');
                    if(vid) {
                        if(entry.isIntersecting) vid.play().catch(()=>{});
                        else vid.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-container').forEach(el => obs.observe(el));
        }

        window.handleLike = async (id) => {
            const ref = doc(db, "posts", id);
            const s = await getDoc(ref);
            const liked = s.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        function loadStories() {
            onSnapshot(collection(db, "stories"), s => {
                document.getElementById('storyList').innerHTML = s.docs.map(d => `
                    <div class="shrink-0 text-center">
                        <div class="story-ring">
                            <img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover border-2 border-white">
                        </div>
                        <p class="text-[10px] mt-1 font-medium truncate w-16">${d.data().userName}</p>
                    </div>
                `).join('');
            });
        }
    </script>
</body>
</html>
