<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hashtag { color: #2563eb; font-weight: 600; cursor: pointer; }
        .hashtag:hover { text-decoration: underline; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <nav class="bg-blue-600 p-3 text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic tracking-tighter">My Book</h1>
            
            <div class="flex items-center gap-4">
                <a href="search.html" class="text-white hover:text-blue-200"><i class="fas fa-search text-lg"></i></a>
                
                <a href="messages.html" class="relative text-white">
                    <i class="fab fa-facebook-messenger text-xl"></i>
                    <span id="msgCount" class="hidden absolute -top-2 -right-2 bg-red-500 text-[10px] text-white w-4 h-4 rounded-full flex items-center justify-center border border-white font-bold">0</span>
                </a>

                <a href="profile.html" id="navProfile" class="w-8 h-8 bg-blue-700 rounded-full flex items-center justify-center text-xs font-bold border border-blue-400 overflow-hidden">
                    <span id="navInit">P</span>
                    <img id="navPic" src="" class="w-full h-full object-cover hidden">
                </a>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b sticky top-[52px] z-40">
        <div class="max-w-md mx-auto flex">
            <button id="showAll" class="flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 uppercase tracking-widest">Feed</button>
            <button onclick="window.location.href='reels.html'" class="flex-1 py-3 text-sm font-bold text-gray-400 uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fas fa-play-circle"></i> Reels
            </button>
        </div>
    </div>

    <div id="feed" class="max-w-md mx-auto p-2 mt-2">
        <div class="text-center py-10 text-gray-400 text-sm italic">পোস্ট লোড হচ্ছে...</div>
    </div>

    <a href="post.html" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition-all active:scale-90 z-50">
        <i class="fas fa-plus"></i>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;
        let myFollowing = [];

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                loadNavData();
                loadMessagesCount();
                loadFollowingList();
                renderFeed();
            } else { window.location.href = "index.html"; }
        });

        // ১. প্রোফাইল ও মেসেজ নোটিফিকেশন লজিক
        async function loadNavData() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if(userDoc.exists() && userDoc.data().profilePic) {
                document.getElementById('navPic').src = userDoc.data().profilePic;
                document.getElementById('navPic').classList.remove('hidden');
                document.getElementById('navInit').classList.add('hidden');
            }
        }

        function loadMessagesCount() {
            onSnapshot(collection(db, "chats"), snap => {
                let count = 0;
                snap.forEach(d => { if(d.id.includes(currentUser.uid)) count++; });
                const badge = document.getElementById('msgCount');
                if(count > 0) { badge.innerText = count; badge.classList.remove('hidden'); }
            });
        }

        function loadFollowingList() {
            onSnapshot(collection(db, "users", currentUser.uid, "following"), snap => {
                myFollowing = snap.docs.map(d => d.id);
            });
        }

        // ২. হ্যাশট্যাগ ও টেক্সট ফরম্যাট
        function formatText(text) {
            if(!text) return "";
            return text.replace(/#(\w+)/g, '<span class="hashtag" onclick="window.location.href=\'search.html?q=$1\'">#$1</span>');
        }

        // ৩. ফিড রেন্ডার লজিক
        function renderFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                
                snap.forEach(postDoc => {
                    const p = postDoc.data();
                    const id = postDoc.id;
                    const isFollowing = myFollowing.includes(p.userId) || p.userId === currentUser.uid;
                    const isLiked = p.likedBy?.includes(currentUser?.uid);
                    
                    // সময় ঠিক করার লজিক (Date Fix)
                    const date = p.createdAt ? new Date(p.createdAt.toDate()).toLocaleString('bn-BD', {hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'}) : "এইমাত্র";
                    
                    const card = document.createElement('div');
                    card.className = "bg-white mb-4 rounded-xl shadow-sm border border-gray-200 overflow-hidden";
                    card.innerHTML = `
                        <div class="p-3 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <a href="user.html?id=${p.userId}" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold overflow-hidden">
                                    ${p.userPic ? `<img src="${p.userPic}" class="w-full h-full object-cover">` : p.userName?.[0] || 'U'}
                                </a>
                                <div>
                                    <a href="user.html?id=${p.userId}" class="font-bold text-sm text-gray-800">${p.userName || 'User'}</a>
                                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">${date}</p>
                                </div>
                            </div>
                            ${!isFollowing ? `<button onclick="window.quickFollow('${p.userId}')" class="text-blue-600 text-[10px] font-black border border-blue-600 px-3 py-1 rounded-full uppercase">Follow</button>` : ''}
                        </div>
                        
                        <p class="px-4 pb-3 text-sm text-gray-700">${formatText(p.text)}</p>
                        
                        ${p.fileUrl ? (p.fileType === 'video' ? 
                            `<div class="bg-black relative group cursor-pointer" onclick="window.location.href='reels.html?id=${id}'">
                                <video src="${p.fileUrl}" class="w-full max-h-[450px]"></video>
                                <div class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 group-hover:opacity-100 transition">
                                    <i class="fas fa-play text-white text-4xl"></i>
                                </div>
                            </div>` : 
                            `<img src="${p.fileUrl}" class="w-full object-cover max-h-[500px]">`) : ""}
                        
                        <div class="p-2 border-t flex justify-around text-xs font-bold text-gray-500">
                            <button onclick="window.like('${id}')" class="flex-1 py-2 flex items-center justify-center gap-2 ${isLiked ? 'text-red-500' : ''}">
                                <i class="${isLiked ? 'fas' : 'far'} fa-heart text-lg"></i> ${p.likes || 0}
                            </button>
                            <button onclick="document.getElementById('commentArea-${id}').classList.toggle('hidden')" class="flex-1 py-2 flex items-center justify-center gap-2">
                                <i class="far fa-comment text-lg"></i> Comment
                            </button>
                        </div>

                        <div id="commentArea-${id}" class="hidden border-t bg-gray-50 p-3">
                            <div id="list-${id}" class="space-y-4 mb-4"></div>
                            <div class="flex gap-2 bg-white p-1 rounded-full px-3 shadow-inner">
                                <input type="text" id="input-${id}" placeholder="মন্তব্য লিখুন..." class="flex-1 bg-transparent border-none py-2 text-[11px] outline-none">
                                <button onclick="window.addComment('${id}')" class="text-blue-600 px-2"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                    loadComments(id);
                });
            });
        }

        // ৪. অ্যাডভান্সড কমেন্ট লোডার
        function loadComments(postId) {
            const container = document.getElementById(`list-${postId}`);
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")), snap => {
                container.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const cid = d.id;
                    const div = document.createElement('div');
                    div.className = "flex gap-2";
                    div.innerHTML = `
                        <a href="user.html?id=${c.userId}" class="w-7 h-7 bg-blue-500 rounded-full flex items-center justify-center text-white text-[10px] font-bold overflow-hidden">
                            ${c.userPic ? `<img src="${c.userPic}" class="w-full h-full object-cover">` : c.userName[0]}
                        </a>
                        <div class="flex-1">
                            <div class="bg-white p-2 px-3 rounded-2xl rounded-tl-none border border-gray-100 shadow-sm">
                                <a href="user.html?id=${c.userId}" class="text-[10px] font-black text-gray-800 hover:underline">${c.userName}</a>
                                <p class="text-[11px] text-gray-600 mt-0.5">${c.text}</p>
                            </div>
                            <div class="flex gap-4 mt-1 ml-2 text-[9px] font-black uppercase text-gray-400">
                                <button class="hover:text-blue-600">Like</button>
                                <button onclick="document.getElementById('input-${postId}').value='@${c.userName} '" class="hover:text-blue-600">Reply</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // ৫. গ্লোবাল ফাংশনসমূহ
        window.quickFollow = async (tid) => {
            await setDoc(doc(db, "users", currentUser.uid, "following", tid), { time: new Date() });
            await setDoc(doc(db, "users", tid, "followers", currentUser.uid), { time: new Date() });
        };

        window.like = async (id) => {
            const ref = doc(db, "posts", id);
            const p = (await getDoc(ref)).data();
            const isLiked = p.likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.addComment = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            if(!input.value.trim()) return;
            await addDoc(collection(db, "posts", postId, "comments"), {
                text: input.value, userId: currentUser.uid, userName: currentUser.displayName || "User",
                createdAt: serverTimestamp()
            });
            input.value = "";
        };

    </script>
</body>
</html>
