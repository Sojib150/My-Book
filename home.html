<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

/* header */
.header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* post box */
.postBox{
  display:flex;
  padding:10px;
  background:white;
}
.postBox input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}
.postBox button{
  margin-left:10px;
  padding:10px;
  border:none;
  background:#1877f2;
  color:white;
  border-radius:20px;
}

/* post */
.post{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.top{
  font-weight:bold;
}

.actions button{
  margin:5px;
}

/* comment */
.comment{
  background:#f0f2f5;
  padding:8px;
  border-radius:10px;
  margin-top:5px;
}

.reply{
  margin-left:20px;
  background:#e4e6eb;
}

.small{
  font-size:12px;
  color:#555;
  cursor:pointer;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🔥 My Social</div>

<div class="postBox">
<input id="text" placeholder="Write something...">
<button onclick="post()">Post</button>
</div>

<div id="feed"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="inbox.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
}else{
location.href="index.html";
}
});

// 📌 POST
window.post = async function(){

let text = document.getElementById("text").value;
if(!text) return;

let userSnap = await get(ref(db,"users/"+uid));
let user = userSnap.val();

push(ref(db,"posts"),{
text,
user:user.username,
owner:uid,
likes:0,
likedBy:{}
});

document.getElementById("text").value="";
}

// 📌 SHOW POSTS
onValue(ref(db,"posts"),snap=>{
let data = snap.val();
let html="";

for(let id in data){

let p = data[id];

html += `
<div class="post">
<div class="top">👤 ${p.user}</div>
<p>${p.text}</p>

<div class="actions">
<button onclick="like('${id}')">❤️ ${p.likes||0}</button>
</div>

<div id="comments_${id}"></div>

<input placeholder="Write comment..." id="c_${id}">
<button onclick="addComment('${id}')">Send</button>

</div>
`;

loadComments(id);

}

document.getElementById("feed").innerHTML = html;
});

// ❤️ LIKE POST
window.like = async function(id){

let snap = await get(ref(db,"posts/"+id));
let p = snap.val();

let liked = p.likedBy || {};

if(liked[uid]){
delete liked[uid];
}else{
liked[uid]=true;
}

update(ref(db,"posts/"+id),{
likedBy:liked,
likes:Object.keys(liked).length
});
}

// 💬 ADD COMMENT
window.addComment = function(postId){

let text = document.getElementById("c_"+postId).value;
if(!text) return;

push(ref(db,"comments/"+postId),{
text,
user:uid,
likes:0,
likedBy:{}
});
}

// 📥 LOAD COMMENTS
function loadComments(postId){

onValue(ref(db,"comments/"+postId),snap=>{

let data = snap.val();
let html="";

for(let cid in data){

let c = data[cid];

html += `
<div class="comment">
${c.text}
<br>
<span class="small" onclick="likeComment('${postId}','${cid}')">❤️ ${c.likes||0}</span>
<span class="small" onclick="reply('${postId}','${cid}')">Reply</span>

<div id="reply_${cid}"></div>

<input id="r_${cid}" placeholder="Reply...">
<button onclick="sendReply('${postId}','${cid}')">Send</button>

</div>
`;

loadReplies(postId,cid);

}

document.getElementById("comments_"+postId).innerHTML = html;

});
}

// ❤️ LIKE COMMENT
window.likeComment = async function(postId,cid){

let snap = await get(ref(db,"comments/"+postId+"/"+cid));
let c = snap.val();

let liked = c.likedBy || {};

if(liked[uid]){
delete liked[uid];
}else{
liked[uid]=true;
}

update(ref(db,"comments/"+postId+"/"+cid),{
likedBy:liked,
likes:Object.keys(liked).length
});
}

// 🔁 REPLY
window.sendReply = function(postId,cid){

let text = document.getElementById("r_"+cid).value;
if(!text) return;

push(ref(db,"replies/"+postId+"/"+cid),{
text,
user:uid
});
}

// 📥 LOAD REPLIES
function loadReplies(postId,cid){

onValue(ref(db,"replies/"+postId+"/"+cid),snap=>{

let data = snap.val();
let html="";

for(let r in data){
html += `<div class="comment reply">${data[r].text}</div>`;
}

document.getElementById("reply_"+cid).innerHTML = html;

});
}

</script>

</body>
</html>
