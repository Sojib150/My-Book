<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Feed View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .hybrid-post { background: white; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; position: relative; margin-bottom: 15px; }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/5; background: #000; overflow: hidden; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-ad-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .skip-ad-btn { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 13px; display: none; cursor: pointer; backdrop-filter: blur(5px); z-index: 60; }
        .inline-ad-card { background: linear-gradient(135deg, #ffffff 0%, #f4f7ff 100%); border-top: 1px dashed #1877f2; border-bottom: 1px dashed #1877f2; padding: 12px; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.06); padding: 10px 0; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; border-radius: 35px 35px 0 0; box-shadow: 0 -15px 50px rgba(0,0,0,0.15); }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); display: none; z-index: 1500; }
        .like-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 5rem; pointer-events: none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .like-pop.animate { animation: heartPop 0.8s ease-out; }
        @keyframes heartPop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 30% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; } }
    </style>
</head>
<body class="pb-24">
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 px-5 py-3.5 flex justify-between items-center">
        <h1 class="text-2.5xl font-black italic tracking-tighter text-blue-600">My Book</h1>
        <div class="flex gap-4 items-center">
            <i class="fa-solid fa-magnifying-glass text-gray-600 text-lg" onclick="location.href='search.html'"></i>
            <i class="fa-regular fa-bell text-gray-700 text-xl" onclick="location.href='notifications.html'"></i>
        </div>
    </nav>

    <div id="feed" class="max-w-md mx-auto mt-4 px-3 space-y-4">
        <div class="text-center py-20 text-gray-400 text-xs animate-pulse">LOADING FEED...</div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home text-blue-600 text-2xl" onclick="location.href='home.html'"></i>
        <i class="fa-regular fa-comment-dots text-gray-600 text-2xl" onclick="location.href='messages.html'"></i>
        <i class="fas fa-play text-gray-600 text-2xl" onclick="location.href='reels.html'"></i>
        <img id="navPic" src="https://via.placeholder.com/150" onclick="location.href='profile.html'" class="w-8 h-8 rounded-full border border-gray-200">
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[80vh] p-5">
        <div id="commentList" class="h-[65vh] overflow-y-auto space-y-4"></div>
        <div class="flex gap-2 pt-3 border-t">
            <input id="cInput" class="flex-1 bg-gray-100 p-3 rounded-full text-sm outline-none" placeholder="মন্তব্য করুন...">
            <button onclick="window.postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-full"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc, increment, addDoc, serverTimestamp, onSnapshot, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" }));
        const auth = getAuth();
        let user = null, activePostId = null, commentUnsubscribe = null, globalCPM = 0.0001;

        auth.onAuthStateChanged(u => { if(u) user = u; renderFeed(); });

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc")));
            feed.innerHTML = snap.docs.map(doc => {
                const p = doc.data(), pid = doc.id;
                return `
                <div class="hybrid-post p-4">
                    <div class="font-bold mb-2">@${p.userName}</div>
                    <div class="mb-3">${p.text || ''}</div>
                    ${p.fileUrl ? `<div class="video-container"><img src="${p.fileUrl}" class="w-full rounded-2xl"></div>` : ''}
                    <div class="flex gap-6 mt-4">
                        <button onclick="window.handleLike('${pid}')"><i class="fa-regular fa-heart text-xl"></i></button>
                        <button onclick="window.openComments('${pid}')"><i class="fa-regular fa-comment text-xl"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        window.openComments = (pid) => {
            activePostId = pid; document.getElementById('commentSheet').classList.add('active'); document.getElementById('overlay').style.display = "block";
            commentUnsubscribe = onSnapshot(query(collection(db, "posts", pid, "comments"), orderBy("time", "asc")), sn => {
                document.getElementById('commentList').innerHTML = sn.docs.map(c => `
                    <div class="flex gap-2">
                        <div class="bg-gray-100 p-3 rounded-2xl text-sm"><b>@${c.data().userName}</b><br>${c.data().text}</div>
                    </div>`).join('');
            });
        };

        window.postComment = async () => {
            const i = document.getElementById('cInput');
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: i.value, userName: 'User', time: serverTimestamp() });
            i.value = "";
        };

        window.closeAll = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('overlay').style.display = "none"; if(commentUnsubscribe) commentUnsubscribe(); };
        window.handleLike = async (id) => { /* Like logic here */ };
    </script>
</body>
</html>
