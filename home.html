<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 24px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .video-box-wrapper { width: 100%; background: #000; position: relative; min-height: 250px; }
        video { width: 100%; max-height: 75vh; display: block; background: #000; }
        .mute-indicator { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; pointer-events: none; }
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-radius: 30px; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .nav-item { color: rgba(255,255,255,0.5); font-size: 1.3rem; }
        .nav-item.active { color: white; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; border-radius: 30px 30px 0 0; }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic">My Book</h1>
            <div class="flex items-center gap-5">
                <a href="reels.html" class="text-red-500"><i class="fa-solid fa-play-circle text-2xl"></i></a>
                <div class="relative" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <span id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden border-2 border-white"></span>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" class="w-10 h-10 rounded-full border bg-gray-100 object-cover cursor-pointer">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div onclick="location.href='upload-story.html'" class="flex flex-col items-center gap-1 shrink-0">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center">
                    <img id="storyMyPic" class="w-14 h-14 rounded-full object-cover hidden">
                    <i id="storyPlusIcon" class="fa-solid fa-plus text-gray-400"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-400">Add Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg cursor-pointer"><i class="fas fa-plus"></i></div>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[80vh] flex flex-col p-6">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="flex gap-2 border-t pt-4 bg-white">
            <input id="cInput" type="text" placeholder="মন্তব্য লিখুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm">
            <button onclick="postComment()" class="bg-blue-600 text-white px-6 rounded-2xl"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; 
        let currentUserData = null; 
        let activePostId = null;
        let globalCPM = 0.0001; 
        let viewTimers = {};

        onAuthStateChanged(auth, async u => {
            if(u) {
                user = u;
                const snap = await getDoc(doc(db, "users", u.uid));
                currentUserData = snap.data() || {};
                initApp();
            } else { location.href = "index.html"; }
        });

        function initApp() {
            // CPM রেট আপডেট
            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost || 0.0001; });
            renderFeed();
            loadProfile();
            checkNotif();
            loadStories();
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            onSnapshot(query(collection(db, "posts"), limit(30)), async snap => {
                let posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // 🔥 ALGORITHM: High Engagement First
                posts.sort((a, b) => {
                    const aScore = (a.likedBy?.length || 0) * 2 + (a.views || 0);
                    const bScore = (b.likedBy?.length || 0) * 2 + (b.views || 0);
                    return bScore - aScore;
                });

                feed.innerHTML = "";
                for(let p of posts) { feed.appendChild(await createPostCard(p.id, p)); }
                initIntersection();
            });
        }

        async function createPostCard(id, p) {
            const isLiked = p.likedBy?.includes(user.uid);
            const card = document.createElement('div');
            card.className = "premium-card";
            card.innerHTML = `
                <div class="p-4 flex items-center justify-between">
                    <div class="flex items-center gap-3" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-10 h-10 rounded-full object-cover border">
                        <div><p class="font-bold text-sm">@${p.userName}</p><p class="text-[10px] text-gray-400">Just Now</p></div>
                    </div>
                    ${p.userId === user.uid ? `<button onclick="deletePost('${id}')" class="text-gray-300"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                </div>
                <div class="px-4 pb-3 text-sm">${p.text || ''}</div>
                <div class="post-tracker" data-id="${id}" data-creator="${p.userId}">
                    ${p.fileUrl ? `
                        <div class="video-box-wrapper">
                            ${p.fileType === 'video' ? `
                                <video id="vid-${id}" src="${p.fileUrl}" loop muted playsinline onclick="toggleMute('${id}')"></video>
                                <div id="mute-icon-${id}" class="mute-indicator"><i class="fa-solid fa-volume-xmark"></i></div>
                                <button onclick="location.href='reels.html?id=${id}'" class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-xs border border-white/30"><i class="fa-solid fa-expand"></i> Reels</button>
                            ` : `<img src="${p.fileUrl}" class="w-full">`}
                        </div>
                    ` : ''}
                </div>
                <div class="flex justify-around py-3 border-t mt-2">
                    <button onclick="like('${id}', '${p.userId}')" class="flex flex-col items-center flex-1 ${isLiked ? 'text-red-500' : 'text-gray-400'}">
                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart text-xl"></i>
                        <span class="text-[10px]">${p.likedBy?.length || 0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="flex flex-col items-center flex-1 text-gray-400">
                        <i class="fa-regular fa-comment text-xl"></i>
                        <span class="text-[10px]">${p.commentCount || 0}</span>
                    </button>
                    <button onclick="shareLink('${id}')" class="flex flex-col items-center flex-1 text-gray-400">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                        <span class="text-[10px]">Share</span>
                    </button>
                    <div class="flex flex-col items-center flex-1 text-blue-400/50">
                        <i class="fa-solid fa-eye text-xl"></i>
                        <span class="text-[10px]">${p.views || 0}</span>
                    </div>
                </div>`;
            return card;
        }

        // 🔥 INCOME & VIEW LOGIC (৫ সেকেন্ড পলিসি)
        function initIntersection() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const pid = entry.target.dataset.id;
                    const cid = entry.target.dataset.creator;
                    const vid = entry.target.querySelector('video');

                    if (entry.isIntersecting) {
                        if(vid) vid.play();
                        // ৫ সেকেন্ড ভিউ কাউন্টার
                        viewTimers[pid] = setTimeout(() => recordViewAndIncome(pid, cid), 5000);
                    } else {
                        if(vid) vid.pause();
                        clearTimeout(viewTimers[pid]);
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.post-tracker').forEach(el => obs.observe(el));
        }

        async function recordViewAndIncome(pid, cid) {
            if(cid === user.uid) return;
            const postRef = doc(db, "posts", pid);
            const postSnap = await getDoc(postRef);

            if(!postSnap.exists() || postSnap.data().viewedBy?.includes(user.uid)) return;

            // ভিউ আপডেট
            await updateDoc(postRef, { views: increment(1), viewedBy: arrayUnion(user.uid) });

            // 🔥 Ads Income (ব্যালেন্স আপডেট)
            const creatorRef = doc(db, "users", cid);
            const creatorSnap = await getDoc(creatorRef);
            if(creatorSnap.exists() && creatorSnap.data().isMonetized) {
                await updateDoc(creatorRef, { balance: increment(globalCPM) });
            }
        }

        // --- functions ---
        window.toggleMute = (id) => {
            const v = document.getElementById(`vid-${id}`);
            const i = document.getElementById(`mute-icon-${id}`);
            v.muted = !v.muted;
            i.innerHTML = v.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
            i.style.opacity = "1";
            setTimeout(() => i.style.opacity = "0", 800);
        };

        window.like = async (id, oid) => {
            const ref = doc(db, "posts", id);
            const snap = await getDoc(ref);
            const isLiked = snap.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            if(!isLiked) addDoc(collection(db, "notifications"), { targetUserId: oid, senderName: currentUserData.name, type: "like", timestamp: serverTimestamp(), read: false });
        };

        window.shareLink = (id) => {
            navigator.clipboard.writeText(`${window.location.origin}/post-view.html?id=${id}`);
            Swal.fire({ title: "Link Copied!", icon: "success", timer: 1000, showConfirmButton: false });
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('overlay').style.display = "block";
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                document.getElementById('commentList').innerHTML = sn.docs.map(c => `
                    <div class="flex gap-3">
                        <img src="${c.data().userPic}" class="w-8 h-8 rounded-full">
                        <div class="bg-gray-100 p-3 rounded-2xl flex-1">
                            <p class="text-[10px] font-bold text-blue-600">@${c.data().userName}</p>
                            <p class="text-xs">${c.data().text}</p>
                        </div>
                    </div>`).join('');
            });
        };

        window.postComment = async () => {
            const val = document.getElementById('cInput').value;
            if(!val) return;
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: val, userId: user.uid, userName: currentUserData.name, userPic: currentUserData.profilePic, time: serverTimestamp() });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            document.getElementById('cInput').value = "";
        };

        window.deletePost = (id) => {
            Swal.fire({ title: 'মুছে ফেলবেন?', icon: 'warning', showCancelButton: true }).then(async r => {
                if(r.isConfirmed) await deleteDoc(doc(db, "posts", id));
            });
        };

        function loadProfile() {
            const p = currentUserData.profilePic;
            if(p) { 
                document.getElementById('navPic').src = p; 
                document.getElementById('storyMyPic').src = p; 
                document.getElementById('storyMyPic').classList.remove('hidden'); 
                document.getElementById('storyPlusIcon').classList.add('hidden');
            }
        }

        function checkNotif() {
            onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => {
                document.getElementById('notifDot').style.display = s.size > 0 ? "block" : "none";
            });
        }

        function loadStories() {
            onSnapshot(collection(db, "stories"), s => {
                document.getElementById('storyList').innerHTML = s.docs.map(d => `
                    <div class="flex flex-col items-center shrink-0" onclick="location.href='story-view.html?id=${d.id}'">
                        <div class="w-16 h-16 rounded-full p-0.5 border-2 border-blue-500">
                            <img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover">
                        </div>
                        <span class="text-[9px] font-medium mt-1">${d.data().userName}</span>
                    </div>`).join('');
            });
        }

        window.closeAll = () => {
            document.getElementById('commentSheet').classList.remove('active');
            document.getElementById('overlay').style.display = "none";
        };
    </script>
</body>
</html>
