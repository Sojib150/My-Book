<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Elite Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        
        /* Instagram Style Vertical Video */
        .insta-post { background: white; border-bottom: 8px solid #f4f7fa; }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/5; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #efefef; padding: 12px 0; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-icon { font-size: 1.4rem; color: #262626; }

        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 2000; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; z-index: 1500; }
        
        .reply-box { border-left: 2px solid #6366f1; margin-left: 10px; padding-left: 10px; margin-top: 8px; background: #f8fafc; border-radius: 8px; padding: 5px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b px-5 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-blue-600">My Book</h1>
        <div class="flex gap-5 items-center">
            <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                <i class="fa-regular fa-bell text-2xl"></i>
                <span id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden border-2 border-white"></span>
            </div>
            <i class="fa-regular fa-paper-plane text-2xl"></i>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="bg-white py-4 border-b overflow-x-auto no-scrollbar flex gap-4 px-4">
            <div class="shrink-0 flex flex-col items-center gap-1" onclick="location.href='post.html'">
                <div class="relative w-16 h-16 rounded-full border-2 border-gray-200 p-0.5">
                    <img id="myStoryPic" src="" class="w-full h-full rounded-full object-cover">
                    <div class="absolute bottom-0 right-0 bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white text-[10px]"><i class="fas fa-plus"></i></div>
                </div>
                <span class="text-[10px] font-bold">Your Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="globalAdArea" class="p-2"></div>

        <div id="feed" class="space-y-1"></div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="location.href='home.html'"></i>
        <i class="fas fa-search nav-icon" onclick="location.href='search.html'"></i>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white -mt-4 shadow-lg shadow-blue-500/30"><i class="fas fa-plus"></i></div>
        <i class="fas fa-play nav-icon" onclick="location.href='reels.html'"></i>
        <img id="navPic" onclick="location.href='profile.html'" class="w-7 h-7 rounded-full border border-gray-200 object-cover">
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[80vh] flex flex-col p-5">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar"></div>
        
        <div id="replyTag" class="hidden px-4 py-2 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-t-xl flex justify-between">
            <span>Replying to <span id="replyName"></span></span>
            <button onclick="cancelReply()"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex gap-2 pt-4 border-t">
            <input id="cInput" type="text" placeholder="মতামত লিখুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none font-bold text-sm">
            <button onclick="postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let currentUserData = null; let activePostId = null;
        let replyToId = null; let globalCPM = 0.0001;

        // 🕒 Time Formatter (Fixed)
        function getTimeAgo(ts) {
            if(!ts) return "সদ্য";
            const diff = Math.floor((new Date() - ts.toDate()) / 1000);
            if(diff < 60) return diff + "s ago";
            if(diff < 3600) return Math.floor(diff/60) + "m ago";
            if(diff < 86400) return Math.floor(diff/3600) + "h ago";
            return Math.floor(diff/86400) + "d ago";
        }

        onAuthStateChanged(auth, async u => {
            if(u) {
                user = u;
                const s = await getDoc(doc(db, "users", u.uid));
                currentUserData = s.data() || {};
                document.getElementById('navPic').src = currentUserData.profilePic;
                document.getElementById('myStoryPic').src = currentUserData.profilePic;
                initApp();
            } else { location.href = "index.html"; }
        });

        function initApp() {
            // Real-time Ads Code
            onSnapshot(doc(db, "appSettings", "ads"), s => {
                if(s.exists()) document.getElementById('globalAdArea').innerHTML = s.data().code;
            });
            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost; });

            renderFeed();
            checkNotifications();
            loadStories();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            // 🔥 Admin Delete Sync: onSnapshot will automatically remove deleted posts
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                feed.innerHTML = snap.docs.map(docSnap => {
                    const p = docSnap.data();
                    const pid = docSnap.id;
                    const isLiked = p.likedBy?.includes(user.uid);
                    
                    return `
                    <div class="insta-post">
                        <div class="flex items-center justify-between p-4">
                            <div class="flex items-center gap-3" onclick="location.href='profile.html?uid=${p.userId}'">
                                <img src="${p.userPic}" class="w-9 h-9 rounded-full object-cover">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm tracking-tight">${p.userName}</span>
                                    <span class="text-[9px] text-gray-400 font-bold uppercase">${getTimeAgo(p.createdAt)}</span>
                                </div>
                            </div>
                            <i class="fas fa-ellipsis-h text-gray-300"></i>
                        </div>

                        <div class="video-container" onclick="recordView('${pid}', '${p.userId}', ${p.isCreatorMonetized})">
                            ${p.fileType === 'video' ? `
                                <video id="vid-${pid}" src="${p.fileUrl}" loop muted playsinline onclick="toggleVideo('${pid}')"></video>
                                <div class="absolute bottom-5 right-5 w-8 h-8 bg-black/30 backdrop-blur rounded-full flex items-center justify-center text-white text-xs">
                                    <i id="icon-${pid}" class="fas fa-volume-mute"></i>
                                </div>
                            ` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>

                        <div class="p-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex gap-5">
                                    <i class="fa-${isLiked?'solid text-red-500':'regular'} fa-heart text-2xl" onclick="handleLike('${pid}')"></i>
                                    <i class="fa-regular fa-comment text-2xl" onclick="openComments('${pid}')"></i>
                                    <i class="fa-regular fa-paper-plane text-2xl" onclick="sharePost('${pid}')"></i>
                                </div>
                                <div class="flex items-center gap-1 text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">
                                    <i class="fas fa-eye text-[10px]"></i>
                                    <span class="text-[10px] font-black">${p.views || 0}</span>
                                </div>
                            </div>
                            <p class="text-sm"><b>${p.userName}</b> ${p.text || ''}</p>
                            ${p.isCreatorMonetized ? `<div class="mt-3 p-2 bg-blue-50 rounded-xl text-[10px] font-black text-blue-600 border border-blue-100 text-center uppercase tracking-widest">Sponsored Post</div>` : ''}
                        </div>
                    </div>`;
                }).join('');
                initObserver();
            });
        }

        // 🔊 Sound & Video Control (High Quality)
        window.toggleVideo = (id) => {
            const v = document.getElementById(`vid-${id}`);
            const i = document.getElementById(`icon-${id}`);
            if(v.paused) { 
                v.play(); v.muted = false; 
                i.className = "fas fa-volume-up"; 
            } else { 
                v.pause(); 
            }
        };

        // 💰 Income & View Logic
        async function recordView(pid, cid, isMon) {
            if(cid === user.uid) return;
            const ref = doc(db, "posts", pid);
            await updateDoc(ref, { views: increment(1) });
            if(isMon) await updateDoc(doc(db, "users", cid), { balance: increment(globalCPM) });
        }

        // 💬 Advanced Comment System (Likes + Replies)
        window.openComments = (id) => {
            activePostId = id; cancelReply();
            document.getElementById('commentSheet').classList.add('active');
            document.getElementById('overlay').style.display = "block";
            
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                document.getElementById('commentList').innerHTML = sn.docs.map(cDoc => {
                    const c = cDoc.data(); const cid = cDoc.id;
                    const liked = c.likedBy?.includes(user.uid);
                    return `
                    <div class="flex gap-3">
                        <img src="${c.userPic}" class="w-8 h-8 rounded-full">
                        <div class="flex-1">
                            <div class="bg-gray-100 p-3 rounded-2xl relative">
                                <p class="text-[10px] font-black text-blue-600">@${c.userName}</p>
                                <p class="text-[12px] font-bold text-gray-800">${c.text}</p>
                                <button onclick="likeComment('${cid}')" class="absolute -right-2 -bottom-2 bg-white shadow-sm rounded-full p-1.5 text-[10px] ${liked?'text-red-500':'text-gray-300'}">
                                    <i class="fas fa-heart"></i> ${c.likedBy?.length || 0}
                                </button>
                            </div>
                            <button onclick="setReply('${cid}', '${c.userName}')" class="text-[10px] font-black text-gray-400 mt-1 ml-2 uppercase">Reply</button>
                            ${c.replies ? c.replies.map(r => `<div class="reply-box"><p class="text-[9px] font-black text-indigo-500">@${r.userName}</p><p class="text-[11px] font-bold text-gray-700">${r.text}</p></div>`).join('') : ''}
                        </div>
                    </div>`;
                }).join('');
            });
        };

        window.likeComment = async (cid) => {
            const ref = doc(db, "posts", activePostId, "comments", cid);
            const s = await getDoc(ref);
            const liked = s.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.setReply = (id, name) => {
            replyToId = id; document.getElementById('replyTag').classList.remove('hidden');
            document.getElementById('replyName').innerText = name; document.getElementById('cInput').focus();
        };

        window.cancelReply = () => { replyToId = null; document.getElementById('replyTag').classList.add('hidden'); };

        window.postComment = async () => {
            const i = document.getElementById('cInput'); if(!i.value.trim()) return;
            if(replyToId) {
                await updateDoc(doc(db, "posts", activePostId, "comments", replyToId), {
                    replies: arrayUnion({ text: i.value, userName: currentUserData.name, time: Date.now() })
                });
                cancelReply();
            } else {
                await addDoc(collection(db, "posts", activePostId, "comments"), { 
                    text: i.value, userName: currentUserData.name, userPic: currentUserData.profilePic, 
                    time: serverTimestamp(), likedBy: [] 
                });
                await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            }
            i.value = "";
        };

        // 🔗 Share & Others
        window.sharePost = (id) => {
            const link = window.location.origin + "/post_view.html?id=" + id;
            navigator.clipboard.writeText(link);
            Swal.fire({ title: 'লিঙ্ক কপি হয়েছে!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
        };

        window.handleLike = async (id) => {
            const ref = doc(db, "posts", id); const s = await getDoc(ref);
            const liked = s.data().likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        function initObserver() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(v) { e.isIntersecting ? v.play().catch(()=>{}) : v.pause(); }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-container').forEach(el => obs.observe(el));
        }

        function checkNotifications() {
            onSnapshot(query(collection(db, "notifications"), where("targetUserId", "==", user.uid), where("read", "==", false)), s => {
                document.getElementById('notifDot').style.display = s.size > 0 ? "block" : "none";
            });
        }

        function loadStories() {
            onSnapshot(collection(db, "stories"), s => {
                document.getElementById('storyList').innerHTML = s.docs.map(d => `
                    <div class="shrink-0 flex flex-col items-center gap-1">
                        <div class="w-16 h-16 rounded-full border-2 border-pink-500 p-0.5">
                            <img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover border-2 border-white">
                        </div>
                        <span class="text-[9px] font-bold truncate w-16 text-center">${d.data().userName}</span>
                    </div>
                `).join('');
            });
        }

        window.closeAll = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('overlay').style.display = "none"; };
    </script>
</body>
</html>
