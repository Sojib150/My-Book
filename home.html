<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
.header{background:#1877f2;color:white;padding:15px;text-align:center;}
.upload{display:flex;padding:10px;background:white;}
.upload input{flex:1;padding:10px;}
.feed{padding:10px;}
.post{background:white;margin-bottom:10px;padding:10px;border-radius:10px;}
.nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px;}
</style>
</head>

<body>

<div class="header">Home</div>

<div class="upload">
<input id="text" placeholder="Write something...">
<button onclick="postText()">Post</button>
</div>

<div id="feed" class="feed"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="chat.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let currentUser;

onAuthStateChanged(auth,(user)=>{
if(user){currentUser=user.uid;}
else location.href="index.html";
});

// post
window.postText = async function(){
let text = document.getElementById("text").value;
if(!text) return;

let snap = await get(ref(db,"users/"+currentUser));
let u = snap.val();

await push(ref(db,"posts"),{
text:text,
user:u.username,
owner:currentUser,
likes:0,
likedBy:{}
});
}

// show posts
onValue(ref(db,"posts"),snap=>{
let data = snap.val();
let html="";

for(let id in data){
let p=data[id];

html+=`
<div class="post">

<div onclick="openProfile('${p.owner}')">
<b>${p.user}</b>
</div>

<p>${p.text}</p>

<button onclick="likePost('${id}')">❤️ ${p.likes||0}</button>

</div>
`;
}

feed.innerHTML=html;
});

// like fix
window.likePost = async function(id){
let snap = await get(ref(db,"posts/"+id));
let p = snap.val();

let likedBy = p.likedBy || {};

if(likedBy[currentUser]){
delete likedBy[currentUser];
}else{
likedBy[currentUser]=true;
}

update(ref(db,"posts/"+id),{
likedBy:likedBy,
likes:Object.keys(likedBy).length
});
}

// open profile
window.openProfile = function(uid){
localStorage.setItem("viewUser",uid);
location.href="user.html";
}
</script>

</body>
</html>
