<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .post-card { background: white; border-radius: 12px; margin-bottom: 20px; padding: 15px; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 p-4 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">My Book</h1>
            <div class="flex items-center gap-3">
                <a href="profile.html" class="text-sm bg-blue-700 px-3 py-1 rounded-md hover:bg-blue-800">Profile</a>
                <a href="post.html" class="bg-white text-blue-600 px-4 py-1 rounded-full font-bold shadow-sm hover:bg-gray-100">+ Post</a>
                <button id="logoutBtn" class="text-xs bg-red-500 px-2 py-1 rounded hover:bg-red-600 transition">Logout</button>
            </div>
        </div>
    </nav>

    <div id="feed" class="max-w-md mx-auto mt-4 p-2 pb-20">
        <div id="loadingStatus" class="text-center py-10">
            <p class="text-gray-500 animate-pulse">ফিড লোড হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
            authDomain: "seen-a1d92.firebaseapp.com",
            databaseURL: "https://seen-a1d92-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1",
            measurementId: "G-K4W1BWQ53V"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const feedElement = document.getElementById('feed');
        const loadingStatus = document.getElementById('loadingStatus');

        // চেক করা ইউজার লগইন আছে কি না
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // লগইন না থাকলে index.html এ পাঠিয়ে দেবে
                window.location.href = "index.html";
            }
        });

        // লগআউট ফাংশন
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });

        // ডাটাবেস থেকে রিয়েল-টাইম পোস্ট রিড করা
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            feedElement.innerHTML = ""; // আগের কন্টেন্ট ক্লিয়ার করা
            
            if (snapshot.empty) {
                feedElement.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-gray-500">এখনো কোনো পোস্ট নেই!</p>
                        <p class="text-sm text-gray-400">প্রথম পোস্টটি আপনিই করুন।</p>
                    </div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                const postDiv = document.createElement('div');
                postDiv.className = "post-card shadow-sm";

                // মিডিয়া কন্টেন্ট (ছবি বা ভিডিও) চেক করা
                let mediaHTML = "";
                if (post.fileUrl) {
                    if (post.fileType === "video") {
                        mediaHTML = `
                            <div class="mt-3 bg-black rounded-lg overflow-hidden">
                                <video src="${post.fileUrl}" controls class="w-full max-h-96"></video>
                            </div>`;
                    } else {
                        mediaHTML = `
                            <div class="mt-3 rounded-lg overflow-hidden border border-gray-100">
                                <img src="${post.fileUrl}" class="w-full object-cover" alt="Post content">
                            </div>`;
                    }
                }

                // পোস্টের সময় ফরম্যাট করা
                const postDate = post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString('bn-BD') : "এইমাত্র";

                postDiv.innerHTML = `
                    <div class="flex items-center mb-3">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold shadow-inner">
                            ${post.userName ? post.userName[0].toUpperCase() : 'U'}
                        </div>
                        <div class="ml-3">
                            <p class="font-bold text-gray-800 text-sm">${post.userName || "ইউজার"}</p>
                            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">${postDate}</p>
                        </div>
                    </div>
                    <p class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">${post.text || ""}</p>
                    ${mediaHTML}
                    <div class="mt-4 pt-3 border-t flex justify-around text-gray-500 text-xs font-semibold">
                        <button class="flex items-center gap-1 hover:text-blue-600 transition">❤️ Like</button>
                        <button class="flex items-center gap-1 hover:text-blue-600 transition">💬 Comment</button>
                        <button class="flex items-center gap-1 hover:text-blue-600 transition">🔗 Share</button>
                    </div>
                `;
                feedElement.appendChild(postDiv);
            });
        }, (error) => {
            console.error("Error fetching posts: ", error);
            feedElement.innerHTML = "<p class='text-center text-red-500 p-5'>পোস্ট লোড করতে সমস্যা হচ্ছে। ফায়ারবেস রুলস চেক করুন।</p>";
        });
    </script>
</body>
</html>
