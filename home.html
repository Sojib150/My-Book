<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Elite Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fafafa; 
        }
        
        .insta-post { 
            background: white; 
            border-bottom: 8px solid #f4f7fa; 
        }
        
        .video-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 4/5; 
            background: #000; 
            overflow: hidden; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .caption-text {
            font-size: 14.5px;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
        }
        
        .read-more {
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            border-top: 1px solid #efefef; 
            padding: 12px 0; 
            display: flex; 
            justify-content: space-around; 
            z-index: 1000; 
        }
        .nav-icon { font-size: 1.4rem; color: #262626; }

        .drawer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            z-index: 2000; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
        }
        .drawer.active { transform: translateY(0); }
        .overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(4px); 
            display: none; 
            z-index: 1500; 
        }
        
        .reply-box { 
            border-left: 2px solid #6366f1; 
            margin-left: 10px; 
            padding-left: 10px; 
            margin-top: 8px; 
            background: #f8fafc; 
            border-radius: 8px; 
            padding: 5px; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b px-5 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-blue-600">My Book</h1>
        <div class="flex gap-5 items-center">
            <div class="relative cursor-pointer" onclick="location.href='notifications.html'">
                <i class="fa-regular fa-bell text-2xl"></i>
                <span id="notifDot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full hidden border-2 border-white"></span>
            </div>
            <i class="fa-regular fa-paper-plane text-2xl"></i>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <!-- Stories -->
        <div class="bg-white py-4 border-b overflow-x-auto no-scrollbar flex gap-4 px-4">
            <div class="shrink-0 flex flex-col items-center gap-1" onclick="location.href='post.html'">
                <div class="relative w-16 h-16 rounded-full border-2 border-gray-200 p-0.5">
                    <img id="myStoryPic" src="" class="w-full h-full rounded-full object-cover">
                    <div class="absolute bottom-0 right-0 bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white text-[10px]">
                        <i class="fas fa-plus"></i>
                    </div>
                </div>
                <span class="text-[10px] font-bold">Your Story</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="globalAdArea" class="p-2"></div>
        <div id="feed" class="space-y-1"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="location.href='home.html'"></i>
        <i class="fas fa-search nav-icon" onclick="location.href='search.html'"></i>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white -mt-4 shadow-lg shadow-blue-500/30">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-play nav-icon" onclick="location.href='reels.html'"></i>
        <img id="navPic" onclick="location.href='profile.html'" class="w-7 h-7 rounded-full border border-gray-200 object-cover">
    </div>

    <!-- Comment Drawer -->
    <div id="overlay" class="overlay" onclick="closeAll()"></div>
    <div id="commentSheet" class="drawer h-[80vh] flex flex-col p-5">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar"></div>
        
        <div id="replyTag" class="hidden px-4 py-2 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-t-xl flex justify-between">
            <span>Replying to <span id="replyName"></span></span>
            <button onclick="cancelReply()"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex gap-2 pt-4 border-t">
            <input id="cInput" type="text" placeholder="মতামত লিখুন..." 
                   class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none font-bold text-sm">
            <button onclick="postComment()" 
                    class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let currentUserData = null;
        let activePostId = null;
        let replyToId = null;
        let globalCPM = 0.0001;

        function getTimeAgo(ts) {
            if(!ts) return "সদ্য";
            const diff = Math.floor((new Date() - ts.toDate()) / 1000);
            if(diff < 60) return diff + "s ago";
            if(diff < 3600) return Math.floor(diff/60) + "m ago";
            if(diff < 86400) return Math.floor(diff/3600) + "h ago";
            return Math.floor(diff/86400) + "d ago";
        }

        // Improved Caption Renderer with Read More
        function renderCaption(text) {
            if (!text) return '';
            const maxLength = 120;
            if (text.length <= maxLength) {
                return `<p class="caption-text text-gray-800">${text}</p>`;
            }
            return `
                <p class="caption-text text-gray-800" id="caption-full" style="display:none;">${text}</p>
                <p class="caption-text text-gray-800" id="caption-short">
                    ${text.substring(0, maxLength)}...
                    <span class="read-more" onclick="this.parentElement.style.display='none'; this.parentElement.previousElementSibling.style.display='block'"> আরও দেখুন</span>
                </p>
            `;
        }

        onAuthStateChanged(auth, async u => {
            if(u) {
                user = u;
                const s = await getDoc(doc(db, "users", u.uid));
                currentUserData = s.data() || {};
                document.getElementById('navPic').src = currentUserData.profilePic || '';
                document.getElementById('myStoryPic').src = currentUserData.profilePic || '';
                initApp();
            } else {
                location.href = "index.html";
            }
        });

        function initApp() {
            onSnapshot(doc(db, "appSettings", "ads"), s => {
                if(s.exists()) document.getElementById('globalAdArea').innerHTML = s.data().code || '';
            });
            
            onSnapshot(doc(db, "appSettings", "algorithm"), s => {
                if(s.exists()) globalCPM = s.data().trendBoost || 0.0001;
            });

            renderFeed();
            checkNotifications();
            loadStories();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
                feed.innerHTML = snap.docs.map(docSnap => {
                    const p = docSnap.data();
                    const pid = docSnap.id;
                    const isLiked = p.likedBy?.includes(user.uid) || false;

                    return `
                    <div class="insta-post">
                        <div class="flex items-center justify-between p-4">
                            <div class="flex items-center gap-3" onclick="location.href='profile.html?uid=${p.userId}'">
                                <img src="${p.userPic || ''}" class="w-9 h-9 rounded-full object-cover border">
                                <div>
                                    <span class="font-bold text-sm">${p.userName || 'User'}</span>
                                    <span class="text-[10px] text-gray-400 block">${getTimeAgo(p.createdAt)}</span>
                                </div>
                            </div>
                            <i class="fas fa-ellipsis-h text-gray-400"></i>
                        </div>

                        <div class="video-container" onclick="recordView('\( {pid}', ' \){p.userId}', ${p.isCreatorMonetized || false})">
                            ${p.fileType === 'video' ? `
                                <video id="vid-\( {pid}" src=" \){p.fileUrl}" loop muted playsinline></video>
                                <div class="absolute bottom-4 right-4 w-8 h-8 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center text-white">
                                    <i id="icon-${pid}" class="fas fa-volume-mute"></i>
                                </div>
                            ` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>

                        <div class="p-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex gap-6">
                                    <i onclick="handleLike('\( {pid}')" class="fa- \){isLiked ? 'solid text-red-500' : 'regular'} fa-heart text-3xl cursor-pointer active:scale-125 transition"></i>
                                    <i onclick="openComments('${pid}')" class="fa-regular fa-comment text-3xl cursor-pointer"></i>
                                    <i onclick="sharePost('${pid}')" class="fa-regular fa-paper-plane text-3xl cursor-pointer"></i>
                                </div>
                                <div class="flex items-center gap-1 bg-blue-50 text-blue-600 px-3 py-1 rounded-xl text-xs font-bold">
                                    <i class="fas fa-eye"></i>
                                    <span>${p.views || 0}</span>
                                </div>
                            </div>
                            
                            <!-- Improved Caption -->
                            <div class="mb-2">
                                <b class="text-sm">${p.userName || ''}</b>
                                ${renderCaption(p.text || '')}
                            </div>

                            ${p.isCreatorMonetized ? `
                                <div class="mt-3 p-3 bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-2xl text-center text-xs font-bold text-blue-700 tracking-wider">
                                    💰 Sponsored Post
                                </div>` : ''}
                        </div>
                    </div>`;
                }).join('');

                initObserver();
            });
        }

        // Video Toggle
        window.toggleVideo = (id) => {
            const v = document.getElementById(`vid-${id}`);
            const i = document.getElementById(`icon-${id}`);
            if (!v) return;
            if (v.paused) {
                v.play();
                v.muted = false;
                i.className = "fas fa-volume-up";
            } else {
                v.pause();
            }
        };

        // Rest of your functions remain same (recordView, openComments, etc.)
        // ... (আমি বাকি ফাংশনগুলো একই রেখেছি, শুধু Caption অংশ উন্নত করেছি)

        window.recordView = async (pid, cid, isMon) => {
            if(cid === user.uid) return;
            try {
                const ref = doc(db, "posts", pid);
                await updateDoc(ref, { views: increment(1) });
                if(isMon) {
                    await updateDoc(doc(db, "users", cid), { balance: increment(globalCPM) });
                }
            } catch(e) {}
        };

        // অন্যান্য ফাংশন (openComments, postComment, handleLike ইত্যাদি) আপাতত একই রাখলাম
        // চাইলে পরে আরও optimize করবো।

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        entry.isIntersecting ? video.play().catch(()=>{}) : video.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.video-container').forEach(el => obs.observe(el));
        }

        // অন্যান্য ফাংশন (loadStories, checkNotifications, closeAll ইত্যাদি) আপনার আগের কোড থেকে রাখুন
        // যদি লাগে তাহলে বলুন, পুরো স্ক্রিপ্ট আবার দিবো।
    </script>
</body>
</html>
