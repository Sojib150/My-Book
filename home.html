<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<!-- ✅ External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">🔥 My Social</div>

<div class="upload">
<input type="text" id="text" placeholder="Write something...">
<button onclick="postText()">Post</button>
</div>

<div id="feed"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="chat.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let currentUser = null;

// 🔐 Auth check
onAuthStateChanged(auth,(user)=>{
if(user){
currentUser = user.uid;
}else{
alert("Login first");
location.href="login.html";
}
});

// 🔥 POST TEXT
window.postText = async function(){

let text = document.getElementById("text").value;

if(!text){
alert("কিছু লিখো");
return;
}

try{

let snap = await get(ref(db,"users/"+currentUser));
let userData = snap.val();

// ✅ safe username
let username = "User";
if(userData && userData.username){
username = userData.username;
}

await push(ref(db,"posts"),{
text:text,
likes:0,
likedBy:{},
comments:{},
user: username,
owner: currentUser
});

document.getElementById("text").value = "";

}catch(e){
alert("Error: "+e.message);
}

}

// 🔥 SHOW POSTS
onValue(ref(db,"posts"),snap=>{
let data = snap.val();

if(!data){
document.getElementById("feed").innerHTML = "No post yet";
return;
}

let html = "";

for(let id in data){

let post = data[id];

// liked users
let likedNames = "";
if(post.likedBy){
likedNames = Object.values(post.likedBy).join(", ");
}

// comments
let commentsHTML = "";
if(post.comments){
for(let c in post.comments){
commentsHTML += `<div class="comment">${post.comments[c]}</div>`;
}
}

html += `
html += `
<div class="post">

<div class="post-user">${post.user}</div>

<div class="post-text">${post.text || ""}</div>

<div class="actions">
<button onclick="likePost('${id}')">👍 ${post.likes || 0}</button>
<button>💬 Comment</button>
</div>

<div style="font-size:12px;color:#666">${likedNames}</div>

<div class="comment-box">
<input placeholder="Write comment..." id="c_${id}">
<button onclick="addComment('${id}')">Send</button>
</div>

${commentsHTML}

</div>
`;

<div style="font-size:12px;color:#888">${likedNames}</div>

<input placeholder="Comment..." id="c_${id}">
<button onclick="addComment('${id}')">Send</button>

${commentsHTML}

</div>
`;
}

document.getElementById("feed").innerHTML = html;
});

// ❤️ LIKE
window.likePost = async function(postId){

let snap = await get(ref(db,"posts/"+postId));
let post = snap.val();

let likedBy = post.likedBy || {};

let userSnap = await get(ref(db,"users/"+currentUser));
let userData = userSnap.val();

let username = "User";
if(userData && userData.username){
username = userData.username;
}

if(likedBy[currentUser]){
delete likedBy[currentUser];
}else{
likedBy[currentUser] = username;
}

let newCount = Object.keys(likedBy).length;

update(ref(db,"posts/"+postId),{
likedBy: likedBy,
likes: newCount
});

}

// 💬 COMMENT
window.addComment = function(id){
let text = document.getElementById("c_"+id).value;
if(!text) return;

push(ref(db,"posts/"+id+"/comments"),text);

document.getElementById("c_"+id).value = "";
}
</script>

</body>
</html>
