<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Professional Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; -webkit-tap-highlight-color: transparent; }
        
        /* iPhone Pro Style Design */
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .premium-card { background: white; border-radius: 28px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); transition: transform 0.2s; }
        .premium-card:active { transform: scale(0.98); }
        
        /* Dynamic Island Call Popup */
        #incomingCallUI {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 92%; max-width: 400px; background: black; border-radius: 35px;
            padding: 12px 20px; z-index: 2000; transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: space-between;
        }
        #incomingCallUI.active { transform: translateX(-50%) translateY(0); }

        .video-box.active { min-height: 200px; border-radius: 12px; overflow: hidden; }
        video { width: 100%; object-fit: cover; }
        
        /* Drawer Styles */
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .drawer.active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Bottom Nav iPhone Style */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-radius: 32px; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        @keyframes ring { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .call-btn-ring { animation: ring 1.5s infinite; }
    </style>
</head>
<body class="pb-28">

    <div id="incomingCallUI">
        <div class="flex items-center gap-3 overflow-hidden">
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shrink-0">
                <i class="fas fa-phone-alt text-white text-xs"></i>
            </div>
            <div class="min-w-0">
                <h4 id="callerNameDisplay" class="text-white text-[13px] font-bold truncate">Incoming Call...</h4>
                <p class="text-[10px] text-gray-400 font-medium">Accept to join</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="declineCallBtn" class="w-9 h-9 bg-red-500 rounded-full flex items-center justify-center text-white"><i class="fas fa-times text-xs"></i></button>
            <button id="acceptCallBtn" class="w-9 h-9 bg-green-500 rounded-full flex items-center justify-center text-white call-btn-ring"><i class="fas fa-check text-xs"></i></button>
        </div>
    </div>

    <nav class="ios-blur sticky top-0 z-50 px-5 pt-8 pb-4 border-b border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">My Book</h1>
            <div class="flex items-center gap-4">
                <div class="relative" onclick="location.href='notifications.html'">
                    <i class="fa-solid fa-bell text-xl text-gray-700"></i>
                    <div id="notifDot" class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></div>
                </div>
                <img id="navPic" onclick="location.href='profile.html'" src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover cursor-pointer">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="stories" class="flex gap-4 overflow-x-auto no-scrollbar mb-6 py-2">
            <div class="flex flex-col items-center gap-2 shrink-0 cursor-pointer" onclick="location.href='upload-story.html'">
                <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 bg-white">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <span class="text-[10px] font-bold text-gray-500 uppercase">You</span>
            </div>
            <div id="storyList" class="flex gap-4"></div>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 text-gray-400 font-medium">লোডিং হচ্ছে...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="p-3 text-white"><i class="fas fa-house-chimney text-lg"></i></a>
        <a href="search.html" class="p-3 text-gray-500"><i class="fas fa-search text-lg"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition"><i class="fas fa-plus"></i></div>
        <a href="messages.html" class="p-3 text-gray-500"><i class="fas fa-comment-nodes text-lg"></i></a>
        <a href="profile.html" class="p-3 text-gray-500"><i class="fas fa-user text-lg"></i></a>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="deleteDrawer" class="drawer p-8">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg font-bold text-center mb-6">পোস্টটি মুছে ফেলবেন?</h3>
        <div class="flex gap-3">
            <button id="confirmDelBtn" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-2xl">মুছে ফেলুন</button>
            <button onclick="closeAll()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl">বাতিল</button>
        </div>
    </div>

    <div id="commentSheet" class="drawer h-[85vh] flex flex-col p-6">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar"></div>
        
        <div id="replyBox" class="hidden bg-blue-50 p-3 rounded-t-2xl text-[11px] font-bold text-blue-600 flex justify-between">
            <span>Replying to <span id="replyingTo"></span></span>
            <button onclick="cancelReply()"><i class="fa-solid fa-times"></i></button>
        </div>

        <div class="flex gap-2 border-t pt-4">
            <input id="cInput" type="text" placeholder="মন্তব্য করুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-medium">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null; let activePostId = null; let postToDelete = null;

        onAuthStateChanged(auth, u => { 
            if(u){ 
                user=u; 
                renderFeed(); 
                loadProfile(); 
                checkNotif(); 
                loadStories(); 
                listenForCalls(u.uid);
            } else location.href="index.html"; 
        });

        function listenForCalls(myId) {
            onSnapshot(doc(db, "calls", myId), (snap) => {
                const ui = document.getElementById('incomingCallUI');
                if (snap.exists()) {
                    const data = snap.data();
                    ui.classList.add('active');
                    document.getElementById('callerNameDisplay').innerText = data.callerName;

                    document.getElementById('acceptCallBtn').onclick = () => {
                        window.location.href = `call.html?id=${data.callerId}&type=${data.type}`;
                    };

                    document.getElementById('declineCallBtn').onclick = async () => {
                        await deleteDoc(doc(db, "calls", myId));
                        ui.classList.remove('active');
                    };
                } else {
                    ui.classList.remove('active');
                }
            });
        }

        async function renderFeed() {
            const feed = document.getElementById('feed');
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            const globalAd = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)), async snap => {
                feed.innerHTML = "";
                snap.forEach(async docRef => {
                    const p = docRef.data();
                    const id = docRef.id;
                    if(p.isShadowBanned) return;
                    const card = await createPostCard(id, p, globalAd);
                    feed.appendChild(card);
                });
                initIntersection();
            });
        }

        async function createPostCard(id, p, globalAd) {
            const isMine = p.userId === user.uid;
            const hasL = p.likedBy?.includes(user.uid);
            const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{hour:'numeric',minute:'numeric',day:'numeric',month:'short'}) : 'সবেমাত্র';
            
            const card = document.createElement('div');
            card.id = `post-${id}`;
            card.className = "premium-card";
            
            const mediaHtml = p.fileUrl ? `<div class="video-box active">${p.fileType==='video' ? `<video src="${p.fileUrl}" loop muted playsinline class="post-vid" onclick="handleVideo(this)"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ``;

            card.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                        <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border">
                        <div>
                            <div class="font-bold text-[14px] text-gray-900">@${p.userName}</div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${date}</p>
                        </div>
                    </div>
                    ${isMine ? `<button onclick="openDeleteDrawer('${id}')" class="text-gray-300 p-2"><i class="fa-solid fa-trash-can text-sm"></i></button>` : ''}
                </div>
                <p class="px-5 pb-4 text-[14px] text-gray-700 leading-relaxed">${p.text || ''}</p>
                ${mediaHtml}
                <div class="flex justify-around py-3 mt-1">
                    <button onclick="like('${id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl transition ${hasL ? 'text-red-500 bg-red-50':'text-gray-500'}">
                        <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart"></i>
                        <span class="text-[11px] font-bold">${p.likes||0}</span>
                    </button>
                    <button onclick="openComments('${id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl text-gray-500">
                        <i class="fa-regular fa-comment"></i>
                        <span class="text-[11px] font-bold">${p.commentCount||0}</span>
                    </button>
                    <button onclick="sharePost('${id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl text-gray-500">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                    </button>
                </div>
            `;
            return card;
        }

        // --- আপনার বাকি লজিকগুলো এখানে হুবহু থাকবে ---
        window.openComments = (id) => { activePostId = id; document.getElementById('commentSheet').classList.add('active'); document.getElementById('overlay').style.display='block'; loadComments(id); };
        
        async function loadComments(id) {
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("time", "asc")), sn => {
                const list = document.getElementById('commentList'); list.innerHTML = "";
                sn.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `<div class="flex gap-3"><img src="${d.userPic}" class="w-9 h-9 rounded-full object-cover"><div class="flex-1"><div class="bg-gray-100 p-3 rounded-2xl inline-block max-w-[90%]"><p class="text-[11px] font-bold text-blue-600">@${d.userName}</p><p class="text-[13px] text-gray-800">${d.text}</p></div></div></div>`;
                });
            });
        }

        window.postComment = async () => {
            const v = document.getElementById('cInput').value; if(!v) return;
            const u = (await getDoc(doc(db, "users", user.uid))).data();
            await addDoc(collection(db, "posts", activePostId, "comments"), { text: v, userId: user.uid, userName: u.name, userPic: u.profilePic, time: serverTimestamp() });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            document.getElementById('cInput').value = "";
        };

        window.like = async (id) => {
            const ref = doc(db, "posts", id); const d = (await getDoc(ref)).data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likes: increment(hasL?-1:1), likedBy: hasL?arrayRemove(user.uid):arrayUnion(user.uid) });
        };

        window.openDeleteDrawer = (id) => { postToDelete = id; document.getElementById('deleteDrawer').classList.add('active'); document.getElementById('overlay').style.display='block'; };
        document.getElementById('confirmDelBtn').onclick = async () => { if(postToDelete){ await deleteDoc(doc(db, "posts", postToDelete)); closeAll(); } };
        window.closeAll = () => { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('active')); document.getElementById('overlay').style.display='none'; };
        window.handleVideo = (v) => { v.muted = !v.muted; if(v.paused) v.play(); };
        
        async function loadProfile() { const d = await getDoc(doc(db, "users", user.uid)); if(d.exists()) document.getElementById('navPic').src = d.data().profilePic || ""; }
        async function checkNotif() { onSnapshot(query(collection(db, "users", user.uid, "notifications")), snap => { document.getElementById('notifDot').style.display = snap.size > 0 ? 'block' : 'none'; }); }
        async function loadStories() { 
            onSnapshot(collection(db, "stories"), snap => { 
                const sL = document.getElementById('storyList'); sL.innerHTML = ""; 
                snap.forEach(d => { sL.innerHTML += `<div class="flex flex-col items-center gap-1 shrink-0" onclick="location.href='story-view.html?id=${d.id}'"><div class="w-16 h-16 rounded-full p-1 border-2 border-blue-600"><img src="${d.data().userPic}" class="w-full h-full rounded-full object-cover"></div><span class="text-[9px] font-bold text-gray-500">${d.data().userName}</span></div>`; }); 
            }); 
        }
        function initIntersection() { const obs = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.play().catch(() => {}); else e.target.pause(); }); }, { threshold: 0.6 }); document.querySelectorAll('.post-vid').forEach(v => obs.observe(v)); }
        window.sharePost = (id) => navigator.share ? navigator.share({ title: 'My Book', url: window.location.href }) : alert("লিঙ্ক কপি হয়েছে!");
    </script>
</body>
</html>
