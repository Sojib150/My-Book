<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">My Social</div>

<div class="upload">
<input id="text" placeholder="Write something...">
<input type="file" id="file">
<button onclick="createPost()">Post</button>
</div>

<div id="feed"></div>

<div class="nav">
<a href="home.html">🏠</a>
<a href="chat.html">💬</a>
<a href="profile.html">👤</a>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(u)=>{
if(!u) location.href="index.html";
uid=u.uid;
});

// Cloudinary upload
async function uploadFile(file){
let formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", "video_upload");

let res = await fetch("https://api.cloudinary.com/v1_1/dlpwdx288/upload",{
method:"POST",
body:formData
});

let data = await res.json();
return data.secure_url;
}

// post
window.createPost = async function(){

let text = document.getElementById("text").value;
let file = document.getElementById("file").files[0];

let url="";

if(file){
url = await uploadFile(file);
}

let snap = await get(ref(db,"users/"+uid));
let user = snap.val();

push(ref(db,"posts"),{
text:text,
media:url,
type:file ? file.type : "text",
user:user.username,
owner:uid,
likes:0,
likedBy:{}
});
}

// show posts
onValue(ref(db,"posts"),snap=>{
let data = snap.val();
let html="";

for(let id in data){
let p=data[id];

html+=`
<div class="post">

<div class="post-header">
<div class="avatar">${p.user[0]}</div>
<div class="username" onclick="openProfile('${p.owner}')">${p.user}</div>
</div>

<p>${p.text||""}</p>
`;

// media
if(p.media){
if(p.type.includes("image")){
html+=`<img src="${p.media}" width="100%">`;
}else{
html+=`<video src="${p.media}" controls width="100%"></video>`;
}
}

html+=`

<div class="actions">
<button onclick="like('${id}')">❤️ ${p.likes||0}</button>
<button onclick="comment('${id}')">💬</button>
</div>

<div id="c_${id}"></div>

</div>
`;
}

feed.innerHTML=html;
});

// like
window.like = async function(id){
let s=await get(ref(db,"posts/"+id));
let p=s.val();

let l=p.likedBy||{};

if(l[uid]) delete l[uid];
else l[uid]=true;

update(ref(db,"posts/"+id),{
likedBy:l,
likes:Object.keys(l).length
});
}

// comment
window.comment = function(id){
let t=prompt("Comment");
if(!t) return;

push(ref(db,"comments/"+id),{
text:t,
user:uid
});
}

// open profile
window.openProfile=function(id){
localStorage.setItem("viewUser",id);
location.href="user.html";
}
</script>

</body>
</html>
