<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">
    <nav class="bg-blue-600 p-4 sticky top-0 z-50 shadow-lg text-white">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">My Book</h1>
            <a href="messages.html" class="text-xl"><i class="fab fa-facebook-messenger"></i></a>
        </div>
    </nav>

    <div id="postContainer" class="max-w-md mx-auto p-4 space-y-6"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 max-w-md mx-auto z-50">
        <a href="home.html" class="text-blue-600 text-xl"><i class="fas fa-home"></i></a>
        <a href="reels.html" class="text-gray-400 text-xl"><i class="fas fa-play-circle"></i></a>
        <a href="profile.html" class="text-gray-400 text-xl"><i class="fas fa-user"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => {
            if(user) {
                currentUser = user;
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadPosts();
            } else { window.location.href = "index.html"; }
        });

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, snap => {
                const container = document.getElementById('postContainer');
                container.innerHTML = "";
                snap.forEach(postDoc => {
                    const p = postDoc.data();
                    const div = document.createElement('div');
                    div.className = "bg-white rounded-2xl shadow-sm p-4 border border-gray-100";
                    
                    let mediaHtml = "";
                    if(p.fileType === 'video') {
                        // সাউন্ড অফ রেখে অটো-প্লে ফিক্স
                        mediaHtml = `<video src="${p.fileUrl}" loop autoplay muted playsinline class="w-full rounded-xl mt-3"></video>`;
                    } else if(p.fileUrl) {
                        mediaHtml = `<img src="${p.fileUrl}" class="w-full rounded-xl mt-3">`;
                    }

                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <img src="${p.userPic || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-full object-cover border">
                                <div>
                                    <h4 class="font-bold text-sm text-gray-800">${p.userName || 'User'}</h4>
                                    <p class="text-[10px] text-gray-400">Just now</p>
                                </div>
                            </div>
                            <button onclick="window.followUser('${p.userId}')" class="text-blue-600 text-xs font-bold px-4 py-1.5 bg-blue-50 rounded-full active:scale-95 transition">Follow</button>
                        </div>
                        <p class="text-sm text-gray-700 mt-3">${p.text || ''}</p>
                        ${mediaHtml}
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.followUser = async (targetId) => {
            if(!currentUser || currentUser.uid === targetId) return;
            await updateDoc(doc(db, "users", currentUser.uid), { following: arrayUnion(targetId) });
            await updateDoc(doc(db, "users", targetId), { followers: arrayUnion(currentUser.uid) });
            alert("ফলো করা হয়েছে!");
        };

        window.onbeforeunload = () => { if(currentUser) updateDoc(doc(db, "users", currentUser.uid), { status: "offline" }); };
    </script>
</body>
</html>
