<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="profile.html" class="text-gray-600"><i class="fas fa-times text-xl"></i></a>
                <h1 class="font-bold text-gray-800">প্রোফাইল এডিট</h1>
            </div>
            <button id="saveBtn" class="text-blue-600 font-bold text-sm">Save</button>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-6">
        <div class="flex flex-col items-center mb-8">
            <div class="relative group">
                <div id="uAvatar" class="w-24 h-24 bg-blue-500 rounded-full border-4 border-white shadow-lg overflow-hidden flex items-center justify-center text-3xl font-bold text-white">
                    <img id="previewImg" src="" class="w-full h-full object-cover hidden">
                    <span id="initial">?</span>
                </div>
                <label for="fileInput" class="absolute bottom-0 right-0 bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white cursor-pointer shadow-md">
                    <i class="fas fa-camera text-xs"></i>
                </label>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>
            <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest">Change Photo</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Full Name</label>
                <input type="text" id="nameInput" placeholder="আপনার নাম লিখুন" class="w-full bg-white border-none rounded-xl py-3 px-4 mt-1 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none text-sm">
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Bio (Optional)</label>
                <textarea id="bioInput" rows="3" placeholder="নিজের সম্পর্কে কিছু লিখুন..." class="w-full bg-white border-none rounded-xl py-3 px-4 mt-1 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none text-sm"></textarea>
            </div>
        </div>

        <div id="loader" class="hidden mt-6 text-center text-blue-600">
            <i class="fas fa-spinner fa-spin"></i> <span class="text-xs font-bold ml-2">Updating...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUser = null;
        let selectedFile = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('nameInput').value = data.name || "";
                    document.getElementById('bioInput').value = data.bio || "";
                    if (data.profilePic) {
                        showPreview(data.profilePic);
                    } else {
                        document.getElementById('initial').innerText = (data.name || user.email)[0].toUpperCase();
                    }
                }
            } else { window.location.href = "index.html"; }
        });

        // ইমেজ প্রিভিউ লজিক
        document.getElementById('fileInput').onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => showPreview(event.target.result);
                reader.readAsDataURL(selectedFile);
            }
        };

        function showPreview(url) {
            const img = document.getElementById('previewImg');
            img.src = url;
            img.classList.remove('hidden');
            document.getElementById('initial').classList.add('hidden');
        }

        // সেভ লজিক
        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('nameInput').value.trim();
            const bio = document.getElementById('bioInput').value.trim();
            const loader = document.getElementById('loader');

            if (!name) return alert("নাম দিতে হবে!");

            loader.classList.remove('hidden');
            let profilePicUrl = null;

            try {
                // ছবি আপলোড (যদি নতুন ছবি সিলেক্ট করা হয়)
                if (selectedFile) {
                    const sRef = ref(storage, `profiles/${currentUser.uid}`);
                    await uploadBytes(sRef, selectedFile);
                    profilePicUrl = await getDownloadURL(sRef);
                }

                // ডাটাবেজ আপডেট
                const updateData = { name, bio };
                if (profilePicUrl) updateData.profilePic = profilePicUrl;

                await updateDoc(doc(db, "users", currentUser.uid), updateData);
                
                alert("প্রোফাইল আপডেট হয়েছে!");
                window.location.href = "profile.html";
            } catch (err) {
                console.error(err);
                alert("সমস্যা হয়েছে!");
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
