<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Withdraw Funds - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #080c14; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        
        /* Premium Glass & Banking UI Components */
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.04); }
        
        /* Luxury Crypto/Banking Balance Vault Card */
        .vault-asset-card { background: linear-gradient(135deg, #1877f2 0%, #0052cc 60%, #00c6ff 100%); box-shadow: 0 15px 35px rgba(24, 119, 242, 0.15); relative; overflow: hidden; }
        .vault-asset-card::before { content: ''; position: absolute; bottom: -30%; left: -20%; width: 160px; height: 160px; background: rgba(255, 255, 255, 0.08); border-radius: 40px; transform: rotate(25deg); pointer-events: none; }
        
        /* Premium Input Elements */
        .premium-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 18px; padding: 16px; width: 100%; outline: none; transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); color: white; font-weight: 500; }
        .premium-input:focus { border-color: #1877f2; box-shadow: 0 0 0 4px rgba(24, 119, 242, 0.15); background: rgba(15, 23, 42, 0.8); }
        
        /* Standard Selection Option Reset style override */
        select.premium-input option { background: #0f172a; color: #fff; }

        .action-click { transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-click:active { transform: scale(0.95); }
        .action-click:disabled { opacity: 0.4; cursor: not-allowed; transform: scale(1) !important; }
    </style>
</head>
<body class="p-5 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full space-y-6">
        
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3.5">
                <button onclick="location.href='dashboard.html'" class="w-11 h-11 glass-panel rounded-xl flex items-center justify-center text-gray-400 action-click border border-white/5 shadow-sm">
                    <i class="fas fa-chevron-left text-xs"></i>
                </button>
                <h1 class="text-lg font-black tracking-tight italic uppercase text-white">Withdrawal</h1>
            </div>
            <button onclick="location.href='withdraw-history.html'" class="w-11 h-11 glass-panel rounded-xl flex items-center justify-center text-blue-400 action-click border border-white/5 shadow-sm">
                <i class="fa-solid fa-clock-rotate-left text-sm"></i>
            </button>
        </div>

        <div class="glass-panel p-6 rounded-[2.2rem] shadow-2xl relative overflow-hidden">
            
            <div class="vault-asset-card p-6 rounded-3xl mb-6 relative overflow-hidden">
                <p class="text-[9px] font-black text-white/70 uppercase tracking-[0.2em] mb-1">Available for Payout</p>
                <h2 id="currentBalance" class="text-3xl font-black text-white tracking-tight font-mono">৳0.0000</h2>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 block mb-1.5">Gateway Method</label>
                    <select id="method" class="premium-input text-xs" onchange="toggleMethod()">
                        <option value="bKash">bKash (Personal Mobile Banking)</option>
                        <option value="Nagad">Nagad (Personal Mobile Banking)</option>
                        <option value="Binance">Binance (Crypto USDT - TRC20)</option>
                    </select>
                </div>
                
                <div>
                    <label id="accountLabel" class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 block mb-1.5">Account Number</label>
                    <input type="number" id="number" class="premium-input text-xs font-mono" placeholder="01XXXXXXXXX">
                </div>

                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1 block mb-1.5">Amount to Liquidate (৳)</label>
                    <input type="number" id="amount" class="premium-input text-xs font-mono" placeholder="Minimum 20 BDT">
                </div>

                <div class="pt-3">
                    <button id="withdrawBtn" onclick="submitRequest()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-black uppercase text-xs tracking-[2px] shadow-lg shadow-blue-500/20 action-click">
                        Confirm Secure Payout
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center text-[9px] text-gray-600 font-extrabold uppercase tracking-[0.15em]">Processing pipeline timeline: 1-12 Hours Maximum</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, increment, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        // Listen for user state mutations and update the balance pool interface live
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        userBalance = snap.data().balance || 0;
                        // Synchronous live string compilation matching precision micro-fractions
                        document.getElementById('currentBalance').innerText = "৳" + (userBalance < 0.0001 && userBalance > 0 ? userBalance.toFixed(6) : userBalance.toFixed(4));
                    }
                });
            } else { window.location.href = "login.html"; }
        });

        // Toggle context based inputs dynamically to reflect active financial network channels
        window.toggleMethod = () => {
            const method = document.getElementById('method').value;
            const label = document.getElementById('accountLabel');
            const input = document.getElementById('number');
            
            if(method === "Binance") {
                label.innerText = "USDT TRC20 Crypto Wallet Address";
                input.placeholder = "Example: T9yDxP... (TRC20 Network Address Only)";
                input.type = "text";
            } else {
                label.innerText = "Account Number";
                input.placeholder = "01XXXXXXXXX";
                input.type = "number";
            }
        };

        // Transaction process payload core dispatch routine
        window.submitRequest = async () => {
            const amount = parseFloat(document.getElementById('amount').value);
            const method = document.getElementById('method').value;
            const number = document.getElementById('number').value;
            const btn = document.getElementById('withdrawBtn');

            // Client Validation Filters
            if (!amount || amount < 20) return Swal.fire("Error", "কমপক্ষে ২০ টাকা উইথড্র করুন", "error");
            if (number.length < 8) return Swal.fire("Error", "সঠিক অ্যাকাউন্ট বা অ্যাড্রেস দিন", "error");
            if (amount > userBalance) return Swal.fire("Error", "পর্যাপ্ত ব্যালেন্স নেই!", "error");

            btn.disabled = true;
            btn.innerText = "SENDING REQUEST...";

            try {
                // ১. Save transactional manifest data logs to the parent cloud infrastructure
                await addDoc(collection(db, "withdrawRequests"), {
                    uid: auth.currentUser.uid,
                    amount: amount,
                    method: method,
                    accountDetails: number,
                    status: "Pending",
                    timestamp: serverTimestamp()
                });

                // ২. Core operational atomic sequence execution block to deduct raw capital from user profile safely
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balance: increment(-amount)
                });

                Swal.fire({
                    title: "সফল!",
                    text: "আপনার পেমেন্ট রিকোয়েস্টটি পেন্ডিং অবস্থায় আছে।",
                    icon: "success",
                    confirmButtonColor: "#1877f2"
                }).then(() => {
                    location.href = "dashboard.html";
                });

            } catch (e) {
                Swal.fire("Error", "ব্যর্থ হয়েছে! আবার চেষ্টা করুন।", "error");
                btn.disabled = false;
                btn.innerText = "Confirm Secure Payout";
            }
        };
    </script>
</body>
</html>
