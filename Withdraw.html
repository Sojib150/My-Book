<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px; width: 100%; outline: none; transition: 0.3s; color: white; }
        .input-box:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-pay { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full space-y-8">
        <div class="flex items-center gap-4">
            <button onclick="location.href='dashboard.html'" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-400">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h1 class="text-xl font-black italic uppercase">Withdrawal</h1>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="mb-8">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Available for Payout</p>
                <h2 id="currentBalance" class="text-3xl font-black text-indigo-400 tracking-tighter">৳0.0000</h2>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 block mb-2">Method</label>
                    <select id="method" class="input-box">
                        <option value="bKash">bKash (Personal)</option>
                        <option value="Nagad">Nagad (Personal)</option>
                    </select>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 block mb-2">Account Number</label>
                    <input type="number" id="number" class="input-box" placeholder="017XXXXXXXX">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 block mb-2">Amount (৳)</label>
                    <input type="number" id="amount" class="input-box" placeholder="Minimum 20">
                </div>

                <div class="pt-4">
                    <button id="withdrawBtn" onclick="submitRequest()" class="btn-pay w-full py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-[3px] shadow-xl shadow-indigo-500/20">
                        Confirm Payout
                    </button>
                </div>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-slate-600 font-bold uppercase tracking-widest">Processing time: 1-12 Hours</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userBalance = 0;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userBalance = snap.data().balance || 0;
                    document.getElementById('currentBalance').innerText = "৳" + userBalance.toFixed(4);
                }
            } else { window.location.href = "login.html"; }
        });

        window.submitRequest = async () => {
            const amount = parseFloat(document.getElementById('amount').value);
            const method = document.getElementById('method').value;
            const number = document.getElementById('number').value;
            const btn = document.getElementById('withdrawBtn');

            if (!amount || amount < 20) return Swal.fire("Error", "কমপক্ষে ২০ টাকা উইথড্র করুন", "error");
            if (number.length < 11) return Swal.fire("Error", "সঠিক নাম্বার দিন", "error");
            if (amount > userBalance) return Swal.fire("Error", "পর্যাপ্ত ব্যালেন্স নেই!", "error");

            btn.disabled = true;
            btn.innerText = "SENDING REQUEST...";

            try {
                // ১. উইথড্র রিকোয়েস্ট তৈরি
                await addDoc(collection(db, "withdrawRequests"), {
                    uid: auth.currentUser.uid,
                    amount: amount,
                    method: method,
                    number: number,
                    status: "Pending",
                    timestamp: serverTimestamp()
                });

                // ২. ইউজারের ব্যালেন্স থেকে টাকা কেটে নেওয়া
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balance: increment(-amount)
                });

                Swal.fire("Success", "রিকোয়েস্ট পাঠানো হয়েছে!", "success").then(() => {
                    location.href = "dashboard.html";
                });
            } catch (e) {
                Swal.fire("Error", e.message, "error");
                btn.disabled = false;
                btn.innerText = "Confirm Payout";
            }
        };
    </script>
</body>
</html>
