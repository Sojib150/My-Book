<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Earnings - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        input { background: #0f172a !important; color: white !important; border: 1px solid #1e293b !important; border-radius: 16px; padding: 14px; outline: none; transition: 0.3s; width: 100%; text-align: center; font-size: 1.5rem; font-weight: 800; }
        .withdraw-btn { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.3); }
        .withdraw-btn:disabled { background: #1e293b; opacity: 0.5; box-shadow: none; }
        .method-card { border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 flex items-center gap-4">
        <button onclick="window.location.href='dashboard.html'" class="w-10 h-10 glass rounded-xl flex items-center justify-center">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1 class="text-xl font-black tracking-tight uppercase">Withdraw</h1>
    </header>

    <main class="px-6 space-y-6">
        <div class="glass p-10 rounded-[3rem] text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-green-500/10 rounded-full blur-3xl"></div>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2">Available for Payout</p>
            <h2 class="text-5xl font-black tracking-tighter text-green-400">৳<span id="currentBal">0.00</span></h2>
        </div>

        <div id="methodBox" class="method-card p-6 rounded-[2rem] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div id="methodIcon" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fas fa-university"></i>
                </div>
                <div>
                    <p id="methodName" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Method Not Set</p>
                    <p id="methodNum" class="font-bold text-sm">Please update profile</p>
                </div>
            </div>
            <button onclick="window.location.href='edit-profile.html'" class="text-xs font-black text-indigo-400 uppercase tracking-widest">Change</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] space-y-6">
            <div>
                <label class="block text-center text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Enter Amount to Withdraw</label>
                <input type="number" id="withdrawAmt" placeholder="0.00">
                <p class="text-center text-[9px] text-slate-600 mt-3 font-bold uppercase tracking-widest italic">Minimum Withdraw: ৳10.00</p>
            </div>

            <button id="reqBtn" class="withdraw-btn w-full py-5 rounded-2xl font-black tracking-widest uppercase">
                Submit Request
            </button>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">Recent Requests</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center text-xs text-slate-700 py-4">No recent history</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, addDoc, collection, serverTimestamp, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let uData = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ১. ইউজারের কারেন্ট ডাটা এবং ব্যালেন্স লোড
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    if (d.exists()) {
                        uData = d.data();
                        document.getElementById('currentBal').innerText = (uData.balance || 0).toFixed(2);
                        
                        // পেমেন্ট মেথড চেক
                        if(uData.paymentNumber) {
                            document.getElementById('methodName').innerText = uData.paymentMethod;
                            document.getElementById('methodNum').innerText = uData.paymentNumber;
                            document.getElementById('methodIcon').innerHTML = `<i class="fas fa-mobile-alt text-green-400"></i>`;
                        }
                    }
                });

                // ২. হিস্ট্রি লোড (ঐচ্ছিক)
            } else {
                window.location.href = "login.html";
            }
        });

        // ৩. উইথড্র রিকোয়েস্ট লজিক
        document.getElementById('reqBtn').onclick = async () => {
            const amt = parseFloat(document.getElementById('withdrawAmt').value);
            const btn = document.getElementById('reqBtn');

            // ভ্যালিডেশন
            if(!uData.paymentNumber) return alert("প্রথমে প্রোফাইল থেকে পেমেন্ট নাম্বার সেট করুন!");
            if(isNaN(amt) || amt < 10) return alert("সর্বনিম্ন ১০ টাকা উইথড্র করা যাবে!");
            if(amt > uData.balance) return alert("আপনার ব্যালেন্স যথেষ্ট নয়!");

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                // ডাটাবেসে রিকোয়েস্ট পাঠানো (এটি Bondo AI এডমিন প্যানেলে জমা হবে)
                await addDoc(collection(db, "withdrawRequests"), {
                    uid: auth.currentUser.uid,
                    userName: uData.name,
                    amount: amt,
                    method: uData.paymentMethod,
                    number: uData.paymentNumber,
                    status: "Pending",
                    requestedAt: serverTimestamp()
                });

                // ইউজারের মেইন ব্যালেন্স থেকে টাকা কেটে নেওয়া
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balance: increment(-amt)
                });

                alert("রিকোয়েস্ট সফল হয়েছে! অ্যাডমিন চেক করে টাকা পাঠিয়ে দেবে।");
                document.getElementById('withdrawAmt').value = "";
                
            } catch (e) {
                alert("ত্রুটি: " + e.message);
            }
            btn.innerText = "SUBMIT REQUEST";
            btn.disabled = false;
        };
    </script>
</body>
</html>
