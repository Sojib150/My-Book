<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Users - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 p-3 shadow-sm">
        <div class="max-w-md mx-auto flex items-center gap-3">
            <a href="home.html" class="text-blue-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-50">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="বন্ধুদের খুঁজুন..." class="w-full bg-gray-100 border-none rounded-full py-2 px-10 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-xs"></i>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <h2 id="resultStatus" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">পরামর্শ</h2>
        <div id="userList" class="space-y-4">
            </div>
        
        <div id="noResult" class="hidden text-center py-20">
            <i class="fas fa-user-slash text-4xl text-gray-200 mb-3"></i>
            <p class="text-gray-400 text-sm">এই নামে কাউকেও পাওয়া যায়নি!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const searchInput = document.getElementById('searchInput');
        const userList = document.getElementById('userList');
        const noResult = document.getElementById('noResult');
        const status = document.getElementById('resultStatus');

        // সব ইউজারদের ডাটা লোড করা (প্রাথমিক অবস্থায়)
        async function fetchAllUsers() {
            const querySnapshot = await getDocs(collection(db, "users"));
            displayUsers(querySnapshot);
        }

        function displayUsers(snapshot) {
            userList.innerHTML = "";
            if (snapshot.empty) {
                noResult.classList.remove('hidden');
                status.innerText = "";
            } else {
                noResult.classList.add('hidden');
                snapshot.forEach((doc) => {
                    const user = doc.data();
                    const userId = doc.id;
                    
                    const userCard = document.createElement('a');
                    userCard.href = `user.html?id=${userId}`;
                    userCard.className = "flex items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-gray-100 active:scale-95 transition";
                    userCard.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold overflow-hidden">
                                ${user.profilePic ? `<img src="${user.profilePic}" class="w-full h-full object-cover">` : user.name ? user.name[0].toUpperCase() : 'U'}
                            </div>
                            <div>
                                <p class="font-bold text-gray-800 text-sm">${user.name || 'User'}</p>
                                <p class="text-[10px] text-gray-400 italic">View Profile</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300 text-xs mr-2"></i>
                    `;
                    userList.appendChild(userCard);
                });
            }
        }

        // সার্চ ফাংশন
        searchInput.oninput = async (e) => {
            const val = e.target.value.trim();
            status.innerText = val ? "অনুসন্ধান ফলাফল" : "পরামর্শ";
            
            if (val.length > 0) {
                // নামের প্রথম অক্ষর বড় হাতের হতে পারে তাই সার্চ লজিক
                const q = query(collection(db, "users"), 
                    where("name", ">=", val), 
                    where("name", "<=", val + '\uf8ff')
                );
                const snap = await getDocs(q);
                displayUsers(snap);
            } else {
                fetchAllUsers();
            }
        };

        fetchAllUsers();
    </script>
</body>
</html>
