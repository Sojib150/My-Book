<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .input-box { background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .input-box:focus-within { border-color: #4f46e5; background: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="profile.html" class="text-gray-400 hover:text-gray-600 transition"><i class="fas fa-times text-xl"></i></a>
                <h1 class="font-black text-gray-800 text-sm uppercase tracking-tighter">এডিট প্রোফাইল</h1>
            </div>
            <button id="saveBtn" class="bg-indigo-600 text-white px-5 py-1.5 rounded-full font-bold text-xs shadow-md active:scale-90 transition">Save</button>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-6">
        <div class="relative mb-20">
            <div class="h-32 w-full bg-indigo-100 rounded-2xl overflow-hidden relative group">
                <img id="coverPreview" src="" class="w-full h-full object-cover hidden">
                <label for="coverInput" class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 group-hover:opacity-100 transition cursor-pointer">
                    <i class="fas fa-camera text-white"></i>
                </label>
                <input type="file" id="coverInput" class="hidden" accept="image/*">
            </div>

            <div class="absolute -bottom-12 left-6">
                <div class="relative group">
                    <div id="avatarWrap" class="w-24 h-24 bg-indigo-500 rounded-full border-4 border-white shadow-lg overflow-hidden flex items-center justify-center text-3xl font-bold text-white">
                        <img id="profilePreview" src="" class="w-full h-full object-cover hidden">
                        <span id="initialText">?</span>
                    </div>
                    <label for="profileInput" class="absolute bottom-0 right-0 bg-gray-900 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white cursor-pointer shadow-md">
                        <i class="fas fa-pencil-alt text-[10px]"></i>
                    </label>
                    <input type="file" id="profileInput" class="hidden" accept="image/*">
                </div>
            </div>
        </div>

        <div class="space-y-6 pt-4">
            <div class="input-box p-4 rounded-2xl">
                <label class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Full Name</label>
                <input type="text" id="nameInput" placeholder="আপনার নাম লিখুন" class="w-full bg-transparent border-none outline-none text-sm font-bold text-gray-800 mt-1">
            </div>

            <div class="input-box p-4 rounded-2xl">
                <label class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Bio / Description</label>
                <textarea id="bioInput" rows="3" placeholder="নিজের সম্পর্কে কিছু লিখুন..." class="w-full bg-transparent border-none outline-none text-sm font-medium text-gray-600 mt-1 resize-none"></textarea>
            </div>
        </div>

        <div id="loader" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="text-[10px] font-bold text-indigo-600 mt-2 uppercase tracking-widest">Updating Database...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUser = null;
        let pFile = null; let cFile = null;

        onAuthStateChanged(auth, async user => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('nameInput').value = d.name || "";
                    document.getElementById('bioInput').value = d.bio || "";
                    if (d.profilePic) {
                        document.getElementById('profilePreview').src = d.profilePic;
                        document.getElementById('profilePreview').classList.remove('hidden');
                        document.getElementById('initialText').classList.add('hidden');
                    }
                    if (d.coverPic) {
                        document.getElementById('coverPreview').src = d.coverPic;
                        document.getElementById('coverPreview').classList.remove('hidden');
                    }
                }
            } else { window.location.href = "index.html"; }
        });

        // Image Previews
        document.getElementById('profileInput').onchange = e => {
            pFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                document.getElementById('profilePreview').src = ev.target.result;
                document.getElementById('profilePreview').classList.remove('hidden');
                document.getElementById('initialText').classList.add('hidden');
            };
            reader.readAsDataURL(pFile);
        };

        document.getElementById('coverInput').onchange = e => {
            cFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev => {
                document.getElementById('coverPreview').src = ev.target.result;
                document.getElementById('coverPreview').classList.remove('hidden');
            };
            reader.readAsDataURL(cFile);
        };

        // Update Logic
        document.getElementById('saveBtn').onclick = async () => {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                let upData = {
                    name: document.getElementById('nameInput').value.trim(),
                    bio: document.getElementById('bioInput').value.trim()
                };

                if (pFile) {
                    const sRef = ref(storage, `profiles/${currentUser.uid}`);
                    await uploadBytes(sRef, pFile);
                    upData.profilePic = await getDownloadURL(sRef);
                }
                if (cFile) {
                    const sRef = ref(storage, `covers/${currentUser.uid}`);
                    await uploadBytes(sRef, cFile);
                    upData.coverPic = await getDownloadURL(sRef);
                }

                await updateDoc(doc(db, "users", currentUser.uid), upData);
                window.location.href = "profile.html";
            } catch (err) {
                console.error(err);
                alert("Error updating profile!");
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
