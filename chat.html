<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Chat - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* Glassmorphism Header */
        .chat-blur { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        /* Message Bubbles - More Premium */
        .msg-me { 
            background: linear-gradient(135deg, #4f46e5, #6366f1); 
            color: white; 
            border-radius: 20px 20px 4px 20px; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); 
        }
        .msg-them { 
            background: white; 
            color: #1f2937; 
            border-radius: 20px 20px 20px 4px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); 
            border: 1px solid #f1f5f9;
        }
        
        /* Smooth Scroll & Scrollbar Hide */
        #chatBox {
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Floating Input Area */
        .input-wrapper { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 92%; 
            max-width: 500px; 
            z-index: 1000; 
        }
        .input-area { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            border: 1px solid rgba(0,0,0,0.03); 
            padding: 6px;
        }
        
        /* Emoji Panel - Optimized */
        #emojiPanel { 
            position: absolute; 
            bottom: 80px; 
            left: 0; 
            right: 0; 
            background: white; 
            border-radius: 24px; 
            padding: 15px; 
            display: none; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 12px; 
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            border: 1px solid #eee; 
        }
        #emojiPanel span { font-size: 22px; cursor: pointer; text-align: center; transition: 0.2s; }
        #emojiPanel span:hover { transform: scale(1.2); }

        .pulse-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <nav class="chat-blur sticky top-0 z-50 p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="messages.html" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full transition active:scale-90"><i class="fas fa-chevron-left text-lg"></i></a>
            <div class="relative">
                <div id="uAvatar" class="w-11 h-11 bg-indigo-100 rounded-2xl overflow-hidden border-2 border-white shadow-sm flex items-center justify-center font-bold text-indigo-500 text-sm">?</div>
                <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div>
                <h2 id="uName" class="font-bold text-[14px] text-gray-900 tracking-tight leading-tight uppercase">Loading...</h2>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                    <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active Now</p>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="startCall('audio')" class="pulse-btn w-9 h-9 bg-gray-50 hover:bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 transition"><i class="fas fa-phone-alt text-xs"></i></button>
            <button onclick="startCall('video')" class="pulse-btn w-9 h-9 bg-indigo-50 hover:bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 transition"><i class="fas fa-video text-xs"></i></button>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto px-5 pt-6 pb-40 no-scrollbar">
        </div>

    <div id="typingArea" class="fixed bottom-24 left-6 hidden z-40">
        <div class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border border-gray-100">
            <p class="text-[10px] font-bold text-indigo-500 italic flex items-center gap-2">
                <span class="flex gap-1"><span class="w-1 h-1 bg-indigo-400 rounded-full animate-bounce"></span><span class="w-1 h-1 bg-indigo-400 rounded-full animate-bounce delay-100"></span><span class="w-1 h-1 bg-indigo-400 rounded-full animate-bounce delay-200"></span></span>
                Someone is typing...
            </p>
        </div>
    </div>

    <div class="input-wrapper">
        <div id="emojiPanel" class="no-scrollbar">
            <span>🥰</span><span>😍</span><span>😂</span><span>🤣</span><span>😊</span><span>😎</span><span>❤️</span>
            <span>🔥</span><span>✨</span><span>👍</span><span>🙏</span><span>😭</span><span>😘</span><span>🥺</span>
            <span>💯</span><span>🙌</span><span>🤩</span><span>🤔</span><span>😏</span><span>👀</span><span>🌹</span>
            </div>

        <div class="flex items-center gap-1 input-area">
            <button onclick="toggleEmojis()" class="w-11 h-11 rounded-full flex items-center justify-center text-gray-400 hover:text-indigo-600 transition">
                <i class="fa-regular fa-face-smile text-xl"></i>
            </button>
            
            <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off"
                class="flex-1 bg-transparent border-none py-3 px-2 text-[15px] font-medium focus:ring-0 outline-none text-gray-800 placeholder-gray-400">
            
            <button id="sendBtn" class="w-11 h-11 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-indigo-200 active:scale-90 transition">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let myId = null;
        let myName = "User";

        onAuthStateChanged(auth, async user => {
            if(user) { 
                myId = user.uid; 
                const mySnap = await getDoc(doc(db, "users", myId));
                if(mySnap.exists()) myName = mySnap.data().name || "User";
                initChat(); 
            } else window.location.href = "index.html";
        });

        window.toggleEmojis = () => {
            const panel = document.getElementById('emojiPanel');
            panel.style.display = panel.style.display === 'grid' ? 'none' : 'grid';
        };

        document.querySelectorAll('#emojiPanel span').forEach(emoji => {
            emoji.onclick = () => {
                document.getElementById('msgInput').value += emoji.innerText;
                document.getElementById('msgInput').focus();
            };
        });

        window.startCall = async (type) => {
            if(!myId || !targetId) return;
            await setDoc(doc(db, "calls", targetId), {
                callerId: myId,
                callerName: myName,
                status: "ringing",
                type: type,
                timestamp: Date.now()
            });
            window.location.href = `call.html?id=${targetId}&type=${type}&action=calling`;
        };

        async function initChat() {
            const uSnap = await getDoc(doc(db, "users", targetId));
            if(uSnap.exists()) {
                const u = uSnap.data();
                document.getElementById('uName').innerText = u.name || "User";
                if(u.profilePic) document.getElementById('uAvatar').innerHTML = `<img src="${u.profilePic}" class="w-full h-full object-cover">`;
            }

            const chatID = [myId, targetId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === myId;
                    const div = document.createElement('div');
                    div.className = `flex w-full mb-1 ${isMe ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = `
                        <div class="${isMe ? 'msg-me' : 'msg-them'} px-4 py-2.5 max-w-[75%] text-[14px] font-medium leading-normal shadow-sm">
                            ${m.text}
                        </div>`;
                    box.appendChild(div);
                });
                // অটো স্ক্রল টু বটম
                setTimeout(() => {
                    box.scrollTop = box.scrollHeight;
                }, 100);
            });
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            const chatID = [myId, targetId].sort().join("_");
            input.value = "";
            document.getElementById('emojiPanel').style.display = 'none';

            await addDoc(collection(db, "chats", chatID, "messages"), {
                senderId: myId,
                text: text,
                timestamp: serverTimestamp()
            });

            await setDoc(doc(db, "chats", chatID), {
                lastMessage: text,
                lastMessageTimestamp: Date.now(),
                users: [myId, targetId]
            }, { merge: true });
        }
    </script>
</body>
</html>
