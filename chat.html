<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session - Bondo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050508; color: #e2e8f0; }
        .glass { background: rgba(11, 15, 25, 0.75); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .msg-inbound { background: rgba(255,255,255,0.04); border-radius: 18px 18px 18px 4px; border: 1px solid rgba(255,255,255,0.02); }
        .msg-outbound { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="h-screen flex flex-col justify-between bg-[#050508] overflow-hidden">

    <header class="glass px-4 py-3 border-b border-white/5 flex justify-between items-center z-50">
        <div class="flex items-center gap-3 truncate max-w-[60%]">
            <button onclick="location.href='messages.html'" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left text-xs"></i></button>
            <img id="targetPic" src="https://via.placeholder.com/100" class="w-9 h-9 rounded-xl object-cover border border-white/10 bg-black">
            <div class="truncate">
                <h2 id="targetName" class="font-black text-xs text-white truncate">Loading User...</h2>
                <p id="targetStatus" class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Secure Node</p>
            </div>
        </div>
        
        <div class="flex gap-2">
            <button onclick="initiateCall('audio')" class="w-9 h-9 bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white rounded-xl flex items-center justify-center transition border border-emerald-500/10"><i class="fas fa-phone text-xs"></i></button>
            <button onclick="initiateCall('video')" class="w-9 h-9 bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white rounded-xl flex items-center justify-center transition border border-indigo-500/10"><i class="fas fa-video text-xs"></i></button>
        </div>
    </header>

    <main id="chatStream" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col">
        </main>

    <footer class="p-3 bg-[#050508] border-t border-white/5">
        <div class="flex items-center gap-2 max-w-md mx-auto relative">
            <input type="text" id="msgInput" placeholder="Type encrypted message node..." class="w-full bg-black/50 text-xs text-white border border-white/5 rounded-2xl pl-4 pr-12 py-3.5 outline-none focus:border-indigo-500 transition">
            <button id="sendBtn" class="absolute right-2 top-2 w-9 h-9 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl flex items-center justify-center transition active:scale-95"><i class="fas fa-paper-plane text-xs"></i></button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('roomId');
        const targetId = urlParams.get('targetId');
        let currentUserId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                if (!roomId && targetId) { roomId = generateRoomId(currentUserId, targetId); }
                loadTargetProfile();
                listenMessages();
                clearUnreadCounter();
            } else {
                window.location.href = "login.html";
            }
        });

        function generateRoomId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        async function loadTargetProfile() {
            const d = await getDoc(doc(db, "users", targetId));
            if(d.exists()) {
                document.getElementById('targetName').innerText = d.data().name || "Creator";
                document.getElementById('targetPic').src = d.data().profilePic || "https://via.placeholder.com/100";
                document.getElementById('targetStatus').innerText = d.data().isVerified ? "Verified Elite" : "Active Node";
            }
        }

        async function clearUnreadCounter() {
            if(roomId) { await setDoc(doc(db, "chats", roomId), { unreadCount: 0 }, { merge: true }); }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            input.value = "";

            const msgData = {
                senderId: currentUserId,
                text: text,
                timestamp: serverTimestamp()
            };

            // মেসেজ সাব-কলেকেশনে অ্যাড হচ্ছে
            await addDoc(collection(db, "chats", roomId, "messages"), msgData);

            // মেইন চ্যাট ডক আপডেট (ইনবক্স ট্র্যাকিংয়ের জন্য)
            await setDoc(doc(db, "chats", roomId), {
                participants: [currentUserId, targetId],
                lastMessage: text,
                lastMessageTime: serverTimestamp(),
                lastSenderId: currentUserId,
                unreadCount: 1 
            }, { merge: true });
        }

        function listenMessages() {
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const stream = document.getElementById('chatStream');
                stream.innerHTML = "";
                
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const wrapper = document.createElement('div');
                    wrapper.className = `max-w-[75%] p-3.5 my-1 text-xs font-semibold ${m.senderId === currentUserId ? 'msg-outbound text-white self-end' : 'msg-inbound text-gray-200 self-start'}`;
                    wrapper.innerText = m.text;
                    stream.appendChild(wrapper);
                });
                stream.scrollTop = stream.scrollHeight;
            });
        }

        // 📞 আউটগোয়িং কল ট্রিগার লজিক (যা call.html ওপেন করবে)
        window.initiateCall = async (type) => {
            const callId = currentUserId + "_" + Date.now(); // ইউনিক কল আইডি
            
            // ফায়ারবেসে একটি ইনকামিং কল নোড তৈরি করা হচ্ছে
            await setDoc(doc(db, "calls", callId), {
                callerId: currentUserId,
                callerName: auth.currentUser.displayName || "Bondo User",
                receiverId: targetId,
                type: type, // 'audio' বা 'video'
                status: "ringing",
                createdAt: serverTimestamp()
            });

            // কল স্ক্রিনে ডাটা পাস করে রিডাইরেক্ট করা হচ্ছে
            window.location.href = `call.html?callId=${callId}&type=${type}&role=caller&targetId=${targetId}`;
        };
    </script>
</body>
</html>
