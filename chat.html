<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{margin:0;font-family:Arial;background:#ece5dd;}
.header{background:#075e54;color:white;padding:15px;text-align:center;}
.chatBox{height:70vh;overflow:auto;padding:10px;}
.msg{
  background:white;
  padding:8px;
  margin:5px;
  border-radius:10px;
  width:fit-content;
}
.me{
  background:#dcf8c6;
  margin-left:auto;
}
.sendBox{
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
}
input{flex:1;padding:10px;border:none;}
button{padding:10px;border:none;background:#25d366;color:white;}
</style>
</head>

<body>

<div class="header">💬 Chat</div>

<div class="chatBox" id="chat"></div>

<div class="sendBox">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;
let friend = localStorage.getItem("chatUser");

// unique chat id
function getChatId(a,b){
return a<b ? a+"_"+b : b+"_"+a;
}

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
loadChat();
}else{
location.href="index.html";
}
});

// send
window.send = function(){
let text = document.getElementById("msg").value;
if(!text) return;

let chatId = getChatId(uid,friend);

push(ref(db,"messages/"+chatId),{
text:text,
sender:uid,
time:Date.now()
});

document.getElementById("msg").value="";
}

// load
function loadChat(){

let chatId = getChatId(uid,friend);

onValue(ref(db,"messages/"+chatId),snap=>{

let data = snap.val();
let html="";

for(let id in data){

let m = data[id];

html+=`
<div class="msg ${m.sender===uid?'me':''}">
${m.text}
</div>
`;

}

document.getElementById("chat").innerHTML = html;

});
}
</script>

</body>
</html>
