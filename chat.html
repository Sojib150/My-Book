<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Chat</div>

<div id="friends"></div>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;
let currentChat=null;

onAuthStateChanged(auth,(u)=>{
uid=u.uid;

// friends list
onValue(ref(db,"friends/"+uid),snap=>{
let d=snap.val();
let html="";

for(let f in d){
html+=`<div onclick="openChat('${f}')">${f}</div>`;
}

friends.innerHTML=html;
});
});

window.openChat=function(f){
currentChat=f;

onValue(ref(db,"chats/"+uid+"_"+f),snap=>{
let d=snap.val();
let html="";

for(let i in d){
let m=d[i];
html+=`<div>${m.text}</div>`;
}

chat.innerHTML=html;
});
}

window.send=function(){
push(ref(db,"chats/"+uid+"_"+currentChat),{
from:uid,
text:msg.value
});
}
</script>

</body>
</html>
