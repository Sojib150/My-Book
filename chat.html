<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Chat - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .chat-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .msg-me { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border-radius: 20px 20px 4px 20px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .msg-them { background: white; color: #1f2937; border-radius: 20px 20px 20px 4px; border: 1px solid #f1f5f9; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .input-wrapper { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; z-index: 1000; }
        .input-area { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 6px; }
        
        /* 3-Dot Menu Style */
        #menuPanel { position: absolute; top: 70px; right: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; z-index: 100; border: 1px solid #f1f5f9; min-width: 180px; overflow: hidden; }
        .menu-item { padding: 12px 20px; font-size: 13px; font-weight: 600; color: #4b5563; display: flex; items-center; gap: 12px; transition: 0.2s; cursor: pointer; }
        .menu-item:hover { background: #f8fafc; color: #4f46e5; }
    </style>
</head>
<body>

    <nav class="chat-blur sticky top-0 z-50 p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="messages.html" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full transition"><i class="fas fa-chevron-left"></i></a>
            <div onclick="location.href='user-profile.html?id='+targetId" class="flex items-center gap-3 cursor-pointer">
                <div class="relative">
                    <div id="uAvatar" class="w-11 h-11 bg-indigo-100 rounded-2xl overflow-hidden border-2 border-white flex items-center justify-center font-bold text-indigo-500">?</div>
                    <div id="statusDot" class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-gray-300 border-2 border-white rounded-full"></div>
                </div>
                <div>
                    <h2 id="uName" class="font-bold text-[13px] text-gray-900 tracking-tight uppercase">Loading...</h2>
                    <p id="uStatusText" class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Offline</p>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-1">
            <button onclick="startCall('audio')" class="w-9 h-9 bg-gray-50 rounded-xl flex items-center justify-center text-gray-600"><i class="fas fa-phone-alt text-xs"></i></button>
            <button onclick="startCall('video')" class="w-9 h-9 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600"><i class="fas fa-video text-xs"></i></button>
            <button onclick="toggleMenu()" class="w-9 h-9 bg-gray-50 rounded-xl flex items-center justify-center text-gray-600"><i class="fas fa-ellipsis-v text-xs"></i></button>
        </div>

        <div id="menuPanel">
            <div class="menu-item" onclick="location.href='user-profile.html?id='+targetId"><i class="fas fa-user-circle"></i> View Profile</div>
            <div class="menu-item"><i class="fas fa-image"></i> Change Wallpaper</div>
            <div class="menu-item text-red-500"><i class="fas fa-trash-alt"></i> Clear Chat</div>
            <div class="menu-item text-red-600"><i class="fas fa-ban"></i> Block User</div>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto px-5 pt-6 pb-40 no-scrollbar"></div>

    <div class="input-wrapper">
        <div class="flex items-center gap-1 input-area">
            <button class="w-11 h-11 text-gray-400"><i class="fa-regular fa-face-smile text-xl"></i></button>
            <input type="text" id="msgInput" placeholder="Type a message..." class="flex-1 bg-transparent border-none py-3 px-2 text-[15px] outline-none">
            <button id="sendBtn" class="w-11 h-11 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg"><i class="fas fa-paper-plane text-sm"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        window.targetId = urlParams.get('id'); // Global variable
        let myId = null;

        onAuthStateChanged(auth, user => {
            if(user) { 
                myId = user.uid; 
                updateMyStatus(true);
                initChat(); 
            }
        });

        // ✅ ৩-ডট মেনু ওপেন/ক্লোজ লজিক
        window.toggleMenu = () => {
            const menu = document.getElementById('menuPanel');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        // ✅ অনলাইন স্ট্যাটাস আপডেট লজিক
        async function updateMyStatus(isOnline) {
            if(!myId) return;
            await updateDoc(doc(db, "users", myId), {
                online: isOnline,
                lastSeen: Date.now()
            });
        }

        async function initChat() {
            // ✅ টার্গেট ইউজারের রিয়েল-টাইম স্ট্যাটাস এবং প্রোফাইল চেক
            onSnapshot(doc(db, "users", targetId), (snap) => {
                if(snap.exists()) {
                    const u = snap.data();
                    document.getElementById('uName').innerText = u.name;
                    if(u.profilePic) document.getElementById('uAvatar').innerHTML = `<img src="${u.profilePic}" class="w-full h-full object-cover">`;
                    
                    // অনলাইন স্ট্যাটাস হ্যান্ডলিং
                    const statusDot = document.getElementById('statusDot');
                    const statusText = document.getElementById('uStatusText');
                    if(u.online === true) {
                        statusDot.className = "absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full";
                        statusText.innerText = "Active Now";
                        statusText.className = "text-[9px] text-green-500 font-bold uppercase tracking-widest";
                    } else {
                        statusDot.className = "absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-gray-300 border-2 border-white rounded-full";
                        statusText.innerText = "Offline";
                        statusText.className = "text-[9px] text-gray-400 font-bold uppercase tracking-widest";
                    }
                }
            });

            // চ্যাট লোডিং লজিক (আগের মতোই থাকবে)
            const chatID = [myId, targetId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === myId;
                    const div = document.createElement('div');
                    div.className = `flex w-full mb-2 ${isMe ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = `<div class="${isMe ? 'msg-me' : 'msg-them'} px-4 py-2.5 max-w-[75%] text-[14px] font-medium shadow-sm">${m.text}</div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // সেন্ড মেসেজ লজিক (আগের মতোই থাকবে)
        document.getElementById('sendBtn').onclick = sendMessage;
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            const chatID = [myId, targetId].sort().join("_");
            const text = input.value;
            input.value = "";
            await addDoc(collection(db, "chats", chatID, "messages"), { senderId: myId, text: text, timestamp: serverTimestamp() });
            await setDoc(doc(db, "chats", chatID), { lastMessage: text, lastMessageTimestamp: Date.now(), users: [myId, targetId] }, { merge: true });
        }

        window.startCall = async (type) => {
            const mySnap = await getDoc(doc(db, "users", myId));
            const myName = mySnap.data().name || "User";
            await setDoc(doc(db, "calls", targetId), { callerId: myId, callerName: myName, status: "ringing", type: type, timestamp: Date.now() });
            window.location.href = `call.html?id=${targetId}&type=${type}&action=calling`;
        };
    </script>
</body>
</html>
