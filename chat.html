<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f0f2f5] h-screen flex flex-col">

    <nav class="bg-white p-4 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="messages.html" class="text-gray-400"><i class="fas fa-arrow-left"></i></a>
            <div id="uAvatar" class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white font-bold overflow-hidden shadow-sm">?</div>
            <div>
                <h2 id="uName" class="font-black text-[11px] text-gray-800 uppercase italic leading-none">লোড হচ্ছে...</h2>
                <p class="text-[9px] text-green-500 font-bold uppercase mt-1">Active Now</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="audioCallBtn" class="w-9 h-9 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 active:scale-90 transition"><i class="fas fa-phone-alt text-sm"></i></button>
            <button id="videoCallBtn" class="w-9 h-9 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 active:scale-90 transition"><i class="fas fa-video text-sm"></i></button>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3 pb-20 no-scrollbar"></div>

    <div class="p-4 bg-white border-t sticky bottom-0">
        <div class="max-w-md mx-auto flex items-center gap-2">
            <input type="text" id="msgInput" placeholder="Aa" class="flex-1 bg-gray-100 border-none rounded-full py-2.5 px-5 text-sm focus:ring-1 focus:ring-indigo-400 outline-none">
            <button id="sendBtn" class="text-indigo-600 text-xl px-2 active:scale-90 transition"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let myId = null;
        let myName = "User";

        onAuthStateChanged(auth, async user => {
            if(user) { 
                myId = user.uid; 
                // নিজের নাম গেট করা কলের জন্য
                const mySnap = await getDoc(doc(db, "users", myId));
                if(mySnap.exists()) myName = mySnap.data().name || "User";
                initChat(); 
            }
            else window.location.href = "index.html";
        });

        // কল লজিক ফাংশন
        async function startCall(type) {
            if(!myId || !targetId) return;

            // ১. ডাটাবেসে কল রিকোয়েস্ট পাঠানো (এটি বন্ধুর home.html এ পপ-আপ দেখাবে)
            await setDoc(doc(db, "calls", targetId), {
                callerId: myId,
                callerName: myName,
                status: "dialing",
                type: type,
                timestamp: serverTimestamp()
            });

            // ২. কল পেজে নিয়ে যাওয়া
            window.location.href = `call.html?id=${targetId}&type=${type}`;
        }

        // বাটন ইভেন্ট লিসেনার
        document.getElementById('audioCallBtn').onclick = () => startCall('audio');
        document.getElementById('videoCallBtn').onclick = () => startCall('video');

        async function initChat() {
            const uSnap = await getDoc(doc(db, "users", targetId));
            if(uSnap.exists()) {
                const u = uSnap.data();
                document.getElementById('uName').innerText = u.name || "User";
                if(u.profilePic) document.getElementById('uAvatar').innerHTML = `<img src="${u.profilePic}" class="w-full h-full object-cover">`;
            }

            const chatID = [myId, targetId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === myId;
                    box.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="${isMe ? 'bg-indigo-600 text-white rounded-[20px] rounded-br-none shadow-md' : 'bg-white text-gray-800 rounded-[20px] rounded-bl-none shadow-sm'} px-4 py-2.5 max-w-[75%] text-sm font-medium">
                                ${m.text}
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            const chatID = [myId, targetId].sort().join("_");
            await addDoc(collection(db, "chats", chatID, "messages"), { senderId: myId, text: input.value, timestamp: serverTimestamp() });
            input.value = "";
        };
    </script>
</body>
</html>
