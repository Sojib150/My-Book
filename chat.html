<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <nav class="bg-white p-4 border-b flex items-center gap-4 sticky top-0 z-50">
        <a href="home.html" class="text-blue-600"><i class="fas fa-arrow-left"></i></a>
        <div class="flex items-center gap-3">
            <div id="targetAvatar" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold overflow-hidden text-sm">?</div>
            <div>
                <h2 id="targetName" class="font-bold text-gray-800 text-sm italic">Loading...</h2>
                <p class="text-[10px] text-green-500 font-bold uppercase">Online</p>
            </div>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
        </div>

    <div class="p-4 bg-white border-t sticky bottom-0">
        <div class="max-w-md mx-auto flex items-center gap-2">
            <input type="text" id="msgInput" placeholder="কিছু লিখুন..." class="flex-1 bg-gray-100 border-none rounded-full py-2.5 px-5 text-sm focus:ring-1 focus:ring-blue-400 outline-none">
            <button id="sendBtn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md active:scale-90 transition">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const receiverId = urlParams.get('id');
        let senderId = null;

        onAuthStateChanged(auth, user => {
            if(user) {
                senderId = user.uid;
                loadReceiverInfo();
                loadMessages();
            } else { window.location.href = "index.html"; }
        });

        // ১. যার সাথে কথা বলছেন তার তথ্য আনা
        async function loadReceiverInfo() {
            const snap = await getDoc(doc(db, "users", receiverId));
            if(snap.exists()){
                const d = snap.data();
                const name = d.name || "User";
                document.getElementById('targetName').innerText = name;
                if(d.profilePic) document.getElementById('targetAvatar').innerHTML = `<img src="${d.profilePic}" class="w-full h-full object-cover">`;
                else document.getElementById('targetAvatar').innerText = name[0].toUpperCase();
            }
        }

        // ২. মেসেজ পাঠানো
        document.getElementById('sendBtn').onclick = async () => {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;

            document.getElementById('msgInput').value = "";
            const chatID = [senderId, receiverId].sort().join("_"); // ইউনিক চ্যাট আইডি

            await addDoc(collection(db, "chats", chatID, "messages"), {
                senderId,
                text,
                timestamp: serverTimestamp()
            });
            
            // অটো স্ক্রল নিচে
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // ৩. মেসেজ লোড করা (রিয়েল-টাইম)
        function loadMessages() {
            const chatID = [senderId, receiverId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, s => {
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === senderId;
                    const div = document.createElement('div');
                    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = `
                        <div class="${isMe ? 'bg-blue-600 text-white rounded-t-2xl rounded-bl-2xl' : 'bg-white text-gray-800 rounded-t-2xl rounded-br-2xl'} px-4 py-2 max-w-[80%] shadow-sm text-sm font-medium">
                            ${m.text}
                        </div>
                    `;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
