<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিয়েল-টাইম চ্যাট</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0a0e17; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        
        /* প্রফেশনাল চ্যাট হেডার */
        .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #111726; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .back-user { display: flex; align-items: center; gap: 12px; }
        .back-user a { color: #d4af37; text-decoration: none; font-size: 18px; }
        .active-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #d4af37; }
        .active-username { font-size: 16px; font-weight: 600; }
        
        /* কলিং বাটন গ্রুপ (ওপরের কর্নারে) */
        .call-actions { display: flex; gap: 18px; }
        .call-actions a { color: #d4af37; font-size: 18px; text-decoration: none; transition: 0.2s; }
        .call-actions a:hover { transform: scale(1.1); }

        /* মেসেজিং এরিয়া */
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .bubble-wrapper.incoming { align-self: flex-start; }
        .bubble-wrapper.outgoing { align-self: flex-end; }

        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
        .incoming .msg-bubble { background: #111726; border: 1px solid rgba(212, 175, 55, 0.05); color: #fff; border-top-left-radius: 2px; }
        .outgoing .msg-bubble { background: linear-gradient(135deg, #d4af37 0%, #aa841e 100%); color: #0a0e17; font-weight: 500; border-top-right-radius: 2px; }
        
        /* টাইম ও সিন (Seen) স্ট্যাটাস */
        .status-row { display: flex; justify-content: flex-end; align-items: center; gap: 4px; font-size: 10px; color: #a0aec0; margin-top: 3px; }
        .outgoing .status-row { color: #d4af37; }
        .seen-tick { font-size: 11px; }

        /* বটম ইনপুট বার */
        .input-container { padding: 12px; background: #111726; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .input-container input { flex: 1; background: #0a0e17; border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px 18px; border-radius: 25px; color: #ffffff; outline: none; }
        .input-container input:focus { border-color: #d4af37; }
        .send-message-btn { background: #d4af37; border: none; width: 44px; height: 44px; border-radius: 50%; color: #0a0e17; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="back-user">
            <a href="messages.html"><i class="fas fa-arrow-left"></i></a>
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" class="active-avatar" alt="">
            <span class="active-username">টিনা শর্মা</span>
        </div>
        <div class="call-actions">
            <a href="call.html?type=audio"><i class="fas fa-phone-alt"></i></a>
            <a href="call.html?type=video"><i class="fas fa-video"></i></a>
        </div>
    </div>

    <div class="chat-box">
        <div class="bubble-wrapper incoming">
            <div class="msg-bubble">হ্যালো, ফ্রি আছো? একটা দরকারি কথা ছিল।</div>
            <div class="status-row"><span>10:55 PM</span></div>
        </div>

        <div class="bubble-wrapper outgoing">
            <div class="msg-bubble">হ্যাঁ ফ্রি আছি, বলো কী বলবে।</div>
            <div class="status-row">
                <span>10:56 PM</span>
                <i class="fas fa-check-double seen-tick"></i> Seen
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" placeholder="মেসেজ টাইপ করুন...">
        <button class="send-message-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

</body>
</html>
