<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; overflow: hidden; }
        .glass-header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #chatBox { height: calc(100vh - 145px); overflow-y: auto; scroll-behavior: smooth; padding-bottom: 20px; }
        .my-msg { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); border-radius: 20px 20px 0 20px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .other-msg { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px 20px 20px 0; border: 1px solid rgba(255,255,255,0.05); }
        .sticker-panel { transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #0f172a; }
        .sticker-panel.active { transform: translateY(0); }
        .voice-active { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <nav class="glass-header sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="messages.html" class="text-slate-400 mr-2"><i class="fas fa-chevron-left text-xl"></i></a>
                <div class="relative">
                    <img id="recPic" src="https://via.placeholder.com/100" class="w-10 h-10 rounded-2xl object-cover border border-white/10">
                    <span class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 border-4 border-[#05070a] rounded-full"></span>
                </div>
                <div>
                    <h1 id="receiverName" class="font-black text-sm tracking-tight">Loading...</h1>
                    <p class="text-[8px] text-green-500 font-black uppercase tracking-widest">Online</p>
                </div>
            </div>
            <div class="flex gap-4 text-slate-400">
                <i class="fas fa-video text-lg"></i>
                <i class="fas fa-info-circle text-lg"></i>
            </div>
        </div>
    </nav>

    <div id="chatBox" class="max-w-md mx-auto p-4 space-y-6 no-scrollbar"></div>

    <div class="fixed bottom-0 left-0 right-0 glass-header p-4 z-50">
        <div class="max-w-md mx-auto flex items-center gap-2">
            <button onclick="toggleStickers()" class="w-10 h-10 flex items-center justify-center text-slate-400"><i class="far fa-face-smile text-xl"></i></button>
            <div class="flex-1 relative">
                <input type="text" id="msgInput" placeholder="Message..." class="w-full bg-slate-800/50 border border-white/5 rounded-2xl py-3 px-5 text-sm outline-none focus:border-indigo-500 transition-all">
            </div>
            <button id="voiceBtn" class="w-11 h-11 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center transition-all">
                <i class="fas fa-microphone text-lg" id="micIcon"></i>
            </button>
            <button onclick="window.sendMsg()" id="sendBtn" class="hidden w-11 h-11 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="stickerPanel" class="sticker-panel fixed bottom-0 left-0 right-0 h-[40vh] p-6 rounded-t-[2.5rem] z-[60] border-t border-white/5">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">iPhone Stickers</h3>
            <button onclick="toggleStickers()"><i class="fas fa-times text-slate-600"></i></button>
        </div>
        <div class="grid grid-cols-4 gap-4 overflow-y-auto h-[70%] no-scrollbar">
            <img src="https://em-content.zobj.net/source/apple/354/grinning-face-with-big-eyes_1f603.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/face-with-tears-of-joy_1f602.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/rolling-on-the-floor-laughing_1f923.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/smiling-face-with-heart-eyes_1f60d.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/face-blowing-a-kiss_1f618.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/thinking-face_1f914.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/loudly-crying-face_1f62d.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
            <img src="https://em-content.zobj.net/source/apple/354/partying-face_1f973.png" class="w-16 h-16 cursor-pointer hover:scale-110 transition" onclick="sendSticker(this.src)">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92", 
            // ... বাকিটুকু ঠিক আছে আপনার ফাইলে
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        const receiverId = new URLSearchParams(window.location.search).get('id');

        onAuthStateChanged(auth, user => {
            if(user && receiverId) {
                currentUser = user;
                loadReceiverInfo();
                loadMessages();
            } else { window.location.href="login.html"; }
        });

        async function loadReceiverInfo() {
            const d = await getDoc(doc(db, "users", receiverId));
            if(d.exists()) {
                document.getElementById('receiverName').innerText = d.data().name;
                document.getElementById('recPic').src = d.data().profilePic || 'https://via.placeholder.com/100';
            }
        }

        const getChatId = () => currentUser.uid < receiverId ? currentUser.uid + "_" + receiverId : receiverId + "_" + currentUser.uid;

        // --- ভয়েস মেসেজ লজিক (সিমুলেটেড ফর প্রিমিয়াম ইউআই) ---
        let isRecording = false;
        const vBtn = document.getElementById('voiceBtn');
        vBtn.onclick = () => {
            isRecording = !isRecording;
            if(isRecording) {
                vBtn.classList.add('voice-active');
                document.getElementById('msgInput').placeholder = "Recording Audio...";
            } else {
                vBtn.classList.remove('voice-active');
                document.getElementById('msgInput').placeholder = "Message...";
                alert("Voice message sent! (Audio API integrating...)");
                // এখানে অডিও ফাইল আপলোড লজিক হবে
            }
        };

        // --- সেন্ড বাটন কন্ট্রোল ---
        document.getElementById('msgInput').oninput = (e) => {
            const sBtn = document.getElementById('sendBtn');
            const vBtn = document.getElementById('voiceBtn');
            if(e.target.value.trim().length > 0) {
                sBtn.classList.remove('hidden');
                vBtn.classList.add('hidden');
            } else {
                sBtn.classList.add('hidden');
                vBtn.classList.remove('hidden');
            }
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "chats", getChatId(), "messages"), {
                senderId: currentUser.uid,
                text: input.value,
                type: 'text',
                timestamp: serverTimestamp()
            });
            input.value = "";
            document.getElementById('sendBtn').classList.add('hidden');
            document.getElementById('voiceBtn').classList.remove('hidden');
        };

        window.sendSticker = async (url) => {
            await addDoc(collection(db, "chats", getChatId(), "messages"), {
                senderId: currentUser.uid,
                fileUrl: url,
                type: 'sticker',
                timestamp: serverTimestamp()
            });
            toggleStickers();
        };

        window.toggleStickers = () => document.getElementById('stickerPanel').classList.toggle('active');

        function loadMessages() {
            const q = query(collection(db, "chats", getChatId(), "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, snap => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.senderId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    
                    let content = m.type === 'sticker' ? `<img src="${m.fileUrl}" class="w-24 h-24">` : `<p class="text-sm font-medium leading-relaxed">${m.text}</p>`;

                    div.innerHTML = `<div class="${isMe ? 'my-msg text-white' : 'other-msg text-slate-200'} p-3 px-5 max-w-[80%] shadow-lg">${content}</div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
