<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fb; overflow: hidden; }
        
        .chat-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        
        /* Message Bubbles */
        .msg-me { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border-radius: 22px 22px 4px 22px; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2); }
        .msg-them { background: white; color: #1f2937; border-radius: 22px 22px 22px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Premium Input Area */
        .input-area { background: white; border-radius: 30px; box-shadow: 0 -5px 25px rgba(0,0,0,0.03); }
        
        /* Call Pulse Animation */
        .pulse-btn:active { transform: scale(0.9); transition: 0.2s; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="chat-blur sticky top-0 z-50 p-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-3">
            <a href="messages.html" class="w-10 h-10 flex items-center justify-center text-gray-400 active:scale-90 transition"><i class="fas fa-chevron-left text-lg"></i></a>
            <div class="relative">
                <div id="uAvatar" class="w-11 h-11 bg-indigo-100 rounded-2xl overflow-hidden border-2 border-white shadow-sm flex items-center justify-center font-bold text-indigo-500">?</div>
                <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 border-[3px] border-white rounded-full"></div>
            </div>
            <div>
                <h2 id="uName" class="font-extrabold text-[13px] text-gray-900 tracking-tight leading-none uppercase">লোড হচ্ছে...</h2>
                <p id="onlineStatus" class="text-[9px] text-green-500 font-bold uppercase mt-1.5 tracking-widest">Active Now</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="startCall('audio')" class="pulse-btn w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-700 shadow-sm"><i class="fas fa-phone-alt text-sm"></i></button>
            <button onclick="startCall('video')" class="pulse-btn w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 shadow-sm"><i class="fas fa-video text-sm"></i></button>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto px-5 py-6 space-y-4 no-scrollbar">
        </div>

    <div id="typingArea" class="px-6 py-2 hidden">
        <p class="text-[9px] font-bold text-gray-400 italic">Someone is typing...</p>
    </div>

    <div class="p-5 pb-8 chat-blur">
        <div class="max-w-md mx-auto flex items-center gap-3 input-area p-1.5 pr-3">
            <button class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 active:scale-90 transition"><i class="fas fa-plus-circle text-lg"></i></button>
            <input type="text" id="msgInput" placeholder="Type a message..." 
                class="flex-1 bg-transparent border-none py-3 px-2 text-[14px] font-medium focus:ring-0 outline-none text-gray-800 placeholder-gray-400">
            <button id="sendBtn" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-indigo-200 active:scale-90 transition">
                <i class="fas fa-paper-plane text-xs"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let myId = null;
        let myName = "User";

        onAuthStateChanged(auth, async user => {
            if(user) { 
                myId = user.uid; 
                const mySnap = await getDoc(doc(db, "users", myId));
                if(mySnap.exists()) myName = mySnap.data().name || "User";
                initChat(); 
            } else window.location.href = "index.html";
        });

        // ১. কল করার লজিক (Call Request)
        window.startCall = async (type) => {
            if(!myId || !targetId) return;
            const callDoc = doc(db, "calls", targetId);
            await setDoc(callDoc, {
                callerId: myId,
                callerName: myName,
                status: "ringing",
                type: type,
                timestamp: Date.now()
            });
            window.location.href = `call.html?id=${targetId}&type=${type}&action=calling`;
        };

        // ২. চ্যাট লজিক
        async function initChat() {
            const uSnap = await getDoc(doc(db, "users", targetId));
            if(uSnap.exists()) {
                const u = uSnap.data();
                document.getElementById('uName').innerText = u.name || "User";
                if(u.profilePic) document.getElementById('uAvatar').innerHTML = `<img src="${u.profilePic}" class="w-full h-full object-cover">`;
                else document.getElementById('uAvatar').innerText = u.name?.[0] || 'U';
            }

            const chatID = [myId, targetId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === myId;
                    const div = document.createElement('div');
                    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2 duration-300`;
                    div.innerHTML = `
                        <div class="${isMe ? 'msg-me' : 'msg-them'} px-5 py-3 max-w-[80%] text-[14px] font-medium leading-relaxed">
                            ${m.text}
                        </div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // ৩. মেসেজ পাঠানো এবং থ্রেড আপডেট (Core Logic)
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            const chatID = [myId, targetId].sort().join("_");
            input.value = "";

            // মেসেজ এড করা
            await addDoc(collection(db, "chats", chatID, "messages"), {
                senderId: myId,
                text: text,
                timestamp: serverTimestamp()
            });

            // 🔥 আপডেট 'chats' সামারি (যাতে messages.html-এ লিস্ট সবার উপরে আসে)
            await setDoc(doc(db, "chats", chatID), {
                lastMessage: text,
                lastMessageTimestamp: Date.now(),
                users: [myId, targetId]
            }, { merge: true });
        }
    </script>
</body>
</html>
