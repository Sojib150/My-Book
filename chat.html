<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <nav class="bg-white p-4 border-b flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="messages.html" class="text-gray-400"><i class="fas fa-chevron-left"></i></a>
            <div id="targetAvatar" class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white font-bold overflow-hidden">?</div>
            <h2 id="targetName" class="font-black text-gray-800 text-xs italic uppercase tracking-tighter">লোড হচ্ছে...</h2>
        </div>
        <div class="flex gap-4">
            <button onclick="makeCall('audio')" class="text-blue-600 active:scale-90 transition"><i class="fas fa-phone-alt"></i></button>
            <button onclick="makeCall('video')" class="text-indigo-600 active:scale-90 transition"><i class="fas fa-video"></i></button>
        </div>
    </nav>

    <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3 pb-10"></div>

    <div class="p-4 bg-white border-t">
        <div class="max-w-md mx-auto flex gap-2">
            <input type="text" id="msgInput" placeholder="মেসেজ লিখুন..." class="flex-1 bg-gray-100 border-none rounded-full py-3 px-6 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
            <button id="sendBtn" class="bg-indigo-600 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let myId = null;

        onAuthStateChanged(auth, user => {
            if(user) { myId = user.uid; init(); }
            else window.location.href = "index.html";
        });

        window.makeCall = (type) => window.location.href = `call.html?id=${targetId}&type=${type}`;

        async function init() {
            const snap = await getDoc(doc(db, "users", targetId));
            if(snap.exists()) {
                const u = snap.data();
                document.getElementById('targetName').innerText = u.name || "User";
                if(u.profilePic) document.getElementById('targetAvatar').innerHTML = `<img src="${u.profilePic}" class="w-full h-full object-cover">`;
            }

            const chatID = [myId, targetId].sort().join("_");
            const q = query(collection(db, "chats", chatID, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === myId;
                    box.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="${isMe ? 'bg-indigo-600 text-white rounded-t-2xl rounded-bl-2xl shadow-md' : 'bg-white text-gray-800 rounded-t-2xl rounded-br-2xl shadow-sm'} px-4 py-2.5 max-w-[80%] text-sm font-medium">
                                ${m.text}
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            const chatID = [myId, targetId].sort().join("_");
            await addDoc(collection(db, "chats", chatID, "messages"), { senderId: myId, text: input.value, timestamp: serverTimestamp() });
            input.value = "";
        };
    </script>
</body>
</html>
