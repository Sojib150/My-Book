<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{margin:0;font-family:Arial;background:#ece5dd;}
.header{
  background:#075e54;
  color:white;
  padding:15px;
  text-align:center;
}
.status{
  font-size:12px;
  color:#d4f8d4;
}
.chatBox{
  height:70vh;
  overflow:auto;
  padding:10px;
}
.msg{
  background:white;
  padding:8px;
  margin:5px;
  border-radius:10px;
  width:fit-content;
  max-width:70%;
}
.me{
  background:#dcf8c6;
  margin-left:auto;
}
.time{
  font-size:10px;
  color:#666;
}
.sendBox{
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
}
input{flex:1;padding:10px;border:none;}
button{
  padding:10px;
  border:none;
  background:#25d366;
  color:white;
}
</style>
</head>

<body>

<div class="header">
💬 Chat
<div class="status" id="status">offline</div>
</div>

<div class="chatBox" id="chat"></div>

<div class="sendBox">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, push, onValue, update, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;
let friend = localStorage.getItem("chatUser");

// 🔑 chat id
function getChatId(a,b){
return a<b ? a+"_"+b : b+"_"+a;
}

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;

setOnline();
watchFriendStatus();
loadChat();

}else{
location.href="index.html";
}
});

// 🟢 SET ONLINE
function setOnline(){
let userStatusRef = ref(db,"status/"+uid);

set(userStatusRef,{
online:true,
lastSeen: Date.now()
});

onDisconnect(userStatusRef).set({
online:false,
lastSeen: Date.now()
});
}

// 👀 WATCH FRIEND STATUS
function watchFriendStatus(){
onValue(ref(db,"status/"+friend),snap=>{
let s = snap.val();

if(!s){
document.getElementById("status").innerText="offline";
return;
}

if(s.online){
document.getElementById("status").innerText="🟢 Online";
}else{
document.getElementById("status").innerText="Last seen: "+new Date(s.lastSeen).toLocaleTimeString();
}
});
}

// 📩 SEND MESSAGE
window.send = function(){

let text = document.getElementById("msg").value;
if(!text) return;

let chatId = getChatId(uid,friend);

push(ref(db,"messages/"+chatId),{
text:text,
sender:uid,
seen:false,
time:Date.now()
});

document.getElementById("msg").value="";
}

// 📥 LOAD CHAT
function loadChat(){

let chatId = getChatId(uid,friend);

onValue(ref(db,"messages/"+chatId),snap=>{

let data = snap.val();
let html="";

for(let id in data){

let m = data[id];

// ✅ mark seen (if friend sent)
if(m.sender !== uid && !m.seen){
update(ref(db,"messages/"+chatId+"/"+id),{
seen:true
});
}

html+=`
<div class="msg ${m.sender===uid?'me':''}">
${m.text}
<div class="time">
${new Date(m.time).toLocaleTimeString()}
${m.sender===uid ? (m.seen ? " ✔✔" : " ✔") : ""}
</div>
</div>
`;

}

document.getElementById("chat").innerHTML = html;

// auto scroll
document.getElementById("chat").scrollTop = 999999;

});
}
</script>

</body>
</html>
