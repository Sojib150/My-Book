<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Book</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    
    <div id="maintenanceOverlay" class="hidden fixed inset-0 bg-white z-[100] flex items-center justify-center p-6 text-center">
        <div>
            <h2 class="text-2xl font-bold text-red-600">সার্ভার মেইনটেন্যান্স চলছে</h2>
            <p id="maintenanceMsg" class="text-gray-500 mt-2 font-medium"></p>
        </div>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">লগইন করুন</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="ইমেইল" class="w-full p-2 mb-4 border rounded" required>
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-2 mb-4 border rounded" required>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white p-2 rounded">লগইন</button>
        </form>
        <p class="mt-4 text-center text-sm">অ্যাকাউন্ট নেই? <a href="register.html" class="text-blue-500">রেজিস্টার করুন</a></p>
        <p id="msg" class="mt-4 text-center text-sm"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // ✅ FCM Messaging ইম্পোর্ট করা হয়েছে
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        // ✅ টোকেন জেনারেট এবং ডাটাবেসে সেভ করার ফাংশন
        async function setupNotifications(userId) {
            try {
                const token = await getToken(messaging, {
                    vapidKey: 'BN-grjGNFoN-TIiiEvRUYqAjDE_Sq21ZAEvB_7q-fT2nIMHsAkyrV0cIST4Q__PHMDc4xTdhI6g6V9Iua4T7Bdo'
                });
                if (token) {
                    await updateDoc(doc(db, "users", userId), { fcmToken: token });
                    console.log("FCM Token Updated!");
                }
            } catch (err) {
                console.error("Token generation failed:", err);
            }
        }

        const checkStatus = async () => {
            const mSnap = await getDoc(doc(db, "appSettings", "adminConfig"));
            if (mSnap.exists() && mSnap.data().maintenanceMode) {
                document.getElementById('maintenanceOverlay').classList.remove('hidden');
                document.getElementById('maintenanceMsg').innerText = mSnap.data().maintenanceNotice || "অ্যাডমিন অ্যাপ আপডেট করছে।";
            }
        };
        checkStatus();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "চেক করা হচ্ছে...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    if (userData.isHardBanned) {
                        await signOut(auth);
                        msg.innerText = "দুঃখিত! এই ডিভাইসটি চিরস্থায়ীভাবে ব্যান করা হয়েছে।";
                        msg.style.color = "red";
                        btn.disabled = false;
                        btn.innerText = "লগইন";
                    } 
                    else if (userData.accountStatus === "waiting_approval") {
                        await signOut(auth);
                        msg.innerText = "আপনার একাউন্টটি এখনো অ্যাডমিন এপ্রুভ করেনি।";
                        msg.style.color = "orange";
                        btn.disabled = false;
                        btn.innerText = "লগইন";
                    } 
                    else {
                        // ✅ লগইন সফল হলে নোটিফিকেশন টোকেন সেটআপ হবে
                        await setupNotifications(user.uid);
                        await deleteDoc(doc(db, "calls", user.uid)).catch(()=>{});
                        window.location.href = "home.html";
                    }
                }

            } catch (error) {
                msg.innerText = "ভুল ইমেইল বা পাসওয়ার্ড!";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = "লগইন";
            }
        });

        // ✅ সার্ভিস ওয়ার্কার রেজিস্ট্রেশন (PWA এর জন্য বাধ্যতামূলক)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('firebase-messaging-sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</body>
</html>
