<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Book - Login</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
    font-family:sans-serif;
}

.glass{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
}

.input{
    width:100%;
    padding:14px;
    border-radius:14px;
    background:#1e293b;
    color:white;
    outline:none;
    border:1px solid #334155;
    transition:0.3s;
}

.input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.btn{
    width:100%;
    padding:14px;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.loader{
    width:18px;
    height:18px;
    border:2px solid white;
    border-top:2px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>

</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div id="maintenanceOverlay" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
    <div class="glass p-8 rounded-3xl text-center max-w-sm w-full">
        <h1 class="text-red-500 text-2xl font-bold">
            Server Maintenance
        </h1>

        <p id="maintenanceMsg" class="text-gray-300 mt-4 text-sm">
            Please wait...
        </p>
    </div>
</div>

<div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-white">
            My Book
        </h1>

        <p class="text-gray-400 mt-2 text-sm">
            Login to continue
        </p>
    </div>

    <form id="loginForm" class="space-y-4">

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            class="input"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            class="input"
            required
        >

        <button type="submit" id="loginBtn" class="btn">
            Login
        </button>

    </form>

    <p class="text-center text-gray-400 text-sm mt-6">
        No account?
        <a href="register.html" class="text-blue-400 font-bold">
            Register
        </a>
    </p>

    <p id="msg" class="text-center mt-4 text-sm"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getMessaging,
getToken
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const firebaseConfig = {
    apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
    authDomain: "seen-a1d92.firebaseapp.com",
    projectId: "seen-a1d92",
    storageBucket: "seen-a1d92.firebasestorage.app",
    messagingSenderId: "868584044532",
    appId: "1:868584044532:web:51f07436a883f88332eba1"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);
const messaging = getMessaging(app);

const msg = document.getElementById("msg");
const loginBtn = document.getElementById("loginBtn");


// AUTO LOGIN
onAuthStateChanged(auth, (user)=>{
    if(user){
        window.location.href="home.html";
    }
});


// MAINTENANCE CHECK
async function checkMaintenance(){

    try{

        const snap = await getDoc(doc(db,"appSettings","adminConfig"));

        if(snap.exists()){

            const data = snap.data();

            if(data.maintenanceMode){

                document.getElementById("maintenanceOverlay")
                .classList.remove("hidden");

                document.getElementById("maintenanceMsg")
                .innerText =
                data.maintenanceNotice ||
                "Server updating...";
            }

        }

    }catch(e){
        console.log(e);
    }

}

checkMaintenance();


// SAVE FCM TOKEN
async function setupNotifications(uid){

    try{

        const token = await getToken(messaging,{
            vapidKey:"BN-grjGNFoN-TIiiEvRUYqAjDE_Sq21ZAEvB_7q-fT2nIMHsAkyrV0cIST4Q__PHMDc4xTdhI6g6V9Iua4T7Bdo"
        });

        if(token){

            await updateDoc(doc(db,"users",uid),{
                fcmToken:token
            });

            console.log("Notification Token Saved");

        }

    }catch(err){

        console.log("FCM Error:",err);

    }

}


// LOGIN
document.getElementById("loginForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

msg.innerText="";

loginBtn.disabled=true;

loginBtn.innerHTML=`
<div class="flex items-center justify-center gap-2">
<div class="loader"></div>
<span>Logging in...</span>
</div>
`;

try{

    const userCredential =
    await signInWithEmailAndPassword(
        auth,
        email,
        password
    );

    const user = userCredential.user;

    const userSnap =
    await getDoc(doc(db,"users",user.uid));

    if(userSnap.exists()){

        const userData = userSnap.data();

        // HARD BAN
        if(userData.isHardBanned){

            await signOut(auth);

            msg.innerText =
            "This account is permanently banned.";

            msg.style.color="red";

            loginBtn.disabled=false;
            loginBtn.innerText="Login";

            return;
        }

        // WAITING APPROVAL
        if(userData.accountStatus==="waiting_approval"){

            await signOut(auth);

            msg.innerText =
            "Account waiting for admin approval.";

            msg.style.color="orange";

            loginBtn.disabled=false;
            loginBtn.innerText="Login";

            return;
        }

        // SAVE NOTIFICATION TOKEN
        await setupNotifications(user.uid);

        // DELETE OLD CALLS
        await deleteDoc(doc(db,"calls",user.uid))
        .catch(()=>{});

        // SUCCESS
        msg.innerText="Login Successful!";
        msg.style.color="lime";

        setTimeout(()=>{
            window.location.href="home.html";
        },1000);

    }

}catch(error){

    console.log(error);

    msg.innerText =
    "Invalid email or password!";

    msg.style.color="red";

    loginBtn.disabled=false;

    loginBtn.innerText="Login";

}

});


// SERVICE WORKER
if('serviceWorker' in navigator){

window.addEventListener('load',()=>{

navigator.serviceWorker
.register('firebase-messaging-sw.js')
.then(()=>{
    console.log("Service Worker Ready");
})
.catch((err)=>{
    console.log(err);
});

});

}

</script>

</body>
</html>
