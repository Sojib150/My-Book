<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  background:#1877f2;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input id="username" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="dob" type="date">
<input type="file" id="photo">

<button onclick="register()">Create Account</button>

</div>

<script type="module">
import { auth, db, storage } from "./config.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

window.register = async function(){

let username = document.getElementById("username").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();
let dob = document.getElementById("dob").value;
let file = document.getElementById("photo").files[0];

if(!username || !email || !password){
alert("সব ফিল করো");
return;
}

try{

let userCred = await createUserWithEmailAndPassword(auth,email,password);
let uid = userCred.user.uid;

// 📸 upload photo
let photoURL = "";
if(file){
let imgRef = sRef(storage,"profile/"+uid);
await uploadBytes(imgRef,file);
photoURL = await getDownloadURL(imgRef);
}

// 💾 SAVE DATA
await set(ref(db,"users/"+uid),{
username: username,
email: email,
dob: dob,
photo: photoURL,
bio: "Hello 👋"
});

alert("Account Created ✅");
location.href="home.html";

}catch(e){
alert(e.message);
}

}
</script>

</body>
</html>
