<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; overflow: hidden; }
        
        /* Video Container Layout */
        #video-grid { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr; background: #000; }
        #remote-player { width: 100%; height: 100%; object-fit: cover; }
        #local-player { position: absolute; top: 40px; right: 20px; width: 120px; height: 180px; border-radius: 24px; overflow: hidden; border: 2px solid rgba(255,255,255,0.3); z-index: 50; box-shadow: 0 20px 40px rgba(0,0,0,0.5); background: #111; }

        /* UI Elements */
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .control-btn { width: 60px; height: 60px; border-radius: 20px; display: flex; items-center; justify-content: center; font-size: 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .control-btn:active { transform: scale(0.9); }
        
        .ringing-anim { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }

        /* Audio Wave for Audio Calls */
        .wave-bar { width: 4px; height: 10px; background: #6366f1; border-radius: 10px; animation: wave 1.2s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 50px; } }
    </style>
</head>
<body class="h-screen flex flex-col justify-between">

    <div id="video-grid">
        <div id="remote-player"></div>
        <div id="local-player"></div>
    </div>

    <div id="identity-ui" class="absolute inset-0 flex flex-col items-center justify-center z-20 transition-all duration-1000">
        <div class="relative mb-8">
            <div id="uAvatar" class="w-40 h-40 rounded-[55px] bg-slate-800 border-[6px] border-white/10 overflow-hidden shadow-2xl flex items-center justify-center text-6xl font-black ringing-anim">?</div>
            <div id="callBadge" class="absolute -bottom-2 -right-2 w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center border-4 border-[#020617]"><i class="fas fa-video text-sm"></i></div>
        </div>
        <h1 id="uName" class="text-3xl font-extrabold tracking-tighter uppercase italic">Loading...</h1>
        <p id="callStatus" class="text-indigo-400 font-bold tracking-[4px] text-[10px] mt-4 uppercase">Connecting...</p>
        
        <div id="audio-visual" class="hidden flex items-center gap-2 mt-8 h-12">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <div class="relative z-30 p-10 flex flex-col items-center gap-8 w-full max-w-md mx-auto">
        
        <div id="incoming-ui" class="hidden flex gap-20">
            <button onclick="endCall()" class="w-20 h-20 bg-red-500 rounded-[30px] shadow-2xl shadow-red-500/40 text-white text-3xl"><i class="fas fa-phone-slash"></i></button>
            <button onclick="acceptCall()" class="w-20 h-20 bg-green-500 rounded-[30px] shadow-2xl shadow-green-500/40 text-white text-3xl animate-bounce"><i class="fas fa-phone"></i></button>
        </div>

        <div id="controls-ui" class="hidden glass-panel p-4 rounded-[35px] flex items-center gap-6 shadow-2xl">
            <button id="micBtn" class="control-btn bg-white/10 hover:bg-white/20 text-white"><i class="fas fa-microphone"></i></button>
            <button onclick="endCall()" class="w-20 h-20 bg-red-500 rounded-[30px] text-white text-3xl shadow-xl shadow-red-500/30"><i class="fas fa-phone-slash"></i></button>
            <button id="camBtn" class="control-btn bg-white/10 hover:bg-white/20 text-white"><i class="fas fa-video"></i></button>
        </div>

    </div>

    <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>
    <audio id="dialtone" src="https://www.soundjay.com/phone/outbound-call-ringback-01.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const APP_ID = "b73c0ab95ca94cb0a11b4216f3e9b616"; 
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const callType = urlParams.get('type'); // 'video' or 'audio'
        const action = urlParams.get('action'); // 'calling' or 'incoming'

        let myId = null;
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        onAuthStateChanged(auth, async user => {
            if(user) {
                myId = user.uid;
                loadIdentity();
                initUI();
                listenCall();
            }
        });

        async function loadIdentity() {
            const snap = await getDoc(doc(db, "users", targetId));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('uName').innerText = d.name || "User";
                if(d.profilePic) document.getElementById('uAvatar').innerHTML = `<img src="${d.profilePic}" class="w-full h-full object-cover">`;
            }
            document.getElementById('callBadge').innerHTML = callType === 'video' ? '<i class="fas fa-video"></i>' : '<i class="fas fa-phone"></i>';
        }

        function initUI() {
            if(action === 'calling') {
                document.getElementById('controls-ui').classList.remove('hidden');
                document.getElementById('dialtone').play();
                document.getElementById('callStatus').innerText = "Ringing...";
            } else {
                document.getElementById('incoming-ui').classList.remove('hidden');
                document.getElementById('ringtone').play();
                document.getElementById('callStatus').innerText = "Incoming Call";
            }
            if(callType === 'audio') document.getElementById('local-player').style.display = 'none';
        }

        function listenCall() {
            const callRef = doc(db, "calls", action === 'calling' ? targetId : myId);
            onSnapshot(callRef, snap => {
                if(!snap.exists()) location.href = "messages.html";
                else if(snap.data().status === 'accepted') startAgora();
            });
        }

        window.acceptCall = async () => {
            document.getElementById('ringtone').pause();
            await updateDoc(doc(db, "calls", myId), { status: 'accepted' });
            document.getElementById('incoming-ui').classList.add('hidden');
            document.getElementById('controls-ui').classList.remove('hidden');
            startAgora();
        };

        window.endCall = async () => {
            if(localTracks.audio) localTracks.audio.close();
            if(localTracks.video) localTracks.video.close();
            await client.leave();
            await deleteDoc(doc(db, "calls", myId)).catch(()=>{});
            await deleteDoc(doc(db, "calls", targetId)).catch(()=>{});
            location.href = "messages.html";
        };

        async function startAgora() {
            document.getElementById('dialtone').pause();
            document.getElementById('callStatus').innerText = "On Call";
            
            if(callType === 'video') {
                document.getElementById('identity-ui').classList.add('opacity-0', 'scale-150', 'pointer-events-none');
            } else {
                document.getElementById('audio-visual').classList.remove('hidden');
            }

            const channel = [myId, targetId].sort().join("_");
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "video") user.videoTrack.play("remote-player");
                if (mediaType === "audio") user.audioTrack.play();
            });

            await client.join(APP_ID, channel, null, null);
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            
            if (callType === 'video') {
                // ✅ High Quality Video Settings (720p HD)
                localTracks.video = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: {
                        resolution: "720p_1", // High resolution
                        frameRate: 30,         // Smooth video
                        bitrateMin: 600,
                        bitrateMax: 1500
                    }
                });
                await localTracks.video.play("local-player");
                await client.publish([localTracks.audio, localTracks.video]);
            } else {
                await client.publish([localTracks.audio]);
            }
        }

        // Controls
        document.getElementById('micBtn').onclick = async () => {
            const state = !localTracks.audio.enabled;
            await localTracks.audio.setEnabled(state);
            document.getElementById('micBtn').innerHTML = state ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
            document.getElementById('micBtn').classList.toggle('bg-red-500', !state);
        };
        
        document.getElementById('camBtn').onclick = async () => {
            if(!localTracks.video) return;
            const state = !localTracks.video.enabled;
            await localTracks.video.setEnabled(state);
            document.getElementById('camBtn').innerHTML = state ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            document.getElementById('camBtn').classList.toggle('bg-red-500', !state);
        };
    </script>
</body>
</html>
