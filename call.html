<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
</head>
<body class="bg-[#0f172a] h-screen flex flex-col items-center justify-between text-white overflow-hidden">

    <div class="w-full flex-1 relative">
        <div id="remote-player" class="w-full h-full bg-slate-900"></div>
        
        <div id="local-player" class="absolute top-6 right-6 w-28 h-40 bg-slate-800 rounded-2xl border-2 border-white/20 shadow-2xl overflow-hidden z-20"></div>

        <div id="statusOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md z-10">
            <div class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-3xl shadow-[0_0_50px_rgba(79,70,229,0.5)] animate-pulse mb-8">
                <i class="fas fa-phone-alt"></i>
            </div>
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-70">Securing Connection...</h2>
        </div>
    </div>

    <div class="bg-slate-800/50 backdrop-blur-xl w-full max-w-md p-8 flex justify-around items-center rounded-t-[40px] border-t border-white/10">
        <button id="micBtn" class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-lg active:bg-white/20"><i class="fas fa-microphone"></i></button>
        <button id="hangupBtn" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90 transition"><i class="fas fa-phone-slash"></i></button>
        <button id="camBtn" class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-lg active:bg-white/20"><i class="fas fa-video"></i></button>
    </div>

    <script>
        const APP_ID = "fe0a5bc2049d480695ca993ee4050d65";
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const callType = urlParams.get('type');

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        async function startCall() {
            const channel = "seen_call_" + targetId; // সহজ আইডি (প্রোডাকশনে টোকেন দরকার)
            
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                document.getElementById('statusOverlay').style.display = 'none';
                if (mediaType === "video") user.videoTrack.play("remote-player");
                if (mediaType === "audio") user.audioTrack.play();
            });

            await client.join(APP_ID, channel, null, null);
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            
            if (callType === 'video') {
                localTracks.video = await AgoraRTC.createCameraVideoTrack();
                localTracks.video.play("local-player");
                await client.publish([localTracks.audio, localTracks.video]);
            } else {
                document.getElementById('local-player').style.display = 'none';
                await client.publish([localTracks.audio]);
            }
        }

        startCall();

        document.getElementById('hangupBtn').onclick = async () => {
            if(localTracks.audio) { localTracks.audio.stop(); localTracks.audio.close(); }
            if(localTracks.video) { localTracks.video.stop(); localTracks.video.close(); }
            await client.leave();
            window.location.href = `chat.html?id=${targetId}`;
        };
    </script>
</body>
</html>
