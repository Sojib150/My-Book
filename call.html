<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Call - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; }
        
        /* Full Screen Remote Video */
        #remote-player { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; background: #111; }
        
        /* Premium Local Video (Floating) */
        #local-player { 
            position: absolute; 
            top: 50px; 
            right: 20px; 
            width: 110px; 
            height: 160px; 
            border-radius: 20px; 
            overflow: hidden; 
            z-index: 50; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
            border: 1.5px solid rgba(255,255,255,0.2);
            background: #222;
        }

        /* Glassmorphism Controls Area */
        .glass-controls { 
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 340px; 
            background: rgba(30, 30, 30, 0.6); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-radius: 40px; 
            padding: 20px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            transition: 0.3s; 
        }

        .bg-blur-btn { background: rgba(255,255,255,0.1); color: white; }
        .bg-red-btn { background: #ff3b30; color: white; width: 65px; height: 65px; font-size: 24px; }
        .control-btn:active { transform: scale(0.9); }
        
        /* Name Overlay */
        .caller-info { position: absolute; top: 60px; left: 30px; z-index: 40; }
        .caller-name { font-size: 28px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .call-status { font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="remote-player"></div>

    <div id="local-player"></div>

    <div class="caller-info">
        <h1 id="uName" class="caller-name">Connecting...</h1>
        <p id="callStatus" class="call-status">HD Video Call</p>
    </div>

    <div class="glass-controls">
        <button id="micBtn" class="control-btn bg-blur-btn"><i class="fas fa-microphone"></i></button>
        <button onclick="endCall()" class="control-btn bg-red-btn"><i class="fas fa-phone-slash"></i></button>
        <button id="camBtn" class="control-btn bg-blur-btn"><i class="fas fa-video"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const APP_ID = "b73c0ab95ca94cb0a11b4216f3e9b616"; 
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let myId = null;
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        onAuthStateChanged(auth, async user => {
            if(user) {
                myId = user.uid;
                loadTargetName();
                startAgora();
                listenForEnd();
            }
        });

        async function loadTargetName() {
            const snap = await getDoc(doc(db, "users", targetId));
            if(snap.exists()) document.getElementById('uName').innerText = snap.data().name;
        }

        function listenForEnd() {
            onSnapshot(doc(db, "calls", targetId), snap => {
                if(!snap.exists()) window.location.href = "messages.html";
            });
        }

        async function startAgora() {
            const channel = [myId, targetId].sort().join("_");
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "video") user.videoTrack.play("remote-player");
                if (mediaType === "audio") user.audioTrack.play();
            });

            await client.join(APP_ID, channel, null, null);
            
            // ✅ Fix: নিজের ভিডিও দেখার জন্য নিচের লাইনগুলো কাজ করবে
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.video = await AgoraRTC.createCameraVideoTrack({
                encoderConfig: "720p_1" // High Quality
            });

            // প্লে করা
            localTracks.video.play("local-player");
            
            // পাবলিশ করা
            await client.publish([localTracks.audio, localTracks.video]);
        }

        window.endCall = async () => {
            localTracks.audio?.close();
            localTracks.video?.close();
            await client.leave();
            await deleteDoc(doc(db, "calls", targetId)).catch(()=>{});
            await deleteDoc(doc(db, "calls", myId)).catch(()=>{});
            window.location.href = "messages.html";
        };

        // Mic & Cam Toggles
        document.getElementById('micBtn').onclick = async () => {
            const state = !localTracks.audio.enabled;
            await localTracks.audio.setEnabled(state);
            document.getElementById('micBtn').innerHTML = state ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
            document.getElementById('micBtn').classList.toggle('bg-red-500', !state);
        };

        document.getElementById('camBtn').onclick = async () => {
            const state = !localTracks.video.enabled;
            await localTracks.video.setEnabled(state);
            document.getElementById('camBtn').innerHTML = state ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            document.getElementById('camBtn').classList.toggle('bg-red-500', !state);
        };
    </script>
</body>
</html>
