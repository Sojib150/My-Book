<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Call - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        /* মেইন ভিডিও স্ক্রিন */
        #remote-player { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 10; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
        }
        
        /* নিজের ভিডিও - এলিট গোল্ডেন ডিজাইন */
        #local-player { 
            position: absolute; 
            top: 50px; 
            right: 20px; 
            width: 115px; 
            height: 170px; 
            border-radius: 24px; 
            overflow: hidden; 
            z-index: 50; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); 
            border: 2px solid #D4AF37; 
            background: #111;
            transition: all 0.3s ease;
        }

        /* প্রিমিয়াম কন্ট্রোল বার */
        .glass-controls { 
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            max-width: 320px; 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 50px; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 100;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .control-btn { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* গোল্ডেন বাটন থিম */
        .bg-blur-btn { 
            background: rgba(212, 175, 55, 0.15); 
            color: #D4AF37; 
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        
        .bg-red-btn { 
            background: linear-gradient(135deg, #ff3b30, #b0150d); 
            color: white; 
            width: 65px; 
            height: 65px; 
            font-size: 24px; 
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.4);
        }

        .bg-red-btn:active { transform: scale(0.9); }

        /* কলার ইনফো */
        .caller-info { 
            position: absolute; 
            top: 65px; 
            left: 25px; 
            z-index: 40; 
        }

        .caller-name { 
            font-size: 32px; 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .call-status { 
            font-size: 11px; 
            font-weight: 600; 
            color: #D4AF37;
            text-transform: uppercase; 
            letter-spacing: 3px; 
            display: flex;
            align-items: center;
        }

        /* গোল্ডেন পালস এনিমেশন */
        .call-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #D4AF37;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #D4AF37;
            animation: goldPulse 1.5s infinite;
        }

        @keyframes goldPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        #permission-overlay {
            position: fixed; inset: 0; background: #000;
            z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .start-btn {
            background: linear-gradient(135deg, #D4AF37, #8A6E2F);
            color: black; padding: 15px 40px; border-radius: 40px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div id="permission-overlay">
        <h2 class="text-2xl font-bold mb-2">My Book Elite</h2>
        <p class="text-gray-400 mb-8 px-10">Secure HD Video Call</p>
        <button id="startCallBtn" class="start-btn">Start Call</button>
    </div>

    <audio id="ringtoneAudio" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    <audio id="dialingAudio" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>

    <div id="remote-player"></div>
    <div id="local-player"></div>

    <div class="caller-info">
        <h1 id="uName" class="caller-name">Connecting...</h1>
        <p id="callStatus" class="call-status">Live Video Call</p>
    </div>

    <div class="glass-controls">
        <button id="micBtn" class="control-btn bg-blur-btn"><i class="fas fa-microphone"></i></button>
        <button onclick="endCall()" class="control-btn bg-red-btn"><i class="fas fa-phone-slash"></i></button>
        <button id="camBtn" class="control-btn bg-blur-btn"><i class="fas fa-video"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const APP_ID = "b73c0ab95ca94cb0a11b4216f3e9b616"; 
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const action = urlParams.get('action');
        
        let myId = null;
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        const ringtone = document.getElementById('ringtoneAudio');
        const dialing = document.getElementById('dialingAudio');

        document.getElementById('startCallBtn').onclick = () => {
            document.getElementById('permission-overlay').style.display = 'none';
            startAgora();
            handleRingtone();
        };

        onAuthStateChanged(auth, async user => {
            if(user) {
                myId = user.uid;
                loadTargetName();
                listenForEnd();
            }
        });

        function handleRingtone() {
            if(action === 'calling') {
                dialing.play().catch(e => console.error(e));
                document.getElementById('callStatus').innerText = "Dialing...";
            } else {
                ringtone.play().catch(e => console.error(e));
                document.getElementById('callStatus').innerText = "Incoming...";
            }
        }

        async function loadTargetName() {
            if(!targetId) return;
            const snap = await getDoc(doc(db, "users", targetId));
            if(snap.exists()) document.getElementById('uName').innerText = snap.data().name;
        }

        async function startAgora() {
            try {
                const channel = [myId, targetId].sort().join("_");
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    stopAllAudio();
                    document.getElementById('callStatus').innerText = "On Call - Elite";
                    if (mediaType === "video") user.videoTrack.play("remote-player");
                    if (mediaType === "audio") user.audioTrack.play();
                });

                await client.join(APP_ID, channel, null, null);
                localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.video = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "720p_1" });
                
                localTracks.video.play("local-player");
                await client.publish([localTracks.audio, localTracks.video]);

            } catch (err) {
                console.error(err);
                alert("Please enable camera permissions in settings.");
            }
        }

        function listenForEnd() {
            onSnapshot(doc(db, "calls", targetId), snap => {
                if(!snap.exists()) endCall();
            });
        }

        function stopAllAudio() {
            ringtone.pause();
            dialing.pause();
        }

        window.endCall = async () => {
            stopAllAudio();
            localTracks.audio?.stop();
            localTracks.audio?.close();
            localTracks.video?.stop();
            localTracks.video?.close();
            await client.leave();
            await deleteDoc(doc(db, "calls", targetId)).catch(()=>{});
            window.location.href = "messages.html";
        };

        // Mic/Cam Toggles
        document.getElementById('micBtn').onclick = async () => {
            if(!localTracks.audio) return;
            const state = !localTracks.audio.enabled;
            await localTracks.audio.setEnabled(state);
            document.getElementById('micBtn').innerHTML = state ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash text-red-500"></i>';
            document.getElementById('micBtn').style.background = state ? 'rgba(212, 175, 55, 0.15)' : 'rgba(255, 59, 48, 0.1)';
        };

        document.getElementById('camBtn').onclick = async () => {
            if(!localTracks.video) return;
            const state = !localTracks.video.enabled;
            await localTracks.video.setEnabled(state);
            document.getElementById('camBtn').innerHTML = state ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash text-red-500"></i>';
            document.getElementById('camBtn').style.background = state ? 'rgba(212, 175, 55, 0.15)' : 'rgba(255, 59, 48, 0.1)';
        };
    </script>
</body>
</html>
