<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondo Voice & Video Core - Call Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030305; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 15, 25, 0.55); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.03); }
        
        /* ডাইনামিক পালস অ্যানিমেশন (রিং টোন ফিল) */
        .pulse-ring { position: relative; }
        .pulse-ring::before, .pulse-ring::after { content: ''; position: absolute; inset: -20px; rounded-radius: inherit; border-radius: 50%; background: rgba(99, 102, 241, 0.15); animation: pulseEmit 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .pulse-ring::after { animation-delay: 1s; }
        
        @keyframes pulseEmit {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        
        .timer-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between items-center p-8 bg-[#030305] relative">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-72 h-72 bg-indigo-600/10 rounded-full blur-[120px] -z-10 animate-pulse"></div>
    <div id="videoContainer" class="absolute inset-0 bg-black hidden z-0">
        <div class="absolute bottom-6 right-6 w-28 h-40 bg-zinc-900 rounded-2xl border border-white/10 overflow-hidden shadow-2xl">
            <div class="w-full h-full bg-slate-800 flex items-center justify-center text-[10px] text-gray-500 font-bold">Your Cam</div>
        </div>
    </div>

    <header class="w-full max-w-sm text-center space-y-2 z-10 pt-8">
        <div class="inline-flex items-center gap-2 bg-white/5 border border-white/5 px-3 py-1.5 rounded-full backdrop-blur-md">
            <span id="callTypeBadge" class="text-[9px] font-black tracking-widest uppercase text-indigo-400">ENCRYPTED VOICE NODE</span>
        </div>
        <h1 id="remoteUserName" class="text-2xl font-black text-white tracking-tight pt-2">Loading Target...</h1>
        <p id="callStatusText" class="text-xs text-gray-400 font-semibold uppercase tracking-wider animate-pulse">Connecting Stream...</p>
        
        <div id="callTimer" class="timer-font text-xl font-black text-emerald-400 hidden tracking-widest pt-2">00:00</div>
    </header>

    <div class="z-10 flex flex-col items-center justify-center">
        <div id="avatarContainer" class="w-32 h-32 rounded-full pulse-ring bg-gradient-to-tr from-indigo-600 to-purple-600 p-1 shadow-2xl shadow-indigo-500/10">
            <img id="remoteUserPic" src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-full border-4 border-[#030305]">
        </div>
    </div>

    <footer class="w-full max-w-sm z-10 pb-8">
        
        <div id="incomingActions" class="hidden grid grid-cols-2 gap-6 w-full">
            <button onclick="handleIncomingCallAction('ended')" class="glass hover:bg-red-600/20 text-red-400 hover:text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-red-500/10 transition active:scale-95 group">
                <div class="w-11 h-11 bg-red-600 rounded-full flex items-center justify-center text-white text-sm shadow-lg shadow-red-600/20 group-hover:scale-105 transition"><i class="fas fa-phone-slash rotate-[135deg]"></i></div>
                <span class="text-[10px] font-black uppercase tracking-wider">Decline</span>
            </button>
            <button onclick="handleIncomingCallAction('accepted')" class="glass hover:bg-emerald-600/20 text-emerald-400 hover:text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-emerald-500/10 transition active:scale-95 group">
                <div class="w-11 h-11 bg-emerald-600 rounded-full flex items-center justify-center text-white text-sm shadow-lg shadow-emerald-600/20 group-hover:scale-105 transition"><i class="fas fa-phone"></i></div>
                <span class="text-[10px] font-black uppercase tracking-wider">Answer</span>
            </button>
        </div>

        <div id="activeActions" class="hidden w-full">
            <button onclick="disconnectCallPipeline()" class="w-full glass hover:bg-red-600/20 text-red-400 hover:text-white py-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-red-500/10 transition active:scale-95 group">
                <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white text-base shadow-lg shadow-red-600/20 group-hover:scale-105 transition"><i class="fas fa-phone-slash rotate-[135deg]"></i></div>
                <span class="text-[10px] font-black uppercase tracking-wider">End Transmission Connection</span>
            </button>
        </div>

    </footer>

    <audio id="ringtoneAudio" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-84.wav" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const callId = urlParams.get('callId');
        const role = urlParams.get('role'); // 'caller' বা 'receiver'
        const type = urlParams.get('type'); // 'audio' বা 'video'
        const targetId = urlParams.get('targetId');

        let currentUserId = null;
        let timerInterval = null;
        let callSeconds = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                initCallInterface();
                listenCallDocEngine();
            } else {
                window.location.href = "login.html";
            }
        });

        async function initCallInterface() {
            // ১. ইন্টারফেস টাইপ সেটআপ করা
            if(type === 'video') {
                document.getElementById('callTypeBadge').innerText = "SECURE VIDEO PIPELINE";
                document.getElementById('callTypeBadge').classList.replace('text-indigo-400', 'text-purple-400');
            }

            // ২. রোল অনুযায়ী বাটন ভিজিবিলিটি ফিল্টারিং 
            if(role === 'caller') {
                document.getElementById('activeActions').classList.remove('hidden');
                document.getElementById('callStatusText').innerText = "Ringing Outgoing Node...";
            } else {
                document.getElementById('incomingActions').classList.remove('hidden');
                document.getElementById('callStatusText').innerText = "Inbound Network Call...";
                document.getElementById('ringtoneAudio').play().catch(()=>{}); // রিংটোন প্লে প্লেব্যাক সেফটি
            }

            // ৩. টার্গেট ইউজারের প্রোফাইল ডাটা ফেচিং
            if(targetId) {
                const uDoc = await getDoc(doc(db, "users", targetId));
                if(uDoc.exists()) {
                    document.getElementById('remoteUserName').innerText = uDoc.data().name || "Bondo Creator";
                    if(uDoc.data().profilePic) document.getElementById('remoteUserPic').src = uDoc.data().profilePic;
                }
            }
        }

        function listenCallDocEngine() {
            if(!callId) return;

            // ৪. ফায়ারবেস রিয়েল-টাইম কল স্ট্যাটাস মনিটরিং লুপ
            onSnapshot(doc(db, "calls", callId), (snapshot) => {
                if(!snapshot.exists()) {
                    terminateUIFlow();
                    return;
                }

                const cData = snapshot.data();

                if(cData.status === 'accepted') {
                    // কল রিসিভ হয়েছে! 
                    document.getElementById('ringtoneAudio').pause();
                    document.getElementById('callStatusText').innerText = "Connection Secure Live";
                    document.getElementById('callStatusText').classList.remove('animate-pulse');
                    document.getElementById('callStatusText').classList.add('text-emerald-400');
                    
                    // ইনকামিং বাটন হাইড করে ডিসকানেক্ট বাটন শো করানো হচ্ছে
                    document.getElementById('incomingActions').classList.add('hidden');
                    document.getElementById('activeActions').classList.remove('hidden');
                    
                    if(type === 'video') {
                        document.getElementById('videoContainer').classList.remove('hidden');
                        document.getElementById('avatarContainer').classList.add('hidden');
                    }

                    startCallTimerCount();
                }

                if(cData.status === 'ended') {
                    terminateUIFlow();
                }
            });
        }

        // ৫. রিসিভার সাইড অ্যাকশন হ্যান্ডলার (Answer/Decline)
        window.handleIncomingCallAction = async (actionState) => {
            document.getElementById('ringtoneAudio').pause();
            await updateDoc(doc(db, "calls", callId), {
                status: actionState,
                answeredAt: serverTimestamp()
            });
            if(actionState === 'ended') terminateUIFlow();
        };

        // ৬. কলার বা রানিং কল কেটে দেওয়ার সিস্টেম
        window.disconnectCallPipeline = async () => {
            await updateDoc(doc(db, "calls", callId), { status: 'ended' });
            terminateUIFlow();
        };

        function startCallTimerCount() {
            if(timerInterval) return;
            document.getElementById('callTimer').classList.remove('hidden');
            timerInterval = setInterval(() => {
                callSeconds++;
                const mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
                const secs = String(callSeconds % 60).padStart(2, '0');
                document.getElementById('callTimer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function terminateUIFlow() {
            document.getElementById('ringtoneAudio').pause();
            if(timerInterval) clearInterval(timerInterval);
            // কল শেষ হলে অটোমেটিক ব্যাক ট্র্যাকে ফেরত যাবে
            history.back();
        }
    </script>
</body>
</html>
