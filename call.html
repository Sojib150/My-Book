<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Call - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; }
        #remote-player { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; background: #111; }
        #local-player { 
            position: absolute; top: 50px; right: 20px; width: 110px; height: 160px; 
            border-radius: 20px; overflow: hidden; z-index: 50; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.2); background: #222;
        }
        .glass-controls { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 340px; background: rgba(30, 30, 30, 0.6); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-radius: 40px; padding: 20px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .bg-blur-btn { background: rgba(255,255,255,0.1); color: white; }
        .bg-red-btn { background: #ff3b30; color: white; width: 65px; height: 65px; font-size: 24px; }
        
        /* পারমিশন ওভারলে */
        #permission-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="permission-overlay">
        <div class="mb-6 text-xl font-bold">ভিডিও কলে যুক্ত হতে অনুমতি দিন</div>
        <button id="startCallBtn" class="bg-blue-600 px-8 py-3 rounded-full font-bold text-lg animate-pulse">
            ক্যামেরা চালু করুন
        </button>
    </div>

    <audio id="ringtoneAudio" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    <audio id="dialingAudio" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>

    <div id="remote-player"></div>
    <div id="local-player"></div>

    <div class="absolute top-[60px] left-[30px] z-40">
        <h1 id="uName" class="text-2xl font-extrabold tracking-tight">Connecting...</h1>
        <p id="callStatus" class="text-xs font-semibold opacity-80 uppercase tracking-widest">HD Video Call</p>
    </div>

    <div class="glass-controls">
        <button id="micBtn" class="control-btn bg-blur-btn"><i class="fas fa-microphone"></i></button>
        <button onclick="endCall()" class="control-btn bg-red-btn"><i class="fas fa-phone-slash"></i></button>
        <button id="camBtn" class="control-btn bg-blur-btn"><i class="fas fa-video"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const APP_ID = "b73c0ab95ca94cb0a11b4216f3e9b616"; 
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const action = urlParams.get('action');
        
        let myId = null;
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        const ringtone = document.getElementById('ringtoneAudio');
        const dialing = document.getElementById('dialingAudio');

        document.getElementById('startCallBtn').onclick = () => {
            document.getElementById('permission-overlay').style.display = 'none';
            startAgora();
            handleRingtone();
        };

        onAuthStateChanged(auth, async user => {
            if(user) {
                myId = user.uid;
                loadTargetName();
                listenForEnd();
            }
        });

        function handleRingtone() {
            if(action === 'calling') {
                dialing.play().catch(e => console.error(e));
                document.getElementById('callStatus').innerText = "Dialing...";
            } else {
                ringtone.play().catch(e => console.error(e));
                document.getElementById('callStatus').innerText = "Incoming Call";
            }
        }

        async function loadTargetName() {
            if(!targetId) return;
            const snap = await getDoc(doc(db, "users", targetId));
            if(snap.exists()) document.getElementById('uName').innerText = snap.data().name;
        }

        async function startAgora() {
            try {
                const channel = [myId, targetId].sort().join("_");
                
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    stopAllAudio();
                    document.getElementById('callStatus').innerText = "On Call - Live";
                    if (mediaType === "video") user.videoTrack.play("remote-player");
                    if (mediaType === "audio") user.audioTrack.play();
                });

                await client.join(APP_ID, channel, null, null);

                // ক্যামেরা ও মাইক চালু করা
                [localTracks.audio, localTracks.video] = await AgoraRTC.createMicrophoneAndCameraTracks();
                
                localTracks.video.play("local-player");
                await client.publish([localTracks.audio, localTracks.video]);

            } catch (err) {
                console.error(err);
                alert("ক্যামেরা পাওয়া যায়নি! সেটিংস থেকে পারমিশন চেক করুন।");
            }
        }

        function listenForEnd() {
            onSnapshot(doc(db, "calls", targetId), snap => {
                if(!snap.exists()) endCall();
            });
        }

        function stopAllAudio() {
            ringtone.pause();
            dialing.pause();
        }

        window.endCall = async () => {
            stopAllAudio();
            localTracks.audio?.stop();
            localTracks.audio?.close();
            localTracks.video?.stop();
            localTracks.video?.close();
            await client.leave();
            await deleteDoc(doc(db, "calls", targetId)).catch(()=>{});
            window.location.href = "messages.html";
        };

        // Mic/Cam Toggles
        document.getElementById('micBtn').onclick = async () => {
            if(!localTracks.audio) return;
            const state = !localTracks.audio.enabled;
            await localTracks.audio.setEnabled(state);
            document.getElementById('micBtn').innerHTML = state ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash text-red-500"></i>';
        };

        document.getElementById('camBtn').onclick = async () => {
            if(!localTracks.video) return;
            const state = !localTracks.video.enabled;
            await localTracks.video.setEnabled(state);
            document.getElementById('camBtn').innerHTML = state ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash text-red-500"></i>';
        };
    </script>
</body>
</html>
