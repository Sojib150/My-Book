<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Call - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
</head>
<body class="bg-gray-900 h-screen flex flex-col items-center justify-between text-white pb-10">

    <div class="w-full flex-1 relative flex items-center justify-center">
        <div id="remote-player" class="w-full h-full bg-black"></div>
        
        <div id="local-player" class="absolute bottom-6 right-6 w-32 h-44 bg-gray-800 rounded-2xl border-2 border-white/20 overflow-hidden shadow-2xl z-10"></div>

        <div id="callingUI" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-0">
            <div class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-3xl animate-pulse shadow-3xl mb-6">
                <i class="fas fa-user"></i>
            </div>
            <p class="text-xs font-black tracking-widest uppercase opacity-50">Connecting Securely...</p>
        </div>
    </div>

    <div class="flex items-center gap-8 z-20">
        <button id="micBtn" class="w-14 h-14 bg-white/10 rounded-full hover:bg-white/20 transition"><i class="fas fa-microphone"></i></button>
        <button id="hangupBtn" class="w-20 h-20 bg-red-500 rounded-full text-2xl shadow-2xl active:scale-90 transition"><i class="fas fa-phone-slash"></i></button>
        <button id="camBtn" class="w-14 h-14 bg-white/10 rounded-full hover:bg-white/20 transition"><i class="fas fa-video"></i></button>
    </div>

    <script>
        const APP_ID = "fe0a5bc2049d480695ca993ee4050d65";
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const callType = urlParams.get('type');

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { audio: null, video: null };

        async function startCall() {
            // সিম্পল রুম আইডি (প্রোডাকশনে টোকেন সার্ভার লাগে)
            const channel = "test_channel_" + targetId; 
            
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                document.getElementById('callingUI').style.display = 'none';
                if (mediaType === "video") user.videoTrack.play("remote-player");
                if (mediaType === "audio") user.audioTrack.play();
            });

            await client.join(APP_ID, channel, null, null);
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            
            if (callType === 'video') {
                localTracks.video = await AgoraRTC.createCameraVideoTrack();
                localTracks.video.play("local-player");
                await client.publish([localTracks.audio, localTracks.video]);
            } else {
                document.getElementById('local-player').classList.add('hidden');
                await client.publish([localTracks.audio]);
            }
        }

        startCall();

        document.getElementById('hangupBtn').onclick = async () => {
            if(localTracks.audio) { localTracks.audio.stop(); localTracks.audio.close(); }
            if(localTracks.video) { localTracks.video.stop(); localTracks.video.close(); }
            await client.leave();
            window.location.href = `chat.html?id=${targetId}`;
        };
    </script>
</body>
</html>
