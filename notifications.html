<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .notif-card { transition: all 0.2s ease; border-radius: 20px; cursor: pointer; }
        .notif-card:active { transform: scale(0.97); background: #f1f5f9; }
        .unread { background: #eef2ff; border-left: 4px solid #4f46e5; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-radius: 35px; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <nav class="glass-nav sticky top-0 z-50 p-5 flex justify-between items-center border-b border-gray-100 max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center text-gray-400 active:scale-90 transition">
                <i class="fas fa-chevron-left text-lg"></i>
            </button>
            <h1 class="font-black text-gray-800 tracking-tighter text-xl italic uppercase">Notifications</h1>
        </div>
        <button id="clearBtn" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-3 py-2 rounded-lg hidden">Clear All</button>
    </nav>

    <div id="notifContainer" class="max-w-md mx-auto px-4 mt-4 space-y-3">
        <div id="loading" class="text-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] text-gray-400 mt-3 font-black uppercase tracking-widest">Checking Updates...</p>
        </div>
    </div>

    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center max-w-md mx-auto">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center text-gray-300 text-3xl mb-4">
            <i class="far fa-bell-slash"></i>
        </div>
        <h3 class="font-bold text-gray-800 uppercase text-sm">All caught up!</h3>
        <p class="text-[11px] text-gray-400 mt-1 font-medium">No new notifications at the moment.</p>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="text-gray-400 text-lg"><i class="fas fa-home"></i></a>
        <a href="search.html" class="text-gray-400 text-lg"><i class="fas fa-search"></i></a>
        <button onclick="location.href='post.html'" class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
            <i class="fas fa-plus"></i>
        </button>
        <a href="messages.html" class="text-gray-400 text-lg"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" class="text-gray-400 text-lg"><i class="fas fa-user-circle"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, orderBy, doc, deleteDoc, getDocs, writeBatch, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                initNotifications(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function initNotifications(uid) {
            // 'notifications' কালেকশন থেকে ডাটা আনা হচ্ছে
            const q = query(
                collection(db, "notifications"), 
                where("targetUserId", "==", uid), 
                orderBy("timestamp", "desc"),
                limit(50) // শেষ ৫০টি নোটিফিকেশন দেখাবে
            );

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('notifContainer');
                const empty = document.getElementById('emptyState');
                const clearBtn = document.getElementById('clearBtn');
                
                document.getElementById('loading').style.display = 'none';
                container.innerHTML = "";

                if(snapshot.empty) {
                    empty.classList.remove('hidden');
                    clearBtn.classList.add('hidden');
                    return;
                }

                empty.classList.add('hidden');
                clearBtn.classList.remove('hidden');

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const notifId = docSnap.id;
                    const time = data.timestamp ? formatTime(data.timestamp.toDate()) : "Now";

                    const div = document.createElement('div');
                    div.className = `notif-card p-4 flex items-center gap-4 bg-white shadow-sm border border-gray-50 ${data.read ? '' : 'unread'}`;
                    
                    div.innerHTML = `
                        <div class="w-12 h-12 rounded-2xl bg-indigo-100 flex-shrink-0 flex items-center justify-center overflow-hidden">
                            ${data.senderPic ? `<img src="${data.senderPic}" class="w-full h-full object-cover">` : `<span class="font-bold text-indigo-500">${data.senderName ? data.senderName[0].toUpperCase() : '?'}</span>`}
                        </div>
                        <div class="flex-1">
                            <p class="text-[13px] text-gray-800 font-semibold leading-tight">
                                <span class="font-black italic">${data.senderName || 'Someone'}</span> ${data.message}
                            </p>
                            <p class="text-[9px] text-gray-400 font-black mt-1 uppercase tracking-tighter">${time}</p>
                        </div>
                        ${data.postImg ? `
                            <div class="w-10 h-10 rounded-lg overflow-hidden border border-gray-100 flex-shrink-0">
                                <img src="${data.postImg}" class="w-full h-full object-cover">
                            </div>
                        ` : ''}
                    `;

                    div.onclick = () => handleAction(notifId, data);
                    container.appendChild(div);
                });
            });
        }

        async function handleAction(id, data) {
            // ক্লিক করলে নোটিফিকেশনটি মুছে ফেলা হবে অথবা 'read' স্ট্যাটাস আপডেট করা হবে
            await deleteDoc(doc(db, "notifications", id));

            // টাইপ অনুযায়ী নির্দিষ্ট পেজে পাঠানো
            if(data.type === "follow") {
                location.href = `user.html?id=${data.senderId}`;
            } else if(data.type === "like" || data.type === "comment") {
                location.href = `post-view.html?id=${data.postId}`;
            }
        }

        // সব নোটিফিকেশন একসাথে মুছার ফাংশন
        document.getElementById('clearBtn').onclick = async () => {
            if(confirm("সব নোটিফিকেশন কি মুছে ফেলতে চান?")) {
                const q = query(collection(db, "notifications"), where("targetUserId", "==", auth.currentUser.uid));
                const snap = await getDocs(q);
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
            }
        };

        // টাইম ফরমেট ফাংশন
        function formatTime(date) {
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }
    </script>
</body>
</html>
