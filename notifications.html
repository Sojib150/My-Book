<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Notifications - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #080c14; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .glass-sticky { background: rgba(8, 12, 20, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        
        .notif-card { border-radius: 20px; cursor: pointer; position: relative; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .notif-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.03); }
        .unread-dot { width: 7px; height: 7px; background: #1877f2; border-radius: 50%; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); box-shadow: 0 0 10px #1877f2; }
        
        /* 📱 Bottom Navigation Bar Styling */
        .nav-glass { background: rgba(8, 12, 20, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.04); }
        .nav-btn { color: #64748b; transition: all 0.25s; }
        .nav-btn.active { color: #1877f2; text-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }

        /* SweetAlert Custom Elite Styling */
        .elite-popup { background: #0f172a !important; color: #f1f5f9 !important; border-radius: 28px !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }
        .elite-confirm { background: #1877f2 !important; border-radius: 14px !important; font-size: 11px !important; font-weight: 800 !important; text-transform: uppercase !important; letter-spacing: 1px !important; padding: 12px 24px !important; }
        .elite-cancel { background: rgba(255, 255, 255, 0.05) !important; color: #94a3b8 !important; border-radius: 14px !important; font-size: 11px !important; font-weight: 800 !important; text-transform: uppercase !important; }
    </style>
</head>
<body class="pb-28">

    <nav class="glass-sticky sticky top-0 z-50 p-5 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <button onclick="location.href='dashboard.html'" class="w-10 h-10 glass-panel flex items-center justify-center text-gray-400 rounded-xl active:scale-90 transition">
                <i class="fas fa-chevron-left text-xs"></i>
            </button>
            <h1 class="font-black text-white tracking-tighter text-lg italic uppercase">Alert Hub</h1>
        </div>
        <button id="clearBtn" class="text-[9px] font-black text-red-400 uppercase tracking-widest bg-red-500/10 border border-red-500/10 px-3 py-2 rounded-lg hidden transition">Clear All</button>
    </nav>

    <div id="notifContainer" class="max-w-md mx-auto px-4 mt-4 space-y-2.5">
        <div id="loading" class="text-center py-40">
            <div class="inline-block w-7 h-7 border-3 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[9px] text-gray-500 mt-4 font-black uppercase tracking-widest">Querying Notification Cluster Logs...</p>
        </div>
    </div>

    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-40 text-center max-w-md mx-auto">
        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center text-gray-600 text-xl mb-4 border border-white/5">
            <i class="far fa-bell-slash"></i>
        </div>
        <h3 class="font-black text-white uppercase text-xs tracking-wider">Pipeline Clear</h3>
        <p class="text-[10px] text-gray-500 mt-1.5 font-medium">No live alert transmissions documented inside this node.</p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-glass z-50 flex justify-around items-center px-4 max-w-md mx-auto">
        <button onclick="location.href='reels.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-clapperboard text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Reels</span>
        </button>
        <button onclick="location.href='post.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-square-plus text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Create</span>
        </button>
        <button onclick="location.href='dashboard.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-chart-pie text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Studio</span>
        </button>
        <button onclick="location.href='profile.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDocs, writeBatch, limit, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                listenNotifications(user.uid);
            } else {
                location.href = "Login.html";
            }
        });

        function listenNotifications(uid) {
            // Memory Optimization Layer Pipeline Execution Query
            const q = query(
                collection(db, "notifications"), 
                where("targetUserId", "==", uid),
                limit(40)
            );

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('notifContainer');
                const empty = document.getElementById('emptyState');
                const clearBtn = document.getElementById('clearBtn');
                
                document.getElementById('loading').style.display = 'none';
                
                let docsArray = [];
                snapshot.forEach(d => docsArray.push({id: d.id, ...d.data()}));
                
                // Real-time local engine parameters sorting operation
                docsArray.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                container.innerHTML = "";

                if(docsArray.length === 0) {
                    empty.classList.remove('hidden');
                    clearBtn.classList.add('hidden');
                    return;
                }

                empty.classList.add('hidden');
                clearBtn.classList.remove('hidden');

                docsArray.forEach(data => {
                    const time = data.timestamp ? formatTime(data.timestamp.toDate()) : "Just now";
                    const div = document.createElement('div');
                    div.className = `notif-card p-4 flex items-center gap-4 glass-panel ${data.read === false ? 'border-l-2 border-l-blue-500' : ''}`;
                    
                    div.innerHTML = `
                        <div class="w-10 h-10 rounded-xl bg-slate-800 flex-shrink-0 flex items-center justify-center overflow-hidden border border-white/5">
                            ${data.senderPic ? `<img src="${data.senderPic}" class="w-full h-full object-cover">` : `<i class="fas fa-user text-slate-600 text-sm"></i>`}
                        </div>
                        <div class="flex-1 pr-6">
                            <p class="text-[12px] text-gray-300 font-medium leading-tight">
                                <span class="font-black italic text-blue-400">@${data.senderName || 'creator'}</span> ${data.message}
                            </p>
                            <p class="text-[8px] text-gray-500 font-black mt-1 uppercase tracking-wider">${time}</p>
                        </div>
                        ${data.postImg ? `
                            <div class="w-9 h-9 rounded-lg overflow-hidden border border-white/5 flex-shrink-0">
                                <img src="${data.postImg}" class="w-full h-full object-cover">
                            </div>
                        ` : ''}
                        ${data.read === false ? `<div class="unread-dot"></div>` : ''}
                    `;

                    div.onclick = () => handleAction(data.id, data);
                    container.appendChild(div);
                });
            }, (error) => {
                console.error("Notif Error:", error);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 text-xs uppercase font-bold">Error loading telemetry stream data.</p>`;
            });
        }

        async function handleAction(id, data) {
            try {
                await updateDoc(doc(db, "notifications", id), { read: true });
            } catch(e) { console.log("Notif state write block handled"); }

            // Target Routing Interface Sync Sequence
            if(data.type === "follow" || data.type === "profile") {
                location.href = `profile.html?uid=${data.senderId}`;
            } else if(data.type === "like" || data.type === "comment") {
                location.href = `post-view.html?id=${data.postId}`;
            } else if(data.type === "call") {
                location.href = `call.html?id=${data.senderId}&type=incoming`;
            }
        }

        document.getElementById('clearBtn').onclick = () => {
            Swal.fire({
                title: 'Flush All Logs?',
                text: "This action will purge all notification packets permanently.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Purge Stream',
                cancelButtonText: 'Abort',
                customClass: { popup: 'elite-popup', confirmButton: 'elite-confirm', cancelButton: 'elite-cancel' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const q = query(collection(db, "notifications"), where("targetUserId", "==", auth.currentUser.uid));
                        const snap = await getDocs(q);
                        const batch = writeBatch(db);
                        snap.forEach(d => batch.delete(d.ref));
                        await batch.commit();
                    } catch(err) { console.log("Flush array clear interrupted:", err); }
                }
            });
        };

        function formatTime(date) {
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }
    </script>
</body>
</html>
