<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications Hub - Bondo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050508; color: #e2e8f0; }
        .glass { background: rgba(11, 15, 25, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen pb-20 bg-[#050508]">

    <header class="glass sticky top-0 z-50 px-5 py-4 border-b border-white/5 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left text-xs"></i></button>
            <h1 class="font-black text-base text-white tracking-wide">Activity Notifications</h1>
        </div>
        <button onclick="purgeNotificationStreams()" class="text-[10px] font-black text-red-400 uppercase tracking-wider bg-red-500/10 px-3 py-1.5 rounded-xl border border-red-500/10 hover:bg-red-500 hover:text-white transition">Clear All</button>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="notificationStack" class="space-y-2.5">
            <div class="text-center py-12 text-gray-600 text-xs font-semibold animate-pulse">Establishing live alert pipelines...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                streamUserAlerts();
            } else {
                window.location.href = "login.html";
            }
        });

        function streamUserAlerts() {
            // ইউজারের সাব-কলেকেশন 'notifications' থেকে রিয়েল-টাইম ডাটা রিড করা হচ্ছে
            const q = query(collection(db, "users", currentUserId, "notifications"), orderBy("time", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const stack = document.getElementById('notificationStack');
                stack.innerHTML = "";

                if(snapshot.empty) {
                    stack.innerHTML = `
                        <div class="text-center py-16 space-y-3">
                            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center mx-auto text-gray-600"><i class="fas fa-bell-slash text-base"></i></div>
                            <p class="text-xs text-gray-600 font-medium">কোনো নোটিফিকেশন ডাটা রেকর্ড নেই ভাই!</p>
                        </div>`;
                    return;
                }

                snapshot.forEach(changeDoc => {
                    const n = changeDoc.data();
                    const card = document.createElement('div');
                    card.className = "glass p-3.5 rounded-2xl flex items-start gap-3.5 border-l-4 border-indigo-500 bg-black/10 transition";
                    
                    // সিস্টেম বা চ্যাট অনুযায়ী আইকন সিলেকশন
                    let iconHtml = `<div class="w-8 h-8 rounded-xl bg-indigo-500/10 text-indigo-400 flex items-center justify-center text-xs border border-indigo-500/10"><i class="fas fa-bullhorn"></i></div>`;
                    if(n.type === 'admin') {
                        iconHtml = `<div class="w-8 h-8 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center text-xs border border-purple-500/10"><i class="fas fa-crown"></i></div>`;
                    }

                    card.innerHTML = `
                        ${iconHtml}
                        <div class="flex-1 space-y-0.5">
                            <p class="text-xs text-gray-200 font-semibold leading-relaxed">${n.message}</p>
                            <span class="text-[9px] text-gray-600 font-bold uppercase tracking-wider">${n.time ? new Date(n.time.toDate()).toLocaleDateString() : 'Live Stream'}</span>
                        </div>
                    `;
                    stack.appendChild(card);
                });
            });
        }

        // নোটিফিকেশন হিস্টোরি ক্লিয়ার করার ব্যাকএন্ড লজিক
        window.purgeNotificationStreams = async () => {
            if(!confirm('সব নোটিফিকেশন ডিলিট করে দিতে চান ভাই?')) return;
            const ref = collection(db, "users", currentUserId, "notifications");
            const snap = await getDocs(ref);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
        };
    </script>
</body>
</html>
