<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels - Ad & Earning Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .reel-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scroll-behavior: smooth; scrollbar-width: none; }
        .reel-container::-webkit-scrollbar { display: none; }
        .reel-video { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        /* ফেসবুকের মতো অ্যাড ব্যানার স্টাইল */
        .banner-ad { 
            position: absolute; 
            bottom: 25px; 
            left: 15px; 
            right: 15px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            border-radius: 20px; 
            padding: 15px; 
            z-index: 100; 
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        
        .overlay-gradient { background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; height: 50%; pointer-events: none; }
        #commentSheet { transition: transform 0.4s ease; z-index: 1000; transform: translateY(100%); border-radius: 30px 30px 0 0; }
        #commentSheet.active { transform: translateY(0); }
        .comment-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(4px); }
        .comment-blur.active { display: block; }
    </style>
</head>
<body>

    <div id="commentBlur" class="comment-blur" onclick="closeComments()"></div>
    <div class="reel-container" id="reelContainer"></div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 bg-white h-[70vh] p-6 shadow-2xl flex flex-col">
        <div class="w-16 h-1.5 bg-gray-200 rounded-full mx-auto mb-4" onclick="closeComments()"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-4 mb-4 text-black font-medium"></div>
        <div class="flex items-center gap-3 border-t pt-4">
            <input type="text" id="commentInput" placeholder="Add comment..." class="flex-1 bg-gray-100 rounded-2xl px-5 py-4 text-black outline-none">
            <button onclick="postComment()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <a href="home.html" class="fixed top-8 left-6 z-[110] text-white text-2xl opacity-80"><i class="fas fa-chevron-left"></i></a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, increment, addDoc, serverTimestamp, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let activePostId = null;
        let globalAdCode = ""; // অ্যাড কোড স্টোর করার জন্য

        onAuthStateChanged(auth, user => { 
            currentUser = user; 
            fetchAdsAndLoadReels(); 
        });

        // অ্যাড এবং ভিডিও একসাথে লোড করার ফাংশন
        async function fetchAdsAndLoadReels() {
            try {
                // ১. অ্যাডমিন সেটিংস থেকে একটিভ অ্যাড নিয়ে আসা
                // আপনার ডাটাবেস পাথ অনুযায়ী চেক করুন: appSettings -> ads_container -> all_ads
                const adSnap = await getDocs(query(collection(db, "appSettings", "ads_container", "all_ads"), where("status", "==", true)));
                
                if (!adSnap.empty) {
                    // র‍্যান্ডমলি একটা অ্যাড সিলেক্ট করা
                    const randomAd = adSnap.docs[Math.floor(Math.random() * adSnap.size)].data();
                    globalAdCode = randomAd.code || ""; 
                }

                loadReels();
            } catch (e) {
                console.error("Ad Load Error:", e);
                loadReels(); // অ্যাড লোড না হলেও ভিডিও লোড হবে
            }
        }

        async function loadReels() {
            const q = query(collection(db, "posts"), where("fileType", "==", "video"));
            onSnapshot(q, async snap => {
                const container = document.getElementById('reelContainer');
                container.innerHTML = "";
                
                for (const postDoc of snap.docs) {
                    const p = postDoc.data();
                    const id = postDoc.id;
                    const authorSnap = await getDoc(doc(db, "users", p.userId));
                    const author = authorSnap.data() || {};
                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const div = document.createElement('div');
                    div.className = "reel-video";
                    div.innerHTML = `
                        <video src="${p.fileUrl}" loop playsinline preload="metadata" muted onplay="window.handleEarning('${id}')"></video>
                        <div class="overlay-gradient"></div>
                        
                        ${globalAdCode ? `<div class="banner-ad animate-bounce-short">${globalAdCode}</div>` : ''}

                        <div class="absolute right-5 bottom-44 flex flex-col gap-8 text-white text-center z-[105]">
                            <button onclick="window.likeReel('${id}', event)" class="text-3xl">
                                <i class="${isLiked ? 'fas text-red-500' : 'far'} fa-heart"></i>
                            </button>
                            <button onclick="window.openComments('${id}', event)" class="text-3xl"><i class="far fa-comment-dots"></i></button>
                            <button onclick="window.sharePost('${p.fileUrl}', event)" class="text-3xl"><i class="fas fa-share"></i></button>
                        </div>

                        <div class="absolute left-5 bottom-40 text-white z-[105] flex items-center gap-3">
                            <img src="${author.profilePic || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-full border-2 border-white object-cover">
                            <div>
                                <h4 class="font-bold text-sm shadow-sm">@${author.name || 'user'}</h4>
                                <p class="text-xs opacity-90">${p.text || ''}</p>
                            </div>
                        </div>
                    `;
                    div.onclick = () => { 
                        const v = div.querySelector('video'); 
                        v.paused ? v.play() : v.pause(); 
                        v.muted = false; 
                    };
                    container.appendChild(div);
                }
                setupAutoPlay();
            });
        }

        // আর্নিং লজিক: শুধুমাত্র অ্যাড থাকলে টাকা বাড়বে
        window.handleEarning = async (postId) => {
            if(!currentUser) return;
            // ভিউ বাড়ানো
            updateDoc(doc(db, "posts", postId), { views: increment(1) });

            // যদি অ্যাড শো করে (globalAdCode খালি না থাকে)
            if (globalAdCode !== "") {
                const algSnap = await getDoc(doc(db, "appSettings", "algorithm"));
                const rate = algSnap.exists() ? (algSnap.data().trendBoost / 1000) : 0.001;
                // ইউজারের ব্যালেন্স আপডেট
                updateDoc(doc(db, "users", currentUser.uid), { balance: increment(rate) });
            }
        };

        function setupAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        if (entry.isIntersecting) video.play().catch(() => {});
                        else { video.pause(); video.muted = true; }
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.reel-video').forEach(rv => observer.observe(rv));
        }

        // লাইক, কমেন্ট ও শেয়ার ফাংশন (আগের মতোই নিখুঁত)
        window.likeReel = async (id, e) => {
            e.stopPropagation();
            const ref = doc(db, "posts", id);
            const snap = await getDoc(ref);
            const isLiked = snap.data().likedBy?.includes(currentUser.uid);
            updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.sharePost = (url, e) => { e.stopPropagation(); navigator.share ? navigator.share({url}) : prompt("Link:", url); };
        window.openComments = (id, e) => { e.stopPropagation(); activePostId = id; document.getElementById('commentSheet').classList.add('active'); document.getElementById('commentBlur').classList.add('active'); };
        window.closeComments = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('commentBlur').classList.remove('active'); };
    </script>
</body>
</html>
