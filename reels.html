<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels - My Book Elite Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body, html { height: 100%; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; }
        .reel-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scroll-behavior: smooth; scrollbar-width: none; }
        .reel-container::-webkit-scrollbar { display: none; }
        .reel-video { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .overlay-gradient { background: linear-gradient(transparent, rgba(0,0,0,0.95)); position: absolute; bottom: 0; width: 100%; height: 60%; pointer-events: none; }
        
        /* Ad Manager Pro Style */
        .banner-ad { position: absolute; bottom: 100px; left: 10px; right: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 16px; padding: 12px; z-index: 50; border: 1px solid rgba(255,255,255,0.2); text-align: center; color: white; font-size: 10px; font-weight: bold; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); border-radius: 35px 35px 0 0; }
        #commentSheet.active { transform: translateY(0); }
        .comment-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; backdrop-filter: blur(8px); }
        .comment-blur.active { display: block; }
    </style>
</head>
<body class="bg-black">

    <div id="commentBlur" class="comment-blur" onclick="closeComments()"></div>

    <div class="reel-container" id="reelContainer">
        <div class="h-full flex items-center justify-center text-white/20 font-black tracking-widest text-[10px] uppercase">
            Initializing 12-Dafa Security Shield...
        </div>
    </div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 bg-white h-[75vh] p-8 shadow-2xl flex flex-col">
        <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeComments()"></div>
        <h3 class="font-black text-gray-900 text-center uppercase tracking-[2px] text-xs mb-6" id="totalComments">Feedback Hub (0)</h3>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 mb-4 pr-2 no-scrollbar"></div>
        <div class="flex flex-col gap-3 border-t pt-5 bg-white">
            <div id="replyIndicator" class="hidden text-[9px] text-blue-600 font-black uppercase tracking-widest ml-2 flex justify-between">
                <span id="replyingToText">Replying to...</span>
                <button onclick="cancelReply()" class="text-red-500">Cancel</button>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 bg-gray-50 border-none rounded-2xl px-6 py-4 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-100">
                <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition">
                    <i class="fas fa-paper-plane text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <a href="home.html" class="fixed top-10 left-6 z-[60] text-white text-xl p-3 bg-black/20 rounded-full backdrop-blur-md">
        <i class="fas fa-chevron-left"></i>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let activePostId = null;
        let replyToId = null;
        let adminConfig = {};

        onAuthStateChanged(auth, async user => { 
            if(user) {
                currentUser = user;
                const status = await checkGlobalSecurity(user.uid);
                if(status) loadMasterReels();
            } else { window.location.href="index.html"; }
        });

        // ১২ দফা: সিকিউরিটি শিল্ড, মেইনটেন্যান্স এবং হার্ড ব্যান চেক
        async function checkGlobalSecurity(uid) {
            const uSnap = await getDoc(doc(db, "users", uid));
            const uData = uSnap.data() || {};

            // দফা ৬: Hard Ban
            if(uData.isHardBanned) {
                document.body.innerHTML = `<div class="h-screen bg-black flex flex-col items-center justify-center p-10 text-center"><i class="fas fa-skull-crossbones text-red-600 text-6xl mb-6"></i><h1 class="text-white font-black uppercase tracking-tighter">Your Device is Permanently Banned</h1></div>`;
                return false;
            }

            // দফা ২: Maintenance Mode
            const mSnap = await getDoc(doc(db, "appSettings", "adminConfig"));
            adminConfig = mSnap.data() || {};
            if(adminConfig.maintenanceMode) {
                document.body.innerHTML = `<div class="h-screen bg-white flex flex-col items-center justify-center p-10 text-center"><i class="fas fa-tools text-blue-600 text-6xl mb-6"></i><h1 class="text-gray-900 font-black uppercase tracking-widest text-sm">Under Maintenance</h1><p class="text-gray-400 text-xs mt-2">অ্যাডমিন অ্যাপ আপডেট করছে। কিছুক্ষণ পর ট্রাই করুন।</p></div>`;
                return false;
            }
            return true;
        }

        async function loadMasterReels() {
            // দফা ৩: Ad Manager - রেন্ডম অ্যাড লোড
            const adCode = adminConfig.adStatus ? adminConfig.adCode : "";

            let q = query(collection(db, "posts"), where("fileType", "==", "video"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, async snap => {
                const container = document.getElementById('reelContainer');
                container.innerHTML = snap.empty ? "<p class='text-white text-center mt-20 opacity-20'>No Reels Found</p>" : "";

                for (const postDoc of snap.docs) {
                    const p = postDoc.data();
                    const pid = postDoc.id;

                    // দফা ১: Shadow Ban চেক (নিজের ভিডিও ছাড়া অন্যদের শ্যাডো ব্যান করা ভিডিও লুকানো)
                    const authorSnap = await getDoc(doc(db, "users", p.userId));
                    const author = authorSnap.data() || {};
                    if(author.isShadowBanned && p.userId !== currentUser.uid) continue;

                    // দফা ১০: কাস্টম স্ট্যাটাস (ফেক ভিউ/লাইক)
                    const displayLikes = p.fakeLikes || p.likes || 0;
                    const displayViews = p.fakeViews || p.views || 0;
                    const isVerified = author.isVerified || false; // দফা ৯: নীল টিক
                    const isLiked = p.likedBy?.includes(currentUser.uid);
                    
                    const reel = document.createElement('div');
                    reel.className = "reel-video";
                    reel.innerHTML = `
                        <video src="${p.fileUrl}" loop playsinline onplay="window.trackMasterView('${pid}', '${p.userId}')"></video>
                        <div class="overlay-gradient"></div>
                        
                        ${adCode ? `<div class="banner-ad"> ${adCode} </div>` : ''}

                        <div class="absolute right-6 bottom-40 flex flex-col gap-8 text-white text-center z-50">
                            <div class="flex flex-col items-center">
                                <button onclick="window.likeMasterReel('${pid}', event)" id="btn-${pid}" class="text-3xl active:scale-150 transition">
                                    <i class="${isLiked ? 'fas text-red-500' : 'far'} fa-heart drop-shadow-xl"></i>
                                </button>
                                <span class="text-[10px] font-black mt-2 uppercase tracking-tighter">${displayLikes}</span>
                            </div>
                            <div class="flex flex-col items-center" onclick="window.openComments('${pid}', event)">
                                <i class="far fa-comment-dots text-3xl"></i>
                                <span class="text-[10px] font-black mt-2 uppercase tracking-tighter">Chat</span>
                            </div>
                            <div class="flex flex-col items-center" onclick="window.reportMaster('${p.userId}', event)">
                                <i class="fas fa-flag text-2xl opacity-40"></i>
                                <span class="text-[8px] font-black mt-2 uppercase opacity-40 tracking-widest">Report</span>
                            </div>
                        </div>

                        <div class="absolute left-6 bottom-32 text-white z-50 max-w-[70%]">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-11 h-11 rounded-full p-[2px] bg-gradient-to-tr from-yellow-400 to-fuchsia-600">
                                    <img src="${author.profilePic || 'https://via.placeholder.com/150'}" class="w-full h-full rounded-full object-cover border-2 border-black">
                                </div>
                                <div>
                                    <h4 class="font-black text-sm flex items-center gap-1 uppercase tracking-tighter">
                                        @${author.name || 'user'} ${isVerified ? '<i class="fas fa-check-circle text-blue-400 text-[10px]"></i>' : ''}
                                    </h4>
                                    <p class="text-[10px] font-bold text-white/60 tracking-widest uppercase mt-0.5"><i class="fas fa-play mr-1"></i> ${displayViews} Views</p>
                                </div>
                            </div>
                            <p class="text-[12px] font-medium leading-relaxed opacity-90">${p.text || ''}</p>
                        </div>
                    `;
                    reel.onclick = () => { const v = reel.querySelector('video'); v.paused ? v.play() : v.pause(); };
                    container.appendChild(reel);
                }
                setupAutoPlay();
            });
        }

        // দফা ৪: CPM Engine লজিক (ভিউ হলে টাকা যোগ)
        window.trackMasterView = async (pid, authorId) => {
            const postRef = doc(db, "posts", pid);
            await updateDoc(postRef, { views: increment(1) });

            // মনিটাইজেশন আর্নিং লজিক (প্রতি ভিউতে এডমিনের সেট করা রেট)
            const authorSnap = await getDoc(doc(db, "users", authorId));
            if(authorSnap.data()?.isMonetized) {
                const cpmRate = adminConfig.cpmRate || 0.05;
                const earn = cpmRate / 1000;
                await updateDoc(doc(db, "users", authorId), { balance: increment(earn) });
                await updateDoc(postRef, { earnings: increment(earn) });
            }
        };

        // দফা ৮: ইউজার রিপোর্টিং সিস্টেম
        window.reportMaster = async (targetUid, e) => {
            e.stopPropagation();
            const reason = prompt("রিপোর্টের কারণ লিখুন (অশ্লীলতা/হয়রানি/স্প্যাম):");
            if(reason) {
                await addDoc(collection(db, "reports"), {
                    targetId: targetUid, reporterId: currentUser.uid,
                    reason: reason, createdAt: serverTimestamp(), status: 'pending'
                });
                alert("আপনার রিপোর্ট রেকর্ড করা হয়েছে।");
            }
        };

        // অটো-প্লে সিস্টেম
        function setupAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video && entry.isIntersecting) video.play().catch(()=>{}); 
                    else if(video) video.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-video').forEach(rv => observer.observe(rv));
        }

        // --- Like & Comment লজিক আপনার অরিজিনাল কোডের মতোই থাকবে ---
        window.likeMasterReel = async (id, e) => {
            e.stopPropagation();
            const ref = doc(db, "posts", id);
            const isLiked = document.getElementById(`btn-${id}`).querySelector('i').classList.contains('fas');
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.openComments = (postId, e) => { e.stopPropagation(); activePostId = postId; document.getElementById('commentSheet').classList.add('active'); document.getElementById('commentBlur').classList.add('active'); loadComments(postId); };
        window.closeComments = () => { document.getElementById('commentSheet').classList.remove('active'); document.getElementById('commentBlur').classList.remove('active'); cancelReply(); };

        // ... বাকি কমেন্ট ফাংশনগুলো আগের মতোই কাজ করবে ...
    </script>
</body>
</html>
