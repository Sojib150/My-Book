<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>My Book - Reels Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;500;800&display=swap');
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        
        /* 📱 সর্বজনীন রেসপনসিভ কন্টেইনার */
        .reels-container { height: calc(100vh - 80px); height: calc(100dvh - 80px); overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        
        /* 📱 ভিডিও কার্ডকে স্ক্রিনের উচ্চতার সাথে ১০০% লক করা হয়েছে */
        .reel-card { height: calc(100vh - 80px); height: calc(100dvh - 80px); width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* 📱 অল-মোবাইল অটো ফিট ভিডিও ইঞ্জিন (ভিডিও কাটবে না কখনোই) */
        .video-wrapper { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; background: #000; max-height: 100%; }

        /* 📱 নচ ফ্রেন্ডলি এলিট হেডার এবং সার্চ ডিজাইন */
        .elite-header { position: fixed; top: 0; left: 0; right: 0; padding-top: calc(env(safe-area-inset-top) + 12px); padding-bottom: 14px; padding-left: 16px; padding-right: 16px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.95) 75%, transparent); display: flex; align-items: center; justify-content: space-between; pointer-events: none; }
        .tab-btn { position: relative; font-size: 14px; font-weight: 800; color: #64748b; transition: all 0.25s ease; padding: 6px 4px; }
        .tab-btn.active-tab { color: #fff; }
        .tab-btn.active-tab::after { content: ''; position: absolute; bottom: -2px; left: 20%; right: 20%; height: 2.5px; background: #1877f2; border-radius: 10px; box-shadow: 0 0 8px #1877f2; }
        .search-glass-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; align-items: center; padding: 0 10px; height: 38px; width: 130px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .search-glass-box:focus-within { width: 160px; border-color: rgba(24, 119, 242, 0.4); background: rgba(255, 255, 255, 0.14); }
        .pointer-events-auto { pointer-events: auto; }

        /* 📱 সাইড বার এবং বটম ইনফো অ্যাডজাস্টমেন্ট (নিখুঁত ওভারলে মার্জিন) */
        .side-bar { position: absolute; right: 14px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 30; }
        .bottom-info { position: absolute; bottom: 125px; left: 15px; right: 80px; z-index: 30; text-shadow: 0 2px 8px rgba(0,0,0,0.9); transition: bottom 0.3s ease; }
        .bottom-info.expanded-info { bottom: 185px; } 
        
        /* 📱 ফেসবুক স্টাইল প্রফেশনাল স্পনসرد অ্যাড স্লট (ভিডিও ফ্রেমের সাথে রেসপনসিভ) */
        .bottom-ad-slot { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(12, 16, 26, 0.95); backdrop-filter: blur(10px); padding: 10px 16px calc(env(safe-area-inset-bottom) + 10px); display: flex; flex-direction: column; justify-content: center; min-height: 85px; z-index: 25; border-top: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5); }
        
        /* যখন অ্যাড থাকবে, তখন সাইডবার ও বটম টেক্সট স্বয়ংক্রিয়ভাবে ওপরে উঠে যাবে */
        .reel-card:has(.bottom-ad-slot:not(.hidden)) .side-bar { bottom: 195px; }
        .reel-card:has(.bottom-ad-slot:not(.hidden)) .bottom-info { bottom: 200px; }
        .reel-card:has(.bottom-ad-slot:not(.hidden)) .bottom-info.expanded-info { bottom: 260px; }

        .action-btn { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .action-btn:active { transform: scale(0.9); }
        
        /* 📱 ফেসবুক স্টাইল বটম শীট কমেন্ট বক্স */
        #commentSheet { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 1000; transform: translateY(100%); background: #0b0f19; border-radius: 25px 25px 0 0; border-top: 1px solid rgba(255,255,255,0.08); color: white; touch-action: none; }
        #commentSheet.active { transform: translateY(0); }
        #commentSheet.dragging { transition: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .heart-animation { position: absolute; color: white; font-size: 80px; opacity: 0; pointer-events: none; transform: scale(0); transition: all 0.5s ease; z-index: 100; text-shadow: 0 0 20px rgba(24, 119, 242, 0.6); }
        .heart-active { opacity: 0.8; transform: scale(1.2); animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* 📱 Bottom Navigation Bar Styling */
        .nav-glass { background: rgba(8, 12, 20, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.04); padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { color: #64748b; transition: all 0.25s; }
        .nav-btn.active { color: #1877f2; text-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }

        .follow-plus-btn { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: translate(-50%, 50%) scale(0); } 100% { transform: translate(-50%, 50%) scale(1); } }
        
        /* 👑 অ্যাডমিন ও ভেরিফাইড গ্লোয়িং বর্ডার */
        .admin-glow-ring { border: 2px solid transparent; background-image: linear-gradient(#000, #000), linear-gradient(to right, #fbbf24, #f59e0b, #ef4444); background-origin: border-box; background-clip: content-box, border-box; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body>

    <div class="elite-header max-w-md mx-auto">
        <div class="search-glass-box pointer-events-auto">
            <i class="fas fa-search text-gray-400 text-xs mr-2"></i>
            <input type="text" id="creatorSearchInput" placeholder="Search user..." class="w-full bg-transparent text-white text-xs outline-none placeholder-gray-500 font-medium">
            <i id="clearSearchBtn" class="fas fa-times-circle text-gray-500 text-xs hidden cursor-pointer ml-1"></i>
        </div>

        <div class="flex gap-5 items-center justify-center mr-2 pointer-events-auto">
            <button id="tabFollowing" class="tab-btn">Following</button>
            <button id="tabForYou" class="tab-btn active-tab">For You</button>
        </div>
        
        <div class="w-8 flex items-center justify-end">
            <i class="fas fa-circle-nodes text-blue-500/40 text-xs"></i>
        </div>
    </div>

    <div class="reels-container" id="reelsWrapper"></div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 h-[75vh] p-6 shadow-2xl flex flex-col max-w-md mx-auto">
        <div id="commentDragHandler" class="w-16 h-1.5 bg-gray-600 rounded-full mx-auto mb-5 cursor-grab active:cursor-grabbing p-1"></div>
        <h3 class="text-xs font-black uppercase tracking-widest text-blue-500 mb-4">Comments Pipeline</h3>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-24 text-sm" style="touch-action: auto;"></div>
        
        <div id="replyPreview" class="hidden absolute bottom-[80px] left-0 right-0 px-6 py-2 bg-slate-900 flex justify-between items-center text-[10px] border-t border-white/5">
            <span id="replyToText" class="text-blue-400 font-bold italic"></span>
            <button onclick="cancelReply()" class="text-white opacity-50"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-[#0b0f19] flex items-center gap-3 border-t border-white/5">
            <input type="text" id="commentInput" placeholder="Write a public comment..." class="flex-1 bg-slate-900 rounded-2xl p-4 text-white outline-none text-xs border border-white/5 focus:border-blue-500/50">
            <button onclick="postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/20"><i class="fas fa-paper-plane text-xs"></i></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-glass z-50 flex justify-around items-center px-4 max-w-md mx-auto">
        <button onclick="location.href='reels.html'" class="nav-btn active flex flex-col items-center gap-1">
            <i class="fa-solid fa-clapperboard text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Reels</span>
        </button>
        <button onclick="location.href='post.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-square-plus text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Create</span>
        </button>
        <button onclick="location.href='messages.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-comment-dots text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Messages</span>
        </button>
        <button onclick="location.href='profile.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, query, orderBy, where, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let userData = null;
        let globalCPM = 0.0001;
        let viewTimers = {};
        let activePostId = null;
        let replyCommentId = null;
        let isAudioEnabled = false;
        let reelsViewTrack = {}; 
        
        let cachedRawPosts = []; 
        let activeTab = "foryou"; 
        let currentSearchQuery = "";

        // 📱 [NATIVE GATEWAY] MEDIAN ONESIGNAL DEVICE SYNC ENGINE (সুরক্ষিত সেফটি বাফার মেকানিজম)
        function syncUserWithOneSignal(uid) {
            setTimeout(() => {
                try {
                    if (window.gonative && window.gonative.push && window.gonative.push.onesignal) {
                        window.gonative.push.onesignal.setExternalUserId(uid, function(result){
                            if(result && result.success) {
                                console.log("OneSignal Native External ID Linked in Reels for UID:", uid);
                            } else {
                                console.log("OneSignal Reels Sync Failed.");
                            }
                        });
                    } else {
                        console.log("Running in standard browser. Median Native Bridge not active in Reels.");
                    }
                } catch(e) { console.log("OneSignal integration bypassed inside webview container."); }
            }, 1200);
        }

        onAuthStateChanged(auth, async (user) => {
            if(user) { 
                currentUser = user; 
                try {
                    const uSnap = await getDoc(doc(db, "users", user.uid));
                    if(uSnap.exists()) userData = uSnap.data();
                    
                    syncUserWithOneSignal(user.uid);
                    
                    // 🚨 [START] গ্লোবাল ইনকামিং কল লিসেনার নোড (ক্র্যাশ প্রুফ ফিল্টার যুক্ত)
                    try {
                        const inboundCallQuery = query(
                            collection(db, "calls"),
                            where("receiverId", "==", user.uid),
                            where("status", "==", "ringing")
                        );

                        onSnapshot(inboundCallQuery, (snapshot) => {
                            if(!snapshot.empty) {
                                snapshot.forEach(changeDoc => {
                                    const callData = changeDoc.data();
                                    const callId = changeDoc.id;
                                    
                                    document.querySelectorAll('.reel-video').forEach(v => v.pause());
                                    window.location.href = `call.html?callId=${callId}&type=${callData.type}&role=receiver&targetId=${callData.callerId}`;
                                });
                            }
                        }, (err) => { console.log("Call listener matrix ignored"); });
                    } catch(err) { console.log("Call stack execution bypassed safely"); }
                    // 🚨 [END] গ্লোবাল ইনকামিং কল লিসেনার নোড

                    loadRawDataFromFirebase();
                } catch(e) {
                    loadRawDataFromFirebase();
                }
            } else { 
                window.location.href="index.html"; 
            }
        });

        document.body.addEventListener('click', () => { isAudioEnabled = true; }, { once: true });

        // Median অ্যাপের ডিফল্ট Pull-to-refresh বন্ধ করার ইঞ্জিন
        document.addEventListener("DOMContentLoaded", function() {
            try {
                if (window.gonative) { window.gonative.android.setPullToRefresh(false); }
            } catch(e) {}
        });

        async function loadRawDataFromFirebase() {
            try {
                const algoSnap = await getDoc(doc(db, "appSettings", "algorithm"));
                if(algoSnap.exists()) globalCPM = algoSnap.data().trendBoost || 0.0001;
            } catch(e){}

            const wrapper = document.getElementById('reelsWrapper');
            wrapper.innerHTML = '<div class="text-white text-center py-40 text-xs tracking-widest class-load client-sync animate-pulse">SYNCHRONIZING MOTOR ENGINE...</div>'; 

            try {
                const q = query(collection(db, "posts"), where("fileType", "==", "video"), limit(50));
                const snap = await getDocs(q);
                cachedRawPosts = [];
                
                snap.forEach(d => {
                    cachedRawPosts.push({ id: d.id, ...d.data() });
                });

                processAndRenderPipeline();

            } catch(err) {
                console.error(err);
                wrapper.innerHTML = '<div class="text-red-500 text-center py-40 text-xs">ERR: CORE PIPELINE INITIALIZATION FAILURE.</div>';
            }
        }

        function processAndRenderPipeline() {
            let filtered = [...cachedRawPosts];

            if(currentSearchQuery.trim() !== "") {
                const queryLower = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    (p.userName && p.userName.toLowerCase().includes(queryLower)) || 
                    (p.text && p.text.toLowerCase().includes(queryLower))
                );
            }

            if(activeTab === "following") {
                const myFollowing = userData?.following || [];
                filtered = filtered.filter(p => myFollowing.includes(p.userId));
            } else {
                filtered.sort((a, b) => {
                    const isAPinned = a.isPinned === true || a.isAdminPost === true;
                    const isBPinned = b.isPinned === true || b.isAdminPost === true;
                    
                    if (isAPinned && !isBPinned) return -1;
                    if (!isAPinned && isBPinned) return 1;

                    const scoreA = (a.likedBy?.length || 0) * 3 + (a.commentCount || 0) * 5;
                    const scoreB = (b.likedBy?.length || 0) * 3 + (b.commentCount || 0) * 5;
                    return scoreB - scoreA;
                });

                let pinnedCount = filtered.filter(p => p.isPinned === true || p.isAdminPost === true).length;
                let topIndex = Math.max(5, pinnedCount);

                if(filtered.length > topIndex) {
                    let trendingTop = filtered.slice(0, topIndex);
                    let normalPool = filtered.slice(topIndex);
                    normalPool.sort(() => Math.random() - 0.5);
                    filtered = trendingTop.concat(normalPool);
                }
            }

            renderViewDOM(filtered);
        }

        window.toggleCaption = (btn, postId) => {
            const pText = document.getElementById(`caption-${postId}`);
            const infoBox = document.getElementById(`info-box-${postId}`);
            if(pText.classList.contains('line-clamp-3')) {
                pText.classList.remove('line-clamp-3');
                btn.innerText = "less";
                infoBox.classList.add('expanded-info');
            } else {
                pText.classList.add('line-clamp-3');
                btn.innerText = "more";
                infoBox.classList.remove('expanded-info');
            }
        };

        async function renderViewDOM(postsArray) {
            const wrapper = document.getElementById('reelsWrapper');
            wrapper.innerHTML = "";

            if(postsArray.length === 0) {
                if(activeTab === "following") {
                    wrapper.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full px-10 text-center">
                            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/10 mb-3"><i class="fas fa-users text-gray-500 text-sm"></i></div>
                            <div class="text-gray-400 text-xs font-bold tracking-wide uppercase">No Following Updates</div>
                        </div>`;
                } else {
                    wrapper.innerHTML = '<div class="text-gray-500 text-center py-40 text-xs uppercase font-bold tracking-wider">No reels match your search.</div>';
                }
                return;
            }

            let adCode = "";
            try {
                const adSnap = await getDoc(doc(db, "appSettings", "ads"));
                adCode = adSnap.exists() ? (adSnap.data().shortsBannerCode || adSnap.data().code || "") : "";
            } catch(e){}
            const myFollowing = userData?.following || [];

            postsArray.forEach((p) => {
                const id = p.id;
                const isLiked = p.likedBy?.includes(currentUser?.uid);
                const isMonetized = p.isCreatorMonetized === true;
                const shouldShowFollowPlus = (p.userId !== currentUser?.uid) && !myFollowing.includes(p.userId);
                const isAdmin = p.isAdminPost === true || p.isPinned === true;
                const isLongText = p.text && p.text.length > 90;

                const card = document.createElement('div');
                card.className = "reel-card";
                card.innerHTML = `
                    <div class="video-wrapper" ondblclick="window.handleDoubleTap(this, '${id}')">
                        <i class="fas fa-heart heart-animation"></i>
                        <video src="${p.fileUrl}" loop muted playsinline class="reel-video" onclick="window.handleReelTap(this)" data-id="${id}" data-owner="${p.userId}" data-monetized="${isMonetized}"></video>
                    </div>
                    <div class="side-bar">
                        <div class="flex flex-col items-center">
                            <button id="likeBtn-${id}" onclick="window.likeReel('${id}')" class="action-btn text-lg ${isLiked ? 'text-red-500' : 'text-white'}"><i class="${isLiked ? 'fas' : 'far'} fa-heart"></i></button>
                            <span id="likeCount-${id}" class="text-[9px] text-gray-400 font-extrabold mt-1.5">${p.likedBy?.length || 0}</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <button onclick="window.openComments('${id}')" class="action-btn text-lg"><i class="far fa-comment-dots"></i></button>
                            <span id="count-${id}" class="text-[9px] text-gray-400 font-extrabold mt-1.5">${p.commentCount || 0}</span>
                        </div>
                        <button onclick="window.shareReel('${id}')" class="action-btn text-lg"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    
                    <div class="bottom-info" id="info-box-${id}">
                        <div class="flex items-center gap-2.5 mb-2.5 relative">
                            <div class="relative cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                                <img src="${p.userPic || 'https://via.placeholder.com/150'}" class="w-9 h-9 rounded-full object-cover ${isAdmin ? 'admin-glow-ring' : 'border border-white/20'}">
                                ${shouldShowFollowPlus ? `
                                    <button id="followPlus-${p.userId}" onclick="event.stopPropagation(); window.followCreatorInline('${p.userId}')" class="follow-plus-btn absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 bg-blue-600 text-white w-4 h-4 rounded-full flex items-center justify-center border border-black text-[9px]">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                ` : ''}
                            </div>
                            <div class="cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                                <h4 class="text-white font-black text-xs flex items-center gap-1">
                                    @${p.userName || 'creator'}
                                    ${isAdmin ? `<i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i>` : ''}
                                </h4>
                                ${isAdmin ? `<span class="bg-gradient-to-r from-red-500 to-amber-500 text-white text-[6px] font-black px-1.5 py-0.5 rounded-sm tracking-wider uppercase inline-block mt-0.5"><i class="fa-solid fa-star mr-0.5"></i>ADMIN ANNOUNCEMENT</span>` : (isMonetized ? `<span class="bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[6px] font-black px-1.5 py-0.5 rounded-sm tracking-wider uppercase inline-block mt-0.5"><i class="fa-solid fa-circle-check mr-0.5"></i>Monetized</span>` : '')}
                            </div>
                        </div>
                        
                        <div class="text-white/90 text-[11px] leading-relaxed pr-2">
                            <p id="caption-${id}" class="inline line-clamp-3 transition-all duration-300 break-words">${p.text || ''}</p>
                            ${isLongText ? `<button onclick="window.toggleCaption(this, '${id}')" class="text-gray-400 font-bold ml-1 outline-none text-[10px] lowercase focus:text-blue-400">more</button>` : ''}
                        </div>
                    </div>
                    
                    <div class="bottom-ad-slot ${isMonetized ? '' : 'hidden'}" id="ad-box-${id}" data-ad-code="${encodeURIComponent(adCode)}">
                        <div class="flex justify-between items-center w-full text-[8px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">
                            <div class="flex items-center gap-1">
                                <i class="fa-solid fa-earth-americas text-blue-500 text-[9px]"></i>
                                <span>Sponsored Distribution</span>
                            </div>
                            <i class="fas fa-ellipsis-h text-gray-500 cursor-pointer"></i>
                        </div>
                        <div class="w-full bg-white/[0.02] rounded-xl overflow-hidden border border-white/5" id="ad-content-target-${id}"></div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
            
            setTimeout(initObserver, 200);
        }

        document.getElementById('tabFollowing').onclick = () => {
            if(activeTab === "following") return;
            activeTab = "following";
            document.getElementById('tabForYou').classList.remove('active-tab');
            document.getElementById('tabFollowing').classList.add('active-tab');
            processAndRenderPipeline();
        };

        document.getElementById('tabForYou').onclick = () => {
            if(activeTab === "foryou") return;
            activeTab = "foryou";
            document.getElementById('tabFollowing').classList.remove('active-tab');
            document.getElementById('tabForYou').classList.add('active-tab');
            processAndRenderPipeline();
        };

        const searchInput = document.getElementById('creatorSearchInput');
        const clearBtn = document.getElementById('clearSearchBtn');

        searchInput.oninput = (e) => {
            currentSearchQuery = e.target.value;
            if(currentSearchQuery.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            processAndRenderPipeline();
        };

        clearBtn.onclick = () => {
            searchInput.value = "";
            currentSearchQuery = "";
            clearBtn.classList.add('hidden');
            processAndRenderPipeline();
        };

        window.followCreatorInline = async (targetCreatorId) => {
            if(!currentUser) return;
            try {
                const myRef = doc(db, "users", currentUser.uid);
                const targetRef = doc(db, "users", targetCreatorId);
                await updateDoc(myRef, { following: arrayUnion(targetCreatorId) });
                await updateDoc(targetRef, { followers: arrayUnion(currentUser.uid) });
                
                if(userData) {
                    if(!userData.following) userData.following = [];
                    userData.following.push(targetCreatorId);
                }

                const allPlusButtons = document.querySelectorAll(`[id="followPlus-${targetCreatorId}"]`);
                allPlusButtons.forEach(btn => {
                    btn.style.transform = "translate(-50%, 50%) scale(0)";
                    btn.style.transition = "transform 0.3s ease";
                    setTimeout(() => btn.remove(), 300);
                });

                await addDoc(collection(db, "notifications"), {
                    targetUserId: targetCreatorId,
                    senderId: currentUser.uid,
                    senderName: userData?.name || "Someone",
                    senderPic: userData?.profilePic || "",
                    type: "follow",
                    message: "আপনাকে ফলো করা শুরু করেছেন।",
                    read: false,
                    timestamp: serverTimestamp()
                });
            } catch (err) { console.error(err); }
        };

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    const id = vid.getAttribute('data-id');
                    const owner = vid.getAttribute('data-owner');
                    const isMonetized = vid.getAttribute('data-monetized') === "true";
                    const adTarget = document.getElementById(`ad-content-target-${id}`);
                    const adBox = document.getElementById(`ad-box-${id}`);

                    if (entry.isIntersecting) {
                        vid.play().catch(() => {});
                        if(isAudioEnabled) vid.muted = false;
                        
                        if(isMonetized && adBox && adTarget && adTarget.innerHTML.trim() === "") {
                            const rawAd = decodeURIComponent(adBox.getAttribute('data-ad-code'));
                            if(rawAd && rawAd !== "undefined" && rawAd !== "") {
                                try {
                                    const range = document.createRange();
                                    const fragment = range.createContextualFragment(rawAd);
                                    adTarget.appendChild(fragment);
                                } catch(adErr) { adTarget.innerHTML = rawAd; }
                            } else {
                                adTarget.innerHTML = '<div class="text-center text-[9px] py-2 text-blue-400 font-bold uppercase tracking-wider">Loading Revenue Partner Ads...</div>';
                            }
                        }
                        viewTimers[id] = setTimeout(() => handleView(id, owner, isMonetized), 5000);
                    } else { 
                        vid.pause(); 
                        vid.muted = true; 
                        clearTimeout(viewTimers[id]); 
                    }
                });
            }, { threshold: 0.60 });
            document.querySelectorAll('.reel-video').forEach(v => observer.observe(v));
        }

        window.handleDoubleTap = async (el, id) => {
            const heart = el.querySelector('.heart-animation');
            if(heart) {
                heart.classList.add('heart-active');
                setTimeout(() => heart.classList.remove('heart-active'), 800);
            }
            await window.likeReel(id);
        };

        async function handleView(postId, ownerId, isMonetized) {
            if (currentUser && ownerId === currentUser.uid) return;
            if(!reelsViewTrack[postId]) {
                reelsViewTrack[postId] = true;
                try {
                    await updateDoc(doc(db, "posts", postId), { views: increment(1) });
                    if(ownerId) {
                        await updateDoc(doc(db, "users", ownerId), { totalImpressions: increment(1) });
                    }
                } catch(e){}
            }
            if (isMonetized && currentUser) {
                try {
                    await addDoc(collection(db, "adImpressions"), {
                        viewerUid: currentUser.uid, creatorUid: ownerId, postId: postId,
                        amount: globalCPM, type: "banner-shorts-post", timestamp: serverTimestamp()
                    });
                } catch(e) {}
            }
        }

        window.handleReelTap = (v) => {
            if(v.paused) { v.play().catch(()=>{}); if(isAudioEnabled) v.muted = false; } else { v.pause(); }
        };

        window.likeReel = async (id) => {
            if(!currentUser) return;
            try {
                const ref = doc(db, "posts", id);
                const pSnap = await getDoc(ref);
                if(!pSnap.exists()) return;
                
                const likedArr = pSnap.data().likedBy || [];
                const isLiked = likedArr.includes(currentUser.uid);
                const btn = document.getElementById(`likeBtn-${id}`);
                const countSpan = document.getElementById(`likeCount-${id}`);

                if (isLiked) {
                    await updateDoc(ref, { likedBy: arrayRemove(currentUser.uid) });
                    if(btn) { btn.classList.remove('text-red-500'); btn.classList.add('text-white'); btn.innerHTML = '<i class="far fa-heart"></i>'; }
                    if(countSpan) countSpan.innerText = Math.max(0, likedArr.length - 1);
                    
                    const cIdx = cachedRawPosts.findIndex(x => x.id === id);
                    if(cIdx !== -1) cachedRawPosts[cIdx].likedBy = likedArr.filter(uid => uid !== currentUser.uid);
                } else {
                    await updateDoc(ref, { likedBy: arrayUnion(currentUser.uid) });
                    if(btn) { btn.classList.remove('text-white'); btn.classList.add('text-red-500'); btn.innerHTML = '<i class="fas fa-heart"></i>'; }
                    if(countSpan) countSpan.innerText = likedArr.length + 1;
                    
                    const cIdx = cachedRawPosts.findIndex(x => x.id === id);
                    if(cIdx !== -1) {
                        if(!cachedRawPosts[cIdx].likedBy) cachedRawPosts[cIdx].likedBy = [];
                        cachedRawPosts[cIdx].likedBy.push(currentUser.uid);
                    }
                }
            } catch(e) { console.log(e); }
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').style.transform = "translateY(0)";
            document.getElementById('commentSheet').classList.add('active');
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.data(); const cid = c.id;
                    const isCLiked = d.likes?.includes(currentUser.uid);
                    list.innerHTML += `
                        <div class="flex gap-3">
                            <img src="${d.userPic || 'https://via.placeholder.com/150'}" class="w-8 h-8 rounded-full object-cover">
                            <div class="flex-1">
                                <div class="flex justify-between">
                                    <p class="text-blue-400 font-bold text-xs">@${d.userName || 'user'}</p>
                                    <button onclick="window.likeComment('${cid}')" class="${isCLiked ? 'text-red-500' : 'text-gray-500'} text-[10px]">
                                        <i class="fas fa-heart"></i> ${d.likes?.length || 0}
                                    </button>
                                </div>
                                <p class="text-gray-200 text-xs mt-1">
                                    ${d.replyTo ? `<span class="text-blue-500 font-bold">@${d.replyTo}</span> ` : ''}${d.text}
                                </p>
                                <button onclick="window.setupReply('${cid}', '${d.userName}')" class="text-gray-500 text-[9px] font-bold mt-2 uppercase tracking-wider">Reply</button>
                            </div>
                        </div>`;
                });
            });
        };

        const sheet = document.getElementById('commentSheet');
        let startY = 0;
        let currentY = 0;
        let isDragging = false;

        sheet.addEventListener('touchstart', (e) => {
            if (e.target.closest('#commentList') && e.target.closest('#commentList').scrollTop > 0) return;
            startY = e.touches[0].clientY;
            sheet.classList.add('dragging');
            isDragging = true;
        }, { passive: true });

        sheet.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY - startY;
            if (currentY > 0) sheet.style.transform = `translateY(${currentY}px)`;
        }, { passive: true });

        sheet.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            sheet.classList.remove('dragging');
            if (currentY > window.innerHeight * 0.20) {
                window.closeComments();
            } else {
                sheet.style.transform = "translateY(0)";
            }
            currentY = 0;
        });

        window.likeComment = async (cid) => {
            if(!currentUser || !activePostId) return;
            try {
                const ref = doc(db, "posts", activePostId, "comments", cid);
                const snap = await getDoc(ref);
                const isLiked = snap.data().likes?.includes(currentUser.uid);
                await updateDoc(ref, { likes: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
            } catch(e){}
        };

        window.setupReply = (cid, name) => {
            replyCommentId = cid;
            document.getElementById('replyPreview').classList.remove('hidden');
            document.getElementById('replyToText').innerText = `Replying to @${name}`;
            document.getElementById('commentInput').focus();
        };

        window.cancelReply = () => {
            replyCommentId = null;
            document.getElementById('replyPreview').classList.add('hidden');
        };

        window.postComment = async () => {
            const input = document.getElementById('commentInput');
            if(!input.value.trim() || !activePostId || !currentUser) return;
            
            try {
                const commentData = {
                    text: input.value, userId: currentUser.uid, userName: userData?.name || "User",
                    userPic: userData?.profilePic || "", likes: [], timestamp: serverTimestamp()
                };
                
                if (replyCommentId) {
                    const rSnap = await getDoc(doc(db, "posts", activePostId, "comments", replyCommentId));
                    if(rSnap.exists()) commentData.replyTo = rSnap.data().userName;
                    window.cancelReply();
                }
                
                await addDoc(collection(db, "posts", activePostId, "comments"), commentData);
                await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
                
                const cIdx = cachedRawPosts.findIndex(x => x.id === activePostId);
                if(cIdx !== -1) cachedRawPosts[cIdx].commentCount = (cachedRawPosts[cIdx].commentCount || 0) + 1;

                const cc = document.getElementById(`count-${activePostId}`);
                if(cc) cc.innerText = parseInt(cc.innerText) + 1;
                
                input.value = "";
            } catch(e){}
        };

        window.closeComments = () => { 
            sheet.style.transform = "translateY(100%)";
            sheet.classList.remove('active'); 
            window.cancelReply(); 
        };

        window.shareReel = (id) => {
            try {
                const url = window.location.origin + "/post-view.html?id=" + id;
                navigator.clipboard.writeText(url);
                Swal.fire({ 
                    title: 'Link Copied!', icon: 'success', background: '#0b0f19', color: '#f1f5f9', timer: 1000, showConfirmButton: false 
                });
            } catch(e){}
        };
    </script>
</body>
</html>
