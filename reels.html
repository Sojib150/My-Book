<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Reels Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .video-wrapper { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .side-bar { position: absolute; right: 12px; bottom: 160px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .bottom-info { position: absolute; bottom: 50px; left: 15px; right: 80px; z-index: 10; }
        
        .action-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); background: #111827; border-radius: 30px 30px 0 0; border-top: 1px solid #1e293b; color: white; }
        #commentSheet.active { transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsWrapper"></div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 h-[75vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeComments()"></div>
        <h3 class="text-sm font-black uppercase tracking-widest text-indigo-400 mb-4">Comments</h3>
        
        <div id="commentList" class="flex-1 overflow-y-auto space-y-6 no-scrollbar pb-24 text-sm"></div>

        <div id="replyPreview" class="hidden absolute bottom-[80px] left-0 right-0 px-6 py-2 bg-gray-800 flex justify-between items-center text-[10px]">
            <span id="replyToText" class="text-indigo-400 font-bold italic"></span>
            <button onclick="cancelReply()" class="text-white opacity-50"><i class="fas fa-times"></i></button>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-[#111827] flex items-center gap-3 border-t border-gray-800">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 bg-gray-800 rounded-2xl p-4 text-white outline-none text-sm border border-gray-700">
            <button onclick="postComment()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, query, orderBy, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let userData = null;
        let globalCPM = 0.0001;
        let viewTimers = {};
        let activePostId = null;
        let replyCommentId = null;
        let isAudioEnabled = false;

        onAuthStateChanged(auth, async (user) => {
            if(user) { 
                currentUser = user; 
                const uSnap = await getDoc(doc(db, "users", user.uid));
                userData = uSnap.data();
                renderReels(); 
            } else { window.location.href="index.html"; }
        });

        // সাউন্ড অ্যাক্টিভেট করার জন্য
        document.body.addEventListener('click', () => { isAudioEnabled = true; }, { once: true });

        async function renderReels() {
            onSnapshot(doc(db, "appSettings", "algorithm"), s => { if(s.exists()) globalCPM = s.data().trendBoost || 0.0001; });
            const q = query(collection(db, "posts"), where("fileType", "==", "video"), limit(30));
            
            onSnapshot(q, (snap) => {
                const wrapper = document.getElementById('reelsWrapper');
                wrapper.innerHTML = "";
                snap.forEach(async d => {
                    const p = d.data(); const id = d.id;
                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const card = document.createElement('div');
                    card.className = "reel-card";
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <video src="${p.fileUrl}" loop muted playsinline class="reel-video" onclick="handleReelTap(this)" data-id="${id}" data-owner="${p.userId}"></video>
                        </div>
                        <div class="side-bar">
                            <div class="flex flex-col items-center">
                                <button onclick="likeReel('${id}')" class="action-btn text-xl ${isLiked ? 'text-red-500' : ''}"><i class="${isLiked ? 'fas' : 'far'} fa-heart"></i></button>
                                <span class="text-[10px] text-white font-bold mt-1">${p.likedBy?.length || 0}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <button onclick="openComments('${id}')" class="action-btn text-xl"><i class="far fa-comment-dots"></i></button>
                                <span id="count-${id}" class="text-[10px] text-white font-bold mt-1">0</span>
                            </div>
                            <button onclick="shareReel('${id}')" class="action-btn text-xl"><i class="fas fa-paper-plane"></i></button>
                        </div>
                        <div class="bottom-info">
                            <div class="flex items-center gap-3 mb-3 cursor-pointer" onclick="window.location.href='user.html?id=${p.userId}'">
                                <img src="${p.userPic || ''}" class="w-10 h-10 rounded-2xl border border-white/20 object-cover">
                                <h4 class="text-white font-black text-sm">@${p.userName}</h4>
                            </div>
                            <p class="text-white/90 text-xs line-clamp-2">${p.text || ''}</p>
                        </div>
                    `;
                    wrapper.appendChild(card);
                    
                    // কমেন্ট সংখ্যা লোড করা
                    const cSnap = await getDocs(collection(db, "posts", id, "comments"));
                    document.getElementById(`count-${id}`).innerText = cSnap.size;
                });
                initObserver();
            });
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    const id = vid.getAttribute('data-id');
                    const owner = vid.getAttribute('data-owner');
                    if (entry.isIntersecting) {
                        vid.play();
                        if(isAudioEnabled) vid.muted = false;
                        viewTimers[id] = setTimeout(() => handleView(id, owner), 5000);
                    } else { 
                        vid.pause(); 
                        vid.muted = true; // সাউন্ড মিক্সিং বন্ধ করতে
                        vid.currentTime = 0; // স্ক্রিন থেকে গেলে শুরু থেকে সেট হবে
                        clearTimeout(viewTimers[id]); 
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel-video').forEach(v => observer.observe(v));
        }

        async function handleView(postId, ownerId) {
            if (ownerId === currentUser.uid) return;
            const postRef = doc(db, "posts", postId);
            const pSnap = await getDoc(postRef);
            if (!pSnap.exists() || pSnap.data().viewedBy?.includes(currentUser.uid)) return;
            await updateDoc(postRef, { views: increment(1), viewedBy: arrayUnion(currentUser.uid) });
            const ownerRef = doc(db, "users", ownerId);
            const oSnap = await getDoc(ownerRef);
            if (oSnap.exists() && oSnap.data().isMonetized) {
                await updateDoc(ownerRef, { balance: increment(globalCPM), totalImpressions: increment(1) });
            }
        }

        window.handleReelTap = (v) => {
            if(v.paused) { v.play(); if(isAudioEnabled) v.muted = false; }
            else v.pause();
        };

        window.likeReel = async (id) => {
            const ref = doc(db, "posts", id);
            const pSnap = await getDoc(ref);
            const isLiked = pSnap.data().likedBy?.includes(currentUser.uid);
            await updateDoc(ref, { likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.data(); const cid = c.id;
                    const isCLiked = d.likes?.includes(currentUser.uid);
                    list.innerHTML += `
                        <div class="flex gap-3">
                            <img onclick="window.location.href='user.html?id=${d.userId}'" src="${d.userPic}" class="w-10 h-10 rounded-xl object-cover cursor-pointer">
                            <div class="flex-1">
                                <div class="flex justify-between">
                                    <p onclick="window.location.href='user.html?id=${d.userId}'" class="text-indigo-400 font-bold text-xs cursor-pointer">@${d.userName}</p>
                                    <button onclick="likeComment('${cid}')" class="${isCLiked ? 'text-red-500' : 'text-gray-500'} text-[10px]">
                                        <i class="fas fa-heart"></i> ${d.likes?.length || 0}
                                    </button>
                                </div>
                                <p class="text-white text-xs mt-1">
                                    ${d.replyTo ? `<span class="text-indigo-500 font-bold">@${d.replyTo}</span> ` : ''}${d.text}
                                </p>
                                <button onclick="setupReply('${cid}', '${d.userName}')" class="text-gray-500 text-[9px] font-bold mt-2 uppercase">Reply</button>
                            </div>
                        </div>`;
                });
            });
        };

        window.likeComment = async (cid) => {
            const ref = doc(db, "posts", activePostId, "comments", cid);
            const snap = await getDoc(ref);
            const isLiked = snap.data().likes?.includes(currentUser.uid);
            await updateDoc(ref, { likes: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });
        };

        window.setupReply = (cid, name) => {
            replyCommentId = cid;
            document.getElementById('replyPreview').classList.remove('hidden');
            document.getElementById('replyToText').innerText = `Replying to @${name}`;
            document.getElementById('commentInput').focus();
        };

        window.cancelReply = () => {
            replyCommentId = null;
            document.getElementById('replyPreview').classList.add('hidden');
        };

        window.postComment = async () => {
            const input = document.getElementById('commentInput');
            if(!input.value || !activePostId) return;
            const commentData = {
                text: input.value, userId: currentUser.uid, userName: userData.name,
                userPic: userData.profilePic, likes: [], timestamp: serverTimestamp()
            };
            if (replyCommentId) {
                const rSnap = await getDoc(doc(db, "posts", activePostId, "comments", replyCommentId));
                commentData.replyTo = rSnap.data().userName;
                cancelReply();
            }
            await addDoc(collection(db, "posts", activePostId, "comments"), commentData);
            input.value = "";
            // কমেন্ট সংখ্যা আপডেট
            const cSnap = await getDocs(collection(db, "posts", activePostId, "comments"));
            document.getElementById(`count-${activePostId}`).innerText = cSnap.size;
        };

        window.closeComments = () => { document.getElementById('commentSheet').classList.remove('active'); cancelReply(); };

        window.shareReel = (id) => {
            const url = window.location.origin + "/post-view.html?id=" + id;
            navigator.clipboard.writeText(url);
            Swal.fire({ title: 'Link Copied!', icon: 'success', timer: 1000, showConfirmButton: false });
        };
    </script>
</body>
</html>
