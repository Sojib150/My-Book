<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Reels Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        
        .reel-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* UI Overlays */
        .side-bar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .bottom-info { position: absolute; bottom: 30px; left: 15px; right: 80px; z-index: 10; }
        
        .action-btn { background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .action-btn:active { transform: scale(0.8); }
        .follow-tag { background: #2563eb; color: white; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; margin-left: 10px; }

        /* Comment Drawer */
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); background: white; border-radius: 30px 30px 0 0; }
        #commentSheet.active { transform: translateY(0); }
        .hidden-follow { display: none !important; }
        
        /* Ad Banner */
        .reel-ad { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 5px; color: white; text-align: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsWrapper">
        </div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 h-[70vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-4" onclick="closeComments()"></div>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="flex items-center gap-3 border-t pt-4">
            <input type="text" id="commentInput" placeholder="Add comment..." class="flex-1 bg-gray-100 rounded-2xl p-4 text-sm outline-none">
            <button onclick="postComment()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92",
            // ... আপনার বাকি কনফিগ
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activePostId = null;

        onAuthStateChanged(auth, (user) => {
            if(user) { currentUser = user; renderReels(); }
            else { window.location.href="index.html"; }
        });

        async function renderReels() {
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            let adCode = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(collection(db, "posts"), (snap) => {
                const wrapper = document.getElementById('reelsWrapper');
                wrapper.innerHTML = "";
                
                snap.forEach(d => {
                    const p = d.data(); const id = d.id;
                    if(p.fileType !== 'video' || p.isShadowBanned) return;

                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const card = document.createElement('div');
                    card.className = "reel-card";
                    card.innerHTML = `
                        <video src="${p.fileUrl}" loop muted playsinline class="reel-video" onclick="handleReelTap(this)"></video>
                        
                        <div class="side-bar">
                            <div class="flex flex-col items-center">
                                <button onclick="likeReel('${id}')" class="action-btn text-xl ${isLiked ? 'text-red-500' : ''}">
                                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                                <span class="text-[10px] text-white font-bold mt-1">${p.likes || 0}</span>
                            </div>
                            <button onclick="openComments('${id}')" class="action-btn text-xl"><i class="far fa-comment"></i></button>
                            <button onclick="shareReel('${id}', '${p.fileUrl}')" class="action-btn text-xl"><i class="fas fa-share"></i></button>
                            <button onclick="reportReel('${id}')" class="text-white/40"><i class="fas fa-flag text-xs"></i></button>
                        </div>

                        <div class="bottom-info">
                            <div class="flex items-center gap-3 mb-3">
                                <img src="${p.userPic}" class="w-10 h-10 rounded-full border-2 border-white shadow-lg">
                                <h4 class="text-white font-bold text-sm tracking-tight">@${p.userName}</h4>
                                <button id="f_${id}" onclick="followInReel('${p.userId}', '${id}')" class="follow-tag">FOLLOW</button>
                            </div>
                            <p class="text-white text-xs line-clamp-2">${p.text || ''}</p>
                        </div>

                        ${adCode ? `<div class="reel-ad">Sponsored: ${adCode}</div>` : ""}
                    `;
                    wrapper.appendChild(card);
                });
                initObserver();
            });
        }

        // --- Reel Magic: সাউন্ড মিক্সিং বন্ধ এবং অটো-প্লে ---
        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        video.muted = false; // অটো সাউন্ড অন (ইউজার এক্সপেরিয়েন্স ভালো হবে)
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-video').forEach(v => observer.observe(v));
        }

        window.handleReelTap = (video) => {
            if(video.paused) video.play();
            else video.pause();
        };

        window.likeReel = async (id) => {
            const ref = doc(db, "posts", id);
            const p = (await getDoc(ref)).data();
            const isLiked = p.likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.followInReel = async (tid, pid) => {
            document.getElementById(`f_${pid}`).classList.add('hidden-follow');
            await setDoc(doc(db, "users", currentUser.uid, "following", tid), { time: serverTimestamp() });
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
        };

        window.reportReel = async (id) => {
            if(confirm("Report this video to Admin?")) {
                await addDoc(collection(db, "reports"), {
                    postId: id, reporter: currentUser.uid, timestamp: serverTimestamp()
                });
                alert("Reported!");
            }
        };

        window.shareReel = (id, url) => {
             // প্রোফাইলে শেয়ার করার লজিক
             alert("Shared to profile!");
        };
    </script>
</body>
</html>
