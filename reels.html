<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Book - Reels Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .side-bar { position: absolute; right: 12px; bottom: 140px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .bottom-info { position: absolute; bottom: 40px; left: 15px; right: 80px; z-index: 10; }
        
        .action-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); background: #111827; border-radius: 30px 30px 0 0; border-top: 1px solid #1e293b; color: white; }
        #commentSheet.active { transform: translateY(0); }
        
        .reel-ad-box { position: absolute; top: 60px; width: 90%; z-index: 20; display: flex; justify-content: center; }
        .elite-popup { background: #111 !important; border: 1px solid #6366f1 !important; color: #fff !important; border-radius: 20px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsWrapper"></div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 h-[75vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6" onclick="closeComments()"></div>
        <h3 class="text-sm font-black uppercase tracking-widest text-indigo-400 mb-4">Comments</h3>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar pb-20 text-sm"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-[#111827] flex items-center gap-3">
            <input type="text" id="commentInput" placeholder="Write a message..." class="flex-1 bg-gray-800 rounded-2xl p-4 text-white outline-none text-sm border border-gray-700">
            <button onclick="postComment()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentUserData = null;
        let activePostId = null;
        let globalCPM = 0.0001;
        let viewTimers = {};

        onAuthStateChanged(auth, async (user) => {
            if(user) { 
                currentUser = user;
                const uSnap = await getDoc(doc(db, "users", user.uid));
                currentUserData = uSnap.exists() ? uSnap.data() : null;

                // Load Settings
                onSnapshot(doc(db, "appSettings", "algorithm"), snap => {
                    if (snap.exists()) globalCPM = snap.data().trendBoost || 0.0001;
                });

                renderReels(); 
            } else { window.location.href="index.html"; }
        });

        async function renderReels() {
            const reelsQuery = query(collection(db, "posts"), where("fileType", "==", "video"), orderBy("createdAt", "desc"), limit(20));
            
            onSnapshot(reelsQuery, (snap) => {
                const wrapper = document.getElementById('reelsWrapper');
                wrapper.innerHTML = "";
                
                snap.forEach(d => {
                    const p = d.data(); const id = d.id;
                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const card = document.createElement('div');
                    card.className = "reel-card";
                    card.innerHTML = `
                        <video src="${p.fileUrl}" loop muted playsinline class="reel-video" onclick="handleReelTap(this)" data-id="${id}" data-owner="${p.userId}"></video>
                        
                        <div class="reel-ad-box" id="ad-slot-${id}"></div>

                        <div class="side-bar">
                            <div class="flex flex-col items-center">
                                <button onclick="likeReel('${id}')" class="action-btn text-xl ${isLiked ? 'text-red-500' : ''}">
                                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                                <span class="text-[10px] text-white font-bold mt-1">${p.likedBy?.length || 0}</span>
                            </div>
                            <button onclick="openComments('${id}')" class="action-btn text-xl"><i class="far fa-comment-dots"></i></button>
                            <button onclick="shareReel('${id}')" class="action-btn text-xl"><i class="fas fa-paper-plane"></i></button>
                        </div>

                        <div class="bottom-info">
                            <div class="flex items-center gap-3 mb-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                                <img src="${p.userPic}" class="w-10 h-10 rounded-2xl border border-white/20 object-cover">
                                <h4 class="text-white font-black text-sm">@${p.userName}</h4>
                            </div>
                            <p class="text-white/90 text-xs line-clamp-2">${p.text || ''}</p>
                        </div>
                    `;
                    wrapper.appendChild(card);
                    loadAdForReel(id);
                });
                initObserver();
            });
        }

        async function loadAdForReel(postId) {
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            if (adSnap.exists() && adSnap.data().code) {
                const adSlot = document.getElementById(`ad-slot-${postId}`);
                const range = document.createRange();
                const fragment = range.createContextualFragment(adSnap.data().code);
                adSlot.appendChild(fragment);
            }
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    const id = vid.getAttribute('data-id');
                    const ownerId = vid.getAttribute('data-owner');

                    if (entry.isIntersecting) {
                        vid.play().catch(() => {});
                        vid.muted = false;
                        // Start 5-second retention timer
                        viewTimers[id] = setTimeout(() => handleView(id, ownerId), 5000);
                    } else {
                        vid.pause();
                        clearTimeout(viewTimers[id]);
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-video').forEach(v => observer.observe(v));
        }

        async function handleView(postId, ownerId) {
            if (ownerId === currentUser.uid) return;
            const postRef = doc(db, "posts", postId);
            const pSnap = await getDoc(postRef);
            if (!pSnap.exists() || pSnap.data().viewedBy?.includes(currentUser.uid)) return;

            await updateDoc(postRef, { 
                views: increment(1), 
                viewedBy: arrayUnion(currentUser.uid),
                trendScore: increment(1)
            });

            const ownerRef = doc(db, "users", ownerId);
            const ownerSnap = await getDoc(ownerRef);
            if (ownerSnap.exists() && ownerSnap.data().isMonetized) {
                await updateDoc(ownerRef, { balance: increment(globalCPM) });
            }
        }

        window.handleReelTap = (v) => v.paused ? v.play() : v.pause();

        window.likeReel = async (id) => {
            const ref = doc(db, "posts", id);
            const pSnap = await getDoc(ref);
            const isLiked = pSnap.data().likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.openComments = async (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("timestamp", "asc")), (snap) => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `
                        <div class="flex gap-3">
                            <img src="${d.userPic}" class="w-8 h-8 rounded-full object-cover">
                            <div>
                                <p class="text-indigo-400 font-bold text-[10px]">@${d.userName}</p>
                                <p class="text-white text-xs">${d.text}</p>
                            </div>
                        </div>`;
                });
            });
        };

        window.closeComments = () => document.getElementById('commentSheet').classList.remove('active');

        window.postComment = async () => {
            const input = document.getElementById('commentInput');
            if(!input.value || !activePostId) return;
            await addDoc(collection(db, "posts", activePostId, "comments"), {
                text: input.value,
                userId: currentUser.uid,
                userName: currentUserData.name,
                userPic: currentUserData.profilePic,
                timestamp: serverTimestamp()
            });
            await updateDoc(doc(db, "posts", activePostId), { commentCount: increment(1) });
            input.value = "";
        };

        window.shareReel = async (id) => {
            const url = window.location.origin + "/reels.html?id=" + id;
            if (navigator.share) {
                navigator.share({ title: 'My Book', url: url });
            } else {
                navigator.clipboard.writeText(url);
                Swal.fire({ title: 'Link Copied!', icon: 'success', timer: 1500, showConfirmButton: false, customClass: { popup: 'elite-popup' } });
            }
        };
    </script>
</body>
</html>
