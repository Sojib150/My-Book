<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Reels Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .side-bar { position: absolute; right: 12px; bottom: 140px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .bottom-info { position: absolute; bottom: 40px; left: 15px; right: 80px; z-index: 10; }
        
        .action-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .follow-tag { background: #6366f1; color: white; padding: 5px 14px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-left: 10px; }

        /* Comment Drawer */
        #commentSheet { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; transform: translateY(100%); background: #111827; border-radius: 30px 30px 0 0; border-top: 1px solid #1e293b; color: white; }
        #commentSheet.active { transform: translateY(0); }
        
        /* Ad Banner */
        .reel-ad { position: absolute; top: 20px; width: 85%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 16px; padding: 12px; color: white; text-align: center; border: 1px solid rgba(99, 102, 241, 0.3); z-index: 20; }
        
        .nav-glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="reels-container" id="reelsWrapper"></div>

    <div id="commentSheet" class="fixed bottom-0 left-0 right-0 h-[75vh] p-6 shadow-2xl flex flex-col">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6" onclick="closeComments()"></div>
        <h3 class="text-sm font-black uppercase tracking-widest text-indigo-400 mb-4">Comments</h3>
        <div id="commentList" class="flex-1 overflow-y-auto space-y-5 no-scrollbar pb-20 text-sm"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-[#111827] flex items-center gap-3">
            <input type="text" id="commentInput" placeholder="Write a message..." class="flex-1 bg-gray-800 rounded-2xl p-4 text-white outline-none text-sm border border-gray-700">
            <button onclick="postComment()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activePostId = null;

        onAuthStateChanged(auth, (user) => {
            if(user) { currentUser = user; renderReels(); }
            else { window.location.href="login.html"; }
        });

        async function renderReels() {
            // CPM রেট আনা (Bondo AI থেকে)
            const algoDoc = await getDoc(doc(db, "appSettings", "algorithm"));
            const cpmRate = algoDoc.exists() ? algoDoc.data().trendBoost : 0.05;

            // অ্যাড কোড আনা
            const adSnap = await getDoc(doc(db, "appSettings", "ads"));
            let adCode = adSnap.exists() ? adSnap.data().code : "";

            onSnapshot(collection(db, "posts"), (snap) => {
                const wrapper = document.getElementById('reelsWrapper');
                wrapper.innerHTML = "";
                
                snap.forEach(async d => {
                    const p = d.data(); const id = d.id;
                    if(p.fileType !== 'video') return;

                    const isLiked = p.likedBy?.includes(currentUser?.uid);

                    const card = document.createElement('div');
                    card.className = "reel-card";
                    card.innerHTML = `
                        <video src="${p.fileUrl}" loop muted playsinline class="reel-video" onclick="handleReelTap(this)" data-owner="${p.userId}"></video>
                        
                        <div class="side-bar">
                            <div class="flex flex-col items-center">
                                <button onclick="likeReel('${id}')" class="action-btn text-xl ${isLiked ? 'text-red-500' : ''}">
                                    <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                                <span class="text-[10px] text-white font-bold mt-1">${p.likes || 0}</span>
                            </div>
                            <button onclick="openComments('${id}')" class="action-btn text-xl"><i class="far fa-comment-dots"></i></button>
                            <button onclick="shareReel('${p.fileUrl}')" class="action-btn text-xl"><i class="fas fa-paper-plane"></i></button>
                        </div>

                        <div class="bottom-info">
                            <div class="flex items-center gap-3 mb-3 cursor-pointer" onclick="window.location.href='other-profile.html?uid=${p.userId}'">
                                <img src="${p.userPic || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-2xl border border-white/20">
                                <div>
                                    <h4 class="text-white font-black text-sm">@${p.userName}</h4>
                                    <p class="text-[8px] text-indigo-400 font-bold uppercase tracking-widest">View Profile</p>
                                </div>
                            </div>
                            <p class="text-white/90 text-xs line-clamp-2 mb-2">${p.text || ''}</p>
                        </div>

                        ${adCode ? `<div class="reel-ad text-[10px] font-bold"><i class="fas fa-ad mr-2"></i> ${adCode}</div>` : ""}
                    `;

                    // ইনকাম লজিক: ভিডিও প্লে হলে
                    const videoEl = card.querySelector('video');
                    videoEl.onplay = async () => {
                        const ownerSnap = await getDoc(doc(db, "users", p.userId));
                        if(ownerSnap.exists() && ownerSnap.data().isMonetized) {
                            await updateDoc(doc(db, "users", p.userId), {
                                balance: increment(cpmRate / 1000)
                            });
                        }
                    };

                    wrapper.appendChild(card);
                });
                initObserver();
            });
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.play().catch(() => {});
                        entry.target.muted = false;
                    } else {
                        entry.target.pause();
                    }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.reel-video').forEach(v => observer.observe(v));
        }

        window.handleReelTap = (v) => v.paused ? v.play() : v.pause();

        window.likeReel = async (id) => {
            const ref = doc(db, "posts", id);
            const p = (await getDoc(ref)).data();
            const isLiked = p.likedBy?.includes(currentUser.uid);
            await updateDoc(ref, {
                likes: increment(isLiked ? -1 : 1),
                likedBy: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.openComments = async (id) => {
            activePostId = id;
            document.getElementById('commentSheet').classList.add('active');
            const list = document.getElementById('commentList');
            
            onSnapshot(query(collection(db, "posts", id, "comments")), (snap) => {
                list.innerHTML = "";
                snap.forEach(c => {
                    const data = c.data();
                    list.innerHTML += `
                        <div class="flex gap-3">
                            <img src="${data.userPic}" class="w-8 h-8 rounded-full border border-gray-700">
                            <div>
                                <p class="text-indigo-400 font-bold text-[10px]">@${data.userName}</p>
                                <p class="text-white text-xs">${data.text}</p>
                            </div>
                        </div>
                    `;
                });
            });
        };

        window.closeComments = () => document.getElementById('commentSheet').classList.remove('active');

        window.postComment = async () => {
            const input = document.getElementById('commentInput');
            if(!input.value || !activePostId) return;
            
            await addDoc(collection(db, "posts", activePostId, "comments"), {
                text: input.value,
                userId: currentUser.uid,
                userName: currentUser.displayName || "User",
                userPic: currentUser.photoURL || "https://via.placeholder.com/50",
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        window.shareReel = async (url) => {
            if (navigator.share) {
                navigator.share({ title: 'My Book', text: 'Watch this cool reel!', url: url });
            } else {
                alert("Link Copied!");
            }
        };
    </script>
</body>
</html>
