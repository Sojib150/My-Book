<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Story - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; }
        .upload-area { border: 2px dashed #333; border-radius: 30px; transition: all 0.3s; }
        .upload-area:active { border-color: #2563eb; background: rgba(37,99,235,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen p-6">

    <div class="flex justify-between items-center mb-10">
        <button onclick="location.href='Home.html'" class="text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <h1 class="text-lg font-extrabold">নতুন স্টোরি</h1>
        <div class="w-8"></div>
    </div>

    <div class="flex-1 flex flex-col justify-center">
        <label for="storyInput" class="upload-area h-96 flex flex-col items-center justify-center cursor-pointer mb-10">
            <i class="fa-solid fa-clapperboard text-5xl mb-4 text-blue-500"></i>
            <p class="text-sm font-bold text-gray-400">ছবি বা ভিডিও সিলেক্ট করুন</p>
            <input type="file" id="storyInput" accept="image/*,video/*" class="hidden" onchange="previewMedia(this)">
        </label>
        
        <div id="previewContainer" class="hidden mb-6 text-center">
            <p class="text-blue-500 font-bold mb-2">মিডিয়া সিলেক্ট করা হয়েছে ✅</p>
        </div>

        <button id="uploadBtn" onclick="uploadStory()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/20 disabled:opacity-50 disabled:bg-gray-700">
            শেয়ার করুন
        </button>
        <p class="text-[10px] text-center mt-4 text-gray-500 uppercase font-bold tracking-widest">এটি ২৪ ঘণ্টা পর অটোমেটিক মুছে যাবে</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        onAuthStateChanged(auth, u => { if(u) user=u; else location.href="index.html"; });

        window.previewMedia = (input) => {
            if(input.files[0]) document.getElementById('previewContainer').classList.remove('hidden');
        }

        window.uploadStory = async () => {
            const file = document.getElementById('storyInput').files[0];
            if(!file) return alert("দয়া করে একটি ফাইল সিলেক্ট করুন");

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = "আপলোড হচ্ছে...";

            try {
                // এখানে আপনার ইমেজ হোস্টিং বা ক্লাউডিনারি লজিক বসাতে পারেন
                // আপাতত আমি ডামি লজিক দিচ্ছি, আপনি আপনার ফাইল সার্ভারের URL ব্যবহার করবেন
                const fileUrl = "https://via.placeholder.com/1080x1920?text=Story+Media"; 
                const uData = (await getDoc(doc(db, "users", user.uid))).data();

                // ২৪ ঘণ্টা পরের সময় ক্যালকুলেট করা
                const expiresAt = new Date();
                expiresAt.setHours(expiresAt.getHours() + 24);

                await addDoc(collection(db, "stories"), {
                    userId: user.uid,
                    userName: uData.name,
                    userPic: uData.profilePic,
                    fileUrl: fileUrl,
                    fileType: file.type.includes('video') ? 'video' : 'image',
                    createdAt: serverTimestamp(),
                    expiresAt: expiresAt
                });

                alert("স্টোরি আপলোড সফল!");
                location.href = "home.html";
            } catch(e) {
                alert("এরর: " + e.message);
                btn.disabled = false;
                btn.innerText = "শেয়ার করুন";
            }
        };
    </script>
</body>
</html>
