<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 p-4 text-white flex items-center">
        <a href="home.html" class="mr-4">← Back</a>
        <h1 class="font-bold">User Profile</h1>
    </nav>

    <div class="max-w-md mx-auto mt-4 p-4">
        <div id="profileHeader" class="bg-white p-6 rounded-lg shadow text-center mb-4">
            <div id="userInit" class="w-20 h-20 bg-blue-500 rounded-full mx-auto flex items-center justify-center text-white text-2xl font-bold mb-2">?</div>
            <h2 id="profileName" class="text-xl font-bold">Loading...</h2>
        </div>
        <div id="userPosts" class="grid grid-cols-3 gap-1"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (userId) {
            const q = query(collection(db, "posts"), where("userId", "==", userId));
            const querySnapshot = await getDocs(q);
            const postsContainer = document.getElementById('userPosts');
            
            querySnapshot.forEach((doc) => {
                const post = doc.data();
                document.getElementById('profileName').innerText = post.userName;
                document.getElementById('userInit').innerText = post.userName[0];

                const img = document.createElement('div');
                img.className = "aspect-square bg-gray-200 overflow-hidden";
                img.innerHTML = post.fileUrl ? (post.fileType === 'video' ? `<video src="${post.fileUrl}" class="w-full h-full object-cover"></video>` : `<img src="${post.fileUrl}" class="w-full h-full object-cover">`) : `<div class="p-2 text-[10px]">${post.text}</div>`;
                postsContainer.appendChild(img);
            });
        }
    </script>
</body>
</html>
