<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <a href="home.html" class="text-blue-600 hover:bg-blue-50 w-8 h-8 flex items-center justify-center rounded-full transition">
                <i class="fas fa-chevron-left text-xl"></i>
            </a>
            <h1 class="font-bold text-gray-800 text-sm uppercase tracking-wider">বন্ধু প্রোফাইল</h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white shadow-sm overflow-hidden border-b relative">
        <div class="h-36 bg-gradient-to-r from-blue-400 to-blue-600 relative group overflow-hidden">
            <img id="coverImg" src="" class="w-full h-full object-cover hidden">
            <div id="coverPlaceholder" class="w-full h-full flex items-center justify-center text-white/50 italic text-sm">No Cover Photo</div>
        </div>
        
        <div class="px-6 pb-6 text-center">
            <div class="relative flex justify-center -mt-16">
                <div id="uAvatar" class="w-32 h-32 bg-blue-500 rounded-full border-4 border-white shadow-xl overflow-hidden flex items-center justify-center text-4xl font-bold text-white">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                    <span id="initialText">?</span>
                </div>
            </div>
            
            <h2 id="uName" class="text-2xl font-black text-gray-800 mt-4 leading-none">লোড হচ্ছে...</h2>
            <p id="uEmail" class="text-gray-400 text-xs mt-2 font-medium italic"></p>

            <div class="flex justify-center gap-12 mt-8 border-t pt-5">
                <div><p id="pCount" class="font-black text-xl text-gray-800">0</p><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Posts</p></div>
                <div><p class="font-black text-xl text-gray-800">0</p><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Followers</p></div>
                <div><p class="font-black text-xl text-gray-800">0</p><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Following</p></div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 bg-white">
        <div class="flex border-b text-gray-400">
            <button id="tabAll" class="flex-1 py-3 text-blue-600 border-b-2 border-blue-600"><i class="fas fa-th text-lg"></i></button>
            <button id="tabVideos" class="flex-1 py-3 hover:text-gray-600 transition"><i class="fas fa-video text-lg"></i></button>
        </div>
        
        <div id="uPosts" class="grid grid-cols-3 gap-0.5 p-0.5"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const viewedUserId = urlParams.get('id');
        let allPosts = [];

        if(viewedUserId) {
            loadUser(viewedUserId);
            fetchPosts(viewedUserId);
        }

        async function loadUser(uid) {
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('uName').innerText = data.name || "User";
                document.getElementById('uEmail').innerText = data.email || "";
                document.getElementById('initialText').innerText = (data.name || "U")[0].toUpperCase();
                
                if (data.profilePic) {
                    document.getElementById('profileImg').src = data.profilePic;
                    document.getElementById('profileImg').classList.remove('hidden');
                    document.getElementById('initialText').classList.add('hidden');
                }
                if (data.coverPic) {
                    document.getElementById('coverImg').src = data.coverPic;
                    document.getElementById('coverImg').classList.remove('hidden');
                    document.getElementById('coverPlaceholder').classList.add('hidden');
                }
            }
        }

        function fetchPosts(uid) {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, (snap) => {
                allPosts = [];
                snap.forEach(d => allPosts.push(d.data()));
                renderPosts('all');
                document.getElementById('pCount').innerText = snap.size;
            });
        }

        function renderPosts(filter) {
            const container = document.getElementById('uPosts');
            container.innerHTML = "";
            
            const filtered = filter === 'video' ? allPosts.filter(p => p.fileType === 'video') : allPosts;

            if(filtered.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-400 text-xs font-bold uppercase tracking-widest">এখনো কিছু নেই</div>`;
                return;
            }

            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = "aspect-square bg-gray-100 overflow-hidden relative group cursor-pointer";
                
                let content = "";
                if(p.fileUrl) {
                    if(p.fileType === 'video') {
                        content = `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video><div class="absolute inset-0 flex items-center justify-center bg-black/10"><i class="fas fa-play text-white text-xs"></i></div>`;
                    } else {
                        content = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                    }
                } else {
                    content = `<div class="p-3 text-[9px] text-gray-500 h-full flex items-center justify-center text-center bg-blue-50">${p.text?.substring(0, 40)}...</div>`;
                }
                
                div.innerHTML = content;
                container.appendChild(div);
            });
        }

        // Tab Switching Logic
        document.getElementById('tabAll').onclick = (e) => {
            switchTab(e.currentTarget, 'all');
        };
        document.getElementById('tabVideos').onclick = (e) => {
            switchTab(e.currentTarget, 'video');
        };

        function switchTab(el, type) {
            document.getElementById('tabAll').classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            document.getElementById('tabVideos').classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            el.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
            renderPosts(type);
        }
    </script>
</body>
</html>
