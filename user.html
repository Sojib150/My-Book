<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <a href="home.html" class="text-blue-600 hover:bg-blue-50 w-8 h-8 flex items-center justify-center rounded-full transition">
                <i class="fas fa-chevron-left text-xl"></i>
            </a>
            <h1 class="font-bold text-gray-800 text-sm uppercase tracking-wider">বন্ধু প্রোফাইল</h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white shadow-sm overflow-hidden border-b relative">
        <div class="h-36 bg-gradient-to-r from-blue-400 to-blue-600 relative group overflow-hidden">
            <img id="coverImg" src="" class="w-full h-full object-cover hidden">
            <div id="coverPlaceholder" class="w-full h-full flex items-center justify-center text-white/50 italic text-sm">No Cover Photo</div>
        </div>
        
        <div class="px-6 pb-6">
            <div class="relative flex justify-center -mt-16">
                <div class="relative">
                    <div id="uAvatar" class="w-32 h-32 bg-blue-500 rounded-full border-4 border-white shadow-xl overflow-hidden flex items-center justify-center text-4xl font-bold text-white">
                        <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                        <span id="initialText">?</span>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <h2 id="uName" class="text-2xl font-black text-gray-800 tracking-tight leading-none">Loading...</h2>
                <p id="uEmail" class="text-gray-400 text-xs mt-2 font-medium italic"></p>
            </div>

            <div class="flex justify-center gap-12 mt-8 border-t pt-5 text-center">
                <div class="group cursor-pointer">
                    <p id="pCount" class="font-black text-xl text-gray-800">0</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest group-hover:text-blue-500 transition">Posts</p>
                </div>
                <div class="group cursor-pointer">
                    <p class="font-black text-xl text-gray-800">0</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest group-hover:text-blue-500 transition">Followers</p>
                </div>
                <div class="group cursor-pointer">
                    <p class="font-black text-xl text-gray-800">0</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest group-hover:text-blue-500 transition">Following</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 bg-white">
        <div class="flex border-b">
            <button class="flex-1 py-3 text-blue-600 border-b-2 border-blue-600 transition">
                <i class="fas fa-th text-lg"></i>
            </button>
            <button class="flex-1 py-3 text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-video text-lg"></i>
            </button>
        </div>
        
        <div id="uPosts" class="grid grid-cols-3 gap-0.5 p-0.5">
            <div class="col-span-3 text-center py-20 text-gray-400 text-xs font-bold uppercase tracking-widest">লোড হচ্ছে...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL থেকে ইউজারের আইডি (id) নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const viewedUserId = urlParams.get('id');

        if(viewedUserId) {
            loadUserData(viewedUserId);
            loadUserPosts(viewedUserId);
        } else {
            // আইডি না থাকলে হোমপেজে পাঠানো
            window.location.href = "home.html";
        }

        // 1 & 2. Load User Data (Cover, Profile Pic, Name)
        async function loadUserData(uid) {
            try {
                // Firestore-এর `users` কালেকশন থেকে ডাটা নেওয়া
                const userDoc = await getDoc(doc(db, "users", uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    const name = data.name || "User";
                    document.getElementById('uName').innerText = name;
                    document.getElementById('uEmail').innerText = data.email || "";
                    document.getElementById('initialText').innerText = name[0].toUpperCase();

                    // Profile Pic
                    if (data.profilePic) {
                        const pImg = document.getElementById('profileImg');
                        pImg.src = data.profilePic;
                        pImg.classList.remove('hidden');
                        document.getElementById('initialText').classList.add('hidden');
                    }
                    
                    // Cover Pic
                    if (data.coverPic) {
                        const cImg = document.getElementById('coverImg');
                        cImg.src = data.coverPic;
                        cImg.classList.remove('hidden');
                        document.getElementById('coverPlaceholder').classList.add('hidden');
                    }
                } else {
                    // যদি `users` কালেকশনে ডাটা না থাকে
                    document.getElementById('uName').innerText = "Unknown User";
                }
            } catch (error) {
                console.error("Error loading user data:", error);
                document.getElementById('uName').innerText = "Error Loading";
            }
        }

        // 3 & 4. Load Posts Grid Layout
        function loadUserPosts(uid) {
            const postsContainer = document.getElementById('uPosts');
            const postCount = document.getElementById('pCount');
            
            // `posts` কালেকশনে userId ফিল্টার করে রিয়েল-টাইম ডাটা আনা
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            
            onSnapshot(q, (snap) => {
                postsContainer.innerHTML = "";
                postCount.innerText = snap.size; // মোট পোস্টের সংখ্যা

                if(snap.empty) {
                    postsContainer.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-400 text-xs font-bold uppercase tracking-widest">এখনো কোনো পোস্ট নেই</div>`;
                    return;
                }

                snap.forEach((d) => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = "aspect-square bg-gray-100 overflow-hidden relative group cursor-pointer";
                    
                    let mediaContent = "";
                    if(p.fileUrl) {
                        if(p.fileType === 'video') {
                            // ভিডিও হলে Play আইকন সহ দেখাবে
                            mediaContent = `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>
                                             <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/30 transition">
                                                 <i class="fas fa-play text-white text-[12px] opacity-80"></i>
                                             </div>`;
                        } else {
                            // ছবি হলে সরাসরি ছবি দেখাবে
                            mediaContent = `<img src="${p.fileUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">`;
                        }
                    } else if (p.text) {
                        // শুধুমাত্র টেক্সট পোস্ট হলে ছোট করে টেক্সট দেখাবে
                        mediaContent = `<div class="p-3 text-[10px] text-gray-600 h-full flex items-center justify-center text-center font-medium bg-blue-50 overflow-hidden leading-tight">
                                           ${p.text.substring(0, 50)}...
                                       </div>`;
                    } else {
                         mediaContent = mediaContent = `<div class="p-3 bg-gray-100 h-full flex items-center justify-center text-gray-400 text-xs"><i class="fas fa-file"></i></div>`;
                    }
                    
                    div.innerHTML = mediaContent;
                    postsContainer.appendChild(div);
                });
            }, (error) => {
                console.error("Error loading posts:", error);
                postsContainer.innerHTML = `<div class="col-span-3 text-center py-20 text-red-400 text-xs font-bold">পোস্ট লোড করতে সমস্যা হয়েছে!</div>`;
            });
        }
    </script>
</body>
</html>
