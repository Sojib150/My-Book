<!DOCTYPE html>
<html>
<head>
<title>User</title>
</head>

<body>

<h2 id="name">User</h2>

<button id="btn"></button>

<div id="posts"></div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;
let viewUID = localStorage.getItem("viewUser");

onAuthStateChanged(auth,(user)=>{
uid=user.uid;
load();
});

function load(){

// name
onValue(ref(db,"users/"+viewUID),snap=>{
name.innerText = snap.val()?.username || "User";
});

// posts
onValue(ref(db,"posts"),snap=>{
let data=snap.val();
let html="";
for(let id in data){
let p=data[id];
if(p.owner===viewUID){
html+=`<p>${p.text}</p>`;
}
}
posts.innerHTML=html;
});

// friend status
get(ref(db,"friends/"+uid+"/"+viewUID)).then(snap=>{
if(snap.exists()){
btn.innerText="Friends";
}else{
btn.innerText="Add Friend";
btn.onclick=sendRequest;
}
});

}

// send request
window.sendRequest = async function(){
await set(ref(db,"requests/"+viewUID+"/"+uid),true);
alert("Request Sent");
}
</script>

</body>
</html>
