<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <a href="home.html" class="text-blue-600 w-8 h-8 flex items-center justify-center rounded-full transition"><i class="fas fa-chevron-left text-xl"></i></a>
            <h1 class="font-bold text-gray-800 text-sm uppercase tracking-wider">বন্ধু প্রোফাইল</h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white shadow-sm border-b relative text-center">
        <div class="h-36 bg-gradient-to-r from-blue-400 to-blue-600 relative overflow-hidden">
            <img id="coverImg" src="" class="w-full h-full object-cover hidden">
        </div>
        
        <div class="relative flex justify-center -mt-16">
            <div id="uAvatar" class="w-32 h-32 bg-blue-500 rounded-full border-4 border-white shadow-xl overflow-hidden flex items-center justify-center text-4xl font-bold text-white">
                <img id="profileImg" src="" class="w-full h-full object-cover hidden">
                <span id="initialText">?</span>
            </div>
        </div>
        
        <div class="px-6 pb-6">
            <h2 id="uName" class="text-2xl font-black text-gray-800 mt-4 leading-none italic">লোড হচ্ছে...</h2>
            <p id="uEmail" class="text-gray-400 text-[10px] mt-1 font-bold"></p>
            
            <div class="mt-5 flex justify-center gap-2">
                <button id="followBtn" class="hidden bg-blue-600 text-white px-8 py-2.5 rounded-full font-black text-xs uppercase tracking-tighter shadow-lg active:scale-90 transition-all">Follow</button>
                <button id="unfollowBtn" class="hidden bg-gray-100 text-gray-500 px-8 py-2.5 rounded-full font-black text-xs uppercase tracking-tighter active:scale-90 transition-all">Unfollow</button>
                
                <button id="msgBtn" class="bg-white text-blue-600 border border-blue-600 px-8 py-2.5 rounded-full font-black text-xs uppercase tracking-tighter shadow-sm active:scale-90 transition-all">
                    <i class="fas fa-comment-dots mr-1"></i> Message
                </button>
            </div>

            <div class="flex justify-around mt-8 border-t pt-6">
                <div class="text-center"><p id="pCount" class="font-black text-lg text-gray-800">0</p><p class="text-[9px] text-gray-400 font-bold uppercase">Posts</p></div>
                <div class="text-center"><p id="followerCount" class="font-black text-lg text-gray-800">0</p><p class="text-[9px] text-gray-400 font-bold uppercase">Followers</p></div>
                <div class="text-center"><p id="followingCount" class="font-black text-lg text-gray-800">0</p><p class="text-[9px] text-gray-400 font-bold uppercase">Following</p></div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 bg-white">
        <div class="flex border-b">
            <button id="tabAll" class="flex-1 py-3 text-blue-600 border-b-2 border-blue-600"><i class="fas fa-th"></i></button>
            <button id="tabVideos" class="flex-1 py-3 text-gray-300"><i class="fas fa-video"></i></button>
        </div>
        <div id="uPosts" class="grid grid-cols-3 gap-0.5 p-0.5"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        let currentUser = null;
        let posts = [];

        onAuthStateChanged(auth, user => {
            if(user) {
                currentUser = user;
                if(currentUser.uid === targetId) window.location.href = "profile.html";
                init();
            } else { window.location.href = "index.html"; }
        });

        // মেসেজ বাটনের লজিক
        document.getElementById('msgBtn').onclick = () => {
            window.location.href = `chat.html?id=${targetId}`;
        };

        async function init() {
            const userDoc = await getDoc(doc(db, "users", targetId));
            let name = "User";
            if(userDoc.exists()) {
                const data = userDoc.data();
                name = data.name || data.email.split('@')[0];
                document.getElementById('uEmail').innerText = data.email;
                if(data.profilePic) {
                    document.getElementById('profileImg').src = data.profilePic;
                    document.getElementById('profileImg').classList.remove('hidden');
                    document.getElementById('initialText').classList.add('hidden');
                }
                if(data.coverPic) {
                    document.getElementById('coverImg').src = data.coverPic;
                    document.getElementById('coverImg').classList.remove('hidden');
                }
            }
            document.getElementById('uName').innerText = name;
            document.getElementById('initialText').innerText = name[0].toUpperCase();

            onSnapshot(doc(db, "users", currentUser.uid, "following", targetId), s => {
                if(s.exists()) {
                    document.getElementById('unfollowBtn').classList.remove('hidden');
                    document.getElementById('followBtn').classList.add('hidden');
                } else {
                    document.getElementById('followBtn').classList.remove('hidden');
                    document.getElementById('unfollowBtn').classList.add('hidden');
                }
            });

            onSnapshot(collection(db, "users", targetId, "followers"), s => document.getElementById('followerCount').innerText = s.size);
            onSnapshot(collection(db, "users", targetId, "following"), s => document.getElementById('followingCount').innerText = s.size);

            onSnapshot(query(collection(db, "posts"), where("userId", "==", targetId)), s => {
                posts = []; s.forEach(d => posts.push(d.data()));
                render('all');
                document.getElementById('pCount').innerText = s.size;
            });
        }

        document.getElementById('followBtn').onclick = async () => {
            await setDoc(doc(db, "users", currentUser.uid, "following", targetId), { time: new Date() });
            await setDoc(doc(db, "users", targetId, "followers", currentUser.uid), { time: new Date() });
        };
        document.getElementById('unfollowBtn').onclick = async () => {
            await deleteDoc(doc(db, "users", currentUser.uid, "following", targetId));
            await deleteDoc(doc(db, "users", targetId, "followers", currentUser.uid));
        };

        function render(type) {
            const container = document.getElementById('uPosts'); container.innerHTML = "";
            const filtered = type === 'video' ? posts.filter(p => p.fileType === 'video') : posts;
            filtered.forEach(p => {
                const d = document.createElement('div');
                d.className = "aspect-square bg-gray-100 relative overflow-hidden";
                d.innerHTML = p.fileUrl ? (p.fileType==='video'?`<video src="${p.fileUrl}" class="w-full h-full object-cover"></video><i class="fas fa-play absolute inset-0 m-auto w-fit h-fit text-white text-[10px]"></i>`:`<img src="${p.fileUrl}" class="w-full h-full object-cover">`) : `<div class="p-2 text-[8px] text-gray-400">${p.text?.slice(0,30)}</div>`;
                container.appendChild(d);
            });
        }

        document.getElementById('tabAll').onclick = () => render('all');
        document.getElementById('tabVideos').onclick = () => render('video');
    </script>
</body>
</html>
