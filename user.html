<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>User Profile - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050508; -webkit-tap-highlight-color: transparent; color: #fff; margin: 0; overflow-x: hidden; }
        
        /* Premium Cyberpunk & Glassmorphism Theme Base */
        .neon-border { border: 1px solid rgba(99, 102, 241, 0.12); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .avatar-ring { border: 4px solid #0b0f19; box-shadow: 0 0 25px rgba(99, 102, 241, 0.25); border-radius: 32px; transform: translateY(-35%); }
        
        /* Premium Creator Stat Block */
        .stat-pill { background: rgba(255, 255, 255, 0.02); border-radius: 16px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.04); }
        .stat-pill:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.05); }
        
        /* Grid Thumbnails Styling */
        .insta-gallery-item { aspect-ratio: 1/1; position: relative; overflow: hidden; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); }
        .media-badge { position: absolute; top: 6px; right: 6px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); color: white; width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 8px; z-index: 5; }
        .text-post-placeholder { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); padding: 8px; display: flex; align-items: center; justify-content: center; text-align: center; height: 100%; font-size: 9px; font-weight: 700; color: #a5b4fc; line-height: 1.4; }
    </style>
</head>
<body class="pb-24">

    <nav class="sticky top-0 z-50 bg-[#050508]/90 backdrop-blur-md border-b border-white/5 px-5 py-4 flex items-center gap-4 max-w-md mx-auto">
        <button onclick="history.back()" class="w-9 h-9 bg-white/5 text-gray-400 rounded-xl flex items-center justify-center active:scale-90 transition border border-white/5">
            <i class="fas fa-chevron-left text-xs"></i>
        </button>
        <h1 class="font-black text-white text-xs uppercase tracking-[2px]">Creator Profile</h1>
    </nav>

    <div class="max-w-md mx-auto relative px-0 sm:px-4">
        <div class="h-36 bg-gradient-to-tr from-blue-950 via-slate-900 to-black relative overflow-hidden sm:rounded-t-[24px] neon-border">
            <img id="coverImg" src="" class="w-full h-full object-cover opacity-50 hidden">
            <div class="absolute inset-0 bg-black/20"></div>
        </div>

        <div class="bg-[#0b0f19] px-5 pb-6 rounded-b-[24px] border-x border-b border-white/5 shadow-2xl relative">
            <div class="flex justify-center relative h-12">
                <div id="uAvatar" class="avatar-ring w-28 h-28 bg-[#111625] overflow-hidden flex items-center justify-center text-3xl text-white font-black">
                    <img id="profileImg" src="" class="w-full h-full object-cover hidden bg-black">
                    <span id="initialText">?</span>
                </div>
            </div>

            <div class="text-center mt-3 space-y-1">
                <div class="flex items-center justify-center gap-1.5">
                    <h2 id="uName" class="text-xl font-black text-white tracking-wide italic uppercase">LOAD হচ্ছে...</h2>
                </div>
                <p id="uEmail" class="text-[9px] text-gray-500 font-extrabold tracking-widest uppercase"></p>
            </div>

            <div class="mt-6 flex justify-center gap-2.5 px-2">
                <button id="followBtn" class="hidden flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black text-[11px] uppercase tracking-wider shadow-lg shadow-indigo-600/10 active:scale-95 transition-all">
                    Follow <i class="fa-solid fa-user-plus ml-1 text-[10px]"></i>
                </button>
                <button id="unfollowBtn" class="hidden flex-1 bg-white/5 border border-white/5 text-gray-400 py-3 rounded-xl font-black text-[11px] uppercase tracking-wider active:scale-95 transition-all">
                    Unfollow <i class="fa-solid fa-user-check ml-1 text-[10px]"></i>
                </button>
                
                <button id="msgBtn" class="flex-1 bg-white text-black py-3 rounded-xl font-black text-[11px] uppercase tracking-wider shadow-md active:scale-95 transition-all">
                    <i class="fas fa-comment-dots mr-1"></i> Message
                </button>
            </div>

            <div class="grid grid-cols-3 gap-3 mt-6 border-t border-white/5 pt-5">
                <div class="stat-pill p-3 text-center">
                    <p id="pCount" class="font-black text-base text-white">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Posts</p>
                </div>
                <div onclick="location.href='followers.html?id='+targetId" class="stat-pill p-3 text-center">
                    <p id="followerCount" class="font-black text-base text-indigo-400">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Followers</p>
                </div>
                <div onclick="location.href='following.html?id='+targetId" class="stat-pill p-3 text-center">
                    <p id="followingCount" class="font-black text-base text-indigo-400">0</p>
                    <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Following</p>
                </div>
            </div>
        </div>

        <div class="bg-[#0b0f19] mt-4 p-4 rounded-2xl mb-10 border border-white/5 mx-3 sm:mx-0">
            <div class="flex border-b border-white/5 text-center mb-4">
                <button id="tabPosts" class="flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 font-bold text-xs uppercase tracking-wider transition focus:outline-none">
                    <i class="fas fa-th mr-1.5"></i> Gallery
                </button>
                <button id="tabVideos" class="flex-1 py-3 text-gray-500 font-bold text-xs uppercase tracking-wider transition focus:outline-none">
                    <i class="fas fa-video mr-1.5"></i> Reels
                </button>
            </div>
            
            <div id="uPosts" class="grid grid-cols-3 gap-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        window.targetId = targetId; 
        
        let currentUser = null;
        let myData = null;
        let allItems = []; 
        let currentTab = 'all'; 

        onAuthStateChanged(auth, async user => {
            if(user) {
                currentUser = user;
                if(currentUser.uid === targetId) {
                    window.location.href = "profile.html";
                    return;
                }
                const mySnap = await getDoc(doc(db, "users", currentUser.uid));
                myData = mySnap.exists() ? mySnap.data() : null;
                
                init();
            } else { 
                window.location.href = "index.html"; 
            }
        });

        document.getElementById('msgBtn').onclick = () => {
            if(targetId) location.href = `chat.html?id=${targetId}`;
        };

        async function init() {
            onSnapshot(doc(db, "users", targetId), (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('uName').innerText = data.name || "User";
                    document.getElementById('uEmail').innerText = data.email || "";
                    document.getElementById('initialText').innerText = (data.name ? data.name[0] : "?").toUpperCase();

                    if(data.profilePic) {
                        document.getElementById('profileImg').src = data.profilePic;
                        document.getElementById('profileImg').classList.remove('hidden');
                        document.getElementById('initialText').classList.add('hidden');
                    }
                    if(data.coverPic) {
                        document.getElementById('coverImg').src = data.coverPic;
                        document.getElementById('coverImg').classList.remove('hidden');
                    }

                    document.getElementById('followerCount').innerText = data.followers ? (Array.isArray(data.followers) ? data.followers.length : data.followers) : 0;
                    document.getElementById('followingCount').innerText = data.following ? (Array.isArray(data.following) ? data.following.length : data.following) : 0;

                    if (data.followers && data.followers.includes(currentUser.uid)) {
                        document.getElementById('unfollowBtn').classList.remove('hidden');
                        document.getElementById('followBtn').classList.add('hidden');
                    } else {
                        document.getElementById('followBtn').classList.remove('hidden');
                        document.getElementById('unfollowBtn').classList.add('hidden');
                    }
                }
            });

            const q = query(collection(db, "posts"), where("userId", "==", targetId));
            onSnapshot(q, s => {
                allItems = [];
                document.getElementById('pCount').innerText = s.size; 
                
                s.forEach(d => allItems.push({id: d.id, ...d.data()}));
                allItems.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                renderGrid();
            });
        }

        const tabPosts = document.getElementById('tabPosts');
        const tabVideos = document.getElementById('tabVideos');

        tabPosts.onclick = () => {
            currentTab = 'all';
            tabPosts.className = "flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 font-bold text-xs uppercase tracking-wider transition";
            tabVideos.className = "flex-1 py-3 text-gray-500 font-bold text-xs uppercase tracking-wider transition";
            renderGrid();
        };

        tabVideos.onclick = () => {
            currentTab = 'video';
            tabVideos.className = "flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 font-bold text-xs uppercase tracking-wider transition";
            tabPosts.className = "flex-1 py-3 text-gray-500 font-bold text-xs uppercase tracking-wider transition";
            renderGrid();
        };

        function renderGrid() {
            const container = document.getElementById('uPosts');
            container.innerHTML = "";

            const filteredItems = allItems.filter(p => {
                if (currentTab === 'video') {
                    return p.fileType === 'video';
                } else {
                    return p.fileType !== 'video'; 
                }
            });

            if(filteredItems.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-12 text-gray-500 text-xs font-bold uppercase tracking-wider">কোনো পোস্ট পাওয়া যায়নি</div>`;
                return;
            }

            filteredItems.forEach(p => {
                const div = document.createElement('div');
                div.className = "insta-gallery-item transform active:scale-95 transition-all cursor-pointer";
                div.onclick = () => location.href = `post-view.html?id=${p.id}`;
                
                if (p.fileUrl) {
                    if (p.fileType === 'video') {
                        div.innerHTML = `
                            <video src="${p.fileUrl}" preload="metadata" class="w-full h-full object-cover" muted></video>
                            <div class="media-badge"><i class="fas fa-play text-[8px]"></i></div>`;
                    } else {
                        div.innerHTML = `<img src="${p.fileUrl}" class="w-full h-full object-cover">`;
                    }
                } else {
                    div.innerHTML = `
                        <div class="text-post-placeholder">
                            <span>${p.text ? p.text.slice(0,25) + '...' : 'TEXT POST'}</span>
                        </div>`;
                }
                
                container.appendChild(div);
            });
        }

        async function sendNotif(targetId, type, message) {
            try {
                await addDoc(collection(db, "notifications"), {
                    targetUserId: targetId,
                    senderId: currentUser.uid,
                    senderName: myData?.name || "Someone",
                    senderPic: myData?.profilePic || "",
                    type: type, 
                    message: message,
                    read: false,
                    timestamp: serverTimestamp()
                });
            } catch (err) { console.error("Notif Error:", err); }
        }

        document.getElementById('followBtn').onclick = async () => {
            const myRef = doc(db, "users", currentUser.uid);
            const targetRef = doc(db, "users", targetId);
            
            await updateDoc(myRef, { following: arrayUnion(targetId) });
            await updateDoc(targetRef, { followers: arrayUnion(currentUser.uid) });
            
            sendNotif(targetId, "follow", "আপনাকে ফলো করা শুরু করেছেন।");
        };

        document.getElementById('unfollowBtn').onclick = async () => {
            const myRef = doc(db, "users", currentUser.uid);
            const targetRef = doc(db, "users", targetId);

            await updateDoc(myRef, { following: arrayRemove(targetId) });
            await updateDoc(targetRef, { followers: arrayRemove(currentUser.uid) });
        };
    </script>
</body>
</html>
