<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
.header{background:#1877f2;color:white;padding:15px;text-align:center;}
.user{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.name{font-weight:bold;}
button{
  padding:6px 10px;
  border:none;
  background:#1877f2;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="header">💬 Inbox</div>
<div id="list"></div>

<script type="module">
import { db, auth } from "./config.js";
import { ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let uid;

onAuthStateChanged(auth,(user)=>{
if(user){
uid = user.uid;
loadFriends();
}else{
location.href="index.html";
}
});

// 👥 load friends
function loadFriends(){

onValue(ref(db,"friends/"+uid), async snap=>{

let data = snap.val();
let html="";

if(!data){
html = "<p style='text-align:center'>No friends</p>";
document.getElementById("list").innerHTML = html;
return;
}

for(let fid in data){

let userSnap = await get(ref(db,"users/"+fid));
let user = userSnap.val();

html += `
<div class="user">
<div class="name">${user?.username || "User"}</div>
<button onclick="openChat('${fid}')">Chat</button>
</div>
`;

}

document.getElementById("list").innerHTML = html;

});

}

// 👉 open chat
window.openChat = function(fid){
localStorage.setItem("chatUser", fid);
window.location.href = "chat.html";
}
</script>

</body>
</html>
