<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SojiDa | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #fe2c55; --secondary: #25f4ee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Video Container */
        .video-container {
            height: 100vh; width: 100vw;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .video-container::-webkit-scrollbar { display: none; }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* UI Overlays */
        .side-bar {
            position: absolute; right: 15px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .side-icon { text-align: center; font-size: 25px; cursor: pointer; }
        .side-icon p { font-size: 12px; margin-top: 5px; }

        .video-info {
            position: absolute; left: 15px; bottom: 90px; width: 70%;
        }
        .video-info h3 { font-size: 16px; margin-bottom: 5px; color: var(--secondary); }
        .video-info p { font-size: 14px; color: #eee; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: #000; border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #888; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item.active { color: white; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 2px; }
        .plus-icon { background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 45px; height: 28px; border-radius: 8px; color: #000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="video-container" id="video-wrapper">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i>Chat</a>
        <a href="upload.html" class="nav-item"><div class="plus-icon"><i class="fa-solid fa-plus"></i></div></a>
        <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i>Earning</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i>Profile</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // আপনার অরিজিনাল Firebase কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyBeCWMtjRiLaHhWiP-grW_8QDTRxf8ULLs",
            authDomain: "sojida.firebaseapp.com",
            databaseURL: "https://sojida-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sojida",
            storageBucket: "sojida.firebasestorage.app",
            messagingSenderId: "194824640211",
            appId: "1:194824640211:web:2149cd020f898f40996626"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const videoWrapper = document.getElementById('video-wrapper');

        // ১. ফায়ারবেস থেকে ভিডিও লোড করা
        db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snapshot => {
            videoWrapper.innerHTML = '';
            snapshot.forEach(doc => {
                const videoData = doc.data();
                createVideoCard(videoData, doc.id);
            });
        });

        function createVideoCard(data, id) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <video src="${data.url}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="side-bar">
                    <div class="side-icon"><i class="fa-solid fa-heart"></i><p>${data.likes || 0}</p></div>
                    <div class="side-icon"><i class="fa-solid fa-comment"></i><p>০</p></div>
                    <div class="side-icon"><i class="fa-solid fa-share"></i><p>Share</p></div>
                </div>
                <div class="video-info">
                    <h3>@${data.creatorName || 'creator'}</h3>
                    <p>${data.caption || ''}</p>
                </div>
            `;
            
            // ভিডিও ভিউ লজিক সেট করা
            const videoElement = card.querySelector('video');
            setupEarningLogic(videoElement, data.creatorId, id);
            
            videoWrapper.appendChild(card);
        }

        // ২. আর্নিং লজিক (৫ সেকেন্ড চললে ক্রিয়েটর টাকা পাবে)
        function setupEarningLogic(video, creatorId, videoId) {
            let rewarded = false;
            video.addEventListener('timeupdate', function() {
                if (video.currentTime >= 5 && !rewarded) {
                    rewarded = true;
                    updateCreatorBalance(creatorId, 0.10, videoId);
                }
            });
        }

        async function updateCreatorBalance(cId, amount, vId) {
            if(!cId) return;
            const creatorRef = db.collection("users").doc(cId);
            
            // ট্রানজ্যাকশন ব্যবহার করে ব্যালেন্স বাড়ানো (নিরাপদ উপায়)
            db.runTransaction(async (transaction) => {
                const doc = await transaction.get(creatorRef);
                if (!doc.exists) return;
                
                let currentBalance = doc.data().balance || 0;
                transaction.update(creatorRef, { 
                    balance: currentBalance + amount 
                });
                
                // ভিডিওর ভিউ ১ বাড়ানো
                const videoRef = db.collection("videos").doc(vId);
                transaction.update(videoRef, { 
                    views: firebase.firestore.FieldValue.increment(1) 
                });
            });
            console.log("SojiDa: ক্রিয়েটরের ইনকাম জমা হয়েছে!");
        }
    </script>
</body>
</html>
