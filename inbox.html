<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* ✨ Glassmorphism Toast Style */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 16px 24px;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999; display: flex; align-items: center; gap: 15px;
            min-width: 320px; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #customToast.show { top: 30px; }
        .toast-icon { width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        .chat-card { transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.02); }
        .chat-card:hover { transform: translateY(-2px); background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-20">

    <div id="customToast">
        <div id="toastIcon" class="toast-icon"></div>
        <div>
            <p id="toastTitle" class="text-[10px] font-black uppercase tracking-[2px] leading-none"></p>
            <p id="toastMsg" class="text-xs text-gray-600 font-bold mt-1.5"></p>
        </div>
    </div>

    <div class="sticky top-0 z-40 bg-white/80 backdrop-blur-lg border-b border-gray-100 p-5 flex items-center justify-between">
        <h1 class="text-xl font-black text-gray-800 tracking-tight">Messages</h1>
        <div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
            <i class="fas fa-comment-dots"></i>
        </div>
    </div>

    <div id="list" class="p-4 space-y-3">
        <div class="animate-pulse space-y-4">
            <div class="h-20 bg-gray-100 rounded-[25px]"></div>
            <div class="h-20 bg-gray-100 rounded-[25px]"></div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./config.js";
        import { ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let uid;

        // 🍎 Custom Toast Function
        window.showToast = (title, msg, type = 'error') => {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            const tTitle = document.getElementById('toastTitle');
            const tMsg = document.getElementById('toastMsg');

            icon.className = type === 'error' ? "toast-icon bg-red-100 text-red-600" : "toast-icon bg-green-100 text-green-600";
            icon.innerHTML = type === 'error' ? '<i class="fas fa-exclamation-circle"></i>' : '<i class="fas fa-check-circle"></i>';
            tTitle.className = `text-[10px] font-black uppercase tracking-[2px] ${type === 'error' ? 'text-red-600' : 'text-green-600'}`;
            
            tTitle.innerText = title;
            tMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uid = user.uid;
                loadFriends();
            } else {
                window.location.href = "index.html";
            }
        });

        function loadFriends() {
            const listDiv = document.getElementById("list");
            onValue(ref(db, "friends/" + uid), async snap => {
                let data = snap.val();
                let html = "";

                if (!data) {
                    listDiv.innerHTML = `
                        <div class="text-center py-20">
                            <div class="w-16 h-16 bg-gray-50 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-ghost text-gray-300 text-2xl"></i>
                            </div>
                            <p class="text-gray-400 font-bold text-sm">No conversations yet</p>
                        </div>
                    `;
                    return;
                }

                for (let fid in data) {
                    const userSnap = await get(ref(db, "users/" + fid));
                    const user = userSnap.val();
                    
                    // প্রোফাইল পিক না থাকলে ডিফল্ট
                    const pfp = user?.profilePic || "https://ui-avatars.com/api/?name=" + (user?.username || "U");

                    html += `
                        <div onclick="openChat('${fid}')" class="chat-card bg-gray-50/50 p-4 rounded-[25px] flex items-center gap-4 cursor-pointer">
                            <div class="relative">
                                <img src="${pfp}" class="w-14 h-14 rounded-[20px] object-cover shadow-sm">
                                ${user?.isOnline ? '<div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-4 border-white rounded-full"></div>' : ''}
                            </div>
                            <div class="flex-1">
                                <h3 class="font-extrabold text-gray-800 text-sm">${user?.username || "Unknown User"}</h3>
                                <p class="text-[11px] text-gray-400 font-medium truncate w-40">Tap to start chatting...</p>
                            </div>
                            <div class="text-blue-600 bg-blue-100/50 w-8 h-8 rounded-xl flex items-center justify-center text-xs">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        </div>
                    `;
                }
                listDiv.innerHTML = html;
            });
        }

        window.openChat = function(fid) {
            localStorage.setItem("chatUser", fid);
            showToast("Opening Chat", "Connecting to secure server...", "success");
            setTimeout(() => {
                window.location.href = "chat.html";
            }, 1000);
        }
    </script>
</body>
</html>
