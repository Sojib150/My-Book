<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dashboard - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <div class="bg-white p-4 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="profile.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-lg font-black italic">Professional Dashboard</h1>
        </div>
        <button onclick="togglePayoutSettings()" class="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full text-[10px] font-black uppercase">Payout Settings</button>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-gradient-to-br from-indigo-600 to-blue-500 p-6 rounded-[30px] shadow-xl text-white">
            <p class="text-[10px] font-bold uppercase opacity-80 tracking-widest">Available Balance</p>
            <div class="flex items-end gap-2 mt-1">
                <h2 class="text-4xl font-black" id="totalBalance">0.00</h2>
                <span class="text-xs font-bold mb-2 uppercase opacity-80">BDT</span>
            </div>
            <div class="mt-6 grid grid-cols-2 gap-4 border-t border-white/20 pt-4">
                <div>
                    <p class="text-[9px] uppercase font-bold opacity-70">Monetization</p>
                    <p id="mStatus" class="text-xs font-bold">Checking...</p>
                </div>
                <div class="text-right">
                    <button onclick="requestWithdraw()" class="bg-white text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase shadow-lg">Withdraw</button>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="font-black text-gray-800 text-xs uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-chart-bar text-blue-500"></i> Video Performance
            </h3>
            <div id="videoList" class="space-y-3">
                <p class="text-center text-gray-400 py-10 text-xs">ভিডিও ডাটা লোড হচ্ছে...</p>
            </div>
        </div>

    </div>

    <div id="payoutModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[30px] p-6 h-[85vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="font-black text-gray-800 uppercase text-xs tracking-widest">Payout Information</h3>
                <button onclick="togglePayoutSettings()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Full Name (As per ID)</label>
                    <input type="text" id="payName" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Full Address</label>
                    <textarea id="payAddress" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none" rows="2"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Payment Method</label>
                    <select id="payMethod" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none font-bold">
                        <option value="Bkash">Bkash</option>
                        <option value="Nagad">Nagad</option>
                        <option value="Rocket">Rocket</option>
                        <option value="Bank">Bank Transfer</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Account Number / Number</label>
                    <input type="text" id="payNumber" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none" placeholder="017xxxxxxxx">
                </div>
                <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
                    <p class="text-[10px] text-yellow-700 font-medium">ন্যূনতম ৫০০ টাকা হলে আপনি পেমেন্ট রিকোয়েস্ট করতে পারবেন। অ্যাডমিন আপনার তথ্য যাচাই করে পেমেন্ট পাঠাবে।</p>
                </div>
                <button onclick="savePayoutInfo()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Save Settings</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid = null;
        let isUserMonetized = false;

        onAuthStateChanged(auth, user => {
            if(user) {
                uid = user.uid;
                loadDashboard();
                loadVideoAnalytics();
                loadPayoutInfo();
            } else { window.location.href = "index.html"; }
        });

        // ১. ড্যাশবোর্ড ডাটা লোড
        function loadDashboard() {
            onSnapshot(doc(db, "users", uid), s => {
                const d = s.data();
                isUserMonetized = d.isMonetized || false;
                document.getElementById('totalBalance').innerText = (d.balance || 0).toFixed(2);
                document.getElementById('mStatus').innerText = isUserMonetized ? "Active ✅" : "Not Eligible ❌";
            });
        }

        // ২. ভিডিও ভিত্তিক ভিউ এবং ইনকাম (The Master Logic)
        function loadVideoAnalytics() {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, s => {
                const list = document.getElementById('videoList');
                list.innerHTML = "";
                s.forEach(doc => {
                    const p = doc.data();
                    const views = p.views || 0;
                    // যদি ইউজার মনিটাইজড হয় তবেই ইনকাম দেখাবে, নাহলে ০
                    const income = isUserMonetized ? (p.earnings || 0) : 0;

                    const div = document.createElement('div');
                    div.className = "bg-white p-3 rounded-2xl flex items-center gap-3 border shadow-sm";
                    div.innerHTML = `
                        <div class="w-16 h-16 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                            ${p.fileType === 'video' ? `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>
                        <div class="flex-1">
                            <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Engagement</h4>
                            <div class="flex gap-4 mt-1">
                                <div><p class="text-xs font-black">${views}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Views</p></div>
                                <div><p class="text-xs font-black text-green-600">৳${income.toFixed(2)}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Earned</p></div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-gray-200"></i>
                    `;
                    list.appendChild(div);
                });
            });
        }

        // ৩. পে-আউট সেটিংস কন্ট্রোল
        window.togglePayoutSettings = () => document.getElementById('payoutModal').classList.toggle('hidden');

        window.savePayoutInfo = async () => {
            const info = {
                payName: document.getElementById('payName').value,
                payAddress: document.getElementById('payAddress').value,
                payMethod: document.getElementById('payMethod').value,
                payNumber: document.getElementById('payNumber').value,
            };
            await setDoc(doc(db, "users", uid, "private", "payoutSettings"), info);
            alert("পেমেন্ট ইনফরমেশন সেভ হয়েছে! 🚀");
            togglePayoutSettings();
        };

        async function loadPayoutInfo() {
            const s = await getDoc(doc(db, "users", uid, "private", "payoutSettings"));
            if(s.exists()) {
                const d = s.data();
                document.getElementById('payName').value = d.payName || "";
                document.getElementById('payAddress').value = d.payAddress || "";
                document.getElementById('payMethod').value = d.payMethod || "Bkash";
                document.getElementById('payNumber').value = d.payNumber || "";
            }
        }

        window.requestWithdraw = () => alert("আপনার তথ্য যাচাই করা হচ্ছে। পর্যাপ্ত ব্যালেন্স থাকলে পেমেন্ট চলে আসবে।");

    </script>
</body>
</html>
