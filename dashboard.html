<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dashboard - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-10">

    <div class="bg-white p-4 flex items-center gap-4 shadow-sm border-b sticky top-0 z-50">
        <a href="profile.html" class="text-gray-600 text-xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-lg font-bold">Professional Dashboard</h1>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Total Earnings</p>
            <div class="flex items-end gap-2 mt-2">
                <h2 class="text-4xl font-black text-blue-600" id="balance">0.00</h2>
                <span class="text-gray-400 font-bold mb-1 uppercase">BDT</span>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Today's Views</p>
                    <p class="text-lg font-bold text-gray-800" id="todayViews">0</p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Estimated Revenue</p>
                    <p class="text-lg font-bold text-green-500" id="todayIncome">৳0.00</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border" id="monetizationCard">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-award text-yellow-500"></i> Monetization Status
            </h3>
            <div id="monetizationContent" class="mt-4">
                <p class="text-sm text-gray-500 mb-4">আপনার অ্যাকাউন্ট মনিটাইজ করে ইনকাম শুরু করুন।</p>
                <div class="space-y-2 mb-4">
                    <div class="flex justify-between text-[11px] font-bold uppercase">
                        <span>Followers (Min 1000)</span>
                        <span id="followerCount">0/1000</span>
                    </div>
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                        <div id="followerProgress" class="bg-blue-600 h-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="applyMonetization()" id="applyBtn" disabled class="w-full bg-gray-200 text-gray-500 py-3 rounded-xl font-bold transition active:scale-95">Apply for Monetization</button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-wallet text-indigo-500"></i> Payout Methods
            </h3>
            <p class="text-[11px] text-gray-400 mt-1 italic">বিকাশ বা নগদে টাকা উইথড্র করুন।</p>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="openWithdraw('Bkash')" class="border p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-pink-50 transition">
                    <img src="https://img.icons8.com/color/48/null/b-kash.png" class="w-8">
                    <span class="text-xs font-bold">Bkash</span>
                </button>
                <button onclick="openWithdraw('Nagad')" class="border p-4 rounded-xl flex flex-col items-center gap-2 hover:bg-orange-50 transition">
                    <img src="https://img.icons8.com/color/48/null/nagad.png" class="w-8">
                    <span class="text-xs font-bold">Nagad</span>
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, async user => {
            if(user) {
                currentUser = user;
                loadDashboardData();
            } else { window.location.href = "login.html"; }
        });

        async function loadDashboardData() {
            // ১. ইউজারের ব্যালেন্স এবং মনিটাইজেশন স্ট্যাটাস আনা
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            const data = userSnap.data();

            document.getElementById('balance').innerText = (data.balance || 0).toFixed(2);
            
            // ২. ফলোয়ার চেক করা (ক্রাইটেরিয়া)
            const followersSnap = await getDocs(collection(db, "users", currentUser.uid, "followers"));
            const count = followersSnap.size;
            document.getElementById('followerCount').innerText = `${count}/1000`;
            const progress = (count / 1000) * 100;
            document.getElementById('followerProgress').style.width = `${progress > 100 ? 100 : progress}%`;

            if(count >= 1000 && !data.isMonetized) {
                const btn = document.getElementById('applyBtn');
                btn.disabled = false;
                btn.classList.replace('bg-gray-200', 'bg-blue-600');
                btn.classList.replace('text-gray-500', 'text-white');
            }

            if(data.isMonetized) {
                document.getElementById('monetizationContent').innerHTML = `
                    <div class="bg-green-100 text-green-700 p-3 rounded-xl text-center font-bold">
                        <i class="fas fa-check-circle"></i> Monetization Active
                    </div>
                `;
            }
        }

        window.applyMonetization = async () => {
            await updateDoc(doc(db, "users", currentUser.uid), {
                monetizationStatus: "pending",
                applyDate: serverTimestamp()
            });
            alert("আপনার আবেদনটি রিভিউতে আছে। এডমিন চেক করে এপ্রুভ করবে।");
        };

        window.openWithdraw = (method) => {
            const amount = prompt(`উইথড্র মেথড: ${method}\nকত টাকা তুলতে চান লিখুন:`);
            if(amount && amount >= 500) {
                alert(`${amount} টাকা তোলার রিকুয়েস্ট সফল হয়েছে। ২৪ ঘণ্টার মধ্যে পেমেন্ট পাবেন।`);
            } else {
                alert("মিনিমাম ৫০০ টাকা থাকতে হবে।");
            }
        };
    </script>
</body>
</html>
