<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Elite Dashboard - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #080c14; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .glass-sticky { background: rgba(8, 12, 20, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        
        .premium-vault-card { background: linear-gradient(135deg, #1877f2 0%, #0052cc 50%, #00c6ff 100%); box-shadow: 0 20px 40px rgba(24, 119, 242, 0.18); position: relative; overflow: hidden; }
        .premium-vault-card::before { content: ''; position: absolute; top: -20%; right: -20%; width: 180px; height: 180px; background: rgba(255, 255, 255, 0.12); border-radius: 50px; transform: rotate(45deg); pointer-events: none; }
        
        .metric-pod { background: rgba(30, 41, 59, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.25s; }
        .meta-progress-track { height: 7px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); overflow: hidden; }
        .meta-progress-fill { height: 100%; background: linear-gradient(90deg, #1877f2, #00c6ff); width: 0%; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.95); }
        
        /* 📱 Bottom Navigation Bar Styling */
        .nav-glass { background: rgba(8, 12, 20, 0.7); backdrop-filter: blur(30px); border-top: 1px solid rgba(255, 255, 255, 0.04); }
        .nav-btn { color: #64748b; transition: all 0.25s; }
        .nav-btn.active { color: #1877f2; text-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }
    </style>
</head>
<body class="pb-28">

    <header class="sticky top-0 z-50 glass-sticky px-6 py-4 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="userPic" src="https://via.placeholder.com/100" class="w-11 h-11 rounded-2xl border-2 border-blue-500/30 object-cover bg-slate-800">
                <div id="verifiedBadge" class="hidden absolute -top-1 -right-1 bg-blue-500 text-white w-4 h-4 rounded-full flex items-center justify-center text-[7px] border-2 border-[#080c14]">
                    <i class="fas fa-check"></i>
                </div>
            </div>
            <div>
                <p class="text-[9px] font-extrabold text-gray-500 uppercase tracking-widest leading-none mb-1.5">Meta Studio</p>
                <h1 id="userName" class="text-base font-black tracking-tight italic uppercase text-white">Loading...</h1>
            </div>
        </div>
        <button onclick="window.location.href='profile.html'" class="w-9 h-9 glass-panel rounded-xl flex items-center justify-center text-gray-400 hover:text-white action-btn">
            <i class="fa-solid fa-gear text-xs"></i>
        </button>
    </header>

    <main class="px-5 mt-4 space-y-5 max-w-md mx-auto">
        
        <div class="premium-vault-card p-6 rounded-[2.2rem]">
            <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-1.5 text-white/80">
                    <i class="fa-solid fa-shield-halved text-xs"></i>
                    <p class="text-[9px] font-black uppercase tracking-[0.18em]">Creator Vault Balance</p>
                </div>
            </div>
            <div class="my-3">
                <h2 class="text-3xl font-black text-white"><span class="text-xl opacity-90">৳</span> <span id="userBalance">0.0000</span></h2>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="location.href='Withdraw.html'" class="w-full bg-white text-blue-600 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest action-btn shadow-lg shadow-black/10">Withdraw Profits</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3.5">
            <div class="metric-pod p-5 rounded-3xl">
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider">Followers</p>
                <h3 id="userFollowers" class="text-xl font-black mt-0.5 text-white">0</h3>
            </div>
            <div class="metric-pod p-5 rounded-3xl">
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider">Impressions (Views)</p>
                <h3 id="userViews" class="text-xl font-black mt-0.5 text-white">0</h3>
            </div>
        </div>

        <div id="monetizationBox" class="glass-panel p-6 rounded-[2.2rem] space-y-4">
            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                <h3 class="font-black text-[11px] uppercase tracking-[1.5px]">Monetization Gate</h3>
                <span id="mStatusText" class="text-[8px] font-black bg-slate-800/80 px-3 py-1 rounded-md text-gray-400 uppercase tracking-wider border border-white/5">Checking Status</span>
            </div>
            
            <div id="mProgressArea" class="space-y-1.5">
                <div class="flex justify-between text-[10px] font-bold text-gray-400">
                    <span>Threshold Requirement</span>
                    <span id="progressBarMetric">0 / 1,000 Views</span>
                </div>
                <div class="meta-progress-track">
                    <div id="mProgressBar" class="meta-progress-fill"></div>
                </div>
            </div>
            
            <p id="mInfo" class="text-[11px] text-gray-400 leading-relaxed">Analyzing system cluster analytics algorithms data parameters mapping sequence...</p>
            
            <button id="applyBtn" class="w-full py-3.5 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest action-btn shadow-md shadow-blue-600/10 transition hidden"></button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-glass z-50 flex justify-around items-center px-4 max-w-md mx-auto">
        <button onclick="location.href='reels.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-clapperboard text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Reels</span>
        </button>
        <button onclick="location.href='post.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-square-plus text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Create</span>
        </button>
        <button onclick="location.href='dashboard.html'" class="nav-btn active flex flex-col items-center gap-1">
            <i class="fa-solid fa-chart-pie text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Studio</span>
        </button>
        <button onclick="location.href='profile.html'" class="nav-btn flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-lg"></i><span class="text-[8px] font-bold uppercase tracking-wider">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserDocRef = null;
        let cachedUserData = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserDocRef = doc(db, "users", user.uid);
                
                // Real-time listener for current user document parameters
                onSnapshot(currentUserDocRef, (d) => {
                    if(!d.exists()) return;
                    
                    const data = d.data();
                    cachedUserData = data;
                    
                    // Profile Header Elements Mapping
                    document.getElementById('userName').innerText = data.name || "Creator Profile";
                    if(data.profilePic) {
                        document.getElementById('userPic').src = data.profilePic;
                    }
                    
                    // Blue Check Shield State Control
                    if(data.isVerified) {
                        document.getElementById('verifiedBadge').classList.remove('hidden');
                    } else {
                        document.getElementById('verifiedBadge').classList.add('hidden');
                    }

                    // Financial & Analytical Value Parsing
                    document.getElementById('userBalance').innerText = (data.balance || 0).toFixed(4);
                    document.getElementById('userFollowers').innerText = data.followers ? data.followers.length : 0;
                    
                    const totalViews = data.totalImpressions || 0;
                    document.getElementById('userViews').innerText = totalViews;
                    
                    // 🔑 Monetization Pipeline Validation Engine Matrix
                    evaluateMonetizationState(data, totalViews, user.uid);
                });
            } else {
                window.location.href = "Login.html";
            }
        });

        function evaluateMonetizationState(data, views, uid) {
            const statusText = document.getElementById('mStatusText');
            const infoText = document.getElementById('mInfo');
            const progressBar = document.getElementById('mProgressBar');
            const progressMetric = document.getElementById('progressBarMetric');
            const applyBtn = document.getElementById('applyBtn');
            const progressArea = document.getElementById('mProgressArea');

            const THRESHOLD = 1000;
            
            // Calculate real-time view percentage loop metrics
            let percentage = Math.min((views / THRESHOLD) * 100, 100);
            progressBar.style.width = `${percentage}%`;
            progressMetric.innerText = `${views.toLocaleString()} / ${THRESHOLD.toLocaleString()} Views`;

            // Case A: Monetization Approved & Verified Active State
            if(data.isMonetized) {
                statusText.innerText = "Verified";
                statusText.className = "text-[8px] font-black bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-md text-emerald-400 uppercase tracking-wider";
                infoText.innerText = "Congratulations! Your account node has been verified. Monetization engine is active for revenue split distribution pipeline operations.";
                progressArea.classList.add('hidden');
                applyBtn.classList.add('hidden');
            } 
            // Case B: Review Request Under Pending Administration
            else if(data.monetizationStatus === "Pending") {
                statusText.innerText = "In Review";
                statusText.className = "text-[8px] font-black bg-amber-500/10 border border-amber-500/20 px-3 py-1 rounded-md text-amber-400 uppercase tracking-wider";
                infoText.innerText = "Your application request packet is locked inside review routing queues. HQ Administration is verifying account stream integrity compliance.";
                progressArea.classList.add('hidden');
                applyBtn.classList.add('hidden');
            } 
            // Case C: View Criteria Fulfilled (Ready to submit request)
            else if(views >= THRESHOLD) {
                statusText.innerText = "Eligible";
                statusText.className = "text-[8px] font-black bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-md text-blue-400 uppercase tracking-wider";
                infoText.innerText = "Your profile has breached the programmatic milestone threshold data limits. Tap below to broadcast authorization logs.";
                applyBtn.innerText = "Submit Request Bundle";
                applyBtn.classList.remove('hidden');
                
                applyBtn.onclick = () => submitMonetizationRequest(uid);
            } 
            // Case D: Criteria Locked (Insufficient Traffic)
            else {
                statusText.innerText = "Locked";
                statusText.className = "text-[8px] font-black bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-md text-red-400 uppercase tracking-wider";
                infoText.innerText = `Keep transmitting creative video content pipelines. Secure ${THRESHOLD - views} more organic profile views to trigger network contract node access.`;
                applyBtn.classList.add('hidden');
            }
        }

        async function submitMonetizationRequest(uid) {
            if(!currentUserDocRef || !cachedUserData) return;
            
            try {
                // Step 1: Push Log Event Node inside Central Administration Complaints/Requests Field Hub
                await addDoc(collection(db, "complaints"), {
                    userId: uid,
                    userName: cachedUserData.name || "Anonymous Creator",
                    issueType: "Monetization Request",
                    message: `Creator profile has requested monetization pipeline contract clearing. Snapshot View Metrics: ${cachedUserData.totalImpressions || 0} total traffic parameters documented.`,
                    status: "pending",
                    timestamp: serverTimestamp()
                });

                // Step 2: Set local user object verification field to "Pending" state array sequence
                await updateDoc(currentUserDocRef, {
                    monetizationStatus: "Pending"
                });

                Swal.fire({
                    icon: 'success',
                    title: 'Transmission Block Pushed',
                    text: 'Your qualification request bundle has been uploaded successfully into HQ admin nodes!',
                    background: '#0f172a',
                    color: '#f1f5f9',
                    confirmButtonColor: '#1877f2'
                });

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Routing Interrupt',
                    text: err.message,
                    background: '#0f172a',
                    color: '#f1f5f9'
                });
            }
        }
    </script>
</body>
</html>
