<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Elite Dashboard - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #080c14; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .glass-sticky { background: rgba(8, 12, 20, 0.85); backdrop-filter: blur(20px); border-b: 1px solid rgba(255, 255, 255, 0.04); }
        .premium-vault-card { background: linear-gradient(135deg, #1877f2 0%, #0052cc 50%, #00c6ff 100%); box-shadow: 0 20px 40px rgba(24, 119, 242, 0.18); position: relative; overflow: hidden; }
        .premium-vault-card::before { content: ''; position: absolute; top: -20%; right: -20%; width: 180px; height: 180px; background: rgba(255, 255, 255, 0.12); border-radius: 50px; transform: rotate(45deg); pointer-events: none; }
        .metric-pod { background: rgba(30, 41, 59, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.25s; }
        .meta-progress-track { height: 7px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); overflow: hidden; }
        .meta-progress-fill { height: 100%; background: linear-gradient(90deg, #1877f2, #00c6ff); width: 0%; transition: 1.2s; }
        .action-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-28">

    <header class="sticky top-0 z-50 glass-sticky px-6 py-4 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-3">
            <div class="relative"><img id="userPic" src="https://via.placeholder.com/100" class="w-11 h-11 rounded-2xl border-2 border-blue-500/30 object-cover bg-slate-800"></div>
            <div>
                <p class="text-[9px] font-extrabold text-gray-500 uppercase tracking-widest leading-none mb-1.5">Meta Studio</p>
                <h1 id="userName" class="text-base font-black tracking-tight italic uppercase text-white">Loading...</h1>
            </div>
        </div>
    </header>

    <main class="px-5 mt-4 space-y-5 max-w-md mx-auto">
        <div class="premium-vault-card p-6 rounded-[2.2rem]">
            <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-1.5 text-white/80"><i class="fa-solid fa-shield-halved text-xs"></i><p class="text-[9px] font-black uppercase tracking-[0.18em]">Creator Vault Balance</p></div>
            </div>
            <div class="my-3"><h2 class="text-3xl font-black text-white"><span class="text-xl opacity-90">৳</span> <span id="userBalance">0.0000</span></h2></div>
            <div class="mt-6 flex gap-3">
                <button onclick="location.href='Withdraw.html'" class="flex-1 bg-white text-blue-600 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest action-btn">Withdraw</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3.5">
            <div class="metric-pod p-5 rounded-3xl"><p class="text-[9px] font-bold text-gray-500 uppercase">Followers</p><h3 id="userFollowers" class="text-xl font-black mt-0.5 text-white">0</h3></div>
            <div class="metric-pod p-5 rounded-3xl"><p class="text-[9px] font-bold text-gray-500 uppercase">Impressions</p><h3 id="userViews" class="text-xl font-black mt-0.5 text-white">0</h3></div>
        </div>

        <div id="monetizationBox" class="glass-panel p-6 rounded-[2.2rem]">
            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                <h3 class="font-black text-[11px] uppercase tracking-[1.5px]">Monetization Policy</h3>
                <span id="mStatusText" class="text-[8px] font-black bg-slate-800 px-3 py-1 rounded-full text-gray-400">Inactive</span>
            </div>
            <div id="mProgressArea" class="mt-4"><div class="meta-progress-track"><div id="mProgressBar" class="meta-progress-fill"></div></div></div>
            <p id="mInfo" class="text-[11px] text-gray-400 mt-3"></p>
            <button id="applyBtn" style="display: none;" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Apply Now</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    const data = d.data();
                    document.getElementById('userName').innerText = data.name || "User";
                    document.getElementById('userBalance').innerText = (data.balance || 0).toFixed(4);
                    document.getElementById('userFollowers').innerText = data.followers?.length || 0;
                    document.getElementById('userViews').innerText = data.totalImpressions || 0;
                    
                    if(data.isMonetized) {
                        document.getElementById('mStatusText').innerText = "Verified";
                        document.getElementById('mInfo').innerText = "Active for Revenue Sharing.";
                    }
                });
            }
        });
    </script>
</body>
</html>
