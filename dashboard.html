<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dashboard - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 16px 24px;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999; display: flex; align-items: center; gap: 15px;
            min-width: 320px; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #customToast.show { top: 30px; }
    </style>
</head>
<body class="pb-20">

    <div id="customToast">
        <div id="toastIcon" class="w-9 h-9 rounded-xl flex items-center justify-center"></div>
        <div>
            <p id="toastTitle" class="text-[10px] font-black uppercase tracking-[2px] leading-none"></p>
            <p id="toastMsg" class="text-xs text-gray-600 font-bold mt-1.5"></p>
        </div>
    </div>

    <div class="bg-white/80 backdrop-blur-md p-5 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="profile.html" class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-sm font-black uppercase tracking-widest text-gray-800">Creator Center</h1>
        </div>
        <button onclick="togglePayoutSettings()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-100">Settings</button>
    </div>

    <div class="max-w-md mx-auto p-5 space-y-6">
        
        <div class="bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-700 p-8 rounded-[40px] shadow-2xl text-white relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            <p class="text-[10px] font-black uppercase opacity-70 tracking-[3px]">Wallet Balance</p>
            <div class="flex items-end gap-3 mt-2">
                <h2 class="text-5xl font-black tracking-tighter" id="totalBalance">0.00</h2>
                <span class="text-sm font-black mb-2 uppercase opacity-70">BDT</span>
            </div>
            
            <div class="mt-8 flex justify-between items-center border-t border-white/10 pt-6">
                <div>
                    <p class="text-[9px] uppercase font-black opacity-60 tracking-widest">Earnings Status</p>
                    <p id="mStatusDisplay" class="text-xs font-black mt-1">Loading...</p>
                </div>
                <button onclick="requestWithdraw()" class="bg-white text-blue-600 px-6 py-3 rounded-[20px] text-[10px] font-black uppercase shadow-xl active:scale-95 transition-all">Withdraw</button>
            </div>
        </div>

        <div id="monetizeSection" class="hidden bg-white p-6 rounded-[35px] border border-gray-100 shadow-sm">
            <h3 class="text-[10px] font-black text-gray-900 uppercase tracking-[2px] mb-4">Monetization Program</h3>
            <div id="eligibilityBox" class="space-y-3">
                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl">
                    <span class="text-xs font-bold text-gray-600">Followers (Min. 1000)</span>
                    <span id="followerBadge" class="text-[10px] font-black px-3 py-1 rounded-full bg-red-100 text-red-600">0 / 1000</span>
                </div>
            </div>
            <button id="applyBtn" disabled class="w-full mt-4 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">Apply Now</button>
            <p id="applyStatus" class="text-[9px] text-center mt-3 font-bold text-gray-400 uppercase"></p>
        </div>

        <div class="space-y-4">
            <h3 class="font-black text-gray-900 text-[10px] uppercase tracking-[2px] px-2">Content Performance</h3>
            <div id="videoList" class="space-y-3"></div>
        </div>

    </div>

    <div id="payoutModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end justify-center backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 h-[85vh] overflow-y-auto no-scrollbar shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-pointer" onclick="togglePayoutSettings()"></div>
            <h3 class="font-black text-gray-900 uppercase text-xs tracking-[2px] mb-8 border-b pb-4">Payout Engine</h3>
            <div class="space-y-5">
                <input type="text" id="payName" class="w-full p-5 bg-gray-50 rounded-2xl text-sm font-bold outline-none" placeholder="Full Legal Name">
                <select id="payMethod" class="w-full p-5 bg-gray-50 rounded-2xl text-sm font-black outline-none">
                    <option value="Bkash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Rocket">Rocket</option>
                </select>
                <input type="text" id="payNumber" class="w-full p-5 bg-gray-50 rounded-2xl text-sm font-bold outline-none" placeholder="Account Number">
                <button onclick="savePayoutInfo()" class="w-full bg-blue-600 text-white py-5 rounded-[25px] font-black uppercase text-[10px] tracking-widest mt-4">Save Configuration</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid = null;
        let isMonetized = false;
        let currentFollowers = 0;

        window.showToast = (title, msg, type = 'error') => {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            icon.className = type === 'error' ? "w-9 h-9 rounded-xl flex items-center justify-center bg-red-100 text-red-600" : "w-9 h-9 rounded-xl flex items-center justify-center bg-green-100 text-green-600";
            icon.innerHTML = type === 'error' ? '<i class="fas fa-shield-alt"></i>' : '<i class="fas fa-check-circle"></i>';
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                uid = user.uid;
                loadMainDashboard();
                loadAnalytics();
                loadPayoutInfo();
                checkEligibility();
            } else { window.location.href = "index.html"; }
        });

        function loadMainDashboard() {
            onSnapshot(doc(db, "users", uid), s => {
                const d = s.data();
                isMonetized = d.isMonetized || false;
                document.getElementById('totalBalance').innerText = (d.balance || 0).toFixed(2);
                
                const statusDiv = document.getElementById('mStatusDisplay');
                if(d.monetizationStatus === 'pending') statusDiv.innerHTML = `<span class="text-yellow-400">Reviewing App...</span>`;
                else if(isMonetized) statusDiv.innerHTML = `<span class="text-green-400">Active ✅</span>`;
                else statusDiv.innerHTML = `<span class="text-gray-400">Not Active ❌</span>`;
            });
        }

        async function checkEligibility() {
            const followerSnap = await getDoc(collection(db, "users", uid, "followers")); // এই লজিকটি আপনার ডাটাবেস অনুযায়ী ফলোয়ার কাউন্ট করবে
            // নোট: আপনার ফলোয়ার যদি সাব-কালেকশন হয় তবে s.size ব্যবহার করুন।
            onSnapshot(collection(db, "users", uid, "followers"), s => {
                currentFollowers = s.size;
                const badge = document.getElementById('followerBadge');
                badge.innerText = `${currentFollowers} / 1000`;
                
                const section = document.getElementById('monetizeSection');
                const btn = document.getElementById('applyBtn');

                if(!isMonetized) {
                    section.classList.remove('hidden');
                    if(currentFollowers >= 1000) {
                        badge.className = "text-[10px] font-black px-3 py-1 rounded-full bg-green-100 text-green-600";
                        btn.disabled = false;
                        btn.className = "w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg";
                    }
                }
            });

            // চেক যদি অলরেডি এপ্লাই করা থাকে
            const userDoc = await getDoc(doc(db, "users", uid));
            if(userDoc.data().monetizationStatus === 'pending') {
                document.getElementById('applyBtn').innerText = "Already Applied";
                document.getElementById('applyBtn').disabled = true;
                document.getElementById('applyStatus').innerText = "অ্যাডমিন আপনার প্রোফাইল চেক করছে।";
            }
        }

        document.getElementById('applyBtn').onclick = async () => {
            if(currentFollowers < 1000) return showToast("Denied", "মিনিমাম ১০০০ ফলোয়ার প্রয়োজন", "error");
            
            await updateDoc(doc(db, "users", uid), {
                monetizationStatus: 'pending',
                appliedAt: serverTimestamp()
            });
            showToast("Success", "আবেদন পাঠানো হয়েছে!", "success");
            location.reload();
        };

        // বাকি লোড এনালিটিক্স এবং সেভ সেটিংস আগের কোডটাই থাকবে (সংক্ষেপিত)
        function loadAnalytics() {
            onSnapshot(query(collection(db, "posts"), where("userId", "==", uid)), s => {
                const list = document.getElementById('videoList'); list.innerHTML = "";
                s.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-[30px] flex items-center gap-4 border border-gray-50 shadow-sm">
                            <div class="w-16 h-16 bg-gray-100 rounded-2xl overflow-hidden">${p.fileType==='video'?'<video src="'+p.fileUrl+'"></video>':'<img src="'+p.fileUrl+'">'}</div>
                            <div class="flex-1">
                                <div class="flex gap-4">
                                    <div><p class="text-sm font-black">${p.views||0}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Views</p></div>
                                    <div><p class="text-sm font-black text-green-600">৳${(p.earnings||0).toFixed(2)}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Earned</p></div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
        
        window.togglePayoutSettings = () => document.getElementById('payoutModal').classList.toggle('hidden');
        window.savePayoutInfo = async () => { /* আগের লজিক */ };
        async function loadPayoutInfo() { /* আগের লজিক */ }
        window.requestWithdraw = () => { /* আগের লজিক */ };

    </script>
</body>
</html>
