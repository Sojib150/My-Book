<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Dashboard - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ✨ Premium Toast */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); padding: 16px 24px;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999; display: flex; align-items: center; gap: 15px;
            min-width: 320px; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #customToast.show { top: 30px; }
    </style>
</head>
<body class="pb-20">

    <div id="customToast">
        <div id="toastIcon" class="w-9 h-9 rounded-xl flex items-center justify-center"></div>
        <div>
            <p id="toastTitle" class="text-[10px] font-black uppercase tracking-[2px] leading-none"></p>
            <p id="toastMsg" class="text-xs text-gray-600 font-bold mt-1.5"></p>
        </div>
    </div>

    <div class="bg-white/80 backdrop-blur-md p-5 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="profile.html" class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-sm font-black uppercase tracking-widest text-gray-800">Creator Center</h1>
        </div>
        <button onclick="togglePayoutSettings()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-100">Settings</button>
    </div>

    <div class="max-w-md mx-auto p-5 space-y-6">
        
        <div class="bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-700 p-8 rounded-[40px] shadow-2xl text-white relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            <p class="text-[10px] font-black uppercase opacity-70 tracking-[3px]">Wallet Balance</p>
            <div class="flex items-end gap-3 mt-2">
                <h2 class="text-5xl font-black tracking-tighter" id="totalBalance">0.00</h2>
                <span class="text-sm font-black mb-2 uppercase opacity-70">BDT</span>
            </div>
            
            <div class="mt-8 grid grid-cols-2 gap-6 border-t border-white/10 pt-6">
                <div>
                    <p class="text-[9px] uppercase font-black opacity-60 tracking-widest">Status</p>
                    <p id="mStatus" class="text-xs font-black mt-1 flex items-center gap-2">Checking...</p>
                </div>
                <div class="text-right flex items-center justify-end">
                    <button onclick="requestWithdraw()" class="bg-white text-blue-600 px-6 py-3 rounded-[20px] text-[10px] font-black uppercase shadow-xl active:scale-95 transition-all">Withdraw</button>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-black text-gray-900 text-[10px] uppercase tracking-[2px]">Content Performance</h3>
                <i class="fas fa-chart-line text-blue-500"></i>
            </div>
            
            <div id="videoList" class="space-y-3">
                <div class="text-center py-20">
                    <i class="fas fa-circle-notch fa-spin text-blue-600 mb-3"></i>
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Syncing Data...</p>
                </div>
            </div>
        </div>

    </div>

    <div id="payoutModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end justify-center backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 h-[85vh] overflow-y-auto no-scrollbar shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-pointer" onclick="togglePayoutSettings()"></div>
            
            <div class="flex justify-between items-center mb-8 border-b pb-6">
                <h3 class="font-black text-gray-900 uppercase text-xs tracking-[2px]">Payout Engine</h3>
                <button onclick="togglePayoutSettings()" class="w-8 h-8 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400">&times;</button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Full Legal Name</label>
                    <input type="text" id="payName" class="w-full p-5 bg-gray-50 border-none rounded-2xl text-sm font-bold outline-none ring-2 ring-transparent focus:ring-blue-500/10 transition-all" placeholder="Enter name">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Payment Method</label>
                    <select id="payMethod" class="w-full p-5 bg-gray-50 border-none rounded-2xl text-sm font-black outline-none">
                        <option value="Bkash">bKash</option>
                        <option value="Nagad">Nagad</option>
                        <option value="Rocket">Rocket</option>
                        <option value="Bank">Bank Transfer</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Account Number</label>
                    <input type="text" id="payNumber" class="w-full p-5 bg-gray-50 border-none rounded-2xl text-sm font-bold outline-none" placeholder="017XXXXXXXX">
                </div>
                
                <div class="bg-blue-50 p-6 rounded-[25px] border border-blue-100 mt-4">
                    <div class="flex gap-3">
                        <i class="fas fa-info-circle text-blue-600 mt-1"></i>
                        <p class="text-[11px] text-blue-700 font-bold leading-relaxed">মিনিমাম ৫০০ টাকা হলে উইথড্র করতে পারবেন। রিকোয়েস্ট করার ৭২ ঘণ্টার মধ্যে অ্যাডমিন আপনার একাউন্টে পেমেন্ট পাঠিয়ে দেবে।</p>
                    </div>
                </div>
                
                <button onclick="savePayoutInfo()" class="w-full bg-blue-600 text-white py-5 rounded-[25px] font-black uppercase text-[10px] tracking-widest shadow-xl shadow-blue-100 active:scale-95 transition-all mt-4">Save Configuration</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uid = null;
        let isUserMonetized = false;
        let currentBalance = 0;

        // 🍎 Toast Engine
        window.showToast = (title, msg, type = 'error') => {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            const tTitle = document.getElementById('toastTitle');
            const tMsg = document.getElementById('toastMsg');
            icon.className = type === 'error' ? "w-9 h-9 rounded-xl flex items-center justify-center bg-red-100 text-red-600" : "w-9 h-9 rounded-xl flex items-center justify-center bg-green-100 text-green-600";
            icon.innerHTML = type === 'error' ? '<i class="fas fa-shield-alt"></i>' : '<i class="fas fa-check-circle"></i>';
            tTitle.className = `text-[10px] font-black uppercase tracking-[2px] leading-none ${type === 'error' ? 'text-red-600' : 'text-green-600'}`;
            tTitle.innerText = title; tMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                uid = user.uid;
                loadDashboard();
                loadVideoAnalytics();
                loadPayoutInfo();
            } else { window.location.href = "index.html"; }
        });

        function loadDashboard() {
            onSnapshot(doc(db, "users", uid), s => {
                if(s.exists()){
                    const d = s.data();
                    isUserMonetized = d.isMonetized || false;
                    currentBalance = d.balance || 0;
                    document.getElementById('totalBalance').innerText = currentBalance.toFixed(2);
                    document.getElementById('mStatus').innerHTML = isUserMonetized ? 
                        `<span class="text-green-400"><i class="fas fa-check-circle"></i> Active</span>` : 
                        `<span class="text-white/50"><i class="fas fa-times-circle"></i> Ineligible</span>`;
                }
            });
        }

        function loadVideoAnalytics() {
            const q = query(collection(db, "posts"), where("userId", "==", uid));
            onSnapshot(q, s => {
                const list = document.getElementById('videoList');
                list.innerHTML = "";
                if(s.empty) {
                    list.innerHTML = `<div class="text-center py-20 text-gray-400 text-[10px] font-black uppercase">No Content Found</div>`;
                    return;
                }
                s.forEach(doc => {
                    const p = doc.data();
                    const views = p.views || 0;
                    const income = isUserMonetized ? (p.earnings || 0) : 0;

                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-[30px] flex items-center gap-4 border border-gray-50 shadow-sm hover:shadow-md transition-all";
                    div.innerHTML = `
                        <div class="w-16 h-16 bg-gray-100 rounded-[20px] overflow-hidden flex-shrink-0 border-2 border-white shadow-sm">
                            ${p.fileType === 'video' ? `<video src="${p.fileUrl}" class="w-full h-full object-cover"></video>` : `<img src="${p.fileUrl}" class="w-full h-full object-cover">`}
                        </div>
                        <div class="flex-1">
                            <h4 class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2">Metrics</h4>
                            <div class="flex gap-6">
                                <div><p class="text-sm font-black text-gray-800">${views}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Reach</p></div>
                                <div><p class="text-sm font-black text-green-600">৳${income.toFixed(2)}</p><p class="text-[8px] text-gray-400 font-bold uppercase">Revenue</p></div>
                            </div>
                        </div>
                        <div class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-gray-300 text-[10px]"><i class="fas fa-chevron-right"></i></div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.togglePayoutSettings = () => document.getElementById('payoutModal').classList.toggle('hidden');

        window.savePayoutInfo = async () => {
            const name = document.getElementById('payName').value.trim();
            const number = document.getElementById('payNumber').value.trim();
            
            if(!name || !number) return showToast("Required", "সবগুলো ঘর পূরণ করুন", "error");

            const info = {
                payName: name,
                payMethod: document.getElementById('payMethod').value,
                payNumber: number,
                updatedAt: new Date()
            };
            
            try {
                await setDoc(doc(db, "users", uid, "private", "payoutSettings"), info);
                showToast("Success", "সেটিংস আপডেট হয়েছে!", "success");
                setTimeout(togglePayoutSettings, 1000);
            } catch(e) {
                showToast("Error", "সেভ করা যাচ্ছে না", "error");
            }
        };

        async function loadPayoutInfo() {
            const s = await getDoc(doc(db, "users", uid, "private", "payoutSettings"));
            if(s.exists()) {
                const d = s.data();
                document.getElementById('payName').value = d.payName || "";
                document.getElementById('payMethod').value = d.payMethod || "Bkash";
                document.getElementById('payNumber').value = d.payNumber || "";
            }
        }

        window.requestWithdraw = () => {
            if(!isUserMonetized) return showToast("Access Denied", "আপনার একাউন্ট মনিটাইজড নয়", "error");
            if(currentBalance < 500) return showToast("Low Balance", "মিনিমাম ৫০০ টাকা প্রয়োজন", "error");
            
            showToast("Processing", "অ্যাডমিন প্যানেলে রিকোয়েস্ট পাঠানো হয়েছে", "success");
            // এখানে উইথড্রল রিকোয়েস্ট ডাটাবেসে পাঠানোর কোড যোগ করা যাবে।
        };

    </script>
</body>
</html>
