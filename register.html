<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join My Book - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        input { background: #0f172a !important; color: white !important; border: 1px solid #1e293b !important; border-radius: 16px; padding: 14px; outline: none; transition: 0.3s; width: 100%; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tighter italic uppercase">MY <span class="text-indigo-500">BOOK</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Create your elite profile</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <form id="regForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="regBtn" class="btn-primary w-full py-4 rounded-2xl font-black tracking-[2px] uppercase text-xs mt-4 shadow-lg shadow-indigo-500/20">
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-slate-400 text-xs">Already have an account? <a href="login.html" class="text-indigo-400 font-bold hover:underline">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // ⚡ increment ইমপোর্ট করা হয়েছে নিখুঁত আইপি ট্র্যাকিংয়ের জন্য
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) { return "Unknown"; }
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            btn.innerText = "SECURITY CHECKING...";
            btn.disabled = true;

            const userIP = await getIP();
            // আইপির স্পেশাল ক্যারেক্টার এবং ডট ক্লিন করার সেফ মেথড
            const safeIP = userIP.replace(/[\.\s:]/g, "_"); 

            try {
                // 🛡️ ১. আইপি সিকিউরিটি গেটওয়ে চেকিং (রেজিস্ট্রেশনের আগেই ব্লক করা হবে)
                if (safeIP !== "Unknown") {
                    const ipCheck = await getDoc(doc(db, "security_ips", safeIP));
                    if (ipCheck.exists() && ipCheck.data().count >= 3) {
                        Swal.fire("Access Denied", "এই ডিভাইস বা নেটওয়ার্ক থেকে সর্বোচ্চ সংখ্যক (৩টি) অ্যাকাউন্ট অলরেডি তৈরি করা হয়েছে!", "error");
                        btn.innerText = "CREATE ACCOUNT";
                        btn.disabled = false;
                        return;
                    }
                }

                // 🔑 ২. ফায়ারবেস অথেন্টিকেশন নোড ক্রিয়েশন
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 📂 ৩. ইউজার প্রোফাইল অবজেক্ট ডাটা সিঙ্ক (ড্যাশবোর্ডের সাথে সামঞ্জস্যপূর্ণ)
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    balance: 0.0000,
                    views: 0,
                    fakeViews: 0,
                    followers: [],
                    following: [],
                    isVerified: false,
                    isMonetized: false,
                    isHardBanned: false, // ⚡ আপনার অ্যাডমিন প্যানেলের ব্যান নোডের সাথে ম্যাচ করা হয়েছে
                    profilePic: "",
                    coverPic: "",
                    bio: "Hello, I am using My Book!",
                    ipAddress: userIP,
                    createdAt: serverTimestamp()
                });

                // 📈 ৪. আইপি ডাটাবেস কাউন্টার এটমিক ইনক্রিমেন্ট (Race Condition ফিক্সড)
                if (safeIP !== "Unknown") {
                    await setDoc(doc(db, "security_ips", safeIP), {
                        count: increment(1),
                        lastUser: user.uid,
                        updatedAt: serverTimestamp()
                    }, { merge: true });
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Welcome to My Book!',
                    text: 'আপনার অ্যাকাউন্টটি সফলভাবে তৈরি হয়েছে।',
                    background: '#0f172a',
                    color: '#fff',
                    confirmButtonColor: '#6366f1'
                }).then(() => {
                    window.location.href = "profile.html";
                });

            } catch (error) {
                let errorMessage = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = "এই ইমেইলটি দিয়ে অলরেডি একটি অ্যাকাউন্ট খোলা আছে।";
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = "পাসওয়ার্ডটি অত্যন্ত দুর্বল। অন্তত ৬টি অক্ষর ব্যবহার করুন।";
                }
                
                Swal.fire("Registration Failed", errorMessage, "error");
                btn.innerText = "CREATE ACCOUNT";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
