<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">নতুন অ্যাকাউন্ট খুলুন</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="আপনার নাম" class="w-full p-2 mb-4 border rounded" required>
            <input type="email" id="email" placeholder="ইমেইল" class="w-full p-2 mb-4 border rounded" required>
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-2 mb-4 border rounded" required>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">রেজিস্টার</button>
        </form>
        <p id="msg" class="mt-4 text-center text-sm"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // আপনার দেওয়া কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM",
            authDomain: "seen-a1d92.firebaseapp.com",
            databaseURL: "https://seen-a1d92-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seen-a1d92",
            storageBucket: "seen-a1d92.firebasestorage.app",
            messagingSenderId: "868584044532",
            appId: "1:868584044532:web:51f07436a883f88332eba1",
            measurementId: "G-K4W1BWQ53V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // ১. ইউজার তৈরি করা
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // ২. ডাটাবেসে প্রোফাইল সেভ করা
                await setDoc(doc(db, "users", user.uid), {
                    displayName: name,
                    email: email,
                    uid: user.uid,
                    createdAt: new Date()
                });

                msg.innerText = "সফল হয়েছে! লগইন করুন।";
                msg.style.color = "green";
                // এখানে আপনি home.html এ পাঠিয়ে দিতে পারেন
            } catch (error) {
                msg.innerText = "ভুল হয়েছে: " + error.message;
                msg.style.color = "red";
            }
        });
    </script>
</body>
</html>
