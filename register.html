<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join My Book - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        input { background: #0f172a !important; color: white !important; border: 1px solid #1e293b !important; border-radius: 16px; padding: 14px; outline: none; transition: 0.3s; width: 100%; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6); }
        .glow-text { font-family: 'Orbitron'; text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-8 relative">
        <div class="absolute -top-24 -left-24 w-64 h-64 bg-indigo-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-purple-600/10 rounded-full blur-[100px]"></div>

        <div class="text-center">
            <h1 class="glow-text text-4xl font-black tracking-tighter mb-2">MY <span class="text-indigo-500 text-3xl">BOOK</span></h1>
            <p class="text-slate-400 text-sm font-medium">Create your content creator profile</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl relative z-10">
            <form id="regForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Your Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="pt-2">
                    <button type="submit" id="regBtn" class="btn-primary w-full py-4 rounded-2xl font-black tracking-widest uppercase">
                        JOIN THE COMMUNITY
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-slate-400 text-xs">Already have an account? <a href="login.html" class="text-indigo-400 font-bold hover:underline">Sign In</a></p>
            </div>
        </div>

        <p class="text-center text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em]">Secure Infrastructure by My Book Core</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) { return "Unknown"; }
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            btn.innerText = "CHECKING SECURITY...";
            btn.disabled = true;

            const userIP = await getIP();

            try {
                // IP Protection (Max 2 accounts)
                const ipCheck = await getDoc(doc(db, "security_ips", userIP));
                if (ipCheck.exists() && ipCheck.data().count >= 2) {
                    alert("SECURITY ALERT: Too many accounts from this network.");
                    btn.innerText = "ACCESS DENIED";
                    return;
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // My Book User Profile Structure
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    balance: 0.00,
                    isVerified: false,
                    isMonetized: false,
                    followers: 0,
                    ipAddress: userIP,
                    profilePic: "",
                    createdAt: serverTimestamp()
                });

                await setDoc(doc(db, "security_ips", userIP), {
                    count: (ipCheck.exists() ? ipCheck.data().count + 1 : 1),
                    lastUser: user.uid
                }, { merge: true });

                alert("Welcome to My Book! Your journey starts now.");
                window.location.href = "dashboard.html";

            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "TRY AGAIN";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
