<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join My Book - Elite Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .glass-input { background: #f1f5f9; border: 2px solid transparent; transition: all 0.3s; }
        .glass-input:focus { background: white; border-color: #2563eb; box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.1); }
        .avatar-upload { width: 100px; height: 100px; border: 3px dashed #cbd5e1; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }

        /* ✨ Glassmorphism Toast Style */
        #customToast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 16px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 320px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #customToast.show { top: 30px; }
        .toast-icon { width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="customToast">
        <div id="toastIcon" class="toast-icon"></div>
        <div>
            <p id="toastTitle" class="text-[10px] font-black uppercase tracking-[2px] leading-none"></p>
            <p id="toastMsg" class="text-xs text-gray-600 font-bold mt-1.5"></p>
        </div>
    </div>

    <div class="w-full max-w-lg bg-white rounded-[40px] p-8 md:p-12 shadow-[0_32px_64px_-15px_rgba(0,0,0,0.08)] border border-gray-100">
        
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-blue-600 rounded-[30px] rotate-12 flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-200">
                <i class="fas fa-book-open text-white text-3xl -rotate-12"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Create Identity</h1>
            <p class="text-gray-400 text-sm mt-2 font-medium uppercase tracking-widest">Join the Elite Community</p>
        </div>

        <div class="space-y-5">
            <div class="flex justify-center mb-6">
                <label for="picInput" class="avatar-upload group">
                    <div id="uploadPlaceholder" class="text-center">
                        <i class="fas fa-camera text-gray-400 group-hover:text-blue-500 transition"></i>
                        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase">Photo</p>
                    </div>
                    <img id="preview" class="hidden">
                    <input type="file" id="picInput" accept="image/*" class="hidden" onchange="previewImg(this)">
                </label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="fullName" placeholder="Full Name" class="w-full glass-input rounded-2xl py-4 px-6 text-sm outline-none font-bold">
                <select id="gender" class="w-full glass-input rounded-2xl py-4 px-6 text-sm outline-none font-bold text-gray-500 appearance-none">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <input type="email" id="email" placeholder="Email Address" class="w-full glass-input rounded-2xl py-4 px-6 text-sm outline-none font-bold">
            <input type="password" id="password" placeholder="Strong Password" class="w-full glass-input rounded-2xl py-4 px-6 text-sm outline-none font-bold">

            <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                <p class="text-[10px] text-blue-600 font-black uppercase mb-1">Security Shield Active</p>
                <p class="text-[11px] text-blue-400 font-medium leading-relaxed">Anti-duplicate system is monitoring your device fingerprint.</p>
            </div>

            <button onclick="handleRegister()" id="regBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-2xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all mt-4 text-sm uppercase tracking-widest">
                Authorize Account
            </button>
        </div>

        <div class="mt-10 text-center">
            <p class="text-gray-400 text-sm font-medium">Already a member? <a href="index.html" class="text-blue-600 font-black hover:underline ml-1">Login Here</a></p>
        </div>
    </div>

    <div id="loader" class="hidden fixed inset-0 bg-white/90 backdrop-blur-xl z-[100] flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-50 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-blue-600 font-black text-xs uppercase tracking-widest animate-pulse">Encrypting Profile...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🍎 Custom Toast Function
        window.showToast = (title, msg, type = 'error') => {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            const tTitle = document.getElementById('toastTitle');
            const tMsg = document.getElementById('toastMsg');

            if(type === 'error') {
                icon.className = "toast-icon bg-red-100 text-red-600";
                icon.innerHTML = '<i class="fas fa-shield-alt"></i>';
                tTitle.className = "text-[10px] font-black uppercase tracking-[2px] text-red-600";
            } else {
                icon.className = "toast-icon bg-green-100 text-green-600";
                icon.innerHTML = '<i class="fas fa-check-double"></i>';
                tTitle.className = "text-[10px] font-black uppercase tracking-[2px] text-green-600";
            }

            tTitle.innerText = title;
            tMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        };

        window.previewImg = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.handleRegister = async () => {
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const gender = document.getElementById('gender').value;
            const loader = document.getElementById('loader');

            if(!name || !email || !pass || !gender) return showToast("Required", "সবগুলো ঘর পূরণ করুন!", "error");
            if(pass.length < 6) return showToast("Weak Password", "পাসওয়ার্ড অন্তত ৬ অক্ষরের দিন!", "error");

            loader.classList.remove('hidden');

            try {
                // ১২ নম্বর সিকিউরিটি শিল্ড লজিক
                const deviceId = navigator.userAgent.replace(/\s/g, '').substring(0, 60);
                let ipAddress = "Hidden";
                let city = "Unknown";
                
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    ipAddress = ipData.ip;
                    city = ipData.city;
                } catch(e) { console.log("Direct IP fetch blocked"); }

                const q = query(collection(db, "users"), where("deviceModel", "==", deviceId));
                const querySnap = await getDocs(q);

                let status = "active";
                if(!querySnap.empty) { status = "waiting_approval"; }

                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    name, email, gender, uid: user.uid,
                    profilePic: document.getElementById('preview').src || "",
                    bio: "Hi, I am using My Book!",
                    followers: [], following: [],
                    isVerified: false, isMonetized: false,
                    isShadowBanned: false, balance: 0, fakeViews: 0,
                    monetizeStatus: "none",
                    accountStatus: status,
                    deviceModel: deviceId,
                    ipAddress: ipAddress,
                    city: city,
                    createdAt: serverTimestamp()
                });

                if(status === "waiting_approval") {
                    showToast("Security Alert", "Duplicate device detected! Waiting for approval.", "error");
                    setTimeout(() => { window.location.href = "index.html"; }, 3000);
                } else {
                    showToast("Success", "একাউন্ট তৈরি হয়েছে! প্রবেশ করুন...", "success");
                    setTimeout(() => { window.location.href = "home.html"; }, 2000);
                }

            } catch (error) {
                showToast("System Error", error.message, "error");
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
