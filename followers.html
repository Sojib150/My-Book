<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Followers - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .user-card { background: white; border-radius: 20px; transition: 0.2s; border: 1px solid rgba(0,0,0,0.02); }
        .user-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 p-5 flex items-center gap-4">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-gray-700">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="text-xl font-black text-gray-900">Followers</h1>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div class="relative mb-6">
            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Search followers..." 
                class="w-full bg-white border-none py-4 pl-12 pr-4 rounded-2xl shadow-sm outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500/20">
        </div>

        <div id="userList" class="space-y-3">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, documentId } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com",
            projectId: "seen-a1d92" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('id');

        let allFollowersData = []; 

        function renderFollowers(users) {
            const userList = document.getElementById('userList');
            if (users.length === 0) {
                userList.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold text-sm">কোনো ব্যবহারকারী পাওয়া যায়নি</div>`;
                return;
            }

            userList.innerHTML = "";
            users.forEach(user => {
                const card = document.createElement('div');
                card.className = "user-card p-3 flex items-center justify-between shadow-sm cursor-pointer hover:bg-slate-50";
                card.onclick = () => location.href = `user.html?id=${user.uid}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.profilePic || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-2xl object-cover bg-gray-100" onerror="this.src='https://via.placeholder.com/100'">
                        <div>
                            <h4 class="font-bold text-[14px] text-gray-900">@${user.name || 'User'}</h4>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${user.category || 'Member'}</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs pr-2"></i>
                `;
                userList.appendChild(card);
            });
        }

        async function loadFollowers() {
            if(!targetUserId) {
                document.getElementById('userList').innerHTML = `<div class="text-center py-10 text-red-500 font-bold text-sm">ইনভ্যালিড ইউজার আইডি!</div>`;
                return;
            }
            const userList = document.getElementById('userList');
            
            try {
                const userDoc = await getDoc(doc(db, "users", targetUserId));
                if (userDoc.exists()) {
                    const followersIds = userDoc.data().followers || [];
                    
                    if (followersIds.length === 0) {
                        userList.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold text-sm">কোনো ফলোয়ার নেই</div>`;
                        return;
                    }

                    // সর্বোচ্চ ৩০টি করে আইডি ভাগ করে ডেটা আনার লজিক (Firebase Limit Optimization)
                    const chunks = [];
                    for (let i = 0; i < followersIds.length; i += 30) {
                        chunks.push(followersIds.slice(i, i + 30));
                    }

                    allFollowersData = [];
                    for (const chunk of chunks) {
                        const q = query(collection(db, "users"), where(documentId(), "in", chunk));
                        const querySnapshot = await getDocs(q);
                        querySnapshot.forEach(doc => {
                            // ⚡ ফিক্স: doc.id কে সরাসরি অবজেক্টের uid হিসেবে পুশ করা হলো
                            allFollowersData.push({ uid: doc.id, ...doc.data() });
                        });
                    }

                    renderFollowers(allFollowersData);
                } else {
                    userList.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold text-sm">ইউজার পাওয়া যায়নি</div>`;
                }
            } catch (e) {
                console.error("Followers Pipeline Error:", e);
                userList.innerHTML = `<div class="text-center py-10 text-red-500 font-bold text-sm">ডাটা লোড করতে সমস্যা হয়েছে।</div>`;
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            const filteredUsers = allFollowersData.filter(user => 
                (user.name && user.name.toLowerCase().includes(keyword))
            );
            renderFollowers(filteredUsers);
        });

        loadFollowers();
    </script>
</body>
</html>
