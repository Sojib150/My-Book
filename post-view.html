<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Post View - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .premium-card { background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .video-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
        video { width: 100%; max-height: 70vh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .elite-popup { background: #111 !important; color: #fff !important; border-radius: 25px !important; }
    </style>
</head>
<body class="pb-20">

    <nav class="ios-blur sticky top-0 z-50 px-6 pt-10 pb-4 border-b border-gray-50">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <button onclick="history.back()" class="text-blue-600 w-8 h-8 flex items-center justify-center rounded-full active:scale-90 transition">
                <i class="fas fa-chevron-left text-xl"></i>
            </button>
            <h1 class="text-lg font-black text-gray-800 italic">পোস্ট দেখুন</h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="singlePost" class="space-y-4">
            <div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-blue-600 text-2xl"></i></div>
        </div>

        <div class="mt-8 mb-4 px-2 flex justify-between items-center">
            <h3 class="font-black text-gray-800 text-sm uppercase tracking-wider">Comments</h3>
            <span id="commentCountLabel" class="bg-blue-100 text-blue-600 text-[10px] px-3 py-1 rounded-full font-bold">0</span>
        </div>

        <div id="commentList" class="space-y-6 pb-24">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 ios-blur border-t border-gray-100">
        <div class="max-w-md mx-auto flex gap-3">
            <input id="cInput" type="text" placeholder="আপনার মতামত লিখুন..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm font-bold border border-transparent focus:border-blue-300 transition">
            <button onclick="postComment()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", projectId: "seen-a1d92" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        let user = null;
        let currentUserData = null;

        onAuthStateChanged(auth, async u => {
            if(u && postId) {
                user = u;
                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.data();
                loadPost();
                loadComments();
            } else if(!postId) {
                alert("পোস্ট আইডি পাওয়া যায়নি!");
                history.back();
            } else {
                window.location.href = "index.html";
            }
        });

        // ১. নির্দিষ্ট পোস্ট লোড করা
        async function loadPost() {
            const postRef = doc(db, "posts", postId);
            onSnapshot(postRef, (snap) => {
                if(!snap.exists()) {
                    document.getElementById('singlePost').innerHTML = "<p class='text-center text-gray-500'>পোস্টটি খুঁজে পাওয়া যায়নি বা মুছে ফেলা হয়েছে।</p>";
                    return;
                }
                const p = snap.data();
                const hasL = p.likedBy?.includes(user.uid);
                const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{day:'numeric',month:'short',hour:'numeric',minute:'numeric'}) : 'এখনই';

                document.getElementById('singlePost').innerHTML = `
                    <div class="premium-card">
                        <div class="p-4 flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                            <img src="${p.userPic}" class="w-11 h-11 rounded-2xl object-cover border-2 border-blue-50">
                            <div>
                                <div class="font-extrabold text-[14px]">@${p.userName}</div>
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">${date}</p>
                            </div>
                        </div>
                        <p class="px-5 pb-4 text-[14px] text-gray-700 font-medium leading-relaxed">${p.text || ''}</p>
                        ${p.fileUrl ? `<div class="video-box">${p.fileType==='video' ? `<video src="${p.fileUrl}" controls class="w-full"></video>` : `<img src="${p.fileUrl}" class="w-full">`}</div>` : ''}
                        <div class="flex justify-around py-2 border-t mt-1">
                            <button onclick="toggleLike()" class="flex flex-col items-center gap-1 flex-1 py-2 ${hasL ? 'text-red-500':'text-gray-400'}">
                                <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-xl"></i>
                                <span class="text-[10px] font-black">${p.likedBy?.length||0}</span>
                            </button>
                            <button class="flex flex-col items-center gap-1 flex-1 py-2 text-blue-500">
                                <i class="fa-solid fa-comment-dots text-xl"></i>
                                <span class="text-[10px] font-black">${p.commentCount||0}</span>
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('commentCountLabel').innerText = p.commentCount || 0;
            });
        }

        // ২. লাইক লজিক
        window.toggleLike = async () => {
            const ref = doc(db, "posts", postId);
            const snap = await getDoc(ref);
            const d = snap.data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            
            if(!hasL) {
                // নোটিফিকেশন পাঠানো
                await addDoc(collection(db, "notifications"), {
                    targetUserId: d.userId,
                    senderId: user.uid,
                    senderName: currentUserData.name,
                    senderPic: currentUserData.profilePic,
                    type: "like",
                    message: "আপনার পোস্টে লাইক দিয়েছেন।",
                    postId: postId,
                    postImg: d.fileUrl || "",
                    read: false,
                    timestamp: serverTimestamp()
                });
            }
        };

        // ৩. কমেন্ট লোড করা
        function loadComments() {
            const q = query(collection(db, "posts", postId, "comments"), orderBy("time", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                sn.forEach(c => {
                    const d = c.data();
                    list.innerHTML += `
                        <div class="flex gap-3 animate-in fade-in duration-500">
                            <img src="${d.userPic}" class="w-10 h-10 rounded-2xl object-cover bg-gray-100 shadow-sm">
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 max-w-[85%]">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-tighter">@${d.userName}</p>
                                <p class="text-[13px] text-gray-800 font-medium mt-1">${d.text}</p>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // ৪. নতুন কমেন্ট পোস্ট করা
        window.postComment = async () => {
            const v = document.getElementById('cInput').value;
            if(!v) return;

            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            const postData = postSnap.data();

            await addDoc(collection(db, "posts", postId, "comments"), {
                text: v,
                userId: user.uid,
                userName: currentUserData.name,
                userPic: currentUserData.profilePic,
                time: serverTimestamp()
            });

            await updateDoc(postRef, { commentCount: increment(1) });

            // নোটিফিকেশন পাঠানো
            await addDoc(collection(db, "notifications"), {
                targetUserId: postData.userId,
                senderId: user.uid,
                senderName: currentUserData.name,
                senderPic: currentUserData.profilePic,
                type: "comment",
                message: `মন্তব্য করেছেন: "${v}"`,
                postId: postId,
                postImg: postData.fileUrl || "",
                read: false,
                timestamp: serverTimestamp()
            });

            document.getElementById('cInput').value = "";
        };
    </script>
</body>
</html>
