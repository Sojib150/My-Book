<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Post View - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050508; 
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
        }

        /* এলিট লাক্সারি ব্যাকগ্রাউন্ড */
        .premium-bg {
            background-color: #050508;
            background-image: radial-gradient(circle at top right, #0f1220, #050508);
            background-size: cover;
            min-height: 100vh;
        }
        
        /* গ্লাস মরফিজম ইফেক্ট */
        .glass-blur { 
            background: rgba(11, 15, 25, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.15); 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
        }

        /* গোল্ডেন ও লাক্সারি বাটন */
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #8A6E2F);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
        }

        .text-gold { color: #D4AF37; }
        .border-gold-soft { border-color: rgba(212, 175, 55, 0.2); }
        
        /* রিলস স্টাইলড মিডিয়া প্লেয়ার */
        .media-box { 
            width: 100%; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        video, img { width: 100%; max-height: 65vh; object-fit: contain; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .comment-bubble {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px 20px 20px 4px;
        }

        .elite-popup {
            background: #0b0f19 !important;
            border: 1px solid rgba(212, 175, 55, 0.25) !important;
            color: #fff !important;
            border-radius: 24px !important;
        }
    </style>
</head>
<body class="pb-32 premium-bg">

    <nav class="glass-blur sticky top-0 z-50 p-4 max-w-md w-full mx-auto flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="text-gold w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center border border-white/5 active:scale-90 transition">
                <i class="fas fa-chevron-left text-sm"></i>
            </button>
            <h1 class="text-sm font-black text-white tracking-widest uppercase">Explore Content</h1>
        </div>
        <div class="w-2.5 h-2.5 bg-[#D4AF37] rounded-full shadow-[0_0_10px_#D4AF37] animate-pulse"></div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="singlePost" class="space-y-4">
            <div class="text-center py-24"><i class="fas fa-circle-notch fa-spin text-gold text-2xl"></i></div>
        </div>

        <div class="mt-8 mb-2 px-2 flex justify-between items-center">
            <h3 class="font-extrabold text-gray-400 text-[11px] uppercase tracking-widest">Discussion Thread</h3>
            <span id="commentCountLabel" class="bg-[#D4AF37]/10 text-gold text-[10px] px-3 py-1 rounded-xl border border-[#D4AF37]/20 font-black">0</span>
        </div>

        <div id="commentList" class="space-y-4"></div>
    </main>

    <div class="fixed bottom-4 left-50 transform -translate-x-1/2 w-[92%] max-w-[500px] z-50 left-1/2">
        <div class="flex items-center gap-2 p-2 bg-[#0b0f19]/90 border border-gold-soft rounded-3xl shadow-[0_15px_40px_rgba(0,0,0,0.6)] backdrop-blur-xl">
            <input id="cInput" type="text" placeholder="Share your insights securely..." class="flex-1 bg-transparent py-3 px-3 outline-none text-xs text-white placeholder-gray-500 font-medium">
            <button onclick="postComment()" class="btn-gold w-11 h-11 rounded-2xl flex items-center justify-center active:scale-95 transition flex-shrink-0">
                <i class="fa-solid fa-paper-plane text-xs"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92",
            appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        let user = null;
        let currentUserData = null;

        onAuthStateChanged(auth, async u => {
            if(u && postId) {
                user = u;
                const userSnap = await getDoc(doc(db, "users", u.uid));
                currentUserData = userSnap.data();
                loadPost();
                loadComments();
            } else if(!postId) {
                Swal.fire({ title: "ERROR", text: "পোস্ট আইডি পাওয়া যায়নি!", icon: "error", customClass: { popup: 'elite-popup' } });
                history.back();
            } else {
                window.location.href = "index.html";
            }
        });

        // ১. নির্দিষ্ট পোস্ট লোড করা (লাক্সারি রিলস লেআউট)
        async function loadPost() {
            const postRef = doc(db, "posts", postId);
            onSnapshot(postRef, (snap) => {
                if(!snap.exists()) {
                    document.getElementById('singlePost').innerHTML = "<p class='text-center text-gray-500 text-xs py-10'>পোস্টটি খুঁজে পাওয়া যায়নি বা মুছে ফেলা হয়েছে।</p>";
                    return;
                }
                const p = snap.data();
                const hasL = p.likedBy?.includes(user.uid);
                const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleString('bn-BD',{day:'numeric',month:'short',hour:'numeric',minute:'numeric'}) : 'এখনই';

                document.getElementById('singlePost').innerHTML = `
                    <div class="glass-card overflow-hidden">
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='user.html?id=${p.userId}'">
                                <img src="${p.userPic || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-xl object-cover border border-white/10">
                                <div>
                                    <div class="font-bold text-[13px] text-white tracking-wide">@${p.userName}</div>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">${date}</p>
                                </div>
                            </div>
                            <span class="text-[8px] border border-gold-soft bg-[#D4AF37]/5 px-2 py-1 rounded-md text-gold font-black uppercase tracking-wider">Premium Content</span>
                        </div>
                        
                        ${p.text ? `<p class="px-5 pb-4 text-xs text-gray-300 font-medium leading-relaxed break-words">${p.text}</p>` : ''}
                        
                        ${p.fileUrl ? `
                            <div class="p-2 pt-0">
                                <div class="media-box">
                                    ${p.fileType === 'video' 
                                        ? `<video src="${p.fileUrl}" controls playsinline class="w-full h-full rounded-2xl bg-black"></video>` 
                                        : `<img src="${p.fileUrl}" class="w-full h-full rounded-2xl object-cover">`
                                    }
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="flex justify-around py-1 border-t border-white/5 mt-2 bg-white/[0.01]">
                            <button onclick="toggleLike()" class="flex flex-col items-center gap-1 flex-1 py-2.5 transition active:scale-90 ${hasL ? 'text-red-500':'text-gray-400'}">
                                <i class="fa-${hasL ? 'solid' : 'regular'} fa-heart text-lg"></i>
                                <span class="text-[9px] font-black tracking-wider">${p.likedBy?.length||0} Likes</span>
                            </button>
                            <button class="flex flex-col items-center gap-1 flex-1 py-2.5 text-gold">
                                <i class="fa-solid fa-comment-dots text-lg"></i>
                                <span class="text-[9px] font-black tracking-wider">${p.commentCount||0} Comments</span>
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('commentCountLabel').innerText = p.commentCount || 0;
            });
        }

        // ২. লাইক লজিক
        window.toggleLike = async () => {
            const ref = doc(db, "posts", postId);
            const snap = await getDoc(ref);
            const d = snap.data();
            const hasL = d.likedBy?.includes(user.uid);
            await updateDoc(ref, { likedBy: hasL ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            
            if(!hasL) {
                // নোটিফিকেশন ফায়ার
                await addDoc(collection(db, "notifications"), {
                    targetUserId: d.userId,
                    senderId: user.uid,
                    senderName: currentUserData.name,
                    senderPic: currentUserData.profilePic || "",
                    type: "like",
                    message: "আপনার পোস্টে লাইক দিয়েছেন।",
                    postId: postId,
                    postImg: d.fileUrl || "",
                    read: false,
                    timestamp: serverTimestamp()
                });
            }
        };

        // ৩. কমেন্ট লোড করা (ডার্ক বাবল থিম)
        function loadComments() {
            const q = query(collection(db, "posts", postId, "comments"), orderBy("time", "desc"));
            onSnapshot(q, sn => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                
                if(sn.empty) {
                    list.innerHTML = `
                        <div class="text-center py-8 text-gray-600 text-xs font-medium">
                            কোনো মন্তব্য নেই ভাই। প্রথম মন্তব্যটি আপনার হোক!
                        </div>`;
                    return;
                }

                sn.forEach(c => {
                    const d = c.data();
                    const div = document.createElement('div');
                    div.className = "flex gap-3 items-start p-1";
                    
                    div.innerHTML = `
                        <img src="${d.userPic || 'https://via.placeholder.com/150'}" class="w-9 h-9 rounded-xl object-cover bg-neutral-900 border border-white/10 flex-shrink-0">
                        <div class="comment-bubble p-3 flex-1 min-w-0">
                            <p class="text-[10px] font-black text-gold uppercase tracking-wider">@${d.userName}</p>
                            <p class="text-xs text-gray-300 font-medium mt-1 leading-relaxed break-words">${d.text}</p>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        // ৪. নতুন কমেন্ট পোস্ট করা
        window.postComment = async () => {
            const input = document.getElementById('cInput');
            const v = input.value.trim();
            if(!v) return;

            input.value = "";

            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            const postData = postSnap.data();

            await addDoc(collection(db, "posts", postId, "comments"), {
                text: v,
                userId: user.uid,
                userName: currentUserData.name,
                userPic: currentUserData.profilePic || "",
                time: serverTimestamp()
            });

            await updateDoc(postRef, { commentCount: increment(1) });

            // নোটিফিকেশন পাঠানো
            await addDoc(collection(db, "notifications"), {
                targetUserId: postData.userId,
                senderId: user.uid,
                senderName: currentUserData.name,
                senderPic: currentUserData.profilePic || "",
                type: "comment",
                message: `মন্তব্য করেছেন: "${v}"`,
                postId: postId,
                postImg: postData.fileUrl || "",
                read: false,
                timestamp: serverTimestamp()
            });
        };
    </script>
</body>
</html>
