<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Diary - Supreme Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #07090f; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .tab-link { transition: all 0.3s; border-radius: 12px; padding: 10px 15px; color: #94a3b8; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        input, textarea { background: #111827 !important; color: white !important; border: 1px solid #1f2937 !important; border-radius: 12px; padding: 12px; outline: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[9999] bg-[#07090f] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] max-w-sm w-full text-center border-t-4 border-indigo-600">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-indigo-500/50">
                <i class="fas fa-crown text-3xl text-white"></i>
            </div>
            <h2 style="font-family: 'Orbitron';" class="text-2xl font-black mb-6 tracking-tighter text-indigo-400">MASTER DIARY</h2>
            <input type="password" id="accessKey" placeholder="Code" class="w-full text-center mb-6">
            <button onclick="unlock()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black">INITIALIZE</button>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 style="font-family: 'Orbitron';" class="font-black text-lg tracking-widest text-indigo-100">COMMANDER</h1>
                <div class="flex gap-2 overflow-x-auto w-full md:w-auto">
                    <button onclick="showTab('users')" class="tab-link tab-active">Users</button>
                    <button onclick="showTab('ads')" class="tab-link">Ads/CPM</button>
                    <button onclick="showTab('system')" class="tab-link">System</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 space-y-8">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-3xl border-l-4 border-indigo-500 text-center">
                    <p class="text-[10px] font-bold text-slate-500">POPULATION</p>
                    <h3 id="countUsers" class="text-2xl font-black">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl border-l-4 border-green-500 text-center">
                    <p class="text-[10px] font-bold text-slate-500">CPM RATE</p>
                    <h3 id="displayCPM" class="text-2xl font-black text-green-400">৳0</h3>
                </div>
            </div>

            <div id="tab-users" class="tab-content space-y-6">
                <input type="text" id="uSearch" onkeyup="searchUser()" placeholder="Search citizens..." class="w-full">
                <div id="userGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-ads" class="hidden tab-content space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="font-black text-lg mb-6"><i class="fas fa-coins text-yellow-500"></i> Ad Control</h2>
                    <textarea id="adCodeInput" placeholder="Paste Ad HTML here..." class="w-full h-32 mb-4 font-mono text-xs"></textarea>
                    <button onclick="saveAd()" class="w-full bg-indigo-600 py-4 rounded-xl font-black mb-6">DEPLOY ADS</button>
                    
                    <div class="flex items-center gap-4 bg-slate-900 p-4 rounded-xl">
                        <span class="font-bold">CPM Rate (৳):</span>
                        <input type="number" id="cpmRateInput" step="0.001" class="flex-1 text-center font-black">
                        <button onclick="updateCPM()" class="bg-green-600 px-6 py-2 rounded-lg font-bold">SET</button>
                    </div>
                </div>
            </div>

            <div id="tab-system" class="hidden tab-content grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-orange-500">
                    <h3 class="font-black mb-4 text-center">Maintenance Mode</h3>
                    <button id="mBtn" onclick="toggleMaintenance()" class="w-full py-4 rounded-xl font-black"></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.unlock = () => {
            if(document.getElementById('accessKey').value === "150") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainUI').classList.remove('hidden');
                startLive();
            } else { alert("DENIED"); }
        };

        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('tab-active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            event.target.classList.add('tab-active');
        };

        function startLive() {
            // Load Users
            onSnapshot(collection(db, "users"), (snap) => {
                const grid = document.getElementById('userGrid'); grid.innerHTML = "";
                document.getElementById('countUsers').innerText = snap.size;
                snap.forEach(d => {
                    const u = d.data(); const id = d.id;
                    const card = document.createElement('div');
                    card.className = "glass p-6 rounded-[2rem] admin-card";
                    card.innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${u.profilePic || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-xl object-cover">
                            <div class="flex-1">
                                <h4 class="font-black text-sm uppercase">${u.name || 'User'}</h4>
                                <p class="text-xs text-indigo-400">৳${(u.balance || 0).toFixed(3)}</p>
                            </div>
                            <button onclick="toggleVerify('${id}', ${u.isVerified})" class="${u.isVerified ? 'text-blue-400' : 'text-slate-600'} text-xl">
                                <i class="fas fa-check-circle"></i>
                            </button>
                        </div>
                        <button onclick="hardBanUser('${id}')" class="w-full py-2 bg-red-900/20 text-red-500 font-bold rounded-xl text-[10px]">TERMINATE USER</button>
                    `;
                    grid.appendChild(card);
                });
            });

            // Load Ads
            onSnapshot(doc(db, "appSettings", "ads"), (d) => {
                if(d.exists()) document.getElementById('adCodeInput').value = d.data().code || "";
            });

            // Load Global Settings
            onSnapshot(doc(db, "appSettings", "algorithm"), (d) => {
                const r = d.data()?.trendBoost || 0;
                document.getElementById('displayCPM').innerText = "৳" + r;
                document.getElementById('cpmRateInput').value = r;
            });

            onSnapshot(doc(db, "appSettings", "maintenance"), (d) => {
                const status = d.data()?.isOn;
                window.mStatus = status;
                const btn = document.getElementById('mBtn');
                btn.innerText = status ? "OFF MAINTENANCE" : "ON MAINTENANCE";
                btn.className = status ? "w-full py-4 rounded-xl font-black bg-red-600" : "w-full py-4 rounded-xl font-black bg-slate-800 text-indigo-400";
            });
        }

        // Functions
        window.saveAd = async () => {
            const code = document.getElementById('adCodeInput').value;
            await setDoc(doc(db, "appSettings", "ads"), { code: code, status: true }, { merge: true });
            alert("Ads Updated!");
        };

        window.updateCPM = async () => {
            const rate = parseFloat(document.getElementById('cpmRateInput').value);
            await setDoc(doc(db, "appSettings", "algorithm"), { trendBoost: rate }, { merge: true });
            alert("CPM Rate Set!");
        };

        window.toggleMaintenance = async () => {
            await setDoc(doc(db, "appSettings", "maintenance"), { isOn: !window.mStatus }, { merge: true });
        };

        window.toggleVerify = async (id, s) => { await updateDoc(doc(db, "users", id), { isVerified: !s }); };
        window.hardBanUser = async (id) => { if(confirm("Terminate?")) await deleteDoc(doc(db, "users", id)); };
        
        window.searchUser = () => {
            const term = document.getElementById('uSearch').value.toLowerCase();
            document.querySelectorAll('.admin-card').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        };
    </script>
</body>
</html>
