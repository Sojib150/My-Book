<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-card { transition: all 0.3s ease; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #adminOverlay { backdrop-blur: 20px; }
        .toggle-checkbox:checked { right: 0; border-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div id="adminOverlay" class="fixed inset-0 bg-indigo-900/90 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[30px] shadow-2xl max-w-xs w-full text-center">
            <i class="fas fa-user-shield text-5xl text-indigo-600 mb-4"></i>
            <h2 class="font-black text-gray-800 uppercase tracking-tighter text-xl">Admin Login</h2>
            <p class="text-[10px] text-gray-400 font-bold mb-6">অ্যাডমিন পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>
            <input type="password" id="adminPassInput" placeholder="Password" class="w-full bg-gray-100 border-none rounded-xl py-3 px-4 mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="checkAdminPass()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg">Login Now</button>
        </div>
    </div>

    <div id="adminContent" class="hidden">
        <div class="bg-indigo-900 text-white p-6 shadow-2xl">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">Admin <span class="text-yellow-400 font-normal">Command Center</span></h1>
                    <span class="bg-indigo-800 px-4 py-2 rounded-full text-[10px] font-bold border border-indigo-700 animate-pulse">SYSTEM LIVE</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                        <p class="text-[9px] text-indigo-200 uppercase font-black">Total Users</p>
                        <h3 id="statTotalUsers" class="text-2xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                        <p class="text-[9px] text-indigo-200 uppercase font-black">Verified</p>
                        <h3 id="statVerified" class="text-2xl font-black mt-1 text-blue-400">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                        <p class="text-[9px] text-indigo-200 uppercase font-black">Monetized</p>
                        <h3 id="statRequests" class="text-2xl font-black mt-1 text-yellow-400">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                        <p class="text-[9px] text-indigo-200 uppercase font-black">Total Posts</p>
                        <h3 id="statPosts" class="text-2xl font-black mt-1">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-purple-100 ring-4 ring-purple-50">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-gray-800 text-xs uppercase tracking-widest flex items-center gap-2">
                            <i class="fas fa-brain text-purple-600"></i> Algorithm Engine
                        </h2>
                        <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" id="autoMode" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none"/>
                            <label for="autoMode" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                        </div>
                    </div>

                    <div id="algoSettings" class="space-y-4">
                        <div>
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Trend Boost Speed</label>
                            <input type="range" id="algoBoost" min="1" max="100" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-purple-600 mt-2">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Priority Target</label>
                            <select id="algoFocus" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-3 text-xs mt-1 outline-none font-bold text-gray-700">
                                <option value="mixed">Mixed Content (Normal)</option>
                                <option value="viral">Viral Posts (High Engagement)</option>
                                <option value="verified">Verified Creators Only</option>
                                <option value="fresh">New Content Boost</option>
                            </select>
                        </div>
                        <button onclick="updateAlgorithm()" class="w-full bg-purple-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-purple-200">Save AI Config</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-gray-800 text-sm uppercase mb-4 flex items-center gap-2"><i class="fas fa-bullhorn text-red-500"></i> Global Announcement</h2>
                    <textarea id="globalMsg" rows="2" placeholder="সবার কাছে নোটিফিকেশন পাঠান..." class="w-full bg-gray-50 border rounded-2xl p-3 text-xs outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <button onclick="sendGlobalNotice()" class="mt-3 w-full bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Push Notice</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-gray-800 text-sm uppercase mb-4 flex items-center gap-2"><i class="fas fa-code text-blue-500"></i> Master Ad Code</h2>
                    <textarea id="masterAdCode" rows="3" placeholder="Paste Adsterra/Google script here..." class="w-full bg-gray-900 text-green-400 font-mono border-none rounded-2xl p-3 text-[10px] outline-none"></textarea>
                    <button onclick="updateAdCode()" class="mt-3 w-full bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Activate Ads</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border min-h-[500px]">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 pb-4 border-b">
                        <h2 class="font-black text-gray-800 text-xs uppercase tracking-widest">User Management</h2>
                        <div class="relative w-full md:w-64">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-xs"></i>
                            <input type="text" id="userSearch" onkeyup="searchUser()" placeholder="Search user..." class="w-full bg-gray-100 border-none rounded-full pl-9 pr-4 py-2.5 text-xs outline-none">
                        </div>
                    </div>
                    <div id="userList" class="space-y-3">
                        <p class="text-center text-gray-300 py-20 italic">Loading safe database...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, setDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security Check
        window.checkAdminPass = () => {
            const pass = document.getElementById('adminPassInput').value;
            if(pass === "150") {
                document.getElementById('adminOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadAlgoState();
            } else { alert("WRONG ACCESS CODE!"); }
        };

        // 1. Live Post Counter (Pro Feature)
        onSnapshot(collection(db, "posts"), (s) => {
            document.getElementById('statPosts').innerText = s.size;
        });

        // 2. Algorithm Engine Save
        window.updateAlgorithm = async () => {
            const isAuto = document.getElementById('autoMode').checked;
            const boost = document.getElementById('algoBoost').value;
            const focus = document.getElementById('algoFocus').value;
            
            await setDoc(doc(db, "appSettings", "algorithm"), {
                autoPilot: isAuto,
                trendBoost: parseInt(boost),
                priority: focus,
                lastUpdate: serverTimestamp()
            });
            alert("Algorithm Power Updated! 🧠");
        };

        async function loadAlgoState() {
            const snap = await getDoc(doc(db, "appSettings", "algorithm"));
            if(snap.exists()) {
                const data = snap.data();
                document.getElementById('autoMode').checked = data.autoPilot || false;
                document.getElementById('algoBoost').value = data.trendBoost || 50;
                document.getElementById('algoFocus').value = data.priority || 'mixed';
            }
        }

        // 3. Main User Management & Stats (With Monetization)
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('userList');
            let v = 0; let m = 0;
            list.innerHTML = "";

            snapshot.forEach(docData => {
                const u = docData.data();
                const uid = docData.id;
                if(u.isVerified) v++;
                if(u.isMonetized) m++;

                const userCard = document.createElement('div');
                userCard.className = "flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100 admin-card";
                userCard.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-sm bg-gray-200">
                                <img src="${u.profilePic || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                            </div>
                            ${u.isMonetized ? '<div class="absolute -top-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-white flex items-center justify-center text-[8px] text-white"><i class="fas fa-dollar-sign"></i></div>' : ''}
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm flex items-center gap-1">
                                ${u.name || 'User'} 
                                ${u.isVerified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>' : ''}
                            </h4>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">
                                Balance: <span class="text-green-600 font-black">৳${(u.balance || 0).toFixed(2)}</span>
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-1 flex-wrap justify-end">
                        <button onclick="toggleVerify('${uid}', ${u.isVerified})" class="p-2.5 ${u.isVerified ? 'bg-blue-100 text-blue-600' : 'bg-gray-200 text-gray-400'} rounded-xl text-[10px]" title="Verify"><i class="fas fa-certificate"></i></button>
                        <button onclick="toggleMonetize('${uid}', ${u.isMonetized})" class="p-2.5 ${u.isMonetized ? 'bg-yellow-100 text-yellow-600' : 'bg-gray-200 text-gray-400'} rounded-xl text-[10px]" title="Monetize"><i class="fas fa-hand-holding-usd"></i></button>
                        <button onclick="sendWarning('${uid}')" class="p-2.5 bg-orange-100 text-orange-600 rounded-xl text-[10px]" title="Notice"><i class="fas fa-bolt"></i></button>
                        <button onclick="deleteUser('${uid}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl text-[10px]" title="Delete"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                list.appendChild(userCard);
            });

            document.getElementById('statTotalUsers').innerText = snapshot.size;
            document.getElementById('statVerified').innerText = v;
            document.getElementById('statRequests').innerText = m;
        });

        // 4. Monetization Toggle Logic
        window.toggleMonetize = async (uid, cur) => {
            const confirmMsg = cur ? "Stop monetization for this user?" : "Approve monetization for this user?";
            if(confirm(confirmMsg)) {
                await updateDoc(doc(db, "users", uid), { isMonetized: !cur });
            }
        };

        // 5. Verification Toggle
        window.toggleVerify = async (uid, cur) => { await updateDoc(doc(db, "users", uid), { isVerified: !cur }); };

        // 6. Delete Logic
        window.deleteUser = async (uid) => { if(confirm("Permanently delete this user?")) await deleteDoc(doc(db, "users", uid)); };

        // 7. Global Ad Code Update
        window.updateAdCode = async () => {
            const code = document.getElementById('masterAdCode').value;
            await setDoc(doc(db, "appSettings", "ads"), { code: code, updatedAt: serverTimestamp() });
            alert("Ads Updated Everywhere!");
        };

        // 8. Global Announcement (Push Notice)
        window.sendGlobalNotice = async () => {
            const msg = document.getElementById('globalMsg').value;
            if(msg) {
                await addDoc(collection(db, "announcements"), { 
                    text: msg, 
                    createdAt: serverTimestamp() 
                });
                alert("Announcement Pushed!");
                document.getElementById('globalMsg').value = "";
            }
        };

        // Search UI Logic
        window.searchUser = () => {
            const input = document.getElementById('userSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.admin-card');
            cards.forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(input) ? 'flex' : 'none';
            });
        };
    </script>
</body>
</html>
