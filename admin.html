<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Command - Master Diary V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-link { transition: all 0.3s; border-radius: 12px; padding: 12px 18px; color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .tab-active { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); color: white; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea { background: #0f172a !important; color: white !important; border: 1px solid #1e293b !important; border-radius: 12px; padding: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .stat-card { border-bottom: 4px solid #6366f1; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[9999] bg-[#05070a] flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[3rem] max-w-md w-full text-center">
            <div class="w-24 h-24 bg-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-indigo-500/40 rotate-12">
                <i class="fas fa-user-shield text-4xl text-white -rotate-12"></i>
            </div>
            <h2 style="font-family: 'Orbitron';" class="text-3xl font-black mb-8 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">SUPREME COMMAND</h2>
            <input type="password" id="accessKey" placeholder="Authorization Code" class="w-full text-center mb-6 text-xl">
            <button onclick="unlock()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black tracking-widest hover:bg-indigo-500 transition shadow-xl shadow-indigo-500/20">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-indigo-600/20 rounded-lg text-indigo-400"><i class="fas fa-bolt text-xl"></i></div>
                    <h1 style="font-family: 'Orbitron';" class="font-black text-xl tracking-tighter">Bondo <span class="text-indigo-500">AI</span></h1>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto pb-2 md:pb-0">
                    <button onclick="showTab('citizens')" class="tab-link tab-active"><i class="fas fa-users mr-2"></i>Citizens</button>
                    <button onclick="showTab('engine')" class="tab-link"><i class="fas fa-broadcast-tower mr-2"></i>Broadcast</button>
                    <button onclick="showTab('economy')" class="tab-link"><i class="fas fa-wallet mr-2"></i>Economy</button>
                    <button onclick="showTab('safety')" class="tab-link"><i class="fas fa-shield-alt mr-2"></i>Safety</button>
                    <button onclick="showTab('control')" class="tab-link"><i class="fas fa-cog mr-2"></i>Control</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 space-y-8">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-3xl stat-card bg-gradient-to-br from-indigo-500/5 to-transparent">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total Population</p>
                    <h3 id="countUsers" class="text-3xl font-black mt-2">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl stat-card bg-gradient-to-br from-green-500/5 to-transparent border-green-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Current CPM</p>
                    <h3 id="displayCPM" class="text-3xl font-black mt-2 text-green-400">৳0</h3>
                </div>
                <div class="glass p-6 rounded-3xl stat-card bg-gradient-to-br from-yellow-500/5 to-transparent border-yellow-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Active Ads</p>
                    <h3 id="countAds" class="text-3xl font-black mt-2 text-yellow-400">LIVE</h3>
                </div>
                <div class="glass p-6 rounded-3xl stat-card bg-gradient-to-br from-red-500/5 to-transparent border-red-500">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Withdrawals</p>
                    <h3 id="countPending" class="text-3xl font-black mt-2 text-red-500">0</h3>
                </div>
            </div>

            <div id="tab-citizens" class="tab-content space-y-6">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="uSearch" onkeyup="searchUser()" placeholder="Search by name or UID..." class="flex-1">
                    <button class="bg-indigo-600 px-8 py-3 rounded-xl font-bold">EXPORT DATA</button>
                </div>
                <div id="userGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-engine" class="hidden tab-content space-y-6">
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-indigo-500">
                    <h2 class="font-black text-xl mb-4 uppercase tracking-tighter">Emergency Broadcast 📣</h2>
                    <p class="text-slate-400 text-sm mb-6">এই বার্তাটি সমস্ত ইউজারের অ্যাপ স্ক্রিনে ভেসে উঠবে।</p>
                    <textarea id="broadcastMsg" placeholder="Type your announcement..." class="w-full h-32 mb-6"></textarea>
                    <button onclick="sendBroadcast()" class="w-full bg-indigo-600 py-4 rounded-xl font-black tracking-widest">LAUNCH ANNOUNCEMENT</button>
                </div>
            </div>

            <div id="tab-economy" class="hidden tab-content grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[3rem] space-y-6">
                    <h3 class="font-black text-indigo-400">AD ENGINE SETTINGS</h3>
                    <textarea id="adCodeInput" placeholder="Paste Ad HTML Code..." class="w-full h-40"></textarea>
                    <button onclick="saveAd()" class="w-full bg-slate-800 py-4 rounded-xl font-black hover:bg-slate-700">UPDATE AD CODE</button>
                </div>
                <div class="glass p-8 rounded-[3rem] space-y-6">
                    <h3 class="font-black text-green-400">REVENUE CONTROL</h3>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500">GLOBAL CPM RATE (৳)</label>
                        <input type="number" id="cpmRateInput" step="0.001" class="w-full text-center text-2xl font-black">
                    </div>
                    <button onclick="updateCPM()" class="w-full bg-green-600 py-4 rounded-xl font-black">SAVE CPM RATE</button>
                </div>
            </div>
            
            </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // ফিক্স: এখানে getDocs, writeBatch, serverTimestamp যোগ করা হয়েছে
        import { getFirestore, doc, onSnapshot, updateDoc, collection, deleteDoc, setDoc, getDocs, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH SYSTEM ---
        window.unlock = () => {
            const key = document.getElementById('accessKey').value;
            if(key === "150") {
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('mainUI').classList.remove('hidden');
                    initSupremeSystem();
                }, 500);
            } else { alert("ACCESS DENIED"); }
        };

        // --- TAB NAVIGATION ---
        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('tab-active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            event.currentTarget.classList.add('tab-active');
        };

        // --- BROADCAST SYSTEM (FIXED) ---
        window.sendBroadcast = async () => {
            const msgInput = document.getElementById('broadcastMsg');
            const msg = msgInput.value;
            if(!msg) return alert("মেসেজ লিখুন!");

            const btn = event.currentTarget;
            btn.innerText = "SENDING...";
            btn.disabled = true;

            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                const batch = writeBatch(db);

                querySnapshot.forEach((userDoc) => {
                    const notifRef = doc(collection(db, "users", userDoc.id, "notifications"));
                    batch.set(notifRef, {
                        type: "admin",
                        senderName: "Bondo AI Admin",
                        message: msg,
                        time: serverTimestamp(),
                        status: "unread"
                    });
                });

                await batch.commit();
                alert("বিস্ফোরণ সম্পন্ন! 🚀 সবার কাছে মেসেজ পৌঁছে গেছে।");
                msgInput.value = "";
            } catch (err) {
                console.error(err);
                alert("উফ! কোনো একটা ভুল হয়েছে।");
            } finally {
                btn.innerText = "LAUNCH ANNOUNCEMENT";
                btn.disabled = false;
            }
        };

        // [বাকি ফাংশনগুলো (initSupremeSystem, saveAd, ইত্যাদি) আগের মতোই থাকবে]
        window.initSupremeSystem = () => {
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('countUsers').innerText = snap.size;
                const grid = document.getElementById('userGrid');
                grid.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data(); const id = d.id;
                    const card = document.createElement('div');
                    card.className = "glass p-6 rounded-[2.5rem] admin-card";
                    card.innerHTML = `<h4 class="font-black text-sm uppercase">${u.name || 'Citizen'}</h4><p class="text-xs text-green-400">৳${(u.balance || 0).toFixed(4)}</p>`;
                    grid.appendChild(card);
                });
            });
        };
        // ... (বাকি কোড)
    </script>
</body>
</html>
