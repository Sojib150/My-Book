<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Command - Bondo AI V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020408; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-link { transition: all 0.3s; border-radius: 12px; padding: 12px 18px; color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .tab-active { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        input, textarea { background: #0a0f1d !important; color: white !important; border: 1px solid #1e293b !important; border-radius: 12px; padding: 12px; outline: none; }
        .stat-card { border-bottom: 4px solid #6366f1; }
        .user-card { transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .status-badge { font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="lockScreen" class="fixed inset-0 z-[9999] bg-[#020408] flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] max-w-sm w-full text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 rotate-12 shadow-2xl shadow-indigo-500/40">
                <i class="fas fa-shield-halved text-3xl text-white -rotate-12"></i>
            </div>
            <h2 style="font-family: 'Orbitron';" class="text-2xl font-black mb-6 tracking-tighter text-indigo-400">ENCRYPTED LOGIN</h2>
            <input type="password" id="accessKey" placeholder="Access Code" class="w-full text-center mb-6 text-xl tracking-[10px]">
            <button onclick="unlock()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black tracking-widest hover:bg-indigo-500 transition active:scale-95">INITIALIZE</button>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <header class="glass sticky top-0 z-50 px-6 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-600 rounded-lg"><i class="fas fa-crown text-white"></i></div>
                    <h1 style="font-family: 'Orbitron';" class="font-black text-lg tracking-tighter">ELITE <span class="text-indigo-500">ADMIN</span></h1>
                </div>
                <nav class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                    <button onclick="showTab('citizens')" class="tab-link tab-active"><i class="fas fa-users mr-2"></i>Users</button>
                    <button onclick="showTab('economy')" class="tab-link"><i class="fas fa-chart-line mr-2"></i>Economy</button>
                    <button onclick="showTab('engine')" class="tab-link"><i class="fas fa-rss mr-2"></i>Alerts</button>
                    <button onclick="showTab('safety')" class="tab-link"><i class="fas fa-gears mr-2"></i>Core</button>
                </nav>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 space-y-6">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="glass p-5 rounded-3xl stat-card"><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Total Users</p><h3 id="countUsers" class="text-2xl font-black mt-1">0</h3></div>
                <div class="glass p-5 rounded-3xl stat-card border-indigo-500"><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Global CPM</p><h3 id="displayCPM" class="text-2xl font-black mt-1 text-indigo-400">৳0</h3></div>
                <div class="glass p-5 rounded-3xl stat-card border-red-500"><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Withdrawals</p><h3 id="countPending" class="text-2xl font-black mt-1 text-red-500">0</h3></div>
                <div class="glass p-5 rounded-3xl stat-card border-green-500"><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">System</p><h3 id="systemLiveStatus" class="text-2xl font-black mt-1 text-green-400">LIVE</h3></div>
            </div>

            <div id="tab-citizens" class="tab-content space-y-6">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                    <input type="text" id="uSearch" onkeyup="searchUser()" placeholder="Search by name or UID..." class="w-full pl-12 h-14">
                </div>
                <div id="userGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-20 text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Loading Citizens...</div>
                </div>
            </div>

            <div id="tab-economy" class="hidden tab-content space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-[2.5rem] space-y-4 border-l-4 border-indigo-500">
                        <h3 class="font-black text-indigo-400 text-[10px] uppercase tracking-widest">Global Ad Code</h3>
                        <textarea id="adCodeInput" class="w-full h-40 text-[11px] font-mono" placeholder="Paste Ad Code..."></textarea>
                        <button onclick="saveAd()" class="w-full bg-indigo-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Update Ads</button>
                    </div>
                    <div class="glass p-6 rounded-[2.5rem] space-y-4 border-l-4 border-green-500">
                        <h3 class="font-black text-green-400 text-[10px] uppercase tracking-widest">CPM Rate</h3>
                        <input type="number" id="cpmRateInput" step="0.0001" class="w-full text-center text-3xl font-black">
                        <button onclick="updateCPM()" class="w-full bg-green-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Update CPM</button>
                    </div>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="font-black text-lg mb-6"><i class="fas fa-wallet mr-2"></i> Withdrawal Requests</h3>
                    <div id="withdrawList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>

            <div id="tab-safety" class="hidden tab-content grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-[2.5rem] text-center border-t-4 border-red-600">
                    <i class="fas fa-triangle-exclamation text-4xl text-red-600 mb-4"></i>
                    <h3 class="font-black text-xl mb-2">Maintenance Mode</h3>
                    <p class="text-slate-500 text-xs mb-6">মেইনটেন্যান্স মোড অন করলে ইউজাররা অ্যাপ ব্যবহার করতে পারবে না।</p>
                    <button id="mBtn" onclick="toggleMaintenance()" class="w-full py-4 rounded-2xl font-black transition">INITIALIZING...</button>
                </div>
                <div class="glass p-8 rounded-[2.5rem] text-center border-t-4 border-indigo-600">
                    <i class="fas fa-database text-4xl text-indigo-600 mb-4"></i>
                    <h3 class="font-black text-xl mb-2">Reset System</h3>
                    <button onclick="resetAllBalances()" class="w-full bg-slate-800 py-4 rounded-2xl font-black text-red-500 border border-red-500/20">RESET ALL BALANCES</button>
                </div>
            </div>

            <div id="tab-engine" class="hidden tab-content max-w-2xl mx-auto">
                <div class="glass p-8 rounded-[3rem] text-center">
                    <h2 class="text-xl font-black mb-4">Global Broadcast</h2>
                    <textarea id="broadcastMsg" placeholder="Write message..." class="w-full h-40 mb-6"></textarea>
                    <button onclick="sendBroadcast()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black tracking-widest">SEND NOTIFICATION</button>
                </div>
            </div>
        </main>
    </div>

    <div id="magicModal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="glass w-full max-w-md rounded-[3rem] p-10 border-t-8 border-indigo-600">
            <h3 id="targetUserName" class="font-black text-center text-xl mb-6">Edit Citizen</h3>
            <div class="space-y-4">
                <input type="number" id="addBalanceInput" placeholder="Balance" class="w-full text-xl font-black">
                <input type="number" id="fakeViewInput" placeholder="Fake Views" class="w-full text-xl font-black">
                <div class="flex gap-4">
                    <button onclick="closeMagic()" class="flex-1 py-4 bg-slate-800 rounded-2xl font-bold">CANCEL</button>
                    <button id="saveMagicBtn" class="flex-1 py-4 bg-indigo-600 rounded-2xl font-black">UPDATE</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc, query, where, getDocs, writeBatch, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            projectId: "seen-a1d92" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mStatus = false;

        window.unlock = () => {
            if(document.getElementById('accessKey').value === "150") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainUI').classList.remove('hidden');
                initSupremeSystem();
            } else { Swal.fire('Error', 'Wrong Key!', 'error'); }
        };

        window.showTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('tab-active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            event.currentTarget.classList.add('tab-active');
        };

        function initSupremeSystem() {
            // User Monitor
            onSnapshot(collection(db, "users"), snap => {
                document.getElementById('countUsers').innerText = snap.size;
                const grid = document.getElementById('userGrid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data(); const id = d.id;
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-[2rem] user-card admin-card";
                    card.innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${u.profilePic || ''}" class="w-12 h-12 rounded-xl bg-gray-800 object-cover">
                            <div class="flex-1 truncate">
                                <h4 class="font-bold text-sm">${u.name || 'User'}</h4>
                                <p class="text-[10px] text-green-400 font-black">৳${(u.balance || 0).toFixed(4)}</p>
                            </div>
                            <button onclick="openMagic('${id}', '${u.name}', ${u.balance || 0}, ${u.fakeViews || 0})" class="p-2 text-indigo-400"><i class="fas fa-edit"></i></button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleMonetize('${id}', ${u.isMonetized})" class="flex-1 py-2 rounded-lg text-[8px] bg-indigo-500/10">${u.isMonetized ? 'Ads On' : 'Ads Off'}</button>
                            <button onclick="hardBanUser('${id}')" class="flex-1 py-2 rounded-lg text-[8px] bg-red-500/10 text-red-500">Ban</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });

            // Maintenance Sync (FIXED)
            onSnapshot(doc(db, "appSettings", "maintenance"), d => {
                const btn = document.getElementById('mBtn');
                const status = document.getElementById('systemLiveStatus');
                if(d.exists()) {
                    mStatus = d.data().isOn;
                    btn.innerText = mStatus ? "OFFLINE: MAINTENANCE ON" : "ONLINE: MAINTENANCE OFF";
                    btn.className = mStatus ? "w-full py-4 rounded-2xl font-black bg-red-600" : "w-full py-4 rounded-2xl font-black bg-slate-800 text-green-500 border border-green-500/20";
                    status.innerText = mStatus ? "OFFLINE" : "LIVE";
                    status.className = mStatus ? "text-2xl font-black mt-1 text-red-500" : "text-2xl font-black mt-1 text-green-400";
                } else {
                    setDoc(doc(db, "appSettings", "maintenance"), { isOn: false });
                }
            });

            // Economy Sync
            onSnapshot(doc(db, "appSettings", "ads"), d => { if(d.exists()) document.getElementById('adCodeInput').value = d.data().code; });
            onSnapshot(doc(db, "appSettings", "algorithm"), d => { 
                if(d.exists()) {
                    document.getElementById('displayCPM').innerText = "৳" + d.data().trendBoost;
                    document.getElementById('cpmRateInput').value = d.data().trendBoost;
                }
            });

            // Withdraws Monitor
            onSnapshot(query(collection(db, "withdrawRequests"), where("status", "==", "Pending")), snap => {
                document.getElementById('countPending').innerText = snap.size;
                const list = document.getElementById('withdrawList'); list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    const card = document.createElement('div');
                    card.className = "p-4 border border-white/5 rounded-2xl space-y-3";
                    card.innerHTML = `
                        <p class="font-bold text-[10px]">${r.userName} (৳${r.amount})</p>
                        <p class="text-[9px] text-slate-500">${r.method} - ${r.number}</p>
                        <div class="flex gap-2">
                            <button onclick="processPayout('${d.id}', 'Approved')" class="flex-1 py-2 bg-green-600 rounded-lg text-[8px]">Pay</button>
                            <button onclick="processPayout('${d.id}', 'Rejected', '${r.uid}', ${r.amount})" class="flex-1 py-2 bg-red-500/10 text-red-500 rounded-lg text-[8px]">Cancel</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        // Actions
        window.toggleMaintenance = async () => {
            const newStatus = !mStatus;
            await setDoc(doc(db, "appSettings", "maintenance"), { isOn: newStatus }, { merge: true });
            Swal.fire('Updated', `System is now ${newStatus ? 'Offline' : 'Online'}`, 'success');
        };

        window.saveAd = async () => {
            await setDoc(doc(db, "appSettings", "ads"), { code: document.getElementById('adCodeInput').value }, { merge: true });
            Swal.fire('Success', 'Ad Code Updated', 'success');
        };

        window.updateCPM = async () => {
            const val = parseFloat(document.getElementById('cpmRateInput').value);
            await setDoc(doc(db, "appSettings", "algorithm"), { trendBoost: val }, { merge: true });
            Swal.fire('Success', 'CPM Updated', 'success');
        };

        window.openMagic = (id, name, bal, views) => {
            document.getElementById('targetUserName').innerText = name;
            document.getElementById('addBalanceInput').value = bal;
            document.getElementById('fakeViewInput').value = views;
            document.getElementById('magicModal').classList.remove('hidden');
            document.getElementById('saveMagicBtn').onclick = async () => {
                await updateDoc(doc(db, "users", id), { 
                    balance: parseFloat(document.getElementById('addBalanceInput').value),
                    fakeViews: parseInt(document.getElementById('fakeViewInput').value)
                });
                closeMagic();
                Swal.fire('Updated', '', 'success');
            };
        };

        window.closeMagic = () => document.getElementById('magicModal').classList.add('hidden');
        window.toggleMonetize = async (id, status) => await updateDoc(doc(db, "users", id), { isMonetized: !status });
        window.hardBanUser = async (id) => { if(confirm('Ban this user?')) await deleteDoc(doc(db, "users", id)); };
        
        window.processPayout = async (id, status, uid = null, amt = 0) => {
            await updateDoc(doc(db, "withdrawRequests", id), { status: status });
            if(status === 'Rejected' && uid) await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
            Swal.fire('Done', '', 'success');
        };

        window.sendBroadcast = async () => {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) return;
            const users = await getDocs(collection(db, "users"));
            const batch = writeBatch(db);
            users.forEach(u => batch.set(doc(collection(db, "users", u.id, "notifications")), { message: msg, type: "admin", time: serverTimestamp(), status: "unread" }));
            await batch.commit();
            Swal.fire('Broadcast Sent!', '', 'success');
            document.getElementById('broadcastMsg').value = "";
        };

        window.resetAllBalances = async () => {
            if(confirm('সব ব্যালেন্স ০ করতে চান?')) {
                const users = await getDocs(collection(db, "users"));
                const batch = writeBatch(db);
                users.forEach(u => batch.update(doc(db, "users", u.id), { balance: 0 }));
                await batch.commit();
                Swal.fire('Reset Done', '', 'success');
            }
        };
    </script>
</body>
</html>
