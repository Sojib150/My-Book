<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-card { transition: all 0.3s ease; }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #adminOverlay { backdrop-blur: 20px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div id="adminOverlay" class="fixed inset-0 bg-indigo-900/90 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[30px] shadow-2xl max-w-xs w-full text-center">
            <i class="fas fa-user-shield text-5xl text-indigo-600 mb-4"></i>
            <h2 class="font-black text-gray-800 uppercase tracking-tighter text-xl">Admin Login</h2>
            <p class="text-[10px] text-gray-400 font-bold mb-6">অ্যাডমিন পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>
            <input type="password" id="adminPassInput" placeholder="Password" class="w-full bg-gray-100 border-none rounded-xl py-3 px-4 mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="checkAdminPass()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg">Login Now</button>
        </div>
    </div>

    <div id="adminContent" class="hidden">
        <div class="bg-indigo-900 text-white p-6 shadow-2xl">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">Admin <span class="text-yellow-400 font-normal">Command Center</span></h1>
                    <span class="bg-indigo-800 px-4 py-2 rounded-full text-[10px] font-bold border border-indigo-700 animate-pulse">SYSTEM LIVE</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                        <p class="text-xs text-indigo-200 uppercase font-bold">Total Users</p>
                        <h3 id="statTotalUsers" class="text-2xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                        <p class="text-xs text-indigo-200 uppercase font-bold">Verified</p>
                        <h3 id="statVerified" class="text-2xl font-black mt-1 text-blue-400">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                        <p class="text-xs text-indigo-200 uppercase font-bold">Monetized</p>
                        <h3 id="statRequests" class="text-2xl font-black mt-1 text-yellow-400">0</h3>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10">
                        <p class="text-xs text-indigo-200 uppercase font-bold">Total Posts</p>
                        <h3 id="statPosts" class="text-2xl font-black mt-1">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-gray-800 text-sm uppercase mb-4 flex items-center gap-2"><i class="fas fa-bullhorn text-red-500"></i> Global Announcement</h2>
                    <textarea id="globalMsg" rows="3" placeholder="সবাইকে কী মেসেজ দিতে চান?" class="w-full bg-gray-50 border rounded-2xl p-3 text-xs outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <button onclick="sendGlobalNotice()" class="mt-3 w-full bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Send to All Users</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-gray-800 text-sm uppercase mb-4 flex items-center gap-2"><i class="fas fa-code text-blue-500"></i> Master Ad Code</h2>
                    <textarea id="masterAdCode" rows="4" placeholder="Ad Script Here..." class="w-full bg-gray-900 text-green-400 font-mono border-none rounded-2xl p-3 text-[10px] outline-none"></textarea>
                    <button onclick="updateAdCode()" class="mt-3 w-full bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Update Main Ad</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-gray-800 text-sm uppercase mb-4"><i class="fas fa-list-check text-orange-500"></i> Monetization Rules</h2>
                    <input type="number" id="minFollowers" placeholder="Minimum Followers" class="w-full bg-gray-50 border rounded-xl p-3 text-xs mb-2">
                    <input type="number" id="minPosts" placeholder="Minimum Posts" class="w-full bg-gray-50 border rounded-xl p-3 text-xs mb-2">
                    <button onclick="updateRules()" class="w-full bg-gray-800 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Save Rules</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-gray-800 text-sm uppercase tracking-widest">User Management</h2>
                        <input type="text" id="userSearch" onkeyup="searchUser()" placeholder="Search name..." class="bg-gray-100 border-none rounded-full px-4 py-2 text-xs outline-none">
                    </div>
                    <div id="userList" class="space-y-3">
                        <p class="text-center text-gray-300 py-20 italic">Loading database...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Password Security
        window.checkAdminPass = () => {
            const pass = document.getElementById('adminPassInput').value;
            if(pass === "150") { // আপনার গোপন পাসওয়ার্ড এখানে দিন
                document.getElementById('adminOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        };

        // Load Global Stats & Users
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('userList');
            let verified = 0; let monetized = 0;
            list.innerHTML = "";

            snapshot.forEach(docData => {
                const u = docData.data();
                const uid = docData.id;
                if(u.isVerified) verified++;
                if(u.isMonetized) monetized++;

                const userCard = document.createElement('div');
                userCard.className = "flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100 admin-card";
                userCard.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-sm">
                            <img src="${u.profilePic || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm flex items-center gap-1">
                                ${u.name || 'Anonymous'} 
                                ${u.isVerified ? '<i class="fas fa-check-circle text-blue-500 text-[10px]"></i>' : ''}
                            </h4>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${u.job || 'User'}</p>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <a href="profile.html?id=${uid}" title="View" class="p-2 bg-purple-50 text-purple-600 rounded-lg text-[10px]"><i class="fas fa-eye"></i></a>
                        <button onclick="toggleVerify('${uid}', ${u.isVerified})" title="Verify" class="p-2 ${u.isVerified ? 'bg-blue-100 text-blue-600' : 'bg-gray-200 text-gray-500'} rounded-lg text-[10px]"><i class="fas fa-certificate"></i></button>
                        <button onclick="sendWarning('${uid}')" title="Message" class="p-2 bg-orange-100 text-orange-600 rounded-lg text-[10px]"><i class="fas fa-exclamation-triangle"></i></button>
                        <button onclick="toggleAds('${uid}', ${u.adEnabled})" title="Ads" class="p-2 ${u.adEnabled !== false ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} rounded-lg text-[10px]"><i class="fas fa-ad"></i></button>
                        <button onclick="deleteUser('${uid}')" title="Delete" class="p-2 bg-red-50 text-red-400 rounded-lg text-[10px]"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(userCard);
            });

            document.getElementById('statTotalUsers').innerText = snapshot.size;
            document.getElementById('statVerified').innerText = verified;
            document.getElementById('statRequests').innerText = monetized;
        });

        // Functions
        window.toggleVerify = async (uid, current) => {
            await updateDoc(doc(db, "users", uid), { isVerified: !current });
        };

        window.toggleAds = async (uid, current) => {
            await updateDoc(doc(db, "users", uid), { adEnabled: (current === false) });
        };

        window.sendWarning = async (uid) => {
            const msg = prompt("ইউজারকে কী মেসেজ দিতে চান?");
            if(msg) {
                await updateDoc(doc(db, "users", uid), { systemNotice: msg, noticeDate: new Date() });
                alert("মেসেজ পাঠানো হয়েছে!");
            }
        };

        window.deleteUser = async (uid) => {
            if(confirm("এই ইউজারকে চিরতরে ডিলিট করতে চান?")) {
                await deleteDoc(doc(db, "users", uid));
            }
        };

        window.updateRules = async () => {
            const f = document.getElementById('minFollowers').value;
            const p = document.getElementById('minPosts').value;
            await setDoc(doc(db, "appSettings", "monetization"), { minFollowers: f, minPosts: p });
            alert("Rules Updated!");
        };

        window.sendGlobalNotice = async () => {
            const msg = document.getElementById('globalMsg').value;
            if(!msg) return;
            await addDoc(collection(db, "announcements"), { text: msg, date: new Date() });
            alert("Sent to all!");
            document.getElementById('globalMsg').value = "";
        };

        window.updateAdCode = async () => {
            const code = document.getElementById('masterAdCode').value;
            await setDoc(doc(db, "appSettings", "ads"), { code: code });
            alert("Master Ad Code Updated!");
        };
    </script>
</body>
</html>
