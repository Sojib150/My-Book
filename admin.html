<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ad & Income System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-xl uppercase">Admin <span class="text-yellow-400">Panel</span></h1>
            <div class="flex gap-4 text-xs font-bold">
                <button onclick="showTab('ads')" class="hover:text-yellow-400">AD SETTINGS</button>
                <button onclick="showTab('users')" class="hover:text-yellow-400">MONETIZATION</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        
        <div id="tab-ads" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-ad text-indigo-600"></i> বিজ্ঞাপন সেটআপ (Ad Network Code)
                </h2>
                <p class="text-[10px] text-gray-400 mb-4 font-bold uppercase">পোস্ট বা ভিডিওর নিচে দেখানোর জন্য কোড এখানে দিন</p>
                
                <textarea id="adCodeInput" rows="5" placeholder="Paste your Ad Script/HTML here..." 
                    class="w-full bg-gray-50 border border-gray-200 rounded-2xl p-4 text-xs font-mono outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                
                <button id="saveAdBtn" class="mt-4 w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition shadow-lg">
                    Update All Ads
                </button>
            </div>
        </div>

        <div id="tab-users" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="font-bold text-gray-800 mb-4"><i class="fas fa-money-bill-wave text-green-500 mr-2"></i> মনিটাইজেশন রিকোয়েস্ট</h2>
                <div id="requestList" class="space-y-4">
                    <p class="text-center text-gray-400 text-xs py-10 italic">কোনো আবেদন পাওয়া যায়নি</p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ট্যাব সুইচ লজিক
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        };

        // অ্যাড কোড সেভ করা
        document.getElementById('saveAdBtn').onclick = async () => {
            const code = document.getElementById('adCodeInput').value;
            try {
                await setDoc(doc(db, "appSettings", "ads"), { activeAdCode: code });
                alert("বিজ্ঞাপন সফলভাবে আপডেট হয়েছে! সব ইউজারের কাছে এটি শো করবে।");
            } catch (e) { alert("সমস্যা হয়েছে!"); }
        };

        // মনিটাইজেশন রিকোয়েস্ট লোড করা
        onSnapshot(collection(db, "monetizationRequests"), (snapshot) => {
            const list = document.getElementById('requestList');
            list.innerHTML = "";
            snapshot.forEach(docData => {
                const req = docData.data();
                const item = document.createElement('div');
                item.className = "flex items-center justify-between p-4 bg-gray-50 rounded-2xl border";
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${req.userName}</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">UID: ${docData.id}</p>
                    </div>
                    <button onclick="approveUser('${docData.id}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Approve</button>
                `;
                list.appendChild(item);
            });
        });

        // ইউজারকে এপ্রুভ করা
        window.approveUser = async (userId) => {
            await updateDoc(doc(db, "users", userId), { isMonetized: true, balance: 0 });
            alert("ইউজার মনিটাইজেশন সফল!");
        };
    </script>
</body>
</html>
