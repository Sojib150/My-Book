<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl border border-gray-100">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">নতুন পোস্ট</h2>
            <a href="home.html" class="text-blue-500 text-sm font-semibold">ফিরে যান</a>
        </div>
        <textarea id="postText" placeholder="আপনার মনের কথা লিখুন..." class="w-full p-4 bg-gray-50 border-none rounded-xl h-32 mb-4 focus:ring-2 focus:ring-blue-400 outline-none transition-all"></textarea>
        <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 mb-4 text-center">
            <input type="file" id="fileInput" accept="image/*,video/*" class="text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-600 font-semibold">
        </div>
        <button id="uploadBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-all">শেয়ার করুন</button>
        <p id="status" class="mt-4 text-center text-xs font-medium text-gray-400"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUser = null;

        onAuthStateChanged(auth, user => { if(user) currentUser = user; else window.location.href="index.html"; });

        document.getElementById('uploadBtn').onclick = async () => {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if(!text && !file) return alert("কিছু লিখুন!");

            status.innerText = "আপলোড হচ্ছে...";
            let url = ""; let type = "";
            if(file) {
                const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", "Video_upload");
                const res = await fetch(`https://api.cloudinary.com/v1_1/dlpwdx288/${file.type.startsWith('video')?'video':'image'}/upload`, {method:"POST", body:formData});
                const data = await res.json(); url = data.secure_url; type = file.type.startsWith('video')?'video':'image';
            }
            await addDoc(collection(db, "posts"), { 
                text, fileUrl: url, fileType: type, 
                userId: currentUser.uid, 
                userName: currentUser.displayName || currentUser.email.split('@')[0], 
                likes: 0, likedBy: [], createdAt: serverTimestamp() 
            });
            window.location.href = "home.html";
        };
    </script>
</body>
</html>
