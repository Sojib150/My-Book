<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .preview-container img, .preview-container video { width: 100%; border-radius: 25px; max-height: 250px; object-fit: cover; }
        
        /* Category Chip Style */
        .category-chip { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1.5px solid #f1f5f9; }
        .category-chip.active { background: #2563eb; color: white; border-color: #2563eb; transform: scale(1.05); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        
        .ios-input { background: #f1f5f9; border: 2px solid transparent; transition: all 0.3s; }
        .ios-input:focus { background: white; border-color: #dbeafe; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md p-8 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white relative overflow-hidden">
        
        <div class="flex justify-between items-center mb-8">
            <a href="home.html" class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-400 hover:text-blue-600 transition-all">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div class="text-center">
                <h2 class="text-[11px] font-black uppercase tracking-[4px] text-gray-400 mb-1">New Post</h2>
                <div class="h-1 w-4 bg-blue-600 mx-auto rounded-full"></div>
            </div>
            <div class="w-12"></div>
        </div>

        <textarea id="postText" placeholder="আপনার মনের কথা এখানে লিখুন..." class="w-full p-6 ios-input rounded-[30px] h-36 mb-6 outline-none text-[15px] font-medium resize-none text-gray-700"></textarea>

        <div class="mb-6">
            <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4 px-2">Select Category</p>
            <div id="categoryContainer" class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <div class="category-chip active px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="General">General</div>
                <div class="category-chip px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="Technology">Technology</div>
                <div class="category-chip px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="Entertainment">Entertainment</div>
                <div class="category-chip px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="Sports">Sports</div>
                <div class="category-chip px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="Fashion">Fashion</div>
                <div class="category-chip px-5 py-2.5 rounded-2xl text-[12px] font-extrabold shrink-0" data-val="Lifestyle">Lifestyle</div>
            </div>
        </div>

        <div id="previewArea" class="preview-container mb-6 hidden ring-4 ring-blue-50 rounded-[30px] overflow-hidden"></div>

        <div class="relative group mb-8">
            <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">
            <label for="fileInput" class="w-full flex items-center justify-between p-5 bg-gray-50 rounded-[25px] cursor-pointer hover:bg-blue-50 transition-all border-2 border-transparent hover:border-blue-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                        <i class="fas fa-camera text-blue-500"></i>
                    </div>
                    <span id="fileLabel" class="text-[12px] font-bold text-gray-500">Photo / Video</span>
                </div>
                <i class="fas fa-plus text-gray-300 text-sm"></i>
            </label>
        </div>

        <button id="uploadBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[30px] shadow-[0_15px_30px_rgba(37,99,235,0.25)] active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fas fa-paper-plane text-sm"></i>
            <span class="uppercase tracking-widest text-[11px]">Share to Feed</span>
        </button>

        <p id="status" class="mt-6 text-center text-[10px] font-black uppercase tracking-widest text-gray-400"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let userData = null;
        let selectedCategory = "General";
        let videoDuration = 0;

        // ১. ক্যাটাগরি সিলেকশন লজিক
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.onclick = () => {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedCategory = chip.dataset.val;
            };
        });

        onAuthStateChanged(auth, async user => { 
            if(user) {
                currentUser = user;
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userData = uSnap.data();
            } else { 
                window.location.href="index.html"; 
            }
        });

        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const previewArea = document.getElementById('previewArea');
            const fileLabel = document.getElementById('fileLabel');

            if (file) {
                fileLabel.innerText = file.name.slice(0, 15) + "...";
                previewArea.classList.remove('hidden');
                const url = URL.createObjectURL(file);
                
                if (file.type.startsWith('video')) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.onloadedmetadata = () => { videoDuration = video.duration; }; // ২. ডিউরেশন ডিটেক্ট
                    previewArea.innerHTML = '';
                    video.className = "rounded-xl w-full";
                    video.controls = true;
                    previewArea.appendChild(video);
                } else {
                    previewArea.innerHTML = `<img src="${url}" class="rounded-xl shadow-lg w-full">`;
                }
            }
        };

        document.getElementById('uploadBtn').onclick = async () => {
            const text = document.getElementById('postText').value;
            const file = fileInput.files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            if(!text.trim() && !file) {
                status.innerText = "❌ কিছু তো লিখুন!";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            status.innerText = "ALGORITHM SYNCING...";

            let url = ""; 
            let type = "";

            try {
                if(file) {
                    const formData = new FormData(); 
                    formData.append("file", file); 
                    formData.append("upload_preset", "Video_upload");
                    
                    const res = await fetch(`https://api.cloudinary.com/v1_1/dlpwdx288/${file.type.startsWith('video')?'video':'image'}/upload`, {
                        method:"POST", 
                        body:formData
                    });
                    
                    const data = await res.json(); 
                    url = data.secure_url; 
                    type = file.type.startsWith('video')?'video':'image';
                }

                // ৩. অ্যালগরিদম ফ্রেন্ডলি ডাটা ইনজেকশন
                await addDoc(collection(db, "posts"), { 
                    text: text || "", 
                    fileUrl: url, 
                    fileType: type, 
                    category: selectedCategory, // 🔥 ক্যাটাগরি (ইন্টারেস্ট স্কোরিংয়ের জন্য)
                    duration: videoDuration,   // 🔥 ডিউরেশন (ওয়াচ রেশিওর জন্য)
                    watchTime: 0,              // 🔥 অ্যালগরিদম ভেরিয়েবল
                    userId: currentUser.uid, 
                    userName: userData?.name || "User", 
                    userPic: userData?.profilePic || "",
                    likes: 0, 
                    likedBy: [], 
                    commentCount: 0,           // 🔥 প্রপার কাউন্টার
                    shares: 0,                 // 🔥 হাই স্কোরিং এলিমেন্ট
                    views: 0,
                    viewsByUser: [],           // 🔥 রিপিট কন্ট্রোল লজিকের জন্য
                    isShadowBanned: false,
                    createdAt: serverTimestamp() 
                });

                status.innerText = "SUCCESS! REDIRECTING...";
                setTimeout(() => window.location.href = "home.html", 1000);

            } catch (error) {
                console.error(error);
                status.innerText = "ERROR. TRY AGAIN.";
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            }
        };
    </script>
</body>
</html>
