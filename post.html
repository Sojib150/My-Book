<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Create Reel - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #030712; 
            margin: 0; 
            overflow-x: hidden; 
            color: #fff; 
        }
        
        /* Glassmorphism & Neon Effects */
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }
        
        .neon-border { 
            border: 1px solid rgba(99, 102, 241, 0.15); 
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.05); 
        }
        
        .neon-btn { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 8px 35px rgba(79, 70, 229, 0.5);
            transform: translateY(-1px);
        }
        
        .category-chip { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            color: #9ca3af; 
        }
        .category-chip.active { 
            background: linear-gradient(135deg, #4f46e5, #6366f1); 
            color: white; 
            border-color: #6366f1; 
            transform: scale(1.02); 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Camera UI Components */
        #cameraView { transform: scaleX(-1); object-fit: cover; }
        .recording-active { animation: pulseBtn 1.5s infinite; background: #ef4444 !important; }
        
        @keyframes pulseBtn { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 
            70% { transform: scale(1.08); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-0 sm:p-6 bg-[#030712]">

    <div class="glass-card w-full max-w-md min-h-screen sm:min-h-0 sm:rounded-[32px] p-5 flex flex-col justify-between relative overflow-hidden">
        
        <div class="flex justify-between items-center mb-4 z-10">
            <a href="reels.html" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-gray-400 hover:text-white transition-all border border-white/5">
                <i class="fas fa-chevron-left text-sm"></i>
            </a>
            <div class="text-center">
                <h2 class="text-[10px] font-black uppercase tracking-[3px] text-indigo-400 mb-0.5">Studio Lab</h2>
                <p class="text-[15px] font-bold text-white tracking-tight">Create Elite Reel</p>
            </div>
            <div class="w-10"></div>
        </div>

        <div class="relative w-full aspect-[9/13] bg-black/40 rounded-[24px] overflow-hidden neon-border mb-4 group">
            <video id="cameraView" autoplay playsinline class="w-full h-full absolute inset-0 object-cover hidden bg-black"></video>
            
            <div id="previewArea" class="w-full h-full absolute inset-0 flex items-center justify-center overflow-hidden">
                <div class="text-center p-6 transition-all" id="uploadPlaceholder">
                    <div class="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-indigo-500/20">
                        <i class="fa-solid fa-clapperboard text-2xl text-indigo-400 animate-pulse"></i>
                    </div>
                    <p class="text-xs font-semibold text-gray-400">Record Live or Select Gallery Asset</p>
                </div>
            </div>

            <div id="cameraControls" class="absolute bottom-5 left-0 right-0 px-6 flex justify-between items-center z-20 hidden">
                <button id="switchCamBtn" class="w-11 h-11 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 text-white transition-transform active:scale-90"><i class="fa-solid fa-camera-rotate"></i></button>
                <button id="recordBtn" class="w-16 h-16 bg-white rounded-full flex items-center justify-center border-[5px] border-black/30 shadow-2xl transition-all active:scale-95"></button>
                <button id="closeCamBtn" class="w-11 h-11 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 text-white transition-transform active:scale-90"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="recTimer" class="absolute top-4 left-4 bg-red-500/90 backdrop-blur-md text-white font-bold px-3 py-1 rounded-full text-[10px] tracking-wider uppercase flex items-center gap-2 border border-red-500/30 hidden">
                <span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> <span id="timerText">00:00</span>
            </div>
        </div>

        <div class="space-y-3.5 z-10 flex-1">
            <div>
                <button id="openMusicModal" class="w-full flex items-center justify-between p-3.5 glass-input rounded-[18px] transition-all hover:bg-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-indigo-500/10 rounded-xl flex items-center justify-center text-indigo-400 border border-indigo-500/20">
                            <i class="fa-solid fa-music text-xs"></i>
                        </div>
                        <span id="selectedMusicLabel" class="text-[12px] font-medium text-gray-400">Select Creator Audio Track (Optional)</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-500 text-[10px]"></i>
                </button>
            </div>

            <textarea id="postText" placeholder="Write a compelling caption or description..." class="w-full p-4 glass-input rounded-[20px] h-20 outline-none text-[13px] font-medium resize-none text-white placeholder-gray-500"></textarea>

            <div>
                <p class="text-[9px] font-bold uppercase tracking-widest text-indigo-400/80 mb-2 px-1">Content Channel</p>
                <div id="categoryContainer" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <div class="category-chip active px-4 py-2 rounded-xl text-[11px] font-semibold shrink-0" data-val="General">General</div>
                    <div class="category-chip px-4 py-2 rounded-xl text-[11px] font-semibold shrink-0" data-val="Technology">Technology</div>
                    <div class="category-chip px-4 py-2 rounded-xl text-[11px] font-semibold shrink-0" data-val="Entertainment">Entertainment</div>
                    <div class="category-chip px-4 py-2 rounded-xl text-[11px] font-semibold shrink-0" data-val="Sports">Sports</div>
                    <div class="category-chip px-4 py-2 rounded-xl text-[11px] font-semibold shrink-0" data-val="Fashion">Fashion</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2.5">
                <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">
                <label for="fileInput" class="flex items-center justify-center gap-2 p-3 glass-input rounded-xl cursor-pointer hover:bg-white/5 transition-all text-center">
                    <i class="fa-regular fa-images text-indigo-400 text-sm"></i>
                    <span id="fileLabel" class="text-[12px] font-semibold text-gray-300">Studio Gallery</span>
                </label>
                <button id="initCameraBtn" class="flex items-center justify-center gap-2 p-3 bg-indigo-600/10 rounded-xl border border-indigo-500/20 hover:bg-indigo-600/20 transition-all text-center">
                    <i class="fa-solid fa-camera text-indigo-400 text-sm"></i>
                    <span class="text-[12px] font-semibold text-indigo-300">Live Production Cam</span>
                </button>
            </div>

            <div class="p-3.5 glass-card rounded-2xl flex items-center justify-between border border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-400 border border-amber-500/20">
                        <i class="fa-solid fa-coins text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-bold uppercase text-amber-400 tracking-wider">In-Stream Monetization</p>
                        <p class="text-[9px] text-gray-400">Run embedded video advertising impressions</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="monetizeToggle" class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-amber-500 peer-checked:after:bg-white"></div>
                </label>
            </div>
        </div>

        <button id="uploadBtn" class="w-full neon-btn text-white font-bold py-3.5 rounded-[20px] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4 z-10">
            <i class="fas fa-paper-plane text-xs"></i>
            <span class="uppercase tracking-wider text-[11px] font-black">Publish Elite Reel</span>
        </button>

        <p id="status" class="mt-3 text-center text-[9px] font-bold uppercase tracking-widest text-indigo-400/60 min-h-[12px]"></p>
    </div>

    <div id="musicSheet" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-end justify-center hidden" onclick="closeMusicModal()">
        <div class="bg-[#0b0f19] w-full max-w-md rounded-t-[28px] p-5 max-h-[55vh] flex flex-col border-t border-white/10" onclick="event.stopPropagation()">
            <div class="w-10 h-1 bg-gray-700 rounded-full mx-auto mb-4 cursor-pointer" onclick="closeMusicModal()"></div>
            <h3 class="text-[11px] font-black uppercase tracking-wider text-indigo-400 mb-3 px-1">Select Creator Audio Track</h3>
            <div class="flex-1 overflow-y-auto space-y-2 no-scrollbar" id="musicTrackList">
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl cursor-pointer hover:bg-indigo-600/20 border border-white/5" onclick="selectTrack('Cyberpunk Beats', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-play text-indigo-400 text-xs"></i>
                        <div><p class="text-xs font-bold text-white">Cyberpunk Beats</p><p class="text-[9px] text-gray-400">Trending Music Track</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let userData = null;
        let selectedCategory = "General";
        let videoDuration = 0;
        let selectedAudioUrl = "";
        let selectedAudioTitle = "None";

        let mediaStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let activeFacingMode = "user"; 
        let activeRecordBlob = null;
        let timerInterval = null;

        const cameraView = document.getElementById('cameraView');
        const cameraControls = document.getElementById('cameraControls');
        const previewArea = document.getElementById('previewArea');
        const recordBtn = document.getElementById('recordBtn');
        const recTimer = document.getElementById('recTimer');
        const timerText = document.getElementById('timerText');

        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.onclick = () => {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedCategory = chip.dataset.val;
            };
        });

        onAuthStateChanged(auth, async user => { 
            if(user) {
                currentUser = user;
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userData = uSnap.data();
                loadAudioLibrary(); 
            } else { 
                window.location.href="index.html"; 
            }
        });

        async function loadAudioLibrary() {
            try {
                const snap = await getDocs(collection(db, "audioLibrary"));
                const trackList = document.getElementById('musicTrackList');
                if(!snap.empty) {
                    trackList.innerHTML = ""; 
                    snap.forEach(d => {
                        const track = d.data();
                        trackList.innerHTML += `
                            <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl cursor-pointer hover:bg-indigo-600/20 border border-white/5" onclick="selectTrack('${track.title}', '${track.url}')">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid fa-music text-indigo-400 text-xs"></i>
                                    <div><p class="text-xs font-bold text-white">${track.title}</p><p class="text-[9px] text-gray-400">${track.artist || 'Official Audio'}</p></div>
                                </div>
                            </div>`;
                    });
                }
            } catch(e) { console.log("Audio Lib loading offline mode fallback used."); }
        }

        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = (e) => {
            stopCameraSystem(); 
            const file = e.target.files[0];
            processSelectedFile(file);
        };

        function processSelectedFile(file) {
            const fileLabel = document.getElementById('fileLabel');
            if (file) {
                activeRecordBlob = file; 
                fileLabel.innerText = file.name.slice(0, 10) + "...";
                const url = URL.createObjectURL(file);
                
                if (file.type.startsWith('video')) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.onloadedmetadata = () => { videoDuration = video.duration; };
                    previewArea.innerHTML = '';
                    video.className = "w-full h-full object-cover rounded-[24px]";
                    video.controls = true;
                    previewArea.appendChild(video);
                } else {
                    previewArea.innerHTML = `<img src="${url}" class="w-full h-full object-cover rounded-[24px]">`;
                    videoDuration = 0;
                }
            }
        }

        document.getElementById('initCameraBtn').onclick = async () => {
            previewArea.innerHTML = '';
            document.getElementById('uploadPlaceholder').classList.add('hidden');
            cameraView.classList.remove('hidden');
            cameraControls.classList.remove('hidden');
            await startCameraEngine();
        };

        async function startCameraEngine() {
            if(mediaStream) stopCameraSystem();
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: activeFacingMode, width: { ideal: 720 }, height: { ideal: 1280 } },
                    audio: true
                });
                cameraView.srcObject = mediaStream;
            } catch (err) {
                Swal.fire('Camera Error', 'ক্যামেরা এক্সেস করা সম্ভব হচ্ছে না!', 'error');
                document.getElementById('closeCamBtn').click();
            }
        }

        function stopCameraSystem() {
            if(mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            cameraView.classList.add('hidden');
            cameraControls.classList.add('hidden');
            recTimer.classList.add('hidden');
            clearInterval(timerInterval);
        }

        document.getElementById('closeCamBtn').onclick = () => {
            stopCameraSystem();
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            previewArea.innerHTML = `<div class="text-center p-6" id="uploadPlaceholder"><div class="w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-indigo-500/20"><i class="fa-solid fa-clapperboard text-2xl text-indigo-400 animate-pulse"></i></div><p class="text-xs font-semibold text-gray-400">Record Live or Select Gallery Asset</p></div>`;
        };

        document.getElementById('switchCamBtn').onclick = async () => {
            activeFacingMode = (activeFacingMode === "user") ? "environment" : "user";
            cameraView.style.transform = (activeFacingMode === "user") ? "scaleX(-1)" : "none";
            await startCameraEngine();
        };

        recordBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-active');
                clearInterval(timerInterval);
                recTimer.classList.add('hidden');
            } else {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm;codecs=vp8,opus' });
                
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    activeRecordBlob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const videoUrl = URL.createObjectURL(activeRecordBlob);
                    videoDuration = parseFloat(timerText.dataset.seconds) || 5;
                    
                    stopCameraSystem();
                    const videoElem = document.createElement('video');
                    videoElem.src = videoUrl;
                    videoElem.className = "w-full h-full object-cover rounded-[24px]";
                    videoElem.controls = true;
                    previewArea.appendChild(videoElem);
                };

                mediaRecorder.start();
                recordBtn.classList.add('recording-active');
                startTimerCounter();
            }
        };

        function startTimerCounter() {
            recTimer.classList.remove('hidden');
            let totalSeconds = 0;
            timerText.dataset.seconds = 0;
            timerInterval = setInterval(() => {
                totalSeconds++;
                timerText.dataset.seconds = totalSeconds;
                let mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
                let secs = String(totalSeconds % 60).padStart(2, '0');
                timerText.innerText = `${mins}:${secs}`;
                if(totalSeconds >= 60) recordBtn.click(); 
            }, 1000);
        }

        window.selectTrack = (title, url) => {
            selectedAudioTitle = title;
            selectedAudioUrl = url;
            document.getElementById('selectedMusicLabel').innerText = `Track: ${title}`;
            document.getElementById('selectedMusicLabel').classList.remove('text-gray-400');
            document.getElementById('selectedMusicLabel').classList.add('text-indigo-400');
            closeMusicModal();
        };

        document.getElementById('openMusicModal').onclick = () => document.getElementById('musicSheet').classList.remove('hidden');
        window.closeMusicModal = () => document.getElementById('musicSheet').classList.add('hidden');

        document.getElementById('uploadBtn').onclick = async () => {
            const text = document.getElementById('postText').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');
            const isMonetizedChecked = document.getElementById('monetizeToggle').checked;

            if(!text.trim() && !activeRecordBlob) {
                Swal.fire('Empty Submission', 'আপনার ক্যাপশন অথবা কোনো মিডিয়া ফাইল যুক্ত করুন!', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> PROCESSING STUDIO ASSETS...';
            status.innerText = "CLOUDINARY SYNC RUNNING...";

            let url = ""; 
            let type = "";

            try {
                if(activeRecordBlob) {
                    const formData = new FormData(); 
                    formData.append("file", activeRecordBlob); 
                    formData.append("upload_preset", "sojida_videos");
                    
                    const isVideoFile = (activeRecordBlob.type && activeRecordBlob.type.startsWith('video')) || recordedChunks.length > 0;
                    const endpointType = isVideoFile ? 'video' : 'image';
                    
                    const res = await fetch(`https://api.cloudinary.com/v1_1/dlpwdx288/${endpointType}/upload`, {
                        method:"POST", 
                        body:formData
                    });
                    
                    const data = await res.json(); 
                    if(data.secure_url) {
                        url = data.secure_url; 
                        type = isVideoFile ? 'video' : 'image';
                    } else { throw new Error("Cloudinary Core Connection Refused"); }
                }

                status.innerText = "DATABASE ARCHITECTURE UPDATING...";

                await addDoc(collection(db, "posts"), { 
                    text: text || "", 
                    fileUrl: url, 
                    fileType: type, 
                    category: selectedCategory,
                    duration: videoDuration,
                    watchTime: 0,
                    userId: currentUser.uid, 
                    userName: userData?.name || "User", 
                    userPic: userData?.profilePic || "",
                    likes: 0, 
                    likedBy: [], 
                    commentCount: 0,
                    shares: 0,
                    views: 0,
                    viewsByUser: [],
                    isShadowBanned: false,
                    musicTitle: selectedAudioTitle,
                    musicUrl: selectedAudioUrl,
                    isCreatorMonetized: isMonetizedChecked, 
                    isMonetizationApproved: false,          
                    createdAt: serverTimestamp() 
                });

                status.innerText = "SUCCESS! REDIRECTING...";
                Swal.fire({ icon: 'success', title: 'Elite Reel Published!', showConfirmButton: false, timer: 1500 });
                setTimeout(() => window.location.href = "reels.html", 1500);

            } catch (error) {
                console.error(error);
                status.innerText = "TRANSMISSION FAILED. RETRY.";
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span class="uppercase tracking-widest text-[11px]">Publish Elite Reel</span>';
                Swal.fire('Upload Failed', 'সার্ভারে ফাইল আপলোড করার সময় সমস্যা হয়েছে!', 'error');
            }
        };
    </script>
</body>
</html>
