<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Messages - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050508; 
            color: #ffffff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .messenger-header { 
            background: rgba(5, 5, 8, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); 
        }
        
        .search-box { 
            background: rgba(255, 255, 255, 0.04); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease; 
        }
        .search-box:focus-within {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.03);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.08);
        }
        
        .msg-card { transition: all 0.2s ease; }
        .msg-card:active { 
            background-color: rgba(255, 255, 255, 0.03); 
            transform: scale(0.98); 
        }
        
        .active-story-ring {
            background: linear-gradient(45deg, #D4AF37, #F9E498, #AA8A3A);
            padding: 2px;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .unread-dot { 
            width: 9px; 
            height: 9px; 
            background: #D4AF37; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #D4AF37;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .nav-elite {
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .plus-btn {
            background: linear-gradient(135deg, #D4AF37, #8A6E2F);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* কল পপআপ গ্লাস মেটেরিয়াল অ্যানিমেশন */
        .call-popup-glass {
            background: rgba(10, 11, 18, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%) scale(0.9); opacity: 0; }
            to { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="pb-32">

    <div id="incomingCallPopup" class="hidden fixed top-10 left-1/2 -translate-x-1/2 w-[90%] max-w-[380px] call-popup-glass rounded-[28px] p-5 z-[99999] flex items-center gap-4">
        <div class="relative">
            <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-[#D4AF37] shadow-lg animate-pulse" id="callerImageContainer">
                <img id="callerPopupImg" src="" class="w-full h-full object-cover" alt="">
            </div>
            <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-[#D4AF37] rounded-full flex items-center justify-center border-2 border-[#050508]">
                <i class="fas fa-video text-[9px] text-black animate-spin"></i>
            </div>
        </div>
        <div class="flex-1 min-w-0">
            <h3 class="font-bold text-sm text-white truncate" id="callerPopupName">Incoming Call...</h3>
            <p class="text-xs text-gray-400 font-medium tracking-wide animate-pulse">My Book Elite Video Call</p>
        </div>
        <div class="flex gap-2.5">
            <button id="declineCallBtn" class="w-10 h-10 bg-red-600 hover:bg-red-700 active:scale-90 transition rounded-full flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-phone-slash text-sm"></i>
            </button>
            <button id="acceptCallBtn" class="w-10 h-10 bg-emerald-500 hover:bg-emerald-600 active:scale-90 transition rounded-full flex items-center justify-center text-black shadow-lg">
                <i class="fas fa-phone text-sm"></i>
            </button>
        </div>
    </div>

    <nav class="messenger-header sticky top-0 z-50 px-5 pt-6 pb-4 max-w-md mx-auto">
        <div>
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <span class="text-[#D4AF37] font-bold text-xs uppercase tracking-wider cursor-pointer active:opacity-60 transition">Edit</span>
                </div>
                <h1 class="text-xl font-black tracking-wider italic uppercase text-white">Chats</h1>
                <a href="new-chat.html" class="w-9 h-9 bg-white/5 rounded-full flex items-center justify-center text-[#D4AF37] border border-white/5 active:scale-90 transition">
                    <i class="fas fa-edit text-xs"></i>
                </a>
            </div>
            
            <div class="search-box flex items-center px-4 py-2.5">
                <i class="fas fa-search text-xs mr-3 text-[#D4AF37] opacity-60"></i>
                <input type="text" id="chatSearch" placeholder="Search" class="bg-transparent border-none outline-none text-xs w-full text-white placeholder-gray-500 font-medium">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="mt-4 px-5">
            <div id="userSuggestions" class="flex gap-4 overflow-x-auto pb-3 pt-1 no-scrollbar">
                <div class="w-14 h-14 bg-white/5 rounded-full anonymity animate-pulse shrink-0"></div>
                <div class="w-14 h-14 bg-white/5 rounded-full anonymity animate-pulse shrink-0"></div>
                <div class="w-14 h-14 bg-white/5 rounded-full anonymity animate-pulse shrink-0"></div>
            </div>
        </div>

        <div class="mt-2">
            <div id="chatList" class="divide-y divide-white/[0.01]">
                <div class="px-5 py-4 flex gap-3.5 animate-pulse">
                    <div class="w-14 h-14 bg-white/5 rounded-full"></div>
                    <div class="flex-1 space-y-2.5 py-1.5">
                        <div class="h-3 bg-white/5 rounded w-1/3"></div>
                        <div class="h-2 bg-white/5 rounded w-2/3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-elite fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] rounded-[30px] p-3.5 flex justify-around items-center z-[100]">
        <a href="reels.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-th-large"></i></a>
        <a href="search.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-compass"></i></a>
        <div onclick="location.href='post.html'" class="plus-btn w-11 h-11 rounded-xl flex items-center justify-center active:scale-90 transition cursor-pointer">
            <i class="fas fa-plus text-sm"></i>
        </div>
        <a href="messages.html" class="text-[#D4AF37] text-base drop-shadow-[0_0_8px_rgba(212,175,55,0.4)]"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-user-circle"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let cachedUsers = {}; 
        let ringtoneAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-84.wav'); 
        ringtoneAudio.loop = true;

        // গ্লোবাল সেশন সিঙ্ক ও সংশোধিত লগইন রিডাইরেকশন লজিক
        onAuthStateChanged(auth, user => {
            if(user) {
                initInboxEngine(user.uid);
                listenForIncomingCalls(user.uid); 
            } else { 
                // আগের index.html সম্পূর্ণ বাদ দিয়ে login.html এখানে পারফেক্টলি সেট করা হলো
                const loginPage = "login.html"; 
                
                // কারেন্ট পেজ যদি অলরেডি লগইন পেজ না হয়, তবেই কেবল রিডাইরেক্ট করবে (ক্র্যাশ লুপ প্রোটেকশন)
                if (!window.location.href.toLowerCase().includes(loginPage.toLowerCase())) {
                    window.location.href = loginPage; 
                }
            }
        });

        function initInboxEngine(myId) {
            onSnapshot(collection(db, "users"), (userSnap) => {
                userSnap.forEach(d => {
                    cachedUsers[d.id] = { id: d.id, ...d.data() };
                });
                renderActiveStories(myId);
                loadRecentChats(myId);
            });
        }

        // মাল্টি-আর্কিটেকচার গ্লোবাল ইনকামিং কল লিসেনার (১০০% ওয়াটারপ্রুফ লজিক)
        function listenForIncomingCalls(myId) {
            onSnapshot(collection(db, "calls"), (snapshot) => {
                let activeCallFound = false;

                snapshot.forEach((callDoc) => {
                    const callData = callDoc.data();
                    const docId = callDoc.id;

                    // লজিক চেক: ডকুমেন্ট আইডি, ফিল্ডের targetId অথবা কম্পোজিট আইডির শেষ অংশ আমার UID এর সাথে মিললে
                    if (docId === myId || callData.targetId === myId || docId.endsWith(`_${myId}`)) {
                        
                        // স্ট্যাটাস ট্র্যাকিং লজিক
                        if (callData.status === 'dialing' || callData.status === 'ringing') {
                            activeCallFound = true;
                            
                            // কলার আইডি এক্সট্রাকশন লজিক
                            const callerId = callData.callerId || docId.split('_')[0];
                            const callerInfo = cachedUsers[callerId] || { name: "Elite User", profilePic: "" };

                            // পপআপ রেন্ডারিং লজিক
                            document.getElementById('callerPopupName').innerText = callerInfo.name;
                            document.getElementById('callerPopupImg').src = callerInfo.profilePic || 'https://via.placeholder.com/150';
                            document.getElementById('incomingCallPopup').classList.remove('hidden');
                            
                            // ব্রাউজার পলিসি সেফ অডিও প্লে লজিক
                            ringtoneAudio.play().catch(()=>{});

                            // কল রিসিভ অ্যাকশন লজিক
                            document.getElementById('acceptCallBtn').onclick = async () => {
                                ringtoneAudio.pause();
                                await updateDoc(doc(db, "calls", docId), { status: 'connected' }).catch(()=>{});
                                window.location.href = `chat.html?id=${callerId}&room=${docId}`;
                            };

                            // কল রিজেক্ট অ্যাকশন লজিক
                            document.getElementById('declineCallBtn').onclick = async () => {
                                ringtoneAudio.pause();
                                await deleteDoc(doc(db, "calls", docId)).catch(()=>{});
                                document.getElementById('incomingCallPopup').classList.add('hidden');
                            };
                        }
                    }
                });

                // কোনো এক্টিভ কল না থাকলে বা রিসিভ/ডিক্লাইন হয়ে গেলে ক্লিনিং লজিক ট্রিগার
                if (!activeCallFound) {
                    ringtoneAudio.pause();
                    document.getElementById('incomingCallPopup').classList.add('hidden');
                }
            });
        }

        function renderActiveStories(myId) {
            const container = document.getElementById('userSuggestions');
            container.innerHTML = "";
            
            Object.values(cachedUsers).forEach(u => {
                if(u.id !== myId) {
                    const isOnline = u.isOnline || u.online;
                    container.innerHTML += `
                        <a href="chat.html?id=${u.id}" class="story-node flex-shrink-0 text-center w-14 group active:scale-90 transition">
                            <div class="w-[56px] h-[56px] active-story-ring mx-auto mb-1 relative p-[1.5px]">
                                <div class="w-full h-full bg-[#050508] rounded-full p-[2px]">
                                    <div class="w-full h-full bg-neutral-900 rounded-full overflow-hidden border border-white/5 flex items-center justify-center">
                                        ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-sm">${u.name?.[0] || '?'}</div>`}
                                    </div>
                                </div>
                                ${isOnline ? `<div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-[#D4AF37] border-2 border-[#050508] rounded-full"></div>` : ''}
                            </div>
                            <p class="story-name text-[10px] font-medium text-gray-400 truncate px-0.5">${u.name?.split(' ')[0] || 'User'}</p>
                        </a>`;
                }
            });
            
            if(container.innerHTML === "") {
                container.innerHTML = `<div class="text-gray-600 text-[10px] font-bold uppercase py-2">No Active Nodes</div>`;
            }
        }

        function loadRecentChats(myId) {
            onSnapshot(collection(db, "chats"), async (snapshot) => {
                const list = document.getElementById('chatList');
                let chatData = [];

                const promises = snapshot.docs.map(async (chatDoc) => {
                    const ids = chatDoc.id.split('_');
                    if(ids.includes(myId)) {
                        const targetId = ids.find(id => id !== myId);
                        const data = chatDoc.data();
                        
                        let lastMsg = data.lastMessage || "Tap to chat";
                        let lastTime = data.lastMessageTimestamp?.toMillis() || 0;
                        
                        const uData = cachedUsers[targetId];
                        
                        if(uData) {
                            let hasUnread = false;
                            const msgQuery = query(collection(db, "chats", chatDoc.id, "messages"), orderBy("timestamp", "desc"), limit(1));
                            const msgSnap = await getDocs(msgQuery);
                            
                            if(!msgSnap.empty) {
                                const lastMsgData = msgSnap.docs[0].data();
                                if(lastMsgData.senderId !== myId && lastMsgData.isSeen === false) {
                                    hasUnread = true;
                                }
                                if(lastMsgData.timestamp?.toMillis() > lastTime) {
                                    lastTime = lastMsgData.timestamp.toMillis();
                                }
                            }

                            return { ...uData, lastMsg, lastTime, hasUnread };
                        }
                    }
                    return null;
                });

                const results = await Promise.all(promises);
                chatData = results.filter(c => c !== null);

                chatData.sort((a, b) => b.lastTime - a.lastTime);

                list.innerHTML = chatData.length === 0 ? `<div class="text-center py-20 text-gray-600 font-bold uppercase tracking-widest text-[10px]">No Conversations</div>` : "";

                chatData.forEach(u => {
                    const timeString = u.lastTime ? new Date(u.lastTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                    const isOnline = u.isOnline || u.online;
                    const statusColor = isOnline ? 'bg-[#D4AF37]' : 'bg-neutral-600';
                    
                    list.innerHTML += `
                        <a href="chat.html?id=${u.id}" class="msg-card flex items-center gap-3.5 px-5 py-3.5 hover:bg-white/[0.01]">
                            <div class="relative flex-shrink-0">
                                <div class="w-[56px] h-[56px] rounded-full overflow-hidden bg-neutral-900 border border-white/5 flex items-center justify-center shadow-md">
                                    ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-base">${u.name?.[0] || '?'}</div>`}
                                </div>
                                <div class="absolute bottom-0 right-0 w-3.5 h-3.5 ${statusColor} border-[2.5px] border-[#050508] rounded-full"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <h4 class="font-semibold text-[14px] ${u.hasUnread ? 'text-white font-extrabold' : 'text-gray-300'} truncate pr-2">${u.name || 'User'}</h4>
                                    <span class="text-[10px] ${u.hasUnread ? 'text-[#D4AF37] font-bold' : 'text-gray-500'} font-medium flex-shrink-0">${timeString}</span>
                                </div>
                                <div class="flex items-center justify-between gap-2">
                                    <p class="text-[12px] ${u.hasUnread ? 'text-white font-bold' : 'text-gray-400'} truncate flex-1 font-medium">${u.lastMsg}</p>
                                    ${u.hasUnread ? `<div class="unread-dot flex-shrink-0"></div>` : ''}
                                </div>
                            </div>
                        </a>`;
                });
            });
        }

        document.getElementById('chatSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            
            document.querySelectorAll('.msg-card').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });

            document.querySelectorAll('.story-node').forEach(node => {
                const name = node.querySelector('.story-name').innerText.toLowerCase();
                node.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
