<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .search-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(99, 102, 241, 0.2); }
        .user-card { transition: 0.3s; border: 1px solid transparent; }
        .user-card:active { transform: scale(0.97); background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.2); }
        .online-dot { box-shadow: 0 0 10px #22c55e; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 glass p-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-slate-400 text-xl"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-xl font-black tracking-tighter uppercase italic text-indigo-400">Chats</h1>
        </div>
        <div class="flex gap-4">
            <i class="fas fa-circle-plus text-xl text-slate-500"></i>
            <i class="fas fa-ellipsis-v text-xl text-slate-500"></i>
        </div>
    </header>

    <div class="px-6 py-4">
        <div class="relative flex items-center mb-8">
            <i class="fas fa-search absolute left-5 text-indigo-500 text-sm"></i>
            <input type="text" id="userSearch" placeholder="Search friends to chat..." 
                class="search-box w-full rounded-2xl py-4 pl-12 pr-5 text-xs outline-none focus:border-indigo-500 transition shadow-2xl text-white">
        </div>

        <div class="mb-8">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[3px] mb-4">Online Now</h2>
            <div id="activeList" class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[3px] mb-2">Recent Conversations</h2>
            <div id="userList" class="space-y-1">
                <div id="loader" class="text-center py-20 text-indigo-500 opacity-50">
                    <i class="fas fa-spinner fa-spin text-3xl"></i>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadAllUsers(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadAllUsers(myId) {
            const listDiv = document.getElementById('userList');
            const activeDiv = document.getElementById('activeList');
            const searchInput = document.getElementById('userSearch');

            onSnapshot(collection(db, "users"), (snapshot) => {
                let users = [];
                snapshot.forEach(doc => {
                    if (doc.id !== myId) users.push({ id: doc.id, ...doc.data() });
                });

                const render = (filteredUsers) => {
                    listDiv.innerHTML = "";
                    activeDiv.innerHTML = "";
                    
                    if(filteredUsers.length === 0) {
                        listDiv.innerHTML = `<div class="text-center py-20 opacity-20"><i class="fas fa-comment-slash text-5xl mb-4"></i><p class="text-xs">No users found</p></div>`;
                        return;
                    }

                    filteredUsers.forEach(u => {
                        const isOnline = u.status === "online"; 
                        const lastMsg = u.lastMsg || "Tap to start conversation...";
                        
                        // Active Stories (Top Horizontal List)
                        if(isOnline) {
                            activeDiv.innerHTML += `
                                <div class="flex-shrink-0 flex flex-col items-center gap-2">
                                    <div class="relative p-1 border-2 border-indigo-500 rounded-full">
                                        <img src="${u.profilePic || 'https://via.placeholder.com/100'}" class="w-14 h-14 rounded-full object-cover">
                                        <span class="absolute bottom-1 right-1 w-3 h-3 bg-green-500 border-2 border-[#05070a] rounded-full online-dot"></span>
                                    </div>
                                    <span class="text-[9px] font-bold text-slate-400">@${(u.name || 'User').split(' ')[0]}</span>
                                </div>
                            `;
                        }

                        // Main List
                        listDiv.innerHTML += `
                            <a href="chat.html?id=${u.id}" class="user-card flex items-center gap-4 p-4 rounded-[1.5rem] glass mb-3">
                                <div class="relative">
                                    <img src="${u.profilePic || 'https://via.placeholder.com/100'}" class="w-14 h-14 rounded-2xl object-cover border border-white/5">
                                    ${isOnline ? '<span class="absolute -top-1 -right-1 w-4 h-4 bg-green-500 border-4 border-[#05070a] rounded-full"></span>' : ''}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-center">
                                        <h3 class="font-black text-sm tracking-tight text-white">${u.name || 'User'}</h3>
                                        <span class="text-[8px] font-black ${isOnline ? 'text-green-500' : 'text-slate-600'} uppercase">${isOnline ? 'Active' : 'Away'}</span>
                                    </div>
                                    <p class="text-xs text-slate-500 mt-1 line-clamp-1 font-medium">${lastMsg}</p>
                                </div>
                                <div class="text-indigo-500 opacity-30">
                                    <i class="fas fa-chevron-right text-xs"></i>
                                </div>
                            </a>
                        `;
                    });
                };

                render(users);

                searchInput.oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = users.filter(u => u.name?.toLowerCase().includes(term));
                    render(filtered);
                };
            });
        }

        window.onbeforeunload = () => {
            if(auth.currentUser) updateDoc(doc(db, "users", auth.currentUser.uid), { status: "offline" });
        };
    </script>
</body>
</html>
