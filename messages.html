<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Messages - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050508; 
            color: #ffffff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* এলিট হেডার গ্লাস */
        .ios-header { 
            background: rgba(5, 5, 8, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-b: 1px solid rgba(212, 175, 55, 0.15); 
        }
        
        /* গোল্ডেন নিওন সার্চ বক্স */
        .search-box { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 16px; 
            border: 1px solid rgba(212, 175, 55, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .search-box:focus-within {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.04);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        
        .msg-card { 
            transition: all 0.25s ease; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .msg-card:active { 
            background-color: rgba(212, 175, 55, 0.04); 
            transform: scale(0.99); 
        }
        
        /* গোল্ডেন স্টোরি রিং */
        .story-ring {
            background: linear-gradient(45deg, #D4AF37, #F9E498, #AA8A3A);
            padding: 1.5px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
            border-radius: 22px;
        }

        .unread-dot { 
            width: 8px; 
            height: 8px; 
            background: #D4AF37; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #D4AF37;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* নিচের নেভিগেশন বার */
        .nav-elite {
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .plus-btn {
            background: linear-gradient(135deg, #D4AF37, #8A6E2F);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="pb-32">

    <nav class="ios-header sticky top-0 z-50 px-6 pt-8 pb-4 max-w-md mx-auto">
        <div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-[#D4AF37] font-bold text-xs uppercase tracking-wider cursor-pointer active:opacity-60 transition">Edit</span>
                <h1 class="text-xl font-black tracking-wider italic uppercase text-white">My Book <span class="text-[#D4AF37]">Elite</span></h1>
                <a href="new-chat.html" class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center text-[#D4AF37] border border-white/5 active:scale-90 transition">
                    <i class="fas fa-edit text-xs"></i>
                </a>
            </div>
            <div class="search-box flex items-center px-4 py-3">
                <i class="fas fa-search text-xs mr-3 text-[#D4AF37] opacity-60"></i>
                <input type="text" id="chatSearch" placeholder="Search elite members..." class="bg-transparent border-none outline-none text-xs w-full text-white placeholder-gray-500 font-medium">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="mt-6 px-6">
            <h3 class="text-[9px] font-black text-[#D4AF37] uppercase tracking-[3px] mb-4 opacity-90">Active Now</h3>
            <div id="userSuggestions" class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
                <div class="w-16 h-16 bg-white/5 rounded-[20px] animate-pulse shrink-0"></div>
                <div class="w-16 h-16 bg-white/5 rounded-[20px] animate-pulse shrink-0"></div>
                <div class="w-16 h-16 bg-white/5 rounded-[20px] animate-pulse shrink-0"></div>
            </div>
        </div>

        <div class="mt-4">
            <div id="chatList">
                <div class="px-6 py-5 flex gap-4 animate-pulse">
                    <div class="w-14 h-14 bg-white/5 rounded-[22px]"></div>
                    <div class="flex-1 space-y-3 py-1">
                        <div class="h-3 bg-white/5 rounded w-1/4"></div>
                        <div class="h-2 bg-white/5 rounded w-3/4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-elite fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] rounded-[30px] p-3.5 flex justify-around items-center z-[100]">
        <a href="home.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-th-large"></i></a>
        <a href="search.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-compass"></i></a>
        <div onclick="location.href='post.html'" class="plus-btn w-11 h-11 rounded-xl flex items-center justify-center active:scale-90 transition cursor-pointer">
            <i class="fas fa-plus text-sm"></i>
        </div>
        <a href="messages.html" class="text-[#D4AF37] text-base drop-shadow-[0_0_8px_rgba(212,175,55,0.4)]"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="text-gray-500 text-base transition-all active:scale-90"><i class="fas fa-user-circle"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                loadAllUsers(user.uid);
                loadRecentChats(user.uid);
            } else { window.location.href = "index.html"; }
        });

        async function loadAllUsers(myId) {
            onSnapshot(collection(db, "users"), (snap) => {
                const container = document.getElementById('userSuggestions');
                container.innerHTML = "";
                snap.forEach(d => {
                    if(d.id !== myId) {
                        const u = d.data();
                        container.innerHTML += `
                            <a href="chat.html?id=${d.id}" class="flex-shrink-0 text-center w-16 group active:scale-90 transition">
                                <div class="w-14 h-14 story-ring mx-auto mb-1.5">
                                    <div class="w-full h-full bg-[#050508] rounded-[21px] p-[2px]">
                                        <div class="w-full h-full bg-neutral-900 rounded-[19px] overflow-hidden border border-white/5 flex items-center justify-center">
                                            ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-base">${u.name?.[0] || '?'}</div>`}
                                        </div>
                                    </div>
                                </div>
                                <p class="text-[10px] font-bold text-gray-400 truncate px-0.5">${u.name?.split(' ')[0] || 'User'}</p>
                            </a>`;
                    }
                });
                if(container.innerHTML === "") {
                    container.innerHTML = `<div class="text-gray-600 text-[10px] font-bold uppercase py-2">No Active Members</div>`;
                }
            });
        }

        function loadRecentChats(myId) {
            onSnapshot(collection(db, "chats"), async (snapshot) => {
                const list = document.getElementById('chatList');
                let chatData = [];

                const promises = snapshot.docs.map(async (chatDoc) => {
                    const ids = chatDoc.id.split('_');
                    if(ids.includes(myId)) {
                        const targetId = ids.find(id => id !== myId);
                        const data = chatDoc.data();
                        const lastMsg = data.lastMessage || "Tap to chat";
                        const lastTime = data.lastMessageTimestamp?.toMillis() || 0;
                        const uSnap = await getDoc(doc(db, "users", targetId));
                        
                        if(uSnap.exists()) {
                            return { id: targetId, ...uSnap.data(), lastMsg, lastTime };
                        }
                    }
                    return null;
                });

                const results = await Promise.all(promises);
                chatData = results.filter(c => c !== null).sort((a, b) => b.lastTime - a.lastTime);

                list.innerHTML = chatData.length === 0 ? `<div class="text-center py-20 text-gray-600 font-bold uppercase tracking-widest text-[10px]">No Elite Conversations</div>` : "";

                chatData.forEach(u => {
                    const timeString = u.lastTime ? new Date(u.lastTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                    const statusColor = u.isOnline ? 'bg-[#D4AF37]' : 'bg-neutral-600';
                    
                    list.innerHTML += `
                        <a href="chat.html?id=${u.id}" class="msg-card flex items-center gap-4 px-6 py-4.5">
                            <div class="relative flex-shrink-0">
                                <div class="w-[54px] h-[54px] rounded-[18px] overflow-hidden bg-neutral-900 border border-white/10 shadow-lg flex items-center justify-center">
                                    ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-lg">${u.name?.[0] || '?'}</div>`}
                                </div>
                                <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 ${statusColor} border-[2.5px] border-[#050508] rounded-full"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <h4 class="font-bold text-[14px] text-white truncate pr-2">${u.name || 'User'}</h4>
                                    <span class="text-[9px] text-[#D4AF37] font-bold uppercase tracking-wider flex-shrink-0">${timeString}</span>
                                </div>
                                <div class="flex items-center justify-between gap-2">
                                    <p class="text-[12px] text-gray-500 truncate flex-1">${u.lastMsg}</p>
                                    ${u.unreadCount > 0 ? `<div class="unread-dot flex-shrink-0"></div>` : ''}
                                </div>
                            </div>
                        </a>`;
                });
            });
        }

        document.getElementById('chatSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.msg-card').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
