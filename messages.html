<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Bondo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050508; color: #e2e8f0; }
        .glass { background: rgba(11, 15, 25, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20 bg-[#050508]">

    <header class="glass sticky top-0 z-50 px-5 py-4 border-b border-white/5 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white"><i class="fas fa-arrow-left text-sm"></i></button>
            <h1 class="font-black text-lg tracking-wide text-white">Inbox Messages</h1>
        </div>
        <div class="w-9 h-9 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <i class="fas fa-comment-dots text-white text-sm"></i>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-3">
        <div class="relative mb-4">
            <i class="fas fa-search absolute left-4 top-3.5 text-gray-500 text-xs"></i>
            <input type="text" id="searchInbox" placeholder="Search conversations..." class="w-full bg-black/40 text-xs text-white border border-white/5 rounded-xl pl-10 pr-4 py-3 outline-none focus:border-indigo-500 transition">
        </div>

        <div id="inboxContainer" class="space-y-2">
            <div class="text-center py-10 text-gray-500 text-xs font-semibold animate-pulse">Syncing encrypted chat rooms...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগ (অ্যাডমিন প্যানেলের সাথে সেম)
        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                loadInboxRooms();
            } else {
                window.location.href = "login.html";
            }
        });

        function loadInboxRooms() {
            // ইউজারের চ্যাট রুমগুলো লোড করা হচ্ছে (যেখানে সে নিজে জড়িত)
            const chatQuery = query(
                collection(db, "chats"),
                where("participants", "array-contains", currentUserId),
                orderBy("lastMessageTime", "desc")
            );

            onSnapshot(chatQuery, async (snapshot) => {
                const inboxContainer = document.getElementById('inboxContainer');
                inboxContainer.innerHTML = "";

                if(snapshot.empty) {
                    inboxContainer.innerHTML = `<div class="text-center py-12 text-gray-600 text-xs font-medium">কোনো মেসেজ নেই ভাই। নতুন কারোর প্রোফাইলে গিয়ে চ্যাট শুরু করুন!</div>`;
                    return;
                }

                for (const changeDoc of snapshot.docs) {
                    const chatData = changeDoc.data();
                    const roomId = changeDoc.id;

                    // অপর প্রান্তের ইউজারের আইডি বের করা হচ্ছে
                    const targetUserId = chatData.participants.find(id => id !== currentUserId);
                    if(!targetUserId) continue;

                    // ফায়ারবেস থেকে অপর ইউজারের প্রোফাইল ডিটেইলস আনা হচ্ছে
                    const userDoc = await getDoc(doc(db, "users", targetUserId));
                    const userData = userDoc.exists() ? userDoc.data() : { name: "Bondo Creator", profilePic: "https://via.placeholder.com/100" };

                    const card = document.createElement('div');
                    card.className = "glass p-3.5 rounded-2xl flex items-center justify-between gap-3 cursor-pointer hover:bg-white/5 transition active:scale-[0.99]";
                    card.onclick = () => window.location.href = `chat.html?roomId=${roomId}&targetId=${targetUserId}`;

                    card.innerHTML = `
                        <div class="flex items-center gap-3 truncate flex-1">
                            <img src="${userData.profilePic || 'https://via.placeholder.com/100'}" class="w-11 h-11 rounded-xl object-cover border border-white/5">
                            <div class="truncate flex-1">
                                <h4 class="font-bold text-xs text-white truncate">${userData.name}</h4>
                                <p class="text-[11px] text-gray-500 truncate mt-0.5">${chatData.lastMessage || 'Sent a media node...'}</p>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <span class="text-[9px] font-bold text-gray-600">${chatData.lastMessageTime ? new Date(chatData.lastMessageTime.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                            ${chatData.unreadCount && chatData.lastSenderId !== currentUserId ? `
                                <span class="bg-indigo-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded-full">${chatData.unreadCount}</span>
                            ` : ''}
                        </div>
                    `;
                    inboxContainer.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
