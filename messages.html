<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-white p-4 border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black text-gray-800 italic uppercase">Messages</h1>
            <a href="search.html" class="bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-blue-600 transition"><i class="fas fa-edit"></i></a>
        </div>
    </nav>

    <div id="chatList" class="max-w-md mx-auto p-4 space-y-4">
        <p id="loader" class="text-center text-xs text-gray-400 mt-10">আপনার ইনবক্স চেক করা হচ্ছে...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) loadRecentChats(user.uid);
            else window.location.href = "index.html";
        });

        function loadRecentChats(myUid) {
            // আপনার সকল চ্যাট রুম খুঁজে বের করা
            onSnapshot(collection(db, "chats"), (snapshot) => {
                const list = document.getElementById('chatList');
                list.innerHTML = "";
                document.getElementById('loader').classList.add('hidden');

                snapshot.forEach(async (chatDoc) => {
                    const ids = chatDoc.id.split('_');
                    if (ids.includes(myUid)) {
                        const targetId = ids.find(id => id !== myUid);
                        const userSnap = await getDoc(doc(db, "users", targetId));
                        if(userSnap.exists()){
                            const u = userSnap.data();
                            list.innerHTML += `
                                <a href="chat.html?id=${targetId}" class="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-50 active:scale-95 transition">
                                    <div class="w-14 h-14 bg-indigo-500 rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold text-xl overflow-hidden shadow-md">
                                        ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : u.name?.[0] || 'U'}
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-bold text-gray-800 text-sm">${u.name || 'User'}</h3>
                                        <p class="text-[11px] text-gray-400 truncate">চ্যাট করতে এখানে ক্লিক করুন...</p>
                                    </div>
                                    <div class="text-[10px] text-indigo-500 font-bold uppercase italic">Open</div>
                                </a>`;
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
