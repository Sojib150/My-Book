<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; -webkit-tap-highlight-color: transparent; }
        
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .ios-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .ios-card:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Story Ring */
        .story-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2.5px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .search-box { background: rgba(118, 118, 128, 0.12); border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen pb-28 text-[#1c1c1e]">

    <nav class="ios-blur sticky top-0 z-50 px-5 pt-8 pb-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-4">
                <h1 class="text-3xl font-extrabold tracking-tight">Messages</h1>
                <div class="flex gap-4">
                    <a href="search.html" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-800"><i class="fas fa-camera text-sm"></i></a>
                    <a href="profile.html" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-800"><i class="fas fa-pen-to-square text-sm"></i></a>
                </div>
            </div>
            <div class="search-box flex items-center px-3 py-2 text-gray-500">
                <i class="fas fa-search text-xs mr-2 opacity-50"></i>
                <input type="text" placeholder="Search" class="bg-transparent border-none outline-none text-sm w-full placeholder-gray-500">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-5">
        
        <div class="mt-6">
            <div id="userSuggestions" class="flex gap-5 overflow-x-auto pb-2 no-scrollbar">
                </div>
        </div>

        <div class="mt-8">
            <h3 class="text-[12px] font-bold text-gray-400 uppercase tracking-wider mb-4 px-1">Chats</h3>
            <div id="chatList" class="space-y-1">
                <div class="flex justify-center py-10">
                    <div class="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-black/90 backdrop-blur-2xl rounded-[32px] p-3 shadow-2xl flex justify-around items-center z-[100]">
        <a href="home.html" class="p-3 text-gray-500"><i class="fas fa-house-chimney text-lg"></i></a>
        <a href="messages.html" class="p-3 text-white"><i class="fas fa-comment-nodes text-lg"></i></a>
        <div onclick="location.href='post.html'" class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-indigo-500/40 active:scale-90 transition"><i class="fas fa-plus"></i></div>
        <a href="notifications.html" class="p-3 text-gray-500"><i class="fas fa-bell text-lg"></i></a>
        <a href="profile.html" class="p-3 text-gray-500"><i class="fas fa-user text-lg"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", authDomain: "seen-a1d92.firebaseapp.com", projectId: "seen-a1d92", storageBucket: "seen-a1d92.firebasestorage.app", messagingSenderId: "868584044532", appId: "1:868584044532:web:51f07436a883f88332eba1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                loadAllUsers(user.uid);
                loadRecentChats(user.uid);
            } else { window.location.href = "index.html"; }
        });

        async function loadAllUsers(myId) {
            const snap = await getDocs(collection(db, "users"));
            const container = document.getElementById('userSuggestions');
            container.innerHTML = "";
            snap.forEach(d => {
                if(d.id !== myId) {
                    const u = d.data();
                    container.innerHTML += `
                        <a href="chat.html?id=${d.id}" class="flex-shrink-0 text-center w-16 ios-card">
                            <div class="w-16 h-16 rounded-full story-ring mx-auto mb-2 shadow-lg">
                                <div class="w-full h-full bg-white rounded-full p-0.5">
                                    <div class="w-full h-full bg-gray-100 rounded-full overflow-hidden flex items-center justify-center">
                                        ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<span class="text-xs font-bold text-gray-400">${u.name?.[0]}</span>`}
                                    </div>
                                </div>
                            </div>
                            <p class="text-[10px] font-bold text-gray-800 truncate px-1">${u.name || 'User'}</p>
                        </a>`;
                }
            });
        }

        function loadRecentChats(myId) {
            onSnapshot(collection(db, "chats"), async (snapshot) => {
                const list = document.getElementById('chatList');
                list.innerHTML = "";
                snapshot.forEach(async (chatDoc) => {
                    const ids = chatDoc.id.split('_');
                    if(ids.includes(myId)) {
                        const targetId = ids.find(id => id !== myId);
                        const uSnap = await getDoc(doc(db, "users", targetId));
                        if(uSnap.exists()) {
                            const u = uSnap.data();
                            list.innerHTML += `
                                <a href="chat.html?id=${targetId}" class="flex items-center gap-4 py-3 border-b border-gray-50 ios-card active:bg-gray-50 rounded-xl px-2">
                                    <div class="relative flex-shrink-0">
                                        <div class="w-14 h-14 rounded-full overflow-hidden bg-gray-200 border border-gray-100">
                                            ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-gray-400">${u.name?.[0]}</div>`}
                                        </div>
                                        <div class="absolute bottom-0.5 right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex justify-between items-baseline mb-0.5">
                                            <h4 class="font-bold text-[14px] text-gray-900 truncate">${u.name || 'User'}</h4>
                                            <span class="text-[10px] text-gray-400 font-medium">Just now</span>
                                        </div>
                                        <p class="text-[12px] text-gray-500 truncate font-medium">Tap to open conversation</p>
                                    </div>
                                </a>`;
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
