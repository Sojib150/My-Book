<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইনবক্স চ্যাট লিস্ট</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0a0e17; color: #ffffff; padding: 15px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header h2 { color: #d4af37; font-size: 22px; font-weight: 600; }
        .header i { color: #d4af37; font-size: 20px; }

        /* চ্যাট লিস্ট কন্টেইনার */
        .chat-list { display: flex; flex-direction: column; gap: 10px; }
        
        .chat-user-item { 
            background: linear-gradient(135deg, #111726 0%, #0d1321 100%); 
            border: 1px solid rgba(212, 175, 55, 0.05); 
            border-radius: 16px; padding: 14px; 
            display: flex; align-items: center; gap: 15px; 
            text-decoration: none; color: inherit; transition: 0.3s ease;
        }
        .chat-user-item:hover { border-color: #d4af37; transform: translateY(-1px); }
        
        /* চ্যাট হেড / অ্যাভাটার */
        .avatar-container { position: relative; }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #d4af37; object-fit: cover; }
        .online-dot { width: 12px; height: 12px; background: #34c759; border-radius: 50%; position: absolute; bottom: 3px; right: 3px; border: 2px solid #0a0e17; }

        .chat-info { flex: 1; }
        .user-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .username { font-size: 16px; font-weight: 600; color: #ffffff; }
        .msg-time { font-size: 11px; color: #a0aec0; }
        
        .msg-preview-row { display: flex; justify-content: space-between; align-items: center; }
        .last-msg { font-size: 13px; color: #a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        
        /* আনরিড মেসেজ কাউন্ট */
        .unread-count { background: #d4af37; color: #0a0e17; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>মেসেজ</h2>
        <i class="fas fa-comment-medical"></i>
    </div>

    <div class="chat-list">
        <a href="chat.html" class="chat-user-item">
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150" class="user-avatar" alt="User">
                <div class="online-dot"></div>
            </div>
            <div class="chat-info">
                <div class="user-meta">
                    <span class="username">টিনা শর্মা</span>
                    <span class="msg-time">এইমাত্র</span>
                </div>
                <div class="msg-preview-row">
                    <p class="last-msg">হাই সজীব! কল ধরছ না কেন? 🙈</p>
                    <div class="unread-count">2</div>
                </div>
            </div>
        </a>

        <a href="chat.html" class="chat-user-item">
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" class="user-avatar" alt="User">
            </div>
            <div class="chat-info">
                <div class="user-meta">
                    <span class="username">রাহুল আহমেদ</span>
                    <span class="msg-time">১০ মিনিট আগে</span>
                </div>
                <div class="msg-preview-row">
                    <p class="last-msg">ভাই, গিটহাবের কোডটা পুশ করে দিছি।</p>
                </div>
            </div>
        </a>
    </div>

</body>
</html>
