<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - My Book Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000000; 
            color: #ffffff; 
            overflow-x: hidden; 
        }
        
        /* এলিট হেডার */
        .ios-header { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
        }
        
        /* গোল্ডেন সার্চ বক্স */
        .search-box { 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 16px; 
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.3s; 
        }
        .search-box:focus-within {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }
        
        .msg-card { 
            transition: all 0.3s ease; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .msg-card:active { background-color: rgba(212, 175, 55, 0.05); transform: scale(0.98); }
        
        /* গোল্ডেন স্টোরি রিং */
        .story-ring {
            background: linear-gradient(45deg, #D4AF37, #F9E498, #AA8A3A);
            padding: 2px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            border-radius: 22px;
        }

        .unread-dot { 
            width: 8px; 
            height: 8px; 
            background: #D4AF37; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #D4AF37;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* নিচের নেভিগেশন বার */
        .nav-elite {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .plus-btn {
            background: linear-gradient(135deg, #D4AF37, #8A6E2F);
            color: #000;
        }
    </style>
</head>
<body class="pb-32">

    <nav class="ios-header sticky top-0 z-50 px-6 pt-10 pb-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-5">
                <span class="text-[#D4AF37] font-semibold text-sm">Edit</span>
                <h1 class="text-2xl font-extrabold tracking-tight text-white">My Book <span class="text-[#D4AF37]">Elite</span></h1>
                <a href="new-chat.html" class="w-9 h-9 bg-white/5 rounded-full flex items-center justify-center text-[#D4AF37] border border-white/10">
                    <i class="fas fa-edit text-sm"></i>
                </a>
            </div>
            <div class="search-box flex items-center px-4 py-3">
                <i class="fas fa-search text-sm mr-3 text-[#D4AF37] opacity-60"></i>
                <input type="text" id="chatSearch" placeholder="Search elite members..." class="bg-transparent border-none outline-none text-[15px] w-full text-white placeholder-gray-500 font-medium">
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="mt-6 px-6">
            <h3 class="text-[10px] font-black text-[#D4AF37] uppercase tracking-[3px] mb-4 opacity-80">Active Now</h3>
            <div id="userSuggestions" class="flex gap-5 overflow-x-auto pb-4 no-scrollbar">
                </div>
        </div>

        <div class="mt-4">
            <div id="chatList">
                <div class="px-6 py-4 flex gap-4 animate-pulse">
                    <div class="w-14 h-14 bg-white/5 rounded-[20px]"></div>
                    <div class="flex-1 space-y-3 py-1">
                        <div class="h-3 bg-white/5 rounded w-1/3"></div>
                        <div class="h-2 bg-white/5 rounded w-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-elite fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] rounded-[35px] p-4 flex justify-around items-center shadow-2xl z-[100]">
        <a href="home.html" class="text-gray-500 text-lg hover:text-[#D4AF37]"><i class="fas fa-th-large"></i></a>
        <a href="search.html" class="text-gray-500 text-lg hover:text-[#D4AF37]"><i class="fas fa-compass"></i></a>
        <div onclick="location.href='post.html'" class="plus-btn w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition cursor-pointer">
            <i class="fas fa-plus"></i>
        </div>
        <a href="messages.html" class="text-[#D4AF37] text-lg"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="text-gray-500 text-lg hover:text-[#D4AF37]"><i class="fas fa-user-circle"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                loadAllUsers(user.uid);
                loadRecentChats(user.uid);
            } else { window.location.href = "index.html"; }
        });

        async function loadAllUsers(myId) {
            onSnapshot(collection(db, "users"), (snap) => {
                const container = document.getElementById('userSuggestions');
                container.innerHTML = "";
                snap.forEach(d => {
                    if(d.id !== myId) {
                        const u = d.data();
                        container.innerHTML += `
                            <a href="chat.html?id=${d.id}" class="flex-shrink-0 text-center w-16 group active:scale-90 transition">
                                <div class="w-16 h-16 story-ring mx-auto mb-2">
                                    <div class="w-full h-full bg-black rounded-[20px] p-[2px]">
                                        <div class="w-full h-full bg-neutral-900 rounded-[18px] overflow-hidden border border-white/5">
                                            ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-lg">${u.name?.[0]}</div>`}
                                        </div>
                                    </div>
                                </div>
                                <p class="text-[10px] font-bold text-gray-400 truncate">${u.name?.split(' ')[0] || 'User'}</p>
                            </a>`;
                    }
                });
            });
        }

        function loadRecentChats(myId) {
            onSnapshot(collection(db, "chats"), async (snapshot) => {
                const list = document.getElementById('chatList');
                let chatData = [];

                const promises = snapshot.docs.map(async (chatDoc) => {
                    const ids = chatDoc.id.split('_');
                    if(ids.includes(myId)) {
                        const targetId = ids.find(id => id !== myId);
                        const data = chatDoc.data();
                        const lastMsg = data.lastMessage || "Tap to chat";
                        const lastTime = data.lastMessageTimestamp?.toMillis() || 0;
                        const uSnap = await getDoc(doc(db, "users", targetId));
                        
                        if(uSnap.exists()) {
                            return { id: targetId, ...uSnap.data(), lastMsg, lastTime };
                        }
                    }
                    return null;
                });

                const results = await Promise.all(promises);
                chatData = results.filter(c => c !== null).sort((a, b) => b.lastTime - a.lastTime);

                list.innerHTML = chatData.length === 0 ? `<div class="text-center py-20 text-gray-600 font-bold uppercase tracking-widest text-[10px]">No Elite Conversations</div>` : "";

                chatData.forEach(u => {
                    const timeString = u.lastTime ? new Date(u.lastTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                    const statusColor = u.isOnline ? 'bg-[#D4AF37]' : 'bg-neutral-600';
                    
                    list.innerHTML += `
                        <a href="chat.html?id=${u.id}" class="msg-card flex items-center gap-4 px-6 py-5">
                            <div class="relative flex-shrink-0">
                                <div class="w-[62px] h-[62px] rounded-[22px] overflow-hidden bg-neutral-900 border border-white/10 shadow-lg">
                                    ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-bold text-[#D4AF37] text-xl">${u.name?.[0]}</div>`}
                                </div>
                                <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 ${statusColor} border-[3px] border-black rounded-full"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <h4 class="font-bold text-[16px] text-white truncate">${u.name || 'User'}</h4>
                                    <span class="text-[10px] text-[#D4AF37] font-bold uppercase tracking-wider">${timeString}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <p class="text-[13px] text-gray-500 truncate max-w-[180px]">${u.lastMsg}</p>
                                    ${u.unreadCount > 0 ? `<div class="unread-dot"></div>` : ''}
                                </div>
                            </div>
                        </a>`;
                });
            });
        }

        document.getElementById('chatSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.msg-card').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
