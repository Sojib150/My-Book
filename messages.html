<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - My Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="font-bold text-gray-800 text-lg italic">Messages</h1>
            <a href="home.html" class="text-gray-400 text-xl"><i class="fas fa-times"></i></a>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-2">
        <div class="p-2">
            <div class="relative flex items-center">
                <i class="fas fa-search absolute left-4 text-gray-400 text-xs"></i>
                <input type="text" id="userSearch" placeholder="বন্ধুদের খুঁজুন..." 
                    class="w-full bg-white border border-gray-100 rounded-full py-2.5 pl-10 pr-4 text-xs outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
            </div>
        </div>

        <div class="mt-4 px-2">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[2px] mb-3">সক্রিয় বন্ধু ও চ্যাট</h2>
            <div id="userList" class="space-y-2">
                <div id="loader" class="text-center py-10 text-blue-500">
                    <i class="fas fa-circle-notch fa-spin text-2xl"></i>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD_TOgrehY8a5JD55FXHdRiFcZhHxctDkM", 
            authDomain: "seen-a1d92.firebaseapp.com", 
            projectId: "seen-a1d92", 
            storageBucket: "seen-a1d92.firebasestorage.app", 
            messagingSenderId: "868584044532", 
            appId: "1:868584044532:web:51f07436a883f88332eba1" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(user) {
                // অনলাইন স্ট্যাটাস আপডেট
                updateDoc(doc(db, "users", user.uid), { status: "online" });
                loadAllUsers(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function loadAllUsers(myId) {
            const listDiv = document.getElementById('userList');
            const searchInput = document.getElementById('userSearch');

            onSnapshot(collection(db, "users"), (snapshot) => {
                let users = [];
                snapshot.forEach(doc => {
                    if (doc.id !== myId) users.push({ id: doc.id, ...doc.data() });
                });

                const render = (filteredUsers) => {
                    listDiv.innerHTML = "";
                    if(filteredUsers.length === 0) {
                        listDiv.innerHTML = `<p class="text-center py-10 text-gray-300 text-xs">কাউকে পাওয়া যায়নি</p>`;
                        return;
                    }

                    filteredUsers.forEach(u => {
                        // আসল অনলাইন লজিক
                        const isOnline = u.status === "online"; 
                        // লাস্ট মেসেজ লজিক (যদি থাকে)
                        const lastMsg = u.lastMsg || "মেসেজ শুরু করতে ক্লিক করুন...";
                        
                        listDiv.innerHTML += `
                            <a href="chat.html?id=${u.id}" class="flex items-center gap-4 p-3 bg-white rounded-2xl hover:bg-blue-50 transition active:scale-[0.98] border border-gray-50 shadow-sm">
                                <div class="relative">
                                    <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold overflow-hidden shadow-inner text-lg">
                                        ${u.profilePic ? `<img src="${u.profilePic}" class="w-full h-full object-cover">` : (u.name ? u.name[0].toUpperCase() : 'U')}
                                    </div>
                                    <span class="absolute bottom-0 right-0 w-3.5 h-3.5 ${isOnline ? 'bg-green-500' : 'bg-gray-300'} border-2 border-white rounded-full shadow-sm"></span>
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-center">
                                        <h3 class="font-bold text-gray-800 text-sm">${u.name || 'User'}</h3>
                                        <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">${isOnline ? 'Active Now' : 'Offline'}</span>
                                    </div>
                                    <p class="text-[10px] text-gray-400 mt-0.5 truncate italic font-medium">${lastMsg}</p>
                                </div>
                                <div class="w-8 h-8 flex items-center justify-center text-blue-100">
                                    <i class="fab fa-facebook-messenger text-lg"></i>
                                </div>
                            </a>
                        `;
                    });
                };

                render(users);

                // সার্চ লজিক
                searchInput.oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = users.filter(u => u.name?.toLowerCase().includes(term));
                    render(filtered);
                };
            });
        }

        // ট্যাব বন্ধ করলে অফলাইন স্ট্যাটাস
        window.onbeforeunload = () => {
            if(auth.currentUser) updateDoc(doc(db, "users", auth.currentUser.uid), { status: "offline" });
        };
    </script>
</body>
</html>
